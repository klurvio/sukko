asyncapi: 3.0.0
info:
  title: Odin WebSocket Streaming API
  version: 1.0.0
  description: |
    Event streaming API for the Odin WebSocket infrastructure.

    This API documents the Kafka/Redpanda messaging layer for real-time token events.

    ## Topic Naming Patterns

    ### Infrastructure Topics (Shared Processing Pipeline)
    Pattern: `odin.{env}.{category}` and `odin.{env}.{category}.refined`

    The Flink processing pipeline consumes raw events and publishes refined events:
    - **Raw topics** (publisher writes): `odin.local.trade`, `odin.develop.trade`, `odin.main.trade`
    - **Refined topics** (ws-server consumes): `odin.local.trade.refined`, `odin.develop.trade.refined`

    Environment values: `local`, `develop`, `staging`, `main`

    ### Multi-Tenant Topics
    Pattern: `{namespace}.{tenant_id}.{category}`

    Tenants receive isolated topics provisioned via the Provisioning API:
    - Example: `main.acme-corp.trade`, `main.acme-corp.liquidity`
    - Topics are created when tenants are onboarded
    - Access controlled via JWT authentication with tenant-scoped keys

    Consumer types:
    - **Shared**: Multiple tenants share a consumer group (default)
    - **Dedicated**: Tenant gets isolated consumer for guaranteed throughput

    ## Categories
    - `trade` - Trading events (executions, buys, sells)
    - `liquidity` - Liquidity pool operations
    - `balance` - User balance and transfer events
    - `metadata` - Token metadata updates
    - `social` - Social verification and links
    - `community` - Comments, favorites, voting
    - `creation` - Token creation and listing
    - `analytics` - Price deltas, holder counts, trending

    ## Message Key
    All messages use the **token ID** as the Kafka message key for partition-based sharding.

    ## Authentication
    WebSocket connections support two authentication methods:

    ### 1. Tenant JWT (PostgresKeyRegistry)
    - Tokens include `kid` header referencing registered public key
    - Keys managed via Provisioning API
    - Best for: Multi-tenant SaaS deployments with key rotation

    ### 2. OIDC/JWKS Authentication
    - Tokens validated via JWKS discovery from configured issuers
    - Issuer URL in `iss` claim determines JWKS endpoint
    - Best for: Integration with existing identity providers

    **Token Routing:**
    The gateway automatically routes tokens to the appropriate validator:
    1. `kid` header present → Tenant JWT validator
    2. `iss` claim present → OIDC/JWKS validator

    See security schemes below for detailed requirements.
  externalDocs:
    description: WebSocket Client Integration Guide
    url: https://github.com/toniq/odin-ws/blob/main/ws/CLIENT_GUIDE.md
  contact:
    name: Platform Team
  license:
    name: Proprietary

servers:
  local:
    host: localhost:9092
    protocol: kafka
    description: Local Redpanda broker for development
    tags:
      - name: env:local
  develop:
    host: odin-redpanda.develop:9092
    protocol: kafka
    description: Develop environment Redpanda cluster
    tags:
      - name: env:develop
  staging:
    host: odin-redpanda.staging:9092
    protocol: kafka
    description: Staging environment Redpanda cluster
    tags:
      - name: env:staging
  production:
    host: odin-redpanda.production:9092
    protocol: kafka
    description: Production Redpanda cluster
    tags:
      - name: env:main
  kind:
    host: localhost:19092
    protocol: kafka
    description: Kind cluster Redpanda (external port)
    tags:
      - name: env:local

defaultContentType: application/json

channels:
  # Kafka/Redpanda Event Channels
  odin.trades:
    $ref: './channel/trades.yaml#/OdinTrades'
  odin.liquidity:
    $ref: './channel/liquidity.yaml#/OdinLiquidity'
  odin.balances:
    $ref: './channel/balances.yaml#/OdinBalances'
  odin.metadata:
    $ref: './channel/metadata.yaml#/OdinMetadata'
  odin.social:
    $ref: './channel/social.yaml#/OdinSocial'
  odin.community:
    $ref: './channel/community.yaml#/OdinCommunity'
  odin.creation:
    $ref: './channel/creation.yaml#/OdinCreation'
  odin.analytics:
    $ref: './channel/analytics.yaml#/OdinAnalytics'

  # WebSocket Control Channels
  ws.control.subscribe:
    $ref: './channel/control.yaml#/WsSubscribe'
  ws.control.heartbeat:
    $ref: './channel/control.yaml#/WsHeartbeat'
  ws.control.reconnect:
    $ref: './channel/control.yaml#/WsReconnect'
  ws.control.error:
    $ref: './channel/control.yaml#/WsError'

operations:
  # =============================================================================
  # PUBLISH Operations (for producers)
  # =============================================================================
  publishTrades:
    action: send
    channel:
      $ref: '#/channels/odin.trades'
    summary: Publish trade events
    description: |
      Publish trade events to the odin.trades topic.

      **Message Key**: Use the token ID (e.g., "BTC", "ETH") as the Kafka key
      for partition-based sharding.

      **Event Types**:
      - `TRADE_EXECUTED` - Direct trade execution
      - `BUY_COMPLETED` - Buy order completed
      - `SELL_COMPLETED` - Sell order completed

      **Example (Go)**:
      ```go
      event := TokenEvent{
        Type:      "TRADE_EXECUTED",
        Timestamp: time.Now().UnixMilli(),
        Data: map[string]any{
          "price":  "45000.50",
          "amount": "0.5",
          "buyer":  "0x...",
          "seller": "0x...",
        },
      }
      producer.Produce("odin.trades", tokenID, event)
      ```
    messages:
      - $ref: '#/channels/odin.trades/messages/TokenEventMessage'

  publishLiquidity:
    action: send
    channel:
      $ref: '#/channels/odin.liquidity'
    summary: Publish liquidity events
    description: |
      Publish liquidity pool events to odin.liquidity.

      **Event Types**:
      - `LIQUIDITY_ADDED` - Funds added to pool
      - `LIQUIDITY_REMOVED` - Funds removed from pool
      - `LIQUIDITY_REBALANCED` - Pool ratio adjusted
    messages:
      - $ref: '#/channels/odin.liquidity/messages/TokenEventMessage'

  publishBalances:
    action: send
    channel:
      $ref: '#/channels/odin.balances'
    summary: Publish balance events
    description: |
      Publish balance change events to odin.balances.

      **Event Types**:
      - `BALANCE_UPDATED` - User balance changed
      - `TRANSFER_COMPLETED` - Token transfer completed
    messages:
      - $ref: '#/channels/odin.balances/messages/TokenEventMessage'

  publishMetadata:
    action: send
    channel:
      $ref: '#/channels/odin.metadata'
    summary: Publish metadata events
    description: |
      Publish token metadata updates to odin.metadata.

      **Event Types**:
      - `METADATA_UPDATED` - General metadata change
      - `TOKEN_NAME_CHANGED` - Token name updated
      - `TOKEN_FLAGS_CHANGED` - Flags updated (verified, featured, trending)
    messages:
      - $ref: '#/channels/odin.metadata/messages/TokenEventMessage'

  publishSocial:
    action: send
    channel:
      $ref: '#/channels/odin.social'
    summary: Publish social events
    description: |
      Publish social verification events to odin.social.

      **Event Types**:
      - `TWITTER_VERIFIED` - Twitter verification confirmed
      - `SOCIAL_LINKS_UPDATED` - Social links changed
    messages:
      - $ref: '#/channels/odin.social/messages/TokenEventMessage'

  publishCommunity:
    action: send
    channel:
      $ref: '#/channels/odin.community'
    summary: Publish community events
    description: |
      Publish community interaction events to odin.community.

      **Event Types**:
      - `COMMENT_POSTED` - New comment
      - `COMMENT_PINNED` - Comment pinned
      - `COMMENT_UPVOTED` - Comment upvoted
      - `FAVORITE_TOGGLED` - Favorite status changed
    messages:
      - $ref: '#/channels/odin.community/messages/TokenEventMessage'

  publishCreation:
    action: send
    channel:
      $ref: '#/channels/odin.creation'
    summary: Publish creation events
    description: |
      Publish token creation events to odin.creation.

      **Event Types**:
      - `TOKEN_CREATED` - New token created
      - `TOKEN_LISTED` - Token listed on exchange
    messages:
      - $ref: '#/channels/odin.creation/messages/TokenEventMessage'

  publishAnalytics:
    action: send
    channel:
      $ref: '#/channels/odin.analytics'
    summary: Publish analytics events
    description: |
      Publish analytics updates to odin.analytics.

      **Event Types**:
      - `PRICE_DELTA_UPDATED` - Price change metrics
      - `HOLDER_COUNT_UPDATED` - Holder count changed
      - `ANALYTICS_RECALCULATED` - Full recalculation
      - `TRENDING_UPDATED` - Trending rank/score updated
    messages:
      - $ref: '#/channels/odin.analytics/messages/TokenEventMessage'

  # =============================================================================
  # SUBSCRIBE Operations (for consumers)
  # =============================================================================
  consumeTrades:
    action: receive
    channel:
      $ref: '#/channels/odin.trades'
    summary: Consume trade events
    description: |
      Subscribe to trade events including executions, buys, and sells.
      High-frequency topic with 30s retention.

      **Consumer Group**: Use a unique consumer group ID per service.

      **Example (Go)**:
      ```go
      consumer := kafka.NewConsumer(kafka.ConsumerConfig{
        Brokers:       []string{"odin-redpanda:9092"},
        ConsumerGroup: "my-service-trades",
        Topics:        []string{"odin.trades"},
      })
      for event := range consumer.Events() {
        tokenID := event.Key
        // Process event.Value (TokenEvent)
      }
      ```
    messages:
      - $ref: '#/channels/odin.trades/messages/TokenEventMessage'

  consumeLiquidity:
    action: receive
    channel:
      $ref: '#/channels/odin.liquidity'
    summary: Consume liquidity events
    description: |
      Subscribe to liquidity pool operations.
      Medium-frequency topic with 60s retention.
    messages:
      - $ref: '#/channels/odin.liquidity/messages/TokenEventMessage'

  consumeBalances:
    action: receive
    channel:
      $ref: '#/channels/odin.balances'
    summary: Consume balance events
    description: |
      Subscribe to user balance and transfer events.
      High-frequency topic with 30s retention.
    messages:
      - $ref: '#/channels/odin.balances/messages/TokenEventMessage'

  consumeMetadata:
    action: receive
    channel:
      $ref: '#/channels/odin.metadata'
    summary: Consume metadata events
    description: |
      Subscribe to token metadata updates.
      Low-frequency topic with 1h retention.
    messages:
      - $ref: '#/channels/odin.metadata/messages/TokenEventMessage'

  consumeSocial:
    action: receive
    channel:
      $ref: '#/channels/odin.social'
    summary: Consume social events
    description: |
      Subscribe to social verification and links updates.
      Low-frequency topic with 1h retention.
    messages:
      - $ref: '#/channels/odin.social/messages/TokenEventMessage'

  consumeCommunity:
    action: receive
    channel:
      $ref: '#/channels/odin.community'
    summary: Consume community events
    description: |
      Subscribe to comments, favorites, and voting events.
      Medium-frequency topic with 5m retention.
    messages:
      - $ref: '#/channels/odin.community/messages/TokenEventMessage'

  consumeCreation:
    action: receive
    channel:
      $ref: '#/channels/odin.creation'
    summary: Consume creation events
    description: |
      Subscribe to token creation and listing events.
      Low-frequency topic with 1h retention.
    messages:
      - $ref: '#/channels/odin.creation/messages/TokenEventMessage'

  consumeAnalytics:
    action: receive
    channel:
      $ref: '#/channels/odin.analytics'
    summary: Consume analytics events
    description: |
      Subscribe to price deltas, holder counts, and trending updates.
      Medium-frequency topic with 5m retention.
    messages:
      - $ref: '#/channels/odin.analytics/messages/TokenEventMessage'

  # =============================================================================
  # WebSocket Control Operations
  # =============================================================================
  wsSubscribe:
    action: send
    channel:
      $ref: '#/channels/ws.control.subscribe'
    summary: Subscribe to event channels
    description: |
      Client sends subscription requests to manage channel subscriptions.

      **Request:** `SubscribeRequest` or `UnsubscribeRequest`
      **Response:** `SubscriptionAck` or `UnsubscriptionAck`
    messages:
      - $ref: '#/channels/ws.control.subscribe/messages/SubscribeRequest'
      - $ref: '#/channels/ws.control.subscribe/messages/UnsubscribeRequest'

  wsSubscribeAck:
    action: receive
    channel:
      $ref: '#/channels/ws.control.subscribe'
    summary: Receive subscription acknowledgments
    description: |
      Server sends acknowledgments for subscription operations.
    messages:
      - $ref: '#/channels/ws.control.subscribe/messages/SubscriptionAck'
      - $ref: '#/channels/ws.control.subscribe/messages/UnsubscriptionAck'

  wsHeartbeat:
    action: send
    channel:
      $ref: '#/channels/ws.control.heartbeat'
    summary: Send heartbeat ping
    description: |
      Client sends heartbeat to keep connection alive.
      Recommended interval: every 30 seconds.
    messages:
      - $ref: '#/channels/ws.control.heartbeat/messages/HeartbeatRequest'

  wsHeartbeatAck:
    action: receive
    channel:
      $ref: '#/channels/ws.control.heartbeat'
    summary: Receive heartbeat response
    description: |
      Server responds with pong containing server timestamp.
    messages:
      - $ref: '#/channels/ws.control.heartbeat/messages/PongResponse'

  wsReconnect:
    action: send
    channel:
      $ref: '#/channels/ws.control.reconnect'
    summary: Request reconnection and replay
    description: |
      Client sends reconnect request to replay missed messages.
      Provide the last known offset to receive messages from that point.
    messages:
      - $ref: '#/channels/ws.control.reconnect/messages/ReconnectRequest'

  wsReconnectAck:
    action: receive
    channel:
      $ref: '#/channels/ws.control.reconnect'
    summary: Receive reconnection acknowledgment
    description: |
      Server acknowledges reconnection with replay status.
    messages:
      - $ref: '#/channels/ws.control.reconnect/messages/ReconnectAck'

  wsError:
    action: receive
    channel:
      $ref: '#/channels/ws.control.error'
    summary: Receive error responses
    description: |
      Server sends error responses for failed operations.
    messages:
      - $ref: '#/channels/ws.control.error/messages/ErrorResponse'
      - $ref: '#/channels/ws.control.error/messages/PublishAck'
      - $ref: '#/channels/ws.control.error/messages/PublishError'

components:
  messages:
    TokenEventMessage:
      $ref: './component/message/token_event.yaml#/TokenEventMessage'

  schemas:
    TradePayload:
      $ref: './component/schema/trade_payload.yaml#/TradePayload'
    LiquidityPayload:
      $ref: './component/schema/liquidity_payload.yaml#/LiquidityPayload'
    BalancePayload:
      $ref: './component/schema/balance_payload.yaml#/BalancePayload'
    MetadataPayload:
      $ref: './component/schema/metadata_payload.yaml#/MetadataPayload'
    SocialPayload:
      $ref: './component/schema/social_payload.yaml#/SocialPayload'
    CommunityPayload:
      $ref: './component/schema/community_payload.yaml#/CommunityPayload'
    CreationPayload:
      $ref: './component/schema/creation_payload.yaml#/CreationPayload'
    AnalyticsPayload:
      $ref: './component/schema/analytics_payload.yaml#/AnalyticsPayload'

  securitySchemes:
    tenantJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT authentication for multi-tenant WebSocket connections.

        **Token Requirements:**
        - Algorithm: ES256, RS256, or EdDSA (asymmetric only)
        - Header must include `kid` (key ID) registered via Provisioning API
        - Claims must include `tid` (tenant ID) matching the registered key

        **Required Claims:**
        | Claim | Description |
        |-------|-------------|
        | `tenant_id` | Tenant ID (e.g., "acme-corp") |
        | `sub` | Subject/user identifier |
        | `exp` | Expiration timestamp |
        | `iat` | Issued-at timestamp |

        **Optional Claims:**
        | Claim | Description |
        |-------|-------------|
        | `aud` | Audience (validated if configured) |
        | `categories` | Array of allowed event categories |

        **Connection URL:**
        ```
        wss://gateway.example.com/ws?token=<JWT>
        ```

        **Key Registration:**
        Public keys are registered via the Provisioning API and cached by ws-gateway.
        Keys support rotation with multiple active keys per tenant.

    oidcJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        OIDC/JWKS-based JWT authentication.

        **How it works:**
        - Tokens are validated via JWKS discovery from configured OIDC issuers
        - Issuer URL in token determines which JWKS endpoint to use
        - Audience claim is validated against configured values

        **Required Claims:**
        | Claim | Description |
        |-------|-------------|
        | `iss` | OIDC issuer URL (must be pre-registered) |
        | `sub` | Subject/user identifier |
        | `aud` | Audience (validated against config) |
        | `exp` | Expiration timestamp |
        | `tenant_id` | Tenant identifier |

        **Token Routing:**
        Gateway routes tokens to appropriate validator based on:
        1. `kid` header present → Tenant JWT (PostgresKeyRegistry)
        2. `iss` claim present → OIDC/JWKS validation
