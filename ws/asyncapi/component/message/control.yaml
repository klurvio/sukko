# WebSocket Control Protocol Messages
# These messages handle subscription management, heartbeats, and reconnection

# =============================================================================
# Client → Server Messages
# =============================================================================

SubscribeRequest:
  name: SubscribeRequest
  title: Subscribe Request
  summary: Request to subscribe to event channels
  description: |
    Client sends this message to subscribe to one or more event channels.
    The server will acknowledge with a `SubscriptionAck` message.

    **Channel Format**: `{token_id}.{category}` (e.g., "BTC.trade", "ETH.liquidity")
  contentType: application/json
  payload:
    type: object
    required:
      - type
      - data
    properties:
      type:
        type: string
        const: subscribe
        description: Message type identifier
      data:
        type: object
        required:
          - channels
        properties:
          channels:
            type: array
            items:
              type: string
            description: List of channels to subscribe to
            example: ["BTC.trade", "ETH.liquidity", "*.creation"]
  examples:
    - name: Subscribe to multiple channels
      payload:
        type: subscribe
        data:
          channels: ["BTC.trade", "ETH.trade", "BTC.liquidity"]

UnsubscribeRequest:
  name: UnsubscribeRequest
  title: Unsubscribe Request
  summary: Request to unsubscribe from event channels
  description: |
    Client sends this message to unsubscribe from one or more event channels.
    The server will acknowledge with an `UnsubscriptionAck` message.
  contentType: application/json
  payload:
    type: object
    required:
      - type
      - data
    properties:
      type:
        type: string
        const: unsubscribe
        description: Message type identifier
      data:
        type: object
        required:
          - channels
        properties:
          channels:
            type: array
            items:
              type: string
            description: List of channels to unsubscribe from
            example: ["BTC.trade"]
  examples:
    - name: Unsubscribe from a channel
      payload:
        type: unsubscribe
        data:
          channels: ["BTC.trade"]

HeartbeatRequest:
  name: HeartbeatRequest
  title: Heartbeat Request
  summary: Keep-alive ping from client
  description: |
    Client sends this message to keep the connection alive.
    The server will respond with a `PongResponse` message.

    **Recommended interval**: Send every 30 seconds to prevent timeout.
  contentType: application/json
  payload:
    type: object
    required:
      - type
    properties:
      type:
        type: string
        const: heartbeat
        description: Message type identifier
  examples:
    - name: Heartbeat ping
      payload:
        type: heartbeat

ReconnectRequest:
  name: ReconnectRequest
  title: Reconnect Request
  summary: Request to reconnect and replay missed messages
  description: |
    Client sends this message after reconnecting to request replay of
    missed messages. The server will replay messages from the specified
    offsets and respond with a `ReconnectAck` message.

    **Use case**: After a disconnect, client provides its last known
    offsets per topic to receive any messages that were published during the outage.

    **Note**: The `last_offset` field is a map of topic names to offsets,
    allowing selective replay from different topics at different positions.
  contentType: application/json
  payload:
    type: object
    required:
      - type
      - data
    properties:
      type:
        type: string
        const: reconnect
        description: Message type identifier
      data:
        type: object
        required:
          - client_id
          - last_offset
        properties:
          client_id:
            type: string
            description: Client's unique identifier from previous session
            example: "client-abc123"
          last_offset:
            type: object
            additionalProperties:
              type: integer
              format: int64
            description: Map of topic name to last successfully received offset for selective replay
            example:
              "odin.prod.trade": 12345
              "odin.prod.analytics": 67890
  examples:
    - name: Reconnect with topic offsets
      payload:
        type: reconnect
        data:
          client_id: "client-abc123"
          last_offset:
            "odin.prod.trade": 12345
            "odin.prod.analytics": 67890

# =============================================================================
# Server → Client Messages
# =============================================================================

SubscriptionAck:
  name: SubscriptionAck
  title: Subscription Acknowledgment
  summary: Server acknowledgment of subscription request
  description: |
    Server sends this message to confirm a successful subscription.
    Contains the list of channels now subscribed and the total count.
  contentType: application/json
  payload:
    type: object
    required:
      - type
      - subscribed
      - count
    properties:
      type:
        type: string
        const: subscription_ack
        description: Message type identifier
      subscribed:
        type: array
        items:
          type: string
        description: List of channels successfully subscribed to
        example: ["BTC.trade", "ETH.trade"]
      count:
        type: integer
        description: Total number of active subscriptions for this connection
        example: 5
  examples:
    - name: Subscription confirmed
      payload:
        type: subscription_ack
        subscribed: ["BTC.trade", "ETH.trade"]
        count: 5

UnsubscriptionAck:
  name: UnsubscriptionAck
  title: Unsubscription Acknowledgment
  summary: Server acknowledgment of unsubscription request
  description: |
    Server sends this message to confirm a successful unsubscription.
    Contains the list of channels unsubscribed and the remaining count.
  contentType: application/json
  payload:
    type: object
    required:
      - type
      - unsubscribed
      - count
    properties:
      type:
        type: string
        const: unsubscription_ack
        description: Message type identifier
      unsubscribed:
        type: array
        items:
          type: string
        description: List of channels successfully unsubscribed from
        example: ["BTC.trade"]
      count:
        type: integer
        description: Total number of remaining active subscriptions
        example: 4
  examples:
    - name: Unsubscription confirmed
      payload:
        type: unsubscription_ack
        unsubscribed: ["BTC.trade"]
        count: 4

PongResponse:
  name: PongResponse
  title: Pong Response
  summary: Server response to heartbeat
  description: |
    Server sends this message in response to a `HeartbeatRequest`.
    Contains the server timestamp for latency measurement.
  contentType: application/json
  payload:
    type: object
    required:
      - type
      - ts
    properties:
      type:
        type: string
        const: pong
        description: Message type identifier
      ts:
        type: integer
        format: int64
        description: Server timestamp in milliseconds
        example: 1699901234567
  examples:
    - name: Pong with timestamp
      payload:
        type: pong
        ts: 1699901234567

ReconnectAck:
  name: ReconnectAck
  title: Reconnect Acknowledgment
  summary: Server acknowledgment of reconnect request
  description: |
    Server sends this message after processing a reconnect request.
    Indicates the reconnection status and how many messages were replayed.
  contentType: application/json
  payload:
    type: object
    required:
      - type
      - status
      - messages_replayed
    properties:
      type:
        type: string
        const: reconnect_ack
        description: Message type identifier
      status:
        type: string
        enum: [success, partial, failed]
        description: |
          Reconnection status:
          - `success`: All missed messages replayed
          - `partial`: Some messages were beyond retention window
          - `failed`: Reconnection failed (invalid client_id or offset)
        example: success
      messages_replayed:
        type: integer
        description: Number of messages replayed to the client
        example: 42
  examples:
    - name: Successful reconnection
      payload:
        type: reconnect_ack
        status: success
        messages_replayed: 42

ErrorResponse:
  name: ErrorResponse
  title: Error Response
  summary: Server error message
  description: |
    Server sends this message when an error occurs during message processing.
    Contains an error code and human-readable message.

    **Error Codes:**
    | Code | Description |
    |------|-------------|
    | `invalid_message` | Malformed JSON payload |
    | `invalid_request` | Request format invalid |
    | `invalid_channel` | Invalid channel format |
    | `unauthorized` | Authentication required or failed |
    | `forbidden` | Not authorized for this channel |
    | `channel_not_found` | Channel does not exist |
    | `rate_limited` | Too many requests |
    | `RATE_LIMIT_EXCEEDED` | Rate limit exceeded (legacy) |
    | `message_too_large` | Payload exceeds 64KB |
    | `not_available` | Feature disabled |
    | `publish_failed` | Kafka publish failed |
    | `internal_error` | Server-side error |
  contentType: application/json
  payload:
    type: object
    required:
      - type
      - code
      - message
    properties:
      type:
        type: string
        const: error
        description: Message type identifier
      code:
        type: string
        description: Error code for programmatic handling
        example: "unauthorized"
      message:
        type: string
        description: Human-readable error description
        example: "Token expired"
  examples:
    - name: Authentication error
      payload:
        type: error
        code: unauthorized
        message: "Token expired"

PublishAck:
  name: PublishAck
  title: Publish Acknowledgment
  summary: Server acknowledgment of published message
  description: |
    Server sends this message to confirm a message was successfully
    published to Kafka. Contains the channel and acceptance status.
  contentType: application/json
  payload:
    type: object
    required:
      - type
      - channel
      - status
    properties:
      type:
        type: string
        const: publish_ack
        description: Message type identifier
      channel:
        type: string
        description: Channel the message was published to
        example: "community.group123.chat"
      status:
        type: string
        const: accepted
        description: Publication status (always "accepted" on success)
  examples:
    - name: Publish confirmed
      payload:
        type: publish_ack
        channel: "community.group123.chat"
        status: "accepted"

PublishError:
  name: PublishError
  title: Publish Error
  summary: Server error for failed publish
  description: |
    Server sends this message when a publish operation fails.
    Contains an error code and description.

    **Error Codes:**
    | Code | Description |
    |------|-------------|
    | `not_available` | Publishing is not enabled on this server |
    | `invalid_request` | Invalid publish request format |
    | `invalid_channel` | Channel must have format: identifier.category |
    | `message_too_large` | Message exceeds maximum size limit |
    | `rate_limited` | Publish rate limit exceeded |
    | `forbidden` | Not authorized to publish to this channel |
    | `topic_not_provisioned` | Category is not provisioned for your tenant |
    | `service_unavailable` | Service temporarily unavailable, please retry |
    | `publish_failed` | Failed to publish message to Kafka |
  contentType: application/json
  payload:
    type: object
    required:
      - type
      - code
      - message
    properties:
      type:
        type: string
        const: publish_error
        description: Message type identifier
      code:
        type: string
        description: Error code for programmatic handling
        enum:
          - not_available
          - invalid_request
          - invalid_channel
          - message_too_large
          - rate_limited
          - forbidden
          - topic_not_provisioned
          - service_unavailable
          - publish_failed
        example: "rate_limited"
      message:
        type: string
        description: Human-readable error description
        example: "Publish rate limit exceeded"
  examples:
    - name: Rate limited
      payload:
        type: publish_error
        code: rate_limited
        message: "Publish rate limit exceeded"
    - name: Topic not provisioned
      payload:
        type: publish_error
        code: topic_not_provisioned
        message: "Category is not provisioned for your tenant"
    - name: Service unavailable (circuit breaker)
      payload:
        type: publish_error
        code: service_unavailable
        message: "Service temporarily unavailable, please retry"

# =============================================================================
# Client → Server Messages (Publishing)
# =============================================================================

PublishRequest:
  name: PublishRequest
  title: Publish Request
  summary: Request to publish a message to a channel
  description: |
    Client sends this message to publish data to a Kafka topic.
    The gateway maps the channel (adds tenant prefix), then the server
    validates the request, applies rate limits, and publishes to Kafka.

    **Client Channel Format**: `{identifier}.{category}` (e.g., "BTC.trade", "group123.community")
    **Internal Channel Format**: `{tenant}.{identifier}.{category}` (added by gateway)

    **Channel-to-Topic Mapping**:
    - Client sends: `BTC.trade`
    - Gateway maps: `acme.BTC.trade` (tenant "acme" from JWT)
    - Server publishes to: Topic `{namespace}.acme.trade`, Key `acme.BTC.trade`

    **Limits**:
    - Max message size: 64KB
    - Rate limit: 10 messages/sec (100 burst)

    **Kafka Headers** (added by server):
    - `client_id`: Server-verified client identifier
    - `source`: "ws-client"
    - `timestamp`: Message timestamp (milliseconds)

    **Kafka Key**: Full internal channel (for partitioning and ordering)
  contentType: application/json
  payload:
    type: object
    required:
      - type
      - data
    properties:
      type:
        type: string
        const: publish
        description: Message type identifier
      data:
        type: object
        required:
          - channel
          - data
        properties:
          channel:
            type: string
            description: Target channel (min 2 dot-separated parts)
            example: "BTC.trade"
          data:
            type: object
            description: Message payload (max 64KB)
  examples:
    - name: Publish trade event
      payload:
        type: publish
        data:
          channel: "BTC.trade"
          data:
            price: "45000.50"
            volume: "1.5"
    - name: Publish chat message
      payload:
        type: publish
        data:
          channel: "group123.community"
          data:
            message: "Hello, world!"
            sender: "user456"

# =============================================================================
# Server → Client Messages (Broadcast)
# =============================================================================

BroadcastMessage:
  name: BroadcastMessage
  title: Broadcast Message
  summary: Event message broadcast to subscribed clients
  description: |
    Standard envelope for all messages broadcast from server to clients.
    Clients should track `seq` for gap detection and use `reconnect` to recover missed messages.

    **Gap Detection**:
    If `receivedSeq != expectedSeq`, the client has missed messages.
    Use the `reconnect` message with `last_offset` to replay missed messages from Kafka.

    **Latency Measurement**:
    Calculate network latency: `clientTime - ts`

    **Priority Levels** (internal):
    - CRITICAL: Orders, fills, account updates - MUST deliver or disconnect
    - HIGH: Price updates - deliver or disconnect if consistently failing
    - NORMAL: General market data - can drop if client slow
  contentType: application/json
  payload:
    type: object
    required:
      - type
      - seq
      - ts
      - channel
      - data
    properties:
      type:
        type: string
        const: message
        description: Message type identifier (always "message" for broadcasts)
      seq:
        type: integer
        format: int64
        description: Per-connection sequence number for gap detection (starts at 1)
        example: 42
      ts:
        type: integer
        format: int64
        description: Server timestamp in milliseconds (Unix time)
        example: 1699901234567
      channel:
        type: string
        description: Channel identifier the message was published to
        example: "BTC.trade"
      data:
        type: object
        description: Event payload (varies by channel/event type)
  examples:
    - name: Trade event broadcast
      payload:
        type: message
        seq: 42
        ts: 1699901234567
        channel: "BTC.trade"
        data:
          token: "BTC"
          price: "45000.50"
          amount_btc: 1500000000
          buyer: "0x..."
          seller: "0x..."
