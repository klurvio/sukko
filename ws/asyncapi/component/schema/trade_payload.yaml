# Trade Payload Schemas
# Data structures for odin.trades events

TradePayload:
  type: object
  description: Payload for trade-related events
  oneOf:
    - $ref: '#/TradeExecutedPayload'
    - $ref: '#/BuyCompletedPayload'
    - $ref: '#/SellCompletedPayload'

TradeExecutedPayload:
  type: object
  title: Trade Executed
  description: Direct trade execution payload
  required:
    - price
    - amount
    - buyer
    - seller
  properties:
    price:
      type: string
      description: Trade price as decimal string
      example: "45000.50"
    amount:
      type: string
      description: Trade amount as decimal string
      example: "0.5"
    buyer:
      type: string
      description: Buyer wallet address
      example: "0x1234567890abcdef1234567890abcdef12345678"
    seller:
      type: string
      description: Seller wallet address
      example: "0xfedcba0987654321fedcba0987654321fedcba09"
    txHash:
      type: string
      description: Transaction hash
      example: "0xabc123def456789abc123def456789abc123def456789abc123def456789abcd"

BuyCompletedPayload:
  type: object
  title: Buy Completed
  description: Buy order completion payload
  required:
    - price
    - amount
    - buyer
  properties:
    price:
      type: string
      description: Buy price as decimal string
      example: "45000.50"
    amount:
      type: string
      description: Buy amount as decimal string
      example: "1.0"
    buyer:
      type: string
      description: Buyer wallet address
      example: "0x1234567890abcdef1234567890abcdef12345678"
    txHash:
      type: string
      description: Transaction hash
      example: "0xabc123def456789abc123def456789abc123def456789abc123def456789abcd"

SellCompletedPayload:
  type: object
  title: Sell Completed
  description: Sell order completion payload
  required:
    - price
    - amount
    - seller
  properties:
    price:
      type: string
      description: Sell price as decimal string
      example: "45000.50"
    amount:
      type: string
      description: Sell amount as decimal string
      example: "1.0"
    seller:
      type: string
      description: Seller wallet address
      example: "0xfedcba0987654321fedcba0987654321fedcba09"
    txHash:
      type: string
      description: Transaction hash
      example: "0xabc123def456789abc123def456789abc123def456789abc123def456789abcd"
