# Balance Payload Schemas
# Data structures for odin.balances events

BalancePayload:
  type: object
  description: Payload for balance-related events
  oneOf:
    - $ref: '#/BalanceUpdatedPayload'
    - $ref: '#/TransferCompletedPayload'

BalanceUpdatedPayload:
  type: object
  title: Balance Updated
  description: User balance changed
  required:
    - user
    - balance
    - change
  properties:
    user:
      type: string
      description: User wallet address
      example: "0x1234567890abcdef1234567890abcdef12345678"
    balance:
      type: string
      description: New balance as decimal string
      example: "1000.00"
    change:
      type: number
      format: double
      description: Balance change amount (positive or negative)
      example: 50.00

TransferCompletedPayload:
  type: object
  title: Transfer Completed
  description: Token transfer completed
  required:
    - from
    - to
    - amount
  properties:
    from:
      type: string
      description: Sender wallet address
      example: "0x1234567890abcdef1234567890abcdef12345678"
    to:
      type: string
      description: Recipient wallet address
      example: "0xfedcba0987654321fedcba0987654321fedcba09"
    amount:
      type: string
      description: Transfer amount as decimal string
      example: "500.00"
    txHash:
      type: string
      description: Transaction hash
      example: "0xabc123def456789abc123def456789abc123def456789abc123def456789abcd"
