# Liquidity Payload Schemas
# Data structures for odin.liquidity events

LiquidityPayload:
  type: object
  description: Payload for liquidity-related events
  oneOf:
    - $ref: '#/LiquidityAddedPayload'
    - $ref: '#/LiquidityRemovedPayload'
    - $ref: '#/LiquidityRebalancedPayload'

LiquidityAddedPayload:
  type: object
  title: Liquidity Added
  description: Liquidity provider added funds
  required:
    - amount
    - provider
    - totalLiquidity
  properties:
    amount:
      type: string
      description: Amount added as decimal string
      example: "10000.00"
    provider:
      type: string
      description: Liquidity provider wallet address
      example: "0x1234567890abcdef1234567890abcdef12345678"
    totalLiquidity:
      type: string
      description: Total pool liquidity after addition
      example: "500000.00"

LiquidityRemovedPayload:
  type: object
  title: Liquidity Removed
  description: Liquidity removed from pool
  required:
    - amount
    - provider
    - totalLiquidity
  properties:
    amount:
      type: string
      description: Amount removed as decimal string
      example: "5000.00"
    provider:
      type: string
      description: Liquidity provider wallet address
      example: "0x1234567890abcdef1234567890abcdef12345678"
    totalLiquidity:
      type: string
      description: Total pool liquidity after removal
      example: "495000.00"

LiquidityRebalancedPayload:
  type: object
  title: Liquidity Rebalanced
  description: Pool ratio adjustment
  required:
    - oldRatio
    - newRatio
    - totalLiquidity
  properties:
    oldRatio:
      type: number
      format: double
      description: Previous pool ratio
      example: 0.5
    newRatio:
      type: number
      format: double
      description: New pool ratio after rebalance
      example: 0.6
    totalLiquidity:
      type: string
      description: Total pool liquidity
      example: "500000.00"
