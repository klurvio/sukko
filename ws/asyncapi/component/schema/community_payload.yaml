# Community Payload Schemas
# Data structures for odin.community events

CommunityPayload:
  type: object
  description: Payload for community-related events
  oneOf:
    - $ref: '#/CommentPostedPayload'
    - $ref: '#/CommentPinnedPayload'
    - $ref: '#/CommentUpvotedPayload'
    - $ref: '#/FavoriteToggledPayload'

CommentPostedPayload:
  type: object
  title: Comment Posted
  description: New comment added
  required:
    - commentId
    - author
    - content
    - timestamp
  properties:
    commentId:
      type: string
      description: Unique comment identifier
      example: "comment-12345"
    author:
      type: string
      description: Comment author wallet address
      example: "0x1234567890abcdef1234567890abcdef12345678"
    content:
      type: string
      description: Comment text content
      example: "Great project!"
    timestamp:
      type: integer
      format: int64
      description: Comment creation timestamp in milliseconds
      example: 1699901234567

CommentPinnedPayload:
  type: object
  title: Comment Pinned
  description: Comment pinned by moderator
  required:
    - commentId
    - pinnedBy
  properties:
    commentId:
      type: string
      description: Pinned comment identifier
      example: "comment-12345"
    pinnedBy:
      type: string
      description: Moderator wallet address who pinned
      example: "0xfedcba0987654321fedcba0987654321fedcba09"

CommentUpvotedPayload:
  type: object
  title: Comment Upvoted
  description: Comment received upvote
  required:
    - commentId
    - voter
    - totalUpvotes
  properties:
    commentId:
      type: string
      description: Upvoted comment identifier
      example: "comment-12345"
    voter:
      type: string
      description: Voter wallet address
      example: "0x1234567890abcdef1234567890abcdef12345678"
    totalUpvotes:
      type: integer
      description: Total upvote count after this vote
      example: 45

FavoriteToggledPayload:
  type: object
  title: Favorite Toggled
  description: User favorited/unfavorited token
  required:
    - userId
    - isFavorite
  properties:
    userId:
      type: string
      description: User wallet address
      example: "0x1234567890abcdef1234567890abcdef12345678"
    isFavorite:
      type: boolean
      description: Current favorite status
      example: true
