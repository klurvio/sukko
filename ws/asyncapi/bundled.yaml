  ws.control.subscribe:
    address: ws://control/subscribe
    description: >
      Channel for subscription management.


      **Client → Server:**

      - `SubscribeRequest` - Subscribe to event channels

      - `UnsubscribeRequest` - Unsubscribe from event channels


      **Server → Client:**

      - `SubscriptionAck` - Confirms subscription

      - `UnsubscriptionAck` - Confirms unsubscription


      **Channel Format**: `{token_id}.{category}` (e.g., "BTC.trade",
      "ETH.liquidity")


      ## Wildcard Subscription Patterns


      | Pattern | Matches | Example |

      |---------|---------|---------|

      | `*.trade` | Any token's trade events | `BTC.trade`, `ETH.trade` |

      | `odin.*` | Any odin channel | `odin.trades`, `odin.liquidity` |

      | `prefix*suffix` | Prefix AND suffix match | `BTC*trade` →
      `BTC.spot.trade` |

      | `*` | All channels | Everything |


      **Note:** Wildcards expand at subscription time based on available
      channels.


      ## Subscription Bundles


      Clients can subscribe to predefined bundles for common use cases:


      | Bundle | Categories Included | Use Case |

      |--------|---------------------|----------|

      | `TRADING` | trade, liquidity, analytics | Active traders |

      | `FULL_MARKET` | trade, liquidity, analytics, metadata | Market data
      feeds |

      | `COMMUNITY` | community, social, metadata | Social features |

      | `PORTFOLIO` | trade, analytics, balances | Portfolio tracking |

      | `PRICE_ONLY` | trade, analytics | Simple price feeds |

      | `ALL` | All 8 categories | Complete feed |


      **Bundle Example:**

      ```json

      {"type": "subscribe", "data": {"channels": ["BTC.TRADING"]}}

      ```


      **Example Flow:**

      ```

      Client: {"type": "subscribe", "data": {"channels": ["BTC.trade"]}}

      Server: {"type": "subscription_ack", "subscribed": ["BTC.trade"], "count":
      1}

      ```
    messages:
      SubscribeRequest:
        name: SubscribeRequest
        title: Subscribe Request
        summary: Request to subscribe to event channels
        description: >
          Client sends this message to subscribe to one or more event channels.

          The server will acknowledge with a `SubscriptionAck` message.


          **Channel Format**: `{token_id}.{category}` (e.g., "BTC.trade",
          "ETH.liquidity")
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - data
          properties:
            type:
              type: string
              const: subscribe
              description: Message type identifier
            data:
              type: object
              required:
                - channels
              properties:
                channels:
                  type: array
                  items:
                    type: string
                  description: List of channels to subscribe to
                  example:
                    - BTC.trade
                    - ETH.liquidity
                    - '*.creation'
        examples:
          - name: Subscribe to multiple channels
            payload:
              type: subscribe
              data:
                channels:
                  - BTC.trade
                  - ETH.trade
                  - BTC.liquidity
      UnsubscribeRequest:
        name: UnsubscribeRequest
        title: Unsubscribe Request
        summary: Request to unsubscribe from event channels
        description: >
          Client sends this message to unsubscribe from one or more event
          channels.

          The server will acknowledge with an `UnsubscriptionAck` message.
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - data
          properties:
            type:
              type: string
              const: unsubscribe
              description: Message type identifier
            data:
              type: object
              required:
                - channels
              properties:
                channels:
                  type: array
                  items:
                    type: string
                  description: List of channels to unsubscribe from
                  example:
                    - BTC.trade
        examples:
          - name: Unsubscribe from a channel
            payload:
              type: unsubscribe
              data:
                channels:
                  - BTC.trade
      SubscriptionAck:
        name: SubscriptionAck
        title: Subscription Acknowledgment
        summary: Server acknowledgment of subscription request
        description: |
          Server sends this message to confirm a successful subscription.
          Contains the list of channels now subscribed and the total count.
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - subscribed
            - count
          properties:
            type:
              type: string
              const: subscription_ack
              description: Message type identifier
            subscribed:
              type: array
              items:
                type: string
              description: List of channels successfully subscribed to
              example:
                - BTC.trade
                - ETH.trade
            count:
              type: integer
              description: Total number of active subscriptions for this connection
              example: 5
        examples:
          - name: Subscription confirmed
            payload:
              type: subscription_ack
              subscribed:
                - BTC.trade
                - ETH.trade
              count: 5
      UnsubscriptionAck:
        name: UnsubscriptionAck
        title: Unsubscription Acknowledgment
        summary: Server acknowledgment of unsubscription request
        description: |
          Server sends this message to confirm a successful unsubscription.
          Contains the list of channels unsubscribed and the remaining count.
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - unsubscribed
            - count
          properties:
            type:
              type: string
              const: unsubscription_ack
              description: Message type identifier
            unsubscribed:
              type: array
              items:
                type: string
              description: List of channels successfully unsubscribed from
              example:
                - BTC.trade
            count:
              type: integer
              description: Total number of remaining active subscriptions
              example: 4
        examples:
          - name: Unsubscription confirmed
            payload:
              type: unsubscription_ack
              unsubscribed:
                - BTC.trade
              count: 4
  ws.control.heartbeat:
    address: ws://control/heartbeat
    description: |
      Channel for connection keep-alive.

      **Client → Server:**
      - `HeartbeatRequest` - Ping to keep connection alive

      **Server → Client:**
      - `PongResponse` - Response with server timestamp

      **Recommended Interval:** Send heartbeat every 30 seconds.

      **Example Flow:**
      ```
      Client: {"type": "heartbeat"}
      Server: {"type": "pong", "ts": 1699901234567}
      ```
    messages:
      HeartbeatRequest:
        name: HeartbeatRequest
        title: Heartbeat Request
        summary: Keep-alive ping from client
        description: |
          Client sends this message to keep the connection alive.
          The server will respond with a `PongResponse` message.

          **Recommended interval**: Send every 30 seconds to prevent timeout.
        contentType: application/json
        payload:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              const: heartbeat
              description: Message type identifier
        examples:
          - name: Heartbeat ping
            payload:
              type: heartbeat
      PongResponse:
        name: PongResponse
        title: Pong Response
        summary: Server response to heartbeat
        description: |
          Server sends this message in response to a `HeartbeatRequest`.
          Contains the server timestamp for latency measurement.
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - ts
          properties:
            type:
              type: string
              const: pong
              description: Message type identifier
            ts:
              type: integer
              format: int64
              description: Server timestamp in milliseconds
              example: 1699901234567
        examples:
          - name: Pong with timestamp
            payload:
              type: pong
              ts: 1699901234567
  ws.control.reconnect:
    address: ws://control/reconnect
    description: >
      Channel for reconnection and message replay.


      **Client → Server:**

      - `ReconnectRequest` - Request to replay missed messages


      **Server → Client:**

      - `ReconnectAck` - Confirms reconnection and replay status


      **Use Case:**

      When a client reconnects after a disconnect, it can request replay

      of messages missed during the outage by providing its last known offset.


      **Example Flow:**

      ```

      Client: {"type": "reconnect", "data": {"client_id": "abc123",
      "last_offset": 12345}}

      Server: {"type": "reconnect_ack", "status": "success",
      "messages_replayed": 42}

      ```


      **Status Values:**

      - `success` - All missed messages replayed

      - `partial` - Some messages beyond retention window

      - `failed` - Invalid client_id or offset
    messages:
      ReconnectRequest:
        name: ReconnectRequest
        title: Reconnect Request
        summary: Request to reconnect and replay missed messages
        description: >
          Client sends this message after reconnecting to request replay of

          missed messages. The server will replay messages from the specified

          offsets and respond with a `ReconnectAck` message.


          **Use case**: After a disconnect, client provides its last known

          offsets per topic to receive any messages that were published during
          the outage.


          **Note**: The `last_offset` field is a map of topic names to offsets,

          allowing selective replay from different topics at different
          positions.
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - data
          properties:
            type:
              type: string
              const: reconnect
              description: Message type identifier
            data:
              type: object
              required:
                - client_id
                - last_offset
              properties:
                client_id:
                  type: string
                  description: Client's unique identifier from previous session
                  example: client-abc123
                last_offset:
                  type: object
                  additionalProperties:
                    type: integer
                    format: int64
                  description: >-
                    Map of topic name to last successfully received offset for
                    selective replay
                  example:
                    odin.prod.trade: 12345
                    odin.prod.analytics: 67890
        examples:
          - name: Reconnect with topic offsets
            payload:
              type: reconnect
              data:
                client_id: client-abc123
                last_offset:
                  odin.prod.trade: 12345
                  odin.prod.analytics: 67890
      ReconnectAck:
        name: ReconnectAck
        title: Reconnect Acknowledgment
        summary: Server acknowledgment of reconnect request
        description: |
          Server sends this message after processing a reconnect request.
          Indicates the reconnection status and how many messages were replayed.
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - status
            - messages_replayed
          properties:
            type:
              type: string
              const: reconnect_ack
              description: Message type identifier
            status:
              type: string
              enum:
                - success
                - partial
                - failed
              description: |
                Reconnection status:
                - `success`: All missed messages replayed
                - `partial`: Some messages were beyond retention window
                - `failed`: Reconnection failed (invalid client_id or offset)
              example: success
            messages_replayed:
              type: integer
              description: Number of messages replayed to the client
              example: 42
        examples:
          - name: Successful reconnection
            payload:
              type: reconnect_ack
              status: success
              messages_replayed: 42
  ws.control.error:
    address: ws://control/error
    description: |
      Channel for error responses and publish acknowledgments.

      **Server → Client:**
      - `ErrorResponse` - Error during message processing
      - `PublishAck` - Confirms successful publish
      - `PublishError` - Error during publish operation

      **Error Codes:**
      | Code | Description |
      |------|-------------|
      | `invalid_message` | Malformed JSON payload |
      | `invalid_request` | Request format invalid |
      | `invalid_channel` | Invalid channel format |
      | `unauthorized` | Authentication required or failed |
      | `forbidden` | Not authorized for this channel |
      | `channel_not_found` | Channel does not exist |
      | `rate_limited` | Too many requests |
      | `RATE_LIMIT_EXCEEDED` | Rate limit exceeded (legacy) |
      | `message_too_large` | Payload exceeds 64KB |
      | `not_available` | Feature disabled |
      | `publish_failed` | Kafka publish failed |
      | `internal_error` | Server-side error |
    messages:
      ErrorResponse:
        name: ErrorResponse
        title: Error Response
        summary: Server error message
        description: >
          Server sends this message when an error occurs during message
          processing.

          Contains an error code and human-readable message.


          **Error Codes:**

          | Code | Description |

          |------|-------------|

          | `invalid_message` | Malformed JSON payload |

          | `invalid_request` | Request format invalid |

          | `invalid_channel` | Invalid channel format |

          | `unauthorized` | Authentication required or failed |

          | `forbidden` | Not authorized for this channel |

          | `channel_not_found` | Channel does not exist |

          | `rate_limited` | Too many requests |

          | `RATE_LIMIT_EXCEEDED` | Rate limit exceeded (legacy) |

          | `message_too_large` | Payload exceeds 64KB |

          | `not_available` | Feature disabled |

          | `publish_failed` | Kafka publish failed |

          | `internal_error` | Server-side error |
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - code
            - message
          properties:
            type:
              type: string
              const: error
              description: Message type identifier
            code:
              type: string
              description: Error code for programmatic handling
              example: unauthorized
            message:
              type: string
              description: Human-readable error description
              example: Token expired
        examples:
          - name: Authentication error
            payload:
              type: error
              code: unauthorized
              message: Token expired
      PublishAck:
        name: PublishAck
        title: Publish Acknowledgment
        summary: Server acknowledgment of published message
        description: |
          Server sends this message to confirm a message was successfully
          published to Kafka. Contains the channel and acceptance status.
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - channel
            - status
          properties:
            type:
              type: string
              const: publish_ack
              description: Message type identifier
            channel:
              type: string
              description: Channel the message was published to
              example: community.group123.chat
            status:
              type: string
              const: accepted
              description: Publication status (always "accepted" on success)
        examples:
          - name: Publish confirmed
            payload:
              type: publish_ack
              channel: community.group123.chat
              status: accepted
      PublishError:
        name: PublishError
        title: Publish Error
        summary: Server error for failed publish
        description: >
          Server sends this message when a publish operation fails.

          Contains an error code and description.


          **Error Codes:**

          | Code | Description |

          |------|-------------|

          | `invalid_request` | Invalid publish request format |

          | `invalid_channel` | Channel must have format: name.type (min 2
          dot-separated parts) |

          | `message_too_large` | Message exceeds maximum size of 64KB |

          | `rate_limited` | Publish rate limit exceeded |

          | `not_available` | Publishing is not enabled on this server |

          | `publish_failed` | Failed to publish message to Kafka |
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - code
            - message
          properties:
            type:
              type: string
              const: publish_error
              description: Message type identifier
            code:
              type: string
              description: Error code for programmatic handling
              example: rate_limited
            message:
              type: string
              description: Human-readable error description
              example: Publish rate limit exceeded
        examples:
          - name: Rate limited
            payload:
              type: publish_error
              code: rate_limited
              message: Publish rate limit exceeded
          - name: Message too large
            payload:
              type: publish_error
              code: message_too_large
              message: Message exceeds maximum size of 64KB
  ws.control.publish:
    address: ws://control/publish
    description: >
      Channel for client message publishing to Kafka.


      **Client → Server:**

      - `PublishRequest` - Publish message to a channel


      **Server → Client:**

      - `PublishAck` - Confirms successful publish

      - `PublishError` - Error during publish


      **Kafka Topic:** Messages are published to
      `odin.{namespace}.client-events`


      **Limits:**

      - Max message size: 64KB

      - Rate limit: 10 messages/sec (100 burst)

      - Channel format: Minimum 2 dot-separated parts


      **Example Flow:**

      ```

      Client: {"type": "publish", "data": {"channel": "community.group123.chat",
      "data": {"message": "Hello!"}}}

      Server: {"type": "publish_ack", "channel": "community.group123.chat",
      "status": "accepted"}

      ```
    messages:
      PublishRequest:
        name: PublishRequest
        title: Publish Request
        summary: Request to publish a message to a channel
        description: >
          Client sends this message to publish data to a Kafka topic.

          The server validates the request, applies rate limits, and publishes
          to Kafka.


          **Channel Format**: Minimum 2 dot-separated parts (e.g.,
          "community.group123.chat")


          **Limits**:

          - Max message size: 64KB

          - Rate limit: 10 messages/sec (100 burst)


          **Kafka Topic**: Messages are published to
          `odin.{namespace}.client-events`


          **Kafka Headers** (added by server):

          - `client_id`: Server-verified client identifier

          - `source`: "ws-server"

          - `timestamp`: Message timestamp (milliseconds)


          **Kafka Key**: Channel string (for partitioning)
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - data
          properties:
            type:
              type: string
              const: publish
              description: Message type identifier
            data:
              type: object
              required:
                - channel
                - data
              properties:
                channel:
                  type: string
                  description: Target channel (min 2 dot-separated parts)
                  example: community.group123.chat
                data:
                  type: object
                  description: Message payload (max 64KB)
        examples:
          - name: Publish chat message
            payload:
              type: publish
              data:
                channel: community.group123.chat
                data:
                  message: Hello, world!
                  sender: user456
      PublishAck:
        name: PublishAck
        title: Publish Acknowledgment
        summary: Server acknowledgment of published message
        description: |
          Server sends this message to confirm a message was successfully
          published to Kafka. Contains the channel and acceptance status.
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - channel
            - status
          properties:
            type:
              type: string
              const: publish_ack
              description: Message type identifier
            channel:
              type: string
              description: Channel the message was published to
              example: community.group123.chat
            status:
              type: string
              const: accepted
              description: Publication status (always "accepted" on success)
        examples:
          - name: Publish confirmed
            payload:
              type: publish_ack
              channel: community.group123.chat
              status: accepted
      PublishError:
        name: PublishError
        title: Publish Error
        summary: Server error for failed publish
        description: >
          Server sends this message when a publish operation fails.

          Contains an error code and description.


          **Error Codes:**

          | Code | Description |

          |------|-------------|

          | `invalid_request` | Invalid publish request format |

          | `invalid_channel` | Channel must have format: name.type (min 2
          dot-separated parts) |

          | `message_too_large` | Message exceeds maximum size of 64KB |

          | `rate_limited` | Publish rate limit exceeded |

          | `not_available` | Publishing is not enabled on this server |

          | `publish_failed` | Failed to publish message to Kafka |
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - code
            - message
          properties:
            type:
              type: string
              const: publish_error
              description: Message type identifier
            code:
              type: string
              description: Error code for programmatic handling
              example: rate_limited
            message:
              type: string
              description: Human-readable error description
              example: Publish rate limit exceeded
        examples:
          - name: Rate limited
            payload:
              type: publish_error
              code: rate_limited
              message: Publish rate limit exceeded
          - name: Message too large
            payload:
              type: publish_error
              code: message_too_large
              message: Message exceeds maximum size of 64KB
  ws.control.broadcast:
    address: ws://control/broadcast
    description: >
      Channel for server-to-client broadcast messages.


      **Server → Client:**

      - `BroadcastMessage` - Event broadcast to subscribed clients


      All messages broadcast from server to clients use a standard envelope
      format

      with sequence numbers for gap detection and timestamps for latency
      measurement.


      **Message Envelope:**

      ```json

      {
        "type": "message",
        "seq": 42,
        "ts": 1699901234567,
        "channel": "BTC.trade",
        "data": {...}
      }

      ```


      **Gap Detection:**

      Track the `seq` field. If you receive seq 102 but expected 101,

      use `reconnect` to replay missed messages from Kafka.
    messages:
      BroadcastMessage:
        name: BroadcastMessage
        title: Broadcast Message
        summary: Event message broadcast to subscribed clients
        description: >
          Standard envelope for all messages broadcast from server to clients.

          Clients should track `seq` for gap detection and use `reconnect` to
          recover missed messages.


          **Gap Detection**:

          If `receivedSeq != expectedSeq`, the client has missed messages.

          Use the `reconnect` message with `last_offset` to replay missed
          messages from Kafka.


          **Latency Measurement**:

          Calculate network latency: `clientTime - ts`


          **Priority Levels** (internal):

          - CRITICAL: Orders, fills, account updates - MUST deliver or
          disconnect

          - HIGH: Price updates - deliver or disconnect if consistently failing

          - NORMAL: General market data - can drop if client slow
        contentType: application/json
        payload:
          type: object
          required:
            - type
            - seq
            - ts
            - channel
            - data
          properties:
            type:
              type: string
              const: message
              description: Message type identifier (always "message" for broadcasts)
            seq:
              type: integer
              format: int64
              description: Per-connection sequence number for gap detection (starts at 1)
              example: 42
            ts:
              type: integer
              format: int64
              description: Server timestamp in milliseconds (Unix time)
              example: 1699901234567
            channel:
              type: string
              description: Channel identifier the message was published to
              example: BTC.trade
            data:
              type: object
              description: Event payload (varies by channel/event type)
        examples:
          - name: Trade event broadcast
            payload:
              type: message
              seq: 42
              ts: 1699901234567
              channel: BTC.trade
              data:
                token: BTC
                price: '45000.50'
                amount_btc: 1500000000
                buyer: 0x...
                seller: 0x...
  odin.client-events:
    address: odin.{namespace}.client-events
    description: |
      Ingress topic for client-published messages.

      Messages published by WebSocket clients via the `publish` message type
      are written to this topic for downstream processing.

      **Topic Pattern:** `odin.{namespace}.client-events`
      - Example: `odin.prod.client-events`, `odin.develop.client-events`

      **Message Key:** Channel string (for partitioning)
      - Example: `community.group123.chat`

      **Message Value:** Raw JSON from client's `data` field

      **Kafka Headers:**
      | Header | Description |
      |--------|-------------|
      | `client_id` | Server-verified client identifier (int64) |
      | `source` | Always "ws-server" |
      | `timestamp` | Message timestamp in milliseconds (Unix time) |

      **Retention:** 7 days (configurable)

      **Partitions:** 12 (configurable)

      **Use Cases:**
      - Chat messages in community channels
      - User-generated content
      - Real-time collaboration events
      - Custom application events

      **Security:**
      - `client_id` is server-verified, not client-claimed
      - Channel permissions are enforced by ws-gateway before publish
      - Message size limited to 64KB
      - Rate limited: 10 messages/sec (100 burst)
    messages:
      ClientPublishedMessage:
        name: ClientPublishedMessage
        title: Client Published Message
        summary: Message published by a WebSocket client
        contentType: application/json
        payload:
          type: object
          description: |
            Raw message payload from the client.
            Structure varies by application/channel type.
          additionalProperties: true
        headers:
          type: object
          properties:
            client_id:
              type: string
              description: Server-verified client identifier
            source:
              type: string
              const: ws-server
              description: Message source identifier
            timestamp:
              type: string
              description: Message timestamp in milliseconds
operations:
  publishTrades:
    action: send
    channel:
      $ref: '#/channels/odin.trades'
    summary: Publish trade events
    description: |
      Publish trade events to the odin.trades topic.

      **Message Key**: Use the token ID (e.g., "BTC", "ETH") as the Kafka key
      for partition-based sharding.

      **Event Types**:
      - `TRADE_EXECUTED` - Direct trade execution
      - `BUY_COMPLETED` - Buy order completed
      - `SELL_COMPLETED` - Sell order completed

      **Example (Go)**:
      ```go
      event := TokenEvent{
        Type:      "TRADE_EXECUTED",
        Timestamp: time.Now().UnixMilli(),
        Data: map[string]any{
          "price":  "45000.50",
          "amount": "0.5",
          "buyer":  "0x...",
          "seller": "0x...",
        },
      }
      producer.Produce("odin.trades", tokenID, event)
      ```
    messages:
      - $ref: '#/channels/odin.trades/messages/TokenEventMessage'
  publishLiquidity:
    action: send
    channel:
      $ref: '#/channels/odin.liquidity'
    summary: Publish liquidity events
    description: |
      Publish liquidity pool events to odin.liquidity.

      **Event Types**:
      - `LIQUIDITY_ADDED` - Funds added to pool
      - `LIQUIDITY_REMOVED` - Funds removed from pool
      - `LIQUIDITY_REBALANCED` - Pool ratio adjusted
    messages:
      - $ref: '#/channels/odin.liquidity/messages/TokenEventMessage'
  publishBalances:
    action: send
    channel:
      $ref: '#/channels/odin.balances'
    summary: Publish balance events
    description: |
      Publish balance change events to odin.balances.

      **Event Types**:
      - `BALANCE_UPDATED` - User balance changed
      - `TRANSFER_COMPLETED` - Token transfer completed
    messages:
      - $ref: '#/channels/odin.balances/messages/TokenEventMessage'
  publishMetadata:
    action: send
    channel:
      $ref: '#/channels/odin.metadata'
    summary: Publish metadata events
    description: |
      Publish token metadata updates to odin.metadata.

      **Event Types**:
      - `METADATA_UPDATED` - General metadata change
      - `TOKEN_NAME_CHANGED` - Token name updated
      - `TOKEN_FLAGS_CHANGED` - Flags updated (verified, featured, trending)
    messages:
      - $ref: '#/channels/odin.metadata/messages/TokenEventMessage'
  publishSocial:
    action: send
    channel:
      $ref: '#/channels/odin.social'
    summary: Publish social events
    description: |
      Publish social verification events to odin.social.

      **Event Types**:
      - `TWITTER_VERIFIED` - Twitter verification confirmed
      - `SOCIAL_LINKS_UPDATED` - Social links changed
    messages:
      - $ref: '#/channels/odin.social/messages/TokenEventMessage'
  publishCommunity:
    action: send
    channel:
      $ref: '#/channels/odin.community'
    summary: Publish community events
    description: |
      Publish community interaction events to odin.community.

      **Event Types**:
      - `COMMENT_POSTED` - New comment
      - `COMMENT_PINNED` - Comment pinned
      - `COMMENT_UPVOTED` - Comment upvoted
      - `FAVORITE_TOGGLED` - Favorite status changed
    messages:
      - $ref: '#/channels/odin.community/messages/TokenEventMessage'
  publishCreation:
    action: send
    channel:
      $ref: '#/channels/odin.creation'
    summary: Publish creation events
    description: |
      Publish token creation events to odin.creation.

      **Event Types**:
      - `TOKEN_CREATED` - New token created
      - `TOKEN_LISTED` - Token listed on exchange
    messages:
      - $ref: '#/channels/odin.creation/messages/TokenEventMessage'
  publishAnalytics:
    action: send
    channel:
      $ref: '#/channels/odin.analytics'
    summary: Publish analytics events
    description: |
      Publish analytics updates to odin.analytics.

      **Event Types**:
      - `PRICE_DELTA_UPDATED` - Price change metrics
      - `HOLDER_COUNT_UPDATED` - Holder count changed
      - `ANALYTICS_RECALCULATED` - Full recalculation
      - `TRENDING_UPDATED` - Trending rank/score updated
    messages:
      - $ref: '#/channels/odin.analytics/messages/TokenEventMessage'
  consumeTrades:
    action: receive
    channel:
      $ref: '#/channels/odin.trades'
    summary: Consume trade events
    description: |
      Subscribe to trade events including executions, buys, and sells.
      High-frequency topic with 30s retention.

      **Consumer Group**: Use a unique consumer group ID per service.

      **Example (Go)**:
      ```go
      consumer := kafka.NewConsumer(kafka.ConsumerConfig{
        Brokers:       []string{"odin-redpanda:9092"},
        ConsumerGroup: "my-service-trades",
        Topics:        []string{"odin.trades"},
      })
      for event := range consumer.Events() {
        tokenID := event.Key
        // Process event.Value (TokenEvent)
      }
      ```
    messages:
      - $ref: '#/channels/odin.trades/messages/TokenEventMessage'
  consumeLiquidity:
    action: receive
    channel:
      $ref: '#/channels/odin.liquidity'
    summary: Consume liquidity events
    description: |
      Subscribe to liquidity pool operations.
      Medium-frequency topic with 60s retention.
    messages:
      - $ref: '#/channels/odin.liquidity/messages/TokenEventMessage'
  consumeBalances:
    action: receive
    channel:
      $ref: '#/channels/odin.balances'
    summary: Consume balance events
    description: |
      Subscribe to user balance and transfer events.
      High-frequency topic with 30s retention.
    messages:
      - $ref: '#/channels/odin.balances/messages/TokenEventMessage'
  consumeMetadata:
    action: receive
    channel:
      $ref: '#/channels/odin.metadata'
    summary: Consume metadata events
    description: |
      Subscribe to token metadata updates.
      Low-frequency topic with 1h retention.
    messages:
      - $ref: '#/channels/odin.metadata/messages/TokenEventMessage'
  consumeSocial:
    action: receive
    channel:
      $ref: '#/channels/odin.social'
    summary: Consume social events
    description: |
      Subscribe to social verification and links updates.
      Low-frequency topic with 1h retention.
    messages:
      - $ref: '#/channels/odin.social/messages/TokenEventMessage'
  consumeCommunity:
    action: receive
    channel:
      $ref: '#/channels/odin.community'
    summary: Consume community events
    description: |
      Subscribe to comments, favorites, and voting events.
      Medium-frequency topic with 5m retention.
    messages:
      - $ref: '#/channels/odin.community/messages/TokenEventMessage'
  consumeCreation:
    action: receive
    channel:
      $ref: '#/channels/odin.creation'
    summary: Consume creation events
    description: |
      Subscribe to token creation and listing events.
      Low-frequency topic with 1h retention.
    messages:
      - $ref: '#/channels/odin.creation/messages/TokenEventMessage'
  consumeAnalytics:
    action: receive
    channel:
      $ref: '#/channels/odin.analytics'
    summary: Consume analytics events
    description: |
      Subscribe to price deltas, holder counts, and trending updates.
      Medium-frequency topic with 5m retention.
    messages:
      - $ref: '#/channels/odin.analytics/messages/TokenEventMessage'
  wsSubscribe:
    action: send
    channel:
      $ref: '#/channels/ws.control.subscribe'
    summary: Subscribe to event channels
    description: |
      Client sends subscription requests to manage channel subscriptions.

      **Request:** `SubscribeRequest` or `UnsubscribeRequest`
      **Response:** `SubscriptionAck` or `UnsubscriptionAck`
    messages:
      - $ref: '#/channels/ws.control.subscribe/messages/SubscribeRequest'
      - $ref: '#/channels/ws.control.subscribe/messages/UnsubscribeRequest'
  wsSubscribeAck:
    action: receive
    channel:
      $ref: '#/channels/ws.control.subscribe'
    summary: Receive subscription acknowledgments
    description: |
      Server sends acknowledgments for subscription operations.
    messages:
      - $ref: '#/channels/ws.control.subscribe/messages/SubscriptionAck'
      - $ref: '#/channels/ws.control.subscribe/messages/UnsubscriptionAck'
  wsHeartbeat:
    action: send
    channel:
      $ref: '#/channels/ws.control.heartbeat'
    summary: Send heartbeat ping
    description: |
      Client sends heartbeat to keep connection alive.
      Recommended interval: every 30 seconds.
    messages:
      - $ref: '#/channels/ws.control.heartbeat/messages/HeartbeatRequest'
  wsHeartbeatAck:
    action: receive
    channel:
      $ref: '#/channels/ws.control.heartbeat'
    summary: Receive heartbeat response
    description: |
      Server responds with pong containing server timestamp.
    messages:
      - $ref: '#/channels/ws.control.heartbeat/messages/PongResponse'
  wsReconnect:
    action: send
    channel:
      $ref: '#/channels/ws.control.reconnect'
    summary: Request reconnection and replay
    description: |
      Client sends reconnect request to replay missed messages.
      Provide the last known offset to receive messages from that point.
    messages:
      - $ref: '#/channels/ws.control.reconnect/messages/ReconnectRequest'
  wsReconnectAck:
    action: receive
    channel:
      $ref: '#/channels/ws.control.reconnect'
    summary: Receive reconnection acknowledgment
    description: |
      Server acknowledges reconnection with replay status.
    messages:
      - $ref: '#/channels/ws.control.reconnect/messages/ReconnectAck'
  wsError:
    action: receive
    channel:
      $ref: '#/channels/ws.control.error'
    summary: Receive error responses
    description: |
      Server sends error responses for failed operations.
    messages:
      - $ref: '#/channels/ws.control.error/messages/ErrorResponse'
      - $ref: '#/channels/ws.control.error/messages/PublishAck'
      - $ref: '#/channels/ws.control.error/messages/PublishError'
  wsPublish:
    action: send
    channel:
      $ref: '#/channels/ws.control.publish'
    summary: Publish message to channel
    description: |
      Client sends a message to be published to Kafka.

      **Flow:**
      1. Client sends `PublishRequest` with channel and data
      2. Server validates channel format (min 2 dot-separated parts)
      3. Server checks message size (max 64KB)
      4. Server applies rate limiting (10/sec, 100 burst)
      5. Server publishes to `odin.{namespace}.client-events` topic
      6. Server sends `PublishAck` on success or `PublishError` on failure

      **Kafka Message:**
      - Topic: `odin.{namespace}.client-events`
      - Key: Channel string (for partitioning)
      - Value: Raw JSON from client's data field
      - Headers: `client_id`, `source`, `timestamp`
    messages:
      - $ref: '#/channels/ws.control.publish/messages/PublishRequest'
  wsPublishAck:
    action: receive
    channel:
      $ref: '#/channels/ws.control.publish'
    summary: Receive publish acknowledgments
    description: |
      Server sends acknowledgments or errors for publish operations.
    messages:
      - $ref: '#/channels/ws.control.publish/messages/PublishAck'
      - $ref: '#/channels/ws.control.publish/messages/PublishError'
  wsBroadcast:
    action: receive
    channel:
      $ref: '#/channels/ws.control.broadcast'
    summary: Receive broadcast messages
    description: |
      Server broadcasts messages to subscribed clients.

      **Message Envelope:**
      All broadcast messages use a standard envelope with:
      - `type`: Always "message"
      - `seq`: Per-connection sequence number (starts at 1)
      - `ts`: Server timestamp in milliseconds
      - `channel`: Channel the message was published to
      - `data`: Event payload

      **Gap Detection:**
      Clients should track `seq` numbers. If a gap is detected
      (received seq != expected seq), use `reconnect` to replay
      missed messages from Kafka.

      **Latency Measurement:**
      Calculate: `clientTime - ts`
    messages:
      - $ref: '#/channels/ws.control.broadcast/messages/BroadcastMessage'
  publishClientEvents:
    action: send
    channel:
      $ref: '#/channels/odin.client-events'
    summary: Publish client events to Kafka
    description: |
      Internal operation: ws-server publishes client messages to Kafka.

      This is an internal operation - clients use the WebSocket `publish`
      message type, and the server writes to this Kafka topic.

      **Message Format:**
      - Key: Channel string (e.g., "community.group123.chat")
      - Value: Raw JSON from client
      - Headers: client_id, source, timestamp
    messages:
      - $ref: '#/channels/odin.client-events/messages/ClientPublishedMessage'
  consumeClientEvents:
    action: receive
    channel:
      $ref: '#/channels/odin.client-events'
    summary: Consume client events from Kafka
    description: |
      Downstream services consume client-published messages.

      **Use Cases:**
      - Chat message processing
      - Content moderation
      - Event aggregation
      - Analytics pipelines
    messages:
      - $ref: '#/channels/odin.client-events/messages/ClientPublishedMessage'
components:
  messages:
    TokenEventMessage:
      name: TokenEventMessage
      title: Token Event Message
      summary: Standard event envelope for all Odin token events
      description: >
        All events in Odin are wrapped in this envelope structure.

        The `type` field determines the event type, and the `data` field

        contains the event-specific payload.


        **Message Key**: The Kafka message key is the token ID (e.g., "BTC",
        "ETH")


        **Sequence Numbers**: The `seq` field is a per-connection sequence
        number

        that clients can use for gap detection. If a client receives seq=5
        followed

        by seq=7, it knows seq=6 was missed and can request replay via
        reconnect.
      contentType: application/json
      headers:
        type: object
        properties:
          kafka_key:
            type: string
            description: Token ID used as Kafka partition key
            example: BTC
      payload:
        type: object
        required:
          - type
          - timestamp
          - data
        properties:
          seq:
            type: integer
            format: int64
            description: |
              Per-connection sequence number for gap detection.
              Starts at 1 for each new WebSocket connection and increments
              monotonically. Clients can detect missed messages by checking
              for gaps in the sequence.
            example: 42
          channel:
            type: string
            description: |
              The channel this message was published to (e.g., "BTC.trade").
              Format: `{token_id}.{category}` for token-specific channels.
            example: BTC.trade
          type:
            type: string
            description: >
              Event type constant. Valid values depend on the topic:

              - trades: TRADE_EXECUTED, BUY_COMPLETED, SELL_COMPLETED

              - liquidity: LIQUIDITY_ADDED, LIQUIDITY_REMOVED,
              LIQUIDITY_REBALANCED

              - balances: BALANCE_UPDATED, TRANSFER_COMPLETED

              - metadata: METADATA_UPDATED, TOKEN_NAME_CHANGED,
              TOKEN_FLAGS_CHANGED

              - social: TWITTER_VERIFIED, SOCIAL_LINKS_UPDATED

              - community: COMMENT_POSTED, COMMENT_PINNED, COMMENT_UPVOTED,
              FAVORITE_TOGGLED

              - creation: TOKEN_CREATED, TOKEN_LISTED

              - analytics: PRICE_DELTA_UPDATED, HOLDER_COUNT_UPDATED,
              ANALYTICS_RECALCULATED, TRENDING_UPDATED
            example: TRADE_EXECUTED
          timestamp:
            type: integer
            format: int64
            description: Unix timestamp in milliseconds when the event occurred
            example: 1699901234567
          data:
            type: object
            description: >
              Event-specific payload data. The structure depends on the event
              type.

              See the schema definitions for each topic.
            additionalProperties: true
      examples:
        - name: Trade Executed Event
          summary: Example of a trade execution event
          headers:
            kafka_key: BTC
          payload:
            seq: 42
            channel: BTC.trade
            type: TRADE_EXECUTED
            timestamp: 1699901234567
            data:
              price: '45000.50'
              amount: '0.5'
              buyer: '0x1234567890abcdef'
              seller: '0xfedcba0987654321'
              txHash: '0xabc123def456'
        - name: Liquidity Added Event
          summary: Example of a liquidity addition event
          headers:
            kafka_key: ETH
          payload:
            seq: 43
            channel: ETH.liquidity
            type: LIQUIDITY_ADDED
            timestamp: 1699901234567
            data:
              amount: '10000.00'
              provider: '0x1234567890abcdef'
              totalLiquidity: '500000.00'
  schemas:
    TradePayload:
      type: object
      description: Payload for trade-related events
      oneOf:
        - type: object
          title: Trade Executed
          description: Direct trade execution payload
          required:
            - price
            - amount
            - buyer
            - seller
          properties:
            price:
              type: string
              description: Trade price as decimal string
