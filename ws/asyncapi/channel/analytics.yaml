# Analytics Channel
# Price deltas, holder counts, trending

OdinAnalytics:
  address: odin.analytics
  description: |
    Analytics and metrics updates.

    **Event Types:**
    - `PRICE_DELTA_UPDATED` - Price change metrics updated
    - `HOLDER_COUNT_UPDATED` - Holder count changed
    - `ANALYTICS_RECALCULATED` - Full analytics recalculation
    - `TRENDING_UPDATED` - Trending rank/score updated

    **Frequency:** Medium (7% of all events)
    **Retention:** 5 minutes
  messages:
    TokenEventMessage:
      $ref: '../component/message/token_event.yaml#/TokenEventMessage'
  bindings:
    kafka:
      partitions: 12
      replicas: 1
      topicConfiguration:
        retention.ms: 300000
