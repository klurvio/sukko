# Social Channel
# Social verification and links

OdinSocial:
  address: odin.social
  description: |
    Social verification and links updates.

    **Event Types:**
    - `TWITTER_VERIFIED` - Twitter verification confirmed
    - `SOCIAL_LINKS_UPDATED` - Social media links changed

    **Frequency:** Low
    **Retention:** 1 hour
  messages:
    TokenEventMessage:
      $ref: '../component/message/token_event.yaml#/TokenEventMessage'
  bindings:
    kafka:
      partitions: 12
      replicas: 1
      topicConfiguration:
        retention.ms: 3600000
