# Liquidity Channel
# Liquidity pool operations

OdinLiquidity:
  address: odin.liquidity
  description: |
    Liquidity pool operations and state changes.

    **Event Types:**
    - `LIQUIDITY_ADDED` - Liquidity provider added funds
    - `LIQUIDITY_REMOVED` - Liquidity removed from pool
    - `LIQUIDITY_REBALANCED` - Pool ratio adjustment

    **Frequency:** Medium (8% of all events)
    **Retention:** 60 seconds
  messages:
    TokenEventMessage:
      $ref: '../component/message/token_event.yaml#/TokenEventMessage'
  bindings:
    kafka:
      partitions: 12
      replicas: 1
      topicConfiguration:
        retention.ms: 60000
