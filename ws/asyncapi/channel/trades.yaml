# Trades Channel
# High-frequency trading events

OdinTrades:
  address: odin.trades
  description: |
    Trading events including executions, buys, and sells.

    **Event Types:**
    - `TRADE_EXECUTED` - Direct trade execution
    - `BUY_COMPLETED` - Buy order completed
    - `SELL_COMPLETED` - Sell order completed

    **Frequency:** High (20% of all events)
    **Retention:** 30 seconds
  messages:
    TokenEventMessage:
      $ref: '../component/message/token_event.yaml#/TokenEventMessage'
  bindings:
    kafka:
      partitions: 12
      replicas: 1
      topicConfiguration:
        retention.ms: 30000
