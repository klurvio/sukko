syntax = "proto3";

package sukko.provisioning.v1;

option go_package = "github.com/klurvio/sukko/gen/proto/sukko/provisioning/v1;provisioningv1";

// Internal service — streaming provisioning data to gateway and ws-server.
service ProvisioningInternalService {
  // Stream active keys — snapshot on connect, deltas on change.
  rpc WatchKeys(WatchKeysRequest) returns (stream WatchKeysResponse);

  // Stream tenant config (channel rules, routing rules) — snapshot on connect, deltas on change.
  rpc WatchTenantConfig(WatchTenantConfigRequest) returns (stream WatchTenantConfigResponse);

  // Stream topic discovery — snapshot on connect, deltas on change.
  rpc WatchTopics(WatchTopicsRequest) returns (stream WatchTopicsResponse);

  // Stream active API keys — snapshot on connect, deltas on change.
  rpc WatchAPIKeys(WatchAPIKeysRequest) returns (stream WatchAPIKeysResponse);

  // Stream push config (credentials + channel patterns) — snapshot on connect, deltas on change.
  rpc WatchPushConfig(WatchPushConfigRequest) returns (stream WatchPushConfigResponse);

  // StorePushCredentials stores provider credentials for a tenant.
  // Used by push service for VAPID auto-generation (FR-007) and admin API forwarding.
  rpc StorePushCredentials(StorePushCredentialsRequest) returns (StorePushCredentialsResponse);

  // Stream license key — sends current key on connect, updates on LicenseChanged events.
  // Services call Manager.Reload() with the received key.
  rpc WatchLicense(WatchLicenseRequest) returns (stream WatchLicenseResponse);

  // Stream token revocations — snapshot on connect, deltas on change.
  // Gateway checks revocation map on JWT validation. Push service deletes matching registrations.
  rpc WatchTokenRevocations(WatchTokenRevocationsRequest) returns (stream WatchTokenRevocationsResponse);
}

message WatchKeysRequest {}

message WatchKeysResponse {
  bool is_snapshot = 1;           // true = full state, false = delta
  repeated KeyInfo keys = 2;      // All active keys (snapshot) or changed keys (delta)
  repeated string removed_key_ids = 3; // Key IDs removed (delta only)
}

message KeyInfo {
  string key_id = 1;
  string tenant_id = 2;
  string algorithm = 3;           // ES256, RS256, EdDSA
  string public_key_pem = 4;
  bool is_active = 5;
  int64 expires_at_unix = 6;      // 0 = no expiry
}

message WatchTenantConfigRequest {}

message WatchTenantConfigResponse {
  bool is_snapshot = 1;
  repeated TenantConfig tenants = 2;
  repeated string removed_tenant_ids = 3;
}

message TenantConfig {
  string tenant_id = 1;
  reserved 2;                     // was: OIDCConfig oidc (removed)
  ChannelRules channel_rules = 3; // nil = no rules
  repeated TopicRoutingRule routing_rules = 4;
}

message TopicRoutingRule {
  string pattern = 1;
  string topic_suffix = 2; // deprecated: use topics instead
  repeated string topics = 3;
  int32 priority = 4;
}

message ChannelRules {
  repeated string public_channels = 1;
  map<string, GroupChannels> group_mappings = 2;
  repeated string default_channels = 3;
  repeated string publish_public_channels = 4;
  map<string, GroupChannels> publish_group_mappings = 5;
  repeated string publish_default_channels = 6;
}

message GroupChannels {
  repeated string channels = 1;
}

message WatchTopicsRequest {
  string namespace = 1;           // Topic namespace (e.g., "prod")
}

message WatchTopicsResponse {
  bool is_snapshot = 1;
  repeated string shared_topics = 2;
  repeated DedicatedTenant dedicated_tenants = 3;
}

message DedicatedTenant {
  string tenant_id = 1;
  repeated string topics = 2;
}

message WatchAPIKeysRequest {}

message WatchAPIKeysResponse {
  bool is_snapshot = 1;                    // true = full state, false = delta
  repeated APIKeyInfo api_keys = 2;        // All active keys (snapshot) or changed keys (delta)
  repeated string removed_key_ids = 3;     // Key IDs removed (delta only)
}

message APIKeyInfo {
  string key_id = 1;      // pk_live_...
  string tenant_id = 2;
  string name = 3;
  bool is_active = 4;
}

// --- Push Config Streaming ---

message WatchPushConfigRequest {}

message WatchPushConfigResponse {
  bool is_snapshot = 1;                              // true = full state, false = delta
  repeated PushCredentialInfo push_credentials = 2;  // Per-tenant provider credentials
  repeated PushChannelConfig push_channel_configs = 3; // Per-tenant push channel patterns
  repeated string removed_credential_ids = 4;        // Credential IDs removed (delta only)
  repeated string removed_config_tenant_ids = 5;     // Tenant IDs whose push config was removed (delta only)
}

message PushCredentialInfo {
  string tenant_id = 1;
  string provider = 2;        // "vapid", "fcm", "apns"
  string credential_data = 3; // Decrypted JSON (encrypted at rest, decrypted before streaming)
}

message PushChannelConfig {
  string tenant_id = 1;
  repeated string patterns = 2;   // Channel glob patterns WITH tenant prefix
  int32 default_ttl = 3;          // Push TTL in seconds (default 2419200 = 4 weeks)
  string default_urgency = 4;     // "very-low", "low", "normal", "high"
}

// --- Store Push Credentials ---

message StorePushCredentialsRequest {
  string tenant_id = 1;
  string provider = 2;            // "vapid", "fcm", "apns"
  string credential_data = 3;     // Raw JSON (encrypted by provisioning before storage)
}

message StorePushCredentialsResponse {
  bool success = 1;
}

message WatchLicenseRequest {}

message WatchLicenseResponse {
  // Raw license key string. Services call Manager.Reload() with this value.
  string license_key = 1;
}

message WatchTokenRevocationsRequest {}

message WatchTokenRevocationsResponse {
  repeated TokenRevocation revocations = 1;
  bool is_snapshot = 2; // true = full snapshot, false = delta
}

message TokenRevocation {
  string tenant_id = 1;
  string type = 2;      // "user" or "token"
  string sub = 3;       // For user-level revocation
  string jti = 4;       // For token-level revocation
  int64 revoked_at = 5; // Unix timestamp
  int64 expires_at = 6; // Auto-prune time
  bool removed = 7;     // true = entry expired/removed (delta only)
}
