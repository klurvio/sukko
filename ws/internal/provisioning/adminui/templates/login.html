<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Sukko Admin</title>
  <link rel="stylesheet" href="/admin/static/css/tailwind.css">
</head>
<body class="h-full flex items-center justify-center">
  <div class="w-full max-w-sm space-y-6">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-gray-900">Sukko Admin</h1>
      <p class="mt-1 text-sm text-gray-500">Sign in with your admin token</p>
    </div>
    {{if .Error}}
    <div class="rounded-md bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-800">
      {{.Error}}
    </div>
    {{end}}
    <form method="POST" action="/admin/login" class="space-y-4">
      <div>
        <label for="token" class="block text-sm font-medium text-gray-700">Admin token</label>
        <input
          id="token"
          name="token"
          type="password"
          autocomplete="current-password"
          required
          class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
          placeholder="Enter ADMIN_TOKEN"
        >
      </div>
      <button
        type="submit"
        class="w-full rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
      >
        Sign in
      </button>
    </form>
  </div>
</body>
</html>
