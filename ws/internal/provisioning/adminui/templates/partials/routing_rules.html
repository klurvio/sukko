<div class="space-y-4" x-data="{editing: false}" id="routing-rules-panel">
  <div class="flex items-center justify-between">
    <h3 class="text-sm font-medium text-gray-700">Channel Routing Rules</h3>
    <button @click="editing = !editing"
      class="rounded-md border border-gray-300 px-3 py-1.5 text-xs font-medium text-gray-700 hover:bg-gray-50">
      <span x-text="editing ? 'Cancel' : 'Edit JSON'"></span>
    </button>
  </div>

  <div x-show="!editing">
    {{if .Rules}}
    <div class="overflow-hidden rounded-lg border border-gray-200">
      <table class="min-w-full divide-y divide-gray-200 text-xs">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-3 py-2 text-left font-medium text-gray-500">Pattern</th>
            <th class="px-3 py-2 text-left font-medium text-gray-500">Topic</th>
            <th class="px-3 py-2 text-left font-medium text-gray-500">Access</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          {{range .Rules.Public}}
          <tr><td class="px-3 py-2 font-mono text-gray-700">{{.}}</td><td colspan="2" class="px-3 py-2 text-gray-500">public subscribe</td></tr>
          {{end}}
        </tbody>
      </table>
    </div>
    {{else}}
    <p class="text-sm text-gray-400">No channel rules configured</p>
    {{end}}
  </div>

  <div x-show="editing" x-cloak class="space-y-3">
    <div id="cm-editor-container" class="rounded-md border border-gray-300 overflow-hidden" style="height:300px"></div>
    <div class="flex gap-2">
      <button
        hx-put="/admin/tenants/{{.TenantSlug}}/channel-rules"
        hx-target="#routing-rules-panel"
        hx-ext="json-enc"
        hx-include="#cm-editor-container [data-cm-value]"
        class="rounded-md bg-indigo-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-indigo-700">
        Save rules
      </button>
    </div>
    <script>
    (function(){
      var schema;
      fetch("/admin/schemas/channel-rules.json").then(r=>r.json()).then(s=>{schema=s});
    })();
    </script>
  </div>
</div>
