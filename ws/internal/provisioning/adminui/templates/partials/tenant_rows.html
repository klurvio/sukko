{{range .}}
<tr class="hover:bg-gray-50 cursor-pointer" hx-get="/admin/tenants/{{.Slug}}" hx-push-url="true" hx-target="body" hx-swap="outerHTML">
  <td class="px-4 py-3 font-mono text-xs text-gray-900">{{.Slug}}</td>
  <td class="px-4 py-3 text-gray-700">{{.Name}}</td>
  <td class="px-4 py-3">
    {{if eq .Status "active"}}
    <span class="inline-flex items-center rounded-full bg-green-50 px-2 py-0.5 text-xs font-medium text-green-700 ring-1 ring-inset ring-green-600/20">Active</span>
    {{else if eq .Status "suspended"}}
    <span class="inline-flex items-center rounded-full bg-yellow-50 px-2 py-0.5 text-xs font-medium text-yellow-700 ring-1 ring-inset ring-yellow-600/20">Suspended</span>
    {{else}}
    <span class="inline-flex items-center rounded-full bg-gray-50 px-2 py-0.5 text-xs font-medium text-gray-600 ring-1 ring-inset ring-gray-500/20">{{.Status}}</span>
    {{end}}
  </td>
  <td class="px-4 py-3 text-gray-500">{{.ConnectionCount}}</td>
  <td class="px-4 py-3 text-gray-400 text-xs">{{.CreatedAt}}</td>
</tr>
{{else}}
<tr>
  <td colspan="5" class="px-4 py-8 text-center text-sm text-gray-400">No tenants found</td>
</tr>
{{end}}
