<div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
  <div class="rounded-lg border border-gray-200 bg-white p-4">
    <dt class="text-xs font-medium text-gray-500">Topics</dt>
    <dd class="mt-1 text-2xl font-semibold text-gray-900">{{.Tenant.TopicCount}}</dd>
  </div>
  <div class="rounded-lg border border-gray-200 bg-white p-4">
    <dt class="text-xs font-medium text-gray-500">Keys</dt>
    <dd class="mt-1 text-2xl font-semibold text-gray-900">{{.Tenant.KeyCount}}</dd>
  </div>
  <div class="rounded-lg border border-gray-200 bg-white p-4">
    <dt class="text-xs font-medium text-gray-500">Connections</dt>
    <dd class="mt-1 text-2xl font-semibold text-gray-900">{{.Tenant.ConnectionCount}}</dd>
  </div>
