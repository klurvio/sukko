        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "201":
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400":
          description: Validation error (invalid URL, missing channel_pattern, max_retries out of range)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: WEBHOOK_INVALID_INPUT
                message: "webhook url must use https"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Feature not available in current edition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: EDITION_LIMIT
                message: "webhooks require Pro edition or higher"
        "422":
