openapi: 3.1.0

info:
  title: Sukko Provisioning API
  version: 1.0.0
  description: |
    REST API for managing tenants, JWT signing keys, API keys, routing rules,
    channel rules, and quotas in the Sukko multi-tenant WebSocket platform.

    ## Authentication

    All `/api/v1/` endpoints require authentication via one of:
    - **Admin JWT**: `Authorization: Bearer {admin_jwt}` — Ed25519 keypair auth with `iss: "sukko-admin"`. Checked first; if present and valid, bypasses tenant JWT.
    - **Tenant JWT**: `Authorization: Bearer {jwt}` — validated against per-tenant asymmetric keys (ES256, RS256, EdDSA).

    Health, readiness, version, edition, config, and metrics endpoints (at root level, not under `/api/v1/`) require no authentication.

    ## Authorization

    Role-based access control with tenant isolation:
    - **admin/system**: Full access to all tenants and operations
    - **tenant owner**: Access to own tenant's resources only (JWT `tenant_id` must match)

    Operations like creating tenants, suspending, and modifying routing rules require `admin` or `system` role.

    ## Pagination

    All list endpoints support `?limit=N&offset=M` with defaults `limit=50, offset=0` (max limit=100).
    Responses include `{ items, total, limit, offset }`.

    ## Error Format

    All errors return: `{"code": "UPPER_SNAKE_CASE", "message": "human-readable"}`.
  contact:
    name: Sukko Platform Team
  license:
    name: Proprietary

servers:
  - url: http://localhost:8080
    description: Local development
  - url: http://{host}:{port}
    description: Provisioning service (internal, not publicly exposed)
    variables:
      host:
        default: localhost
        description: Provisioning service hostname
      port:
        default: "8080"
        description: Provisioning service port

paths:
  /api/v1/tenants:
    post:
      operationId: createTenant
      summary: Create a new tenant
      description: Creates a tenant with optional initial JWT signing key. Requires admin or system role.
      tags: [Tenants]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTenantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Tenant already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: listTenants
      summary: List all tenants
      description: Returns paginated list of tenants. Requires admin or system role.
      tags: [Tenants]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: status
          in: query
          schema:
            type: string
            enum: [active, suspended, deprovisioning, deleted]
          description: Filter by tenant status
      responses:
        "200":
          description: Paginated tenant list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTenants"

  /api/v1/tenants/{tenantSlug}:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"

    get:
      operationId: getTenant
      summary: Get tenant details
      tags: [Tenants]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tenant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Service temporarily unavailable (RequireTenant middleware DB lookup failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateTenant
      summary: Update tenant
      description: Partial update — only provided fields are changed.
      tags: [Tenants]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantRequest"
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deprovisionTenant
      summary: Deprovision tenant
      description: |
        Marks tenant for deletion. Requires admin or system role.

        With `?force=true`, the tenant is deleted immediately and the response status is `deleted`.
        Without it, the tenant is marked for async deprovisioning and the response status is `deprovisioning`.

        The `force` parameter only accepts the literal string `"true"` — any other value (e.g. `1`, `True`) is treated as absent.
      tags: [Tenants]
      security:
        - bearerAuth: []
      parameters:
        - name: force
          in: query
          required: false
          schema:
            type: string
          description: |
            Pass `force=true` (literal string) to delete the tenant immediately.
            Any other value is treated as absent (deprovisioning mode).
      responses:
        "200":
          description: Tenant deprovisioning started or deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [deprovisioning, deleted]
              examples:
                deprovisioning:
                  summary: Default — async deprovisioning started
                  value:
                    status: deprovisioning
                force_deleted:
                  summary: Force delete — tenant removed immediately
                  value:
                    status: deleted
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Deprovisioning failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: DEPROVISION_FAILED
                message: "failed to deprovision tenant"

  /api/v1/tenants/{tenantSlug}/rename:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"
    post:
      operationId: renameTenant
      summary: Rename tenant slug
      description: |
        Renames the tenant's slug (Kafka namespace and URL identifier). This is a saga operation
        that creates new Kafka topics and ACLs under the new slug before updating the database.
        The old slug remains valid for JWT authentication during the `SLUG_RENAME_TOPIC_HOLD_PERIOD`
        (default 7 days) to allow clients to rotate tokens without service interruption.

        Requires admin or system role — tenant JWTs are rejected with 403.
      tags: [Tenants]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameTenantRequest"
      responses:
        "200":
          description: Tenant renamed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          description: Validation error (invalid slug, reserved slug, unchanged slug)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden — tenant JWT rejected on this endpoint; admin JWT required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict — slug already taken, rename already in progress, or tenant not active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Service temporarily unavailable (RequireTenant middleware DB lookup failed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tenants/{tenantSlug}/suspend:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"
    post:
      operationId: suspendTenant
      summary: Suspend tenant
      description: Suspends an active tenant. Requires admin or system role.
      tags: [Tenants]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tenant suspended
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: suspended
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Tenant not in active state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tenants/{tenantSlug}/reactivate:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"
    post:
      operationId: reactivateTenant
      summary: Reactivate tenant
      description: Reactivates a suspended tenant. Requires admin or system role.
      tags: [Tenants]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tenant reactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: active
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Tenant not in suspended state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tenants/{tenantSlug}/keys:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"

    post:
      operationId: createKey
      summary: Create JWT signing key
      description: Registers a public key for JWT signature verification. The gateway uses this to validate JWTs from this tenant's clients.
      tags: [JWT Keys]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeyRequest"
      responses:
        "201":
          description: Key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantKey"
        "400":
          description: Validation error (invalid PEM, unsupported algorithm)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: listKeys
      summary: List JWT signing keys
      tags: [JWT Keys]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Paginated key list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedKeys"

  /api/v1/tenants/{tenantSlug}/keys/{keyID}:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"
      - $ref: "#/components/parameters/keyID"

    delete:
      operationId: revokeKey
      summary: Revoke JWT signing key
      description: Revokes a key. JWTs signed with this key will be rejected.
      tags: [JWT Keys]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: revoked
        "404":
          description: Key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tenants/{tenantSlug}/api-keys:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"

    post:
      operationId: createAPIKey
      summary: Create API key
      description: |
        Creates an API key for WebSocket connections. The key is returned once on creation — store it securely.
        API keys grant public-channel-only access (no publish). Clients can escalate to full JWT access mid-connection.
      tags: [API Keys]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKey"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: listAPIKeys
      summary: List API keys
      tags: [API Keys]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Paginated API key list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAPIKeys"

  /api/v1/tenants/{tenantSlug}/api-keys/{keyID}:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"
      - $ref: "#/components/parameters/keyID"

    delete:
      operationId: revokeAPIKey
      summary: Revoke API key
      description: Revokes an API key. Existing WebSocket connections using this key are not disconnected but new connections will be rejected.
      tags: [API Keys]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: API key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: revoked
        "404":
          description: API key not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tenants/{tenantSlug}/routing-rules:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"

    get:
      operationId: getRoutingRules
      summary: Get routing rules
      description: Returns channel-to-Kafka-topic routing rules for the tenant.
      tags: [Routing Rules]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Routing rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingRulesResponse"
    post:
      operationId: addRoutingRule
      summary: Add a routing rule
      description: |
        Adds a single routing rule without replacing existing rules. Requires admin or system role.

        The rule is stored with the normalized pattern (bare `*` → `**`). Returns 409 on duplicate
        priority or duplicate pattern.
      tags: [Routing Rules]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddRoutingRuleRequest"
      responses:
        "201":
          description: Rule added
          content:
            application/json:
              schema:
                type: object
                properties:
                  rule:
                    $ref: "#/components/schemas/RoutingRule"
        "400":
          description: Validation error or rule limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                validation_error:
                  summary: Schema validation failed
                  value:
                    code: ROUTING_RULE_VALIDATION_ERROR
                    message: "invalid pattern, empty topics, topic not provisioned, or too many topics per rule"
                too_many_rules:
                  summary: Per-tenant rule limit exceeded
                  value:
                    code: TOO_MANY_ROUTING_RULES
                    message: "too many routing rules"
        "409":
          description: Conflict — duplicate priority or duplicate pattern
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: setRoutingRules
      summary: Set routing rules
      description: |
        Replaces all routing rules for the tenant. Requires admin or system role.

        Rules are evaluated in ascending priority order — **first match wins**. Unmatched channels route to the dead-letter topic.

        **Constraints**: Max 100 rules. No duplicate patterns or priorities. Patterns use `**` for multi-segment wildcard (`*` accepted, normalized to `**`).
      tags: [Routing Rules]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRoutingRulesRequest"
      responses:
        "200":
          description: Rules set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingRulesResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteRoutingRules
      summary: Delete routing rules
      description: Removes all routing rules for the tenant. Idempotent — returns 200 even if no rules exist. Requires admin or system role.
      tags: [Routing Rules]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rules deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: deleted
        "500":
          description: Failed to delete routing rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: DELETE_ROUTING_RULES_FAILED
                message: "failed to delete routing rules"

  /api/v1/tenants/{tenantSlug}/channel-rules:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"

    get:
      operationId: getChannelRules
      summary: Get channel rules
      description: Returns channel access control rules for the tenant.
      tags: [Channel Rules]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Channel rules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantChannelRules"
        "404":
          description: No channel rules configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: setChannelRules
      summary: Set channel rules
      description: |
        Replaces channel access control rules for the tenant. Requires admin or system role.
        Patterns support wildcards (`*`) and placeholders (`{subject}`, `{group_id}`).
      tags: [Channel Rules]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetChannelRulesRequest"
      responses:
        "200":
          description: Rules set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantChannelRules"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteChannelRules
      summary: Delete channel rules
      description: Removes channel rules for the tenant. Falls back to global patterns. Requires admin or system role.
      tags: [Channel Rules]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rules deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: deleted
        "404":
          description: No rules configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tenants/{tenantSlug}/quotas:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"

    get:
      operationId: getQuota
      summary: Get tenant quotas
      tags: [Quotas]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tenant quotas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantQuota"

    patch:
      operationId: updateQuota
      summary: Update tenant quotas
      description: Partial update — only provided fields are changed. Requires admin or system role.
      tags: [Quotas]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuotaRequest"
      responses:
        "200":
          description: Quotas updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantQuota"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/tenants/{tenantSlug}/audit:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"

    get:
      operationId: getAuditLog
      summary: Get audit log
      description: Returns paginated audit trail for the tenant.
      tags: [Audit]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAuditEntries"

  /api/v1/tenants/{tenantSlug}/test-access:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"

    post:
      operationId: testAccess
      summary: Test channel access
      description: Computes which channel patterns would be allowed for given groups. Useful for debugging access rules.
      tags: [Channel Rules]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                groups:
                  type: array
                  items:
                    type: string
                  description: JWT groups to test access for
              required:
                - groups
      responses:
        "200":
          description: Allowed patterns
          content:
            application/json:
              schema:
                type: object
                properties:
                  allowed_patterns:
                    type: array
                    items:
                      type: string

  /api/v1/tenants/{tenantSlug}/tokens/revoke:
    parameters:
      - $ref: "#/components/parameters/tenantSlug"

    post:
      operationId: revokeToken
      summary: Revoke a JWT token or all tokens for a user
      description: |
        Revoke a specific JWT by `jti` (token ID) or all JWTs issued to a user by `sub` (subject).
        Revocation entries are retained for `PROVISIONING_TOKEN_REVOCATION_MAX_LIFETIME` (default 1h)
        before the background prune loop removes them.

        **Edition**: Pro (Token Revocation feature gate)

        Provide exactly one of `sub` or `jti` — not both.
      tags: [Token Revocation]
      security:
        - bearerAuth: []
      x-edition: pro
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sub:
                  type: string
                  description: Revoke all tokens for this subject (user ID). Mutually exclusive with `jti`.
                jti:
                  type: string
                  description: Revoke a specific token by JWT ID. Mutually exclusive with `sub`.
                exp:
                  type: integer
                  format: int64
                  description: Optional explicit expiry (Unix timestamp). Overrides the default max lifetime if provided and in the future.
            examples:
              by_subject:
                value:
                  sub: "user-123"
              by_jti:
                value:
                  jti: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        "200":
          description: Token(s) revoked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "revoked"
                  type:
                    type: string
                    enum: [user, token]
                    description: Revocation type — `user` when `sub` was provided, `token` when `jti` was provided
                  tenant_id:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
              example:
                status: "revoked"
                type: "user"
                tenant_id: "acme"
                expires_at: "2026-05-27T14:00:00Z"
        "400":
          description: Invalid request — missing both fields, or both provided simultaneously
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing_fields:
                  value:
                    code: INVALID_REQUEST
                    message: "one of 'sub' or 'jti' is required"
                both_provided:
                  value:
                    code: INVALID_REQUEST
                    message: "provide either 'sub' or 'jti', not both"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Edition gate — requires Pro
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: EDITION_LIMIT
                message: "This feature requires pro edition or higher"
        "429":
          description: Rate limited
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds to wait before retrying
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: RATE_LIMITED
                message: "too many revocation requests"

  /api/v1/keys/active:
    get:
      operationId: getActiveKeys
      summary: Get all active JWT keys
      description: Returns all active, non-expired, non-revoked JWT signing keys across all tenants. Used by the gateway for token validation. Requires system or admin role.
      tags: [JWT Keys]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/TenantKey"

  /api/v1/api-keys/active:
    get:
      operationId: getActiveAPIKeys
      summary: Get all active API keys
      description: Returns all active API keys across all tenants. Used by the gateway for API key validation. Requires system or admin role.
      tags: [API Keys]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIKey"

  # ── License Hot-Reload ──────────────────────────────────────────────
  /api/v1/license:
    post:
      operationId: reloadLicense
      summary: Reload license key
      description: |
        Push a new license key to the provisioning service. Requires admin JWT
        authentication (defense in depth with license signature verification).

        Rate-limited per IP (~10 req/min with burst of 3). Replay-protected via `iat` claim.
        On success, the key is persisted (encrypted) and broadcast to all services via gRPC stream.
      tags: [License]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key:
                  type: string
                  description: Signed license key (base64url payload + Ed25519 signature)
            example:
              key: "eyJlZGl0aW9uIjoicHJvIiwib3JnIjoiQWNtZSJ9.signature..."
      responses:
        "200":
          description: License reloaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  edition:
                    type: string
                    enum: [community, pro, enterprise]
                  org:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
                  status:
                    type: string
                    const: reloaded
              example:
                edition: pro
                org: "Acme Corp"
                expires_at: "2027-04-08T00:00:00Z"
                status: reloaded
        "400":
          description: Invalid key (bad format, invalid signature, or expired)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidSignature:
                  value: { code: "INVALID_SIGNATURE", message: "Ed25519 signature verification failed" }
                keyExpired:
                  value: { code: "KEY_EXPIRED", message: "pushed key is already expired" }
                invalidFormat:
                  value: { code: "INVALID_FORMAT", message: "license key format invalid" }
        "401":
          description: Authentication required or invalid admin credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingToken:
                  value:
                    code: MISSING_TOKEN
                    message: Authorization header required
                unauthorized:
                  value:
                    code: UNAUTHORIZED
                    message: invalid admin credentials
        "403":
          description: Insufficient role — admin or system role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: INSUFFICIENT_ROLE
                message: "Required role: admin or system"
        "409":
          description: Replay detected (iat not newer than current)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: "REPLAY_DETECTED"
                message: "key iat is not newer than current — replay rejected"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: "RATE_LIMITED"
                message: "too many license reload requests"

  # ── Admin Key Management ───────────────────────────────────────────
  /api/v1/admin/keys:
    post:
      operationId: registerAdminKey
      summary: Register an admin public key
      description: |
        Register a new Ed25519 or RS256 public key for admin JWT authentication.
        Requires an existing admin JWT (bootstrap via `ADMIN_BOOTSTRAP_KEY` env var on first deploy).
      tags: [Admin Keys]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_key]
              properties:
                name:
                  type: string
                  description: Human-readable key name (default "unnamed")
                algorithm:
                  type: string
                  enum: [Ed25519, RS256]
                  description: Key algorithm (default Ed25519)
                public_key:
                  type: string
                  description: PEM-encoded public key
            example:
              name: "deploy-key"
              algorithm: "Ed25519"
              public_key: "-----BEGIN PUBLIC KEY-----\nMCowBQYDK2VwAyEA...\n-----END PUBLIC KEY-----"
      responses:
        "201":
          description: Admin key registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminKey"
        "400":
          description: Invalid key material or unsupported algorithm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: listAdminKeys
      summary: List active admin keys
      description: Returns all active (non-revoked) admin keys. Requires admin JWT.
      tags: [Admin Keys]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active admin keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminKey"
                  total:
                    type: integer
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/admin/keys/{id}:
    delete:
      operationId: revokeAdminKey
      summary: Revoke an admin key
      description: |
        Revoke an admin key. Cannot revoke the last active key (returns 409).
        Requires admin JWT.
      tags: [Admin Keys]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Admin key ID
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  key_id:
                    type: string
                  status:
                    type: string
                    const: revoked
              example:
                key_id: "ak_abc123"
                status: "revoked"
        "404":
          description: Key not found or already revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Cannot revoke the last active admin key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: "LAST_KEY"
                message: "cannot revoke the last active admin key"

  # ── Push Credentials (Enterprise) ─────────────────────────────────
  /api/v1/push/credentials:
    post:
      operationId: uploadPushCredentials
      summary: Upload push provider credentials
      description: |
        Upload push notification credentials for a tenant (FCM service account, APNs key, or VAPID keys).
        Credentials are encrypted at rest with AES-256-GCM.

        **Edition**: Enterprise (Push Notifications feature gate)
      tags: [Push]
      security:
        - bearerAuth: []
      x-edition: enterprise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, provider, credential_data]
              properties:
                tenant_id:
                  type: string
                provider:
                  type: string
                  enum: [fcm, apns, vapid]
                credential_data:
                  type: string
                  description: Provider-specific credential payload (JSON string for FCM/APNs, VAPID format for vapid)
            example:
              tenant_id: "acme"
              provider: "vapid"
              credential_data: '{"public_key":"BNw...","private_key":"aBc..."}'
      responses:
        "201":
          description: Credential created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
                  provider:
                    type: string
                  tenant_id:
                    type: string
        "400":
          description: Invalid request (missing fields, invalid provider, invalid credential data)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Edition gate — requires Enterprise
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      operationId: deletePushCredentials
      summary: Delete push provider credentials
      description: |
        Delete push credentials for a tenant and provider.
        Supports JSON body or query parameters (`?tenant_id=X&provider=Y`).

        **Edition**: Enterprise (Push Notifications feature gate)
      tags: [Push]
      security:
        - bearerAuth: []
      x-edition: enterprise
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
          description: Tenant ID (alternative to JSON body)
        - name: provider
          in: query
          schema:
            type: string
            enum: [fcm, apns, vapid]
          description: Provider (alternative to JSON body)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tenant_id:
                  type: string
                provider:
                  type: string
                  enum: [fcm, apns, vapid]
      responses:
        "200":
          description: Credential deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: deleted
        "404":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Push Channel Config (Enterprise) ───────────────────────────────
  /api/v1/push/channels:
    post:
      operationId: createPushChannelConfig
      summary: Create or update push channel config
      description: |
        Configure which channels trigger push notifications for a tenant.
        Patterns must be tenant-scoped (start with `{tenant_slug}.`).

        **Edition**: Enterprise (Push Notifications feature gate)
      tags: [Push]
      security:
        - bearerAuth: []
      x-edition: enterprise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, patterns]
              properties:
                tenant_id:
                  type: string
                patterns:
                  type: array
                  items:
                    type: string
                  description: Channel patterns that trigger push (must start with tenant_id prefix)
                default_ttl:
                  type: integer
                  description: Push message TTL in seconds (default 2419200 = 28 days)
                default_urgency:
                  type: string
                  enum: [very-low, low, normal, high]
                  description: Push message urgency (default "normal")
            example:
              tenant_id: "acme"
              patterns: ["acme.*.messages", "acme.*.alerts"]
              default_ttl: 86400
              default_urgency: "high"
      responses:
        "201":
          description: Channel config created/updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushChannelConfig"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: getPushChannelConfig
      summary: Get push channel config for a tenant
      description: |
        **Edition**: Enterprise (Push Notifications feature gate)
      tags: [Push]
      security:
        - bearerAuth: []
      x-edition: enterprise
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Channel config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushChannelConfig"
        "404":
          description: Config not found for tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      operationId: deletePushChannelConfig
      summary: Delete push channel config
      description: |
        Supports JSON body or query parameter (`?tenant_id=X`).

        **Edition**: Enterprise (Push Notifications feature gate)
      tags: [Push]
      security:
        - bearerAuth: []
      x-edition: enterprise
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                tenant_id:
                  type: string
      responses:
        "200":
          description: Config deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: deleted
        "404":
          description: Config not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/tenants/{tenantSlug}/connections:
    get:
      summary: List active connections for a tenant
      operationId: listConnections
      tags: [Connections]
      description: Returns live WebSocket connections for the authenticated tenant. Requires Pro edition.
      parameters:
        - $ref: "#/components/parameters/tenantSlug"
        - name: api_key_id
          in: query
          schema:
            type: string
          description: Filter by API key database ID.
        - name: channel
          in: query
          schema:
            type: string
          description: Filter by subscribed channel name (exact match).
        - name: transport
          in: query
          schema:
            type: string
            enum: [ws, sse]
          description: Filter by transport type.
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: List of active connections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionListResponse"
        "503":
          description: Registry unavailable — retry after the Retry-After header value
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Force-disconnect connections matching a filter (bulk)
      operationId: bulkDisconnectConnections
      tags: [Connections]
      description: |
        Force-disconnects all connections matching the provided filter(s). At least one filter is required.
        Returns 202 Accepted immediately; the re-query goroutine fires after ~10s to disconnect connections
        registered after the initial query. Requires Pro edition.
      parameters:
        - $ref: "#/components/parameters/tenantSlug"
        - name: api_key_id
          in: query
          schema:
            type: string
          description: Disconnect all connections authenticated with this API key ID.
        - name: channel
          in: query
          schema:
            type: string
          description: Disconnect all connections subscribed to this channel.
      responses:
        "202":
          description: Bulk disconnect accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkDisconnectResponse"
        "400":
          description: No filter provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Registry unavailable
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/tenants/{tenantSlug}/connections/{connId}:
    get:
      summary: Get a single connection by ID
      operationId: getConnection
      tags: [Connections]
      parameters:
        - $ref: "#/components/parameters/tenantSlug"
        - name: connId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connection detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionDetail"
        "404":
          description: Connection not found or belongs to a different tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Registry unavailable
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      summary: Force-disconnect a single connection
      operationId: forceDisconnectConnection
      tags: [Connections]
      parameters:
        - $ref: "#/components/parameters/tenantSlug"
        - name: connId
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Force-disconnect command published successfully
        "404":
          description: |
            Connection not found, belongs to a different tenant, or the target pod has no active
            subscribers (stale registry entry). Retry-After: 1 — connections registered within the
            last WS_CONNECTIONS_REGISTRY_FLUSH_INTERVAL may not yet appear in the registry.
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Admin channel unavailable — admin listener reconnecting.
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Webhooks (Pro edition) ────────────────────────────────────────────────────

  /api/v1/tenants/{tenantSlug}/webhooks:
    post:
      summary: Register a webhook endpoint
      operationId: createWebhook
      tags: [Webhooks]
      description: Creates a new webhook registration. Requires Pro edition. URL must use https (http allowed for local dev only).
      security:
        - TenantJWT: []
        - APIKey: []
