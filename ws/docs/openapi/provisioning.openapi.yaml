        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/tenants/{tenantSlug}/webhooks/{webhookID}/test:
    post:
      summary: Synchronous test delivery
      operationId: testWebhookDelivery
      tags: [Webhooks]
      security:
        - BearerAuth: []
      description: |
        Performs a single synchronous HTTP POST to the registered webhook URL
        using all standard worker logic (SSRF dial-time check, HMAC signing).
        No retry is performed and no delivery record is written.
        FR-017's status gate does **not** apply — suspended and degraded webhooks
        can be test-delivered so operators can verify before re-enabling.

        Rate limits: 10 requests per webhook per minute, 30 per tenant per minute.
        When the webhook worker is unreachable, returns 503.
      parameters:
        - $ref: "#/components/parameters/tenantSlug"
        - name: webhookID
          in: path
          required: true
          schema:
            type: string
          description: ID of the webhook to test
      responses:
        "200":
          description: |
            Test delivery completed. The destination may have returned a non-2xx status
            or a connection error — check the response body for the actual outcome.
            HTTP 200 indicates that the test delivery RPC itself succeeded; the
            `status_code` field reflects the destination's response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestDeliveryResult"
              examples:
                success:
                  summary: Destination returned 200
                  value:
                    status_code: 200
                    latency_ms: 142
                    response_body_preview: '{"received":true}'
                    error: ""
                ssrf_blocked:
                  summary: SSRF protection blocked the delivery
                  value:
                    status_code: 0
                    latency_ms: 0
                    response_body_preview: ""
                    error: "ssrf_blocked: example.internal resolves to private IP 10.0.0.1"
        "401":
          description: Unauthorized — missing or invalid tenant JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: UNAUTHORIZED
                message: "missing tenant context"
        "403":
          description: Feature not available in current edition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: EDITION_LIMIT
                message: "webhooks require Pro edition or higher"
        "404":
          description: Webhook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: WEBHOOK_NOT_FOUND
                message: "webhook not found"
        "429":
          description: Rate limit exceeded
          headers:
            Retry-After:
              description: Seconds until the rate limit window resets
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: RATE_LIMIT_EXCEEDED
                message: "rate limit exceeded for this webhook"
        "503":
          description: Webhook worker unreachable or deadline exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: WEBHOOK_WORKER_UNAVAILABLE
                message: "webhook worker is not reachable"

  /api/v1/admin/connections:
    get:
      summary: List active connections across all tenants (admin)
      operationId: adminListConnections
      tags: [Connections, Admin]
      description: Requires admin JWT. Returns connections across all tenants with optional filters.
      parameters:
        - name: tenant_id
          in: query
          schema:
            type: string
        - name: pod_id
          in: query
          schema:
            type: string
        - name: transport
          in: query
          schema:
            type: string
            enum: [ws, sse]
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Cross-tenant connection list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionListResponse"
        "503":
          description: Registry unavailable
          headers:
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/admin/analytics/stream:
    get:
      summary: Stream real-time per-tenant analytics (admin, Pro edition)
      operationId: adminAnalyticsStream
      tags: [Analytics, Admin]
      description: |
        Server-Sent Events (SSE) stream of per-tenant analytics aggregated across all pods.
        Polls the analytics DB every ~60s (ANALYTICS_FLUSH_INTERVAL) and pushes updated metrics.
        Requires admin JWT and Pro edition.
      security:
        - bearerAuth: []
      parameters:
        - name: tenant_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter to a specific tenant. Omit to aggregate across all tenants.
      responses:
        "200":
          description: SSE stream of analytics events
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Each event has a named type and JSON payload:
                  - `snapshot` (on connect and every interval): full metrics for the tenant
                example: |
                  event: snapshot
                  data: {"tenant_id":"acme","connections":{"active":142,"websocket":120,"sse":22},"messages":{"published":8420,"delivered":8415,"failed":5},"push":{"web":{"sent":200,"success":198,"failed":2,"expired":0,"rate_limited":0},"android":{"sent":150,"success":150,"failed":0,"expired":0,"rate_limited":0},"ios":{"sent":100,"success":99,"failed":1,"expired":0,"rate_limited":0}}}
        "401":
          description: Missing or invalid admin JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Max concurrent SSE connections reached (ANALYTICS_SSE_MAX_CONNS)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/login:
    post:
      summary: Admin UI login — exchange ADMIN_TOKEN for session cookie
      operationId: adminUILogin
      tags: [Admin UI]
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: ADMIN_TOKEN value configured via environment variable
      responses:
        "303":
          description: Login successful — redirects to /admin/ with Set-Cookie header
        "401":
          description: Invalid token — re-renders login page with error message (text/html)

  /admin/logout:
    post:
      summary: Admin UI logout — clear session cookie
      operationId: adminUILogout
      tags: [Admin UI]
      responses:
        "303":
          description: Logged out — redirects to /admin/login with cleared session cookie

  /admin/schemas/channel-rules.json:
    get:
      summary: JSON Schema for the channel rules editor
      operationId: adminUIChannelRulesSchema
      tags: [Admin UI]
      responses:
        "200":
          description: JSON Schema for validating channel rules in the CodeMirror editor
          content:
            application/json:
              schema:
                type: object

  /admin/system/health:
    get:
      summary: System health status for all Sukko services (session-gated)
      operationId: adminUISystemHealth
      tags: [Admin UI]
      description: |
        Fans out HTTP health probes to WS_SERVER_HEALTH_URL and GATEWAY_HEALTH_URL.
        Result is cached for 10 seconds. Provisioning self-status is always "ok".
        Requires a valid admin_session cookie.
      responses:
        "200":
          description: Health status of all configured services
          content:
            text/html:
              schema:
                type: string
                description: HTMX partial — system_health.html partial
        "303":
          description: Session expired — redirect to /admin/login

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Admin JWT (Ed25519 keypair, iss:"sukko-admin") or tenant JWT (per-tenant asymmetric keys).
        Admin JWT is checked first; if the issuer is not "sukko-admin", tenant JWT validation is used.

  parameters:
    tenantSlug:
      name: tenantSlug
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z][a-z0-9-]{2,62}$"
      description: Tenant slug — the human-readable Kafka namespace and URL identifier (3–63 chars, lowercase alphanumeric + hyphens, must start with a letter)

    keyID:
      name: keyID
      in: path
      required: true
      schema:
        type: string
      description: Key identifier

    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 100
      description: Number of items to return

    offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
      description: Number of items to skip

  schemas:
    ConnectionDetail:
      type: object
      required: [connection_id, tenant_id, pod_id, shard_id, remote_ip, transport, connected_at, channels, registry_status]
      properties:
        connection_id:
          type: string
          format: uuid
        tenant_id:
          type: string
        api_key_id:
          type: string
          description: Stable database ID of the API key; omitted for JWT-only auth.
        user_id:
          type: string
          description: JWT subject claim; omitted for API-key-only auth.
        pod_id:
          type: string
        shard_id:
          type: string
        remote_ip:
          type: string
        transport:
          type: string
          enum: [ws, sse]
        connected_at:
          type: string
          format: date-time
        channels:
          type: array
          items:
            type: string
        channels_capped:
          type: boolean
          description: True when the connection's channel list was capped at MaxRegistryChannelsPerConnection (200).
        registry_status:
          type: string
          enum: [current, possibly_stale]
          description: |
            `current` — all health indicators are green.
            `possibly_stale` — one or more health signals are degraded (drops > 0, stale heartbeat, admin channel unhealthy, or health key absent).

    BulkDisconnectResponse:
      type: object
      required: [disconnected, errors, channels_capped_warning, re_query_skipped]
      properties:
        disconnected:
          type: integer
          description: Number of connections successfully published a disconnect command.
        errors:
          type: integer
          description: Number of connections where the disconnect failed (unhealthy pod or Valkey error).
        channels_capped_warning:
          type: boolean
          description: True when at least one connection's channel list was capped; the filter may have missed some channels.
        re_query_skipped:
          type: boolean
          description: True when the re-query goroutine was not launched (WG unavailable). Normally false.

    ConnectionListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ConnectionDetail"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code (UPPER_SNAKE_CASE)
          examples: ["TENANT_NOT_FOUND"]
        message:
          type: string
          description: Human-readable error message
          examples: ["tenant not found"]

    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Immutable UUID primary key (DB-generated)
        slug:
          type: string
          pattern: "^[a-z][a-z0-9-]{2,62}$"
          description: Human-readable Kafka namespace and URL identifier (mutable via /rename)
        previous_slug:
          type: ["string", "null"]
          description: Slug before the most recent rename; present during the rename hold period
        name:
          type: string
        status:
          type: string
          enum: [active, suspended, deprovisioning, deleted]
        consumer_type:
          type: string
          enum: [shared, dedicated]
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        suspended_at:
          type: ["string", "null"]
          format: date-time
        deprovision_at:
          type: ["string", "null"]
          format: date-time
        deleted_at:
          type: ["string", "null"]
          format: date-time

    CreateTenantRequest:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
          minLength: 3
          maxLength: 63
          pattern: "^[a-z][a-z0-9-]{2,62}$"
          description: Tenant slug — Kafka namespace and URL identifier (lowercase alphanumeric + hyphens, must start with a letter)
        name:
          type: string
          minLength: 1
          maxLength: 256
        consumer_type:
          type: string
          enum: [shared, dedicated]
          default: shared
          description: Kafka consumer type — shared (pool) or dedicated (per-tenant consumer)
        metadata:
          type: object
          additionalProperties: true
        public_key:
          $ref: "#/components/schemas/CreateKeyRequest"

    CreateTenantResponse:
      type: object
      properties:
        tenant:
          $ref: "#/components/schemas/Tenant"
        key:
          $ref: "#/components/schemas/TenantKey"
          description: Only present if public_key was provided in the request

    RenameTenantRequest:
      type: object
      required: [slug]
      properties:
        slug:
          type: string
          minLength: 3
          maxLength: 63
          pattern: "^[a-z][a-z0-9-]{2,62}$"
          description: New tenant slug

    UpdateTenantRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
        consumer_type:
          type: string
          enum: [shared, dedicated]
        metadata:
          type: object
          additionalProperties: true

    PaginatedTenants:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Tenant"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    TenantKey:
      type: object
      properties:
        key_id:
          type: string
        tenant_id:
          type: string
          format: uuid
        algorithm:
          type: string
          enum: [ES256, RS256, EdDSA]
        public_key:
          type: string
          description: PEM-encoded public key
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        expires_at:
          type: ["string", "null"]
          format: date-time
        revoked_at:
          type: ["string", "null"]
          format: date-time

    CreateKeyRequest:
      type: object
      required: [key_id, algorithm, public_key]
      properties:
        key_id:
          type: string
          minLength: 3
          maxLength: 63
          description: Unique key identifier
        algorithm:
          type: string
          enum: [ES256, RS256, EdDSA]
          description: Signing algorithm
        public_key:
          type: string
          minLength: 50
          description: PEM-encoded public key
        expires_at:
          type: string
          format: date-time
          description: Optional key expiration

    PaginatedKeys:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TenantKey"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    APIKey:
      type: object
      properties:
        key_id:
          type: string
          description: "API key value (pk_live_ prefix + random). Only returned in full on creation."
        tenant_id:
          type: string
          format: uuid
        name:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: ["string", "null"]
          format: date-time

    CreateAPIKeyRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Human-readable label for the API key

    PaginatedAPIKeys:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/APIKey"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    RoutingRule:
      type: object
      required: [pattern, topics, priority]
      description: |
        Maps a channel suffix pattern to one or more Kafka topic suffixes. Rules are evaluated in ascending priority order — first match wins. Unmatched channels are routed to the tenant's dead-letter topic.

        **Pattern syntax**: `**` matches any number of dot-separated segments (multi-segment wildcard). `*` is accepted as an alias and normalized to `**` on storage — GET responses always return `**`. For example, `trades.**` matches both `trades.BTC-USD` and `trades.spot.BTC-USD`. The `{}` placeholder syntax is NOT supported.

        **Topic suffixes**: Each value is a topic suffix (not a full topic name). The full topic name is constructed as `{namespace}.{tenant_slug}.{suffix}`. Specifying multiple suffixes fans out the message to all listed topics simultaneously.

        **Priority**: Rules are evaluated in ascending order (lower value = higher priority). Use lower priority values (e.g., 0–99) for tenant-specific rules; higher values (e.g., 100) work well for broad catch-all rules.
      properties:
        pattern:
          type: string
          maxLength: 256
          pattern: "^[a-zA-Z0-9.*_-]{1,256}$"
          description: "Channel suffix pattern. Use `**` for multi-segment wildcard (e.g., `trades.**`, `rooms.*.presence`). Bare `*` is accepted and normalized to `**` on storage."
          examples: ["trades.**", "rooms.*.presence", "**"]
        topics:
          type: array
          minItems: 1
          maxItems: 10
          items:
            type: string
            maxLength: 128
            pattern: "^[a-zA-Z0-9._-]{1,128}$"
          description: "One or more Kafka topic suffixes. Full topic name: `{namespace}.{tenant_slug}.{suffix}`. Must be pre-provisioned topics."
          examples: [["trades"], ["trades", "audit-log"]]
        priority:
          type: integer
          minimum: 0
          description: "Rule evaluation priority — lower value matches first. Must be unique per tenant."
          examples: [0, 10, 100]

    RoutingRulesResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RoutingRule"
        total:
          type: integer
          description: Total number of routing rules for the tenant.
        limit:
          type: integer
          description: Maximum number of items returned per page.
        offset:
          type: integer
          description: Number of items skipped (pagination offset).

    AddRoutingRuleRequest:
      type: object
      required: [rule]
      properties:
        rule:
          $ref: "#/components/schemas/RoutingRule"

    SetRoutingRulesRequest:
      type: object
      required: [rules]
      properties:
        rules:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/RoutingRule"

    TenantChannelRules:
      type: object
      properties:
        tenant_id:
          type: string
          format: uuid
        rules:
          $ref: "#/components/schemas/ChannelRules"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChannelRules:
      type: object
      properties:
        public:
          type: array
          items:
            type: string
          description: "Channel patterns accessible to all authenticated users (e.g., '*.messages')"
        group_mappings:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: "Group name → channel patterns mapping"
        default:
          type: array
          items:
            type: string
          description: Fallback channel patterns when no group matches
        publish_public:
          type: array
          items:
            type: string
          description: Channel patterns anyone can publish to
        publish_group_mappings:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: "Group name → publish channel patterns"
        publish_default:
          type: array
          items:
            type: string
          description: Fallback publish channel patterns

    SetChannelRulesRequest:
      type: object
      properties:
        public:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 256
        group_mappings:
          type: object
          additionalProperties:
            type: array
            maxItems: 20
            items:
              type: string
              maxLength: 256
        default:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 256
        publish_public:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 256
        publish_group_mappings:
          type: object
          additionalProperties:
            type: array
            maxItems: 20
            items:
              type: string
              maxLength: 256
        publish_default:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 256

    TenantQuota:
      type: object
      properties:
        tenant_id:
          type: string
          format: uuid
        max_topics:
          type: integer
        max_partitions:
          type: integer
        max_storage_bytes:
          type: integer
          format: int64
        producer_byte_rate:
          type: integer
          format: int64
          description: Max producer throughput in bytes/sec
        consumer_byte_rate:
          type: integer
          format: int64
          description: Max consumer throughput in bytes/sec
        max_connections:
          type: integer
          description: Max WebSocket connections (0 = system default)
        updated_at:
          type: string
          format: date-time

    UpdateQuotaRequest:
      type: object
      properties:
        max_topics:
          type: integer
        max_partitions:
          type: integer
        max_storage_bytes:
          type: integer
          format: int64
        producer_byte_rate:
          type: integer
          format: int64
        consumer_byte_rate:
          type: integer
          format: int64
        max_connections:
          type: integer

    AuditEntry:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type: string
          format: uuid
        action:
          type: string
          description: "Action performed (e.g., 'create_tenant', 'revoke_key', 'set_routing_rules')"
        actor:
          type: string
          description: Principal or user ID that performed the action
        actor_type:
          type: string
          enum: [user, system, api_key]
        ip_address:
          type: ["string", "null"]
        details:
          type: object
          additionalProperties: true
          description: Action-specific metadata
        created_at:
          type: string
          format: date-time

    PaginatedAuditEntries:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code (UPPER_SNAKE_CASE)
        message:
          type: string
          description: Human-readable error description

    AdminKey:
      type: object
      properties:
        key_id:
          type: string
        name:
          type: string
        algorithm:
          type: string
          enum: [Ed25519, RS256]
        public_key:
          type: string
          description: PEM-encoded public key
        registered_by:
          type: string
          description: Actor who registered this key
        created_at:
          type: string
          format: date-time
        revoked_at:
          type: ["string", "null"]
          format: date-time

    TestDeliveryResult:
      type: object
      description: |
        Result of a synchronous test delivery attempt.
        HTTP 200 is always returned for this schema — the destination's outcome
        is reflected in `status_code` and `error`. An empty `error` field with a
        2xx `status_code` indicates a fully successful delivery.
      properties:
        status_code:
          type: integer
          description: |
            HTTP response status code from the destination. 0 indicates a
            connection-level error (timeout, SSRF block, DNS failure) rather than
            an HTTP response.
          example: 200
        latency_ms:
          type: integer
          format: int64
          description: Round-trip delivery latency in milliseconds. 0 on connection error.
          example: 142
        response_body_preview:
          type: string
          maxLength: 512
          description: First 512 bytes of the destination's response body. Empty on connection error.
          example: '{"received":true}'
        error:
          type: string
          description: |
            Human-readable error description for connection-level failures
            (ssrf_blocked, timeout, decryption_failure). Empty on success.
          example: ""

    Webhook:
      type: object
      required: [id, tenant_id, url, channel_pattern, status, max_retries, retry_count, created_at, updated_at]
      properties:
        id:
          type: string
          description: "Webhook ID (wh_ prefix + base32)"
          example: wh_abc1def2ghi3
        tenant_id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
          description: HTTPS endpoint URL
        channel_pattern:
          type: string
          description: Channel glob pattern (e.g. trades.*)
        status:
          type: string
          enum: [enabled, degraded, suspended]
        max_retries:
          type: integer
          minimum: 1
          maximum: 10
          description: Maximum delivery attempts before entering degraded status
        retry_count:
          type: integer
          description: Number of consecutive delivery failures since last success
        last_status:
          type: ["string", "null"]
          description: HTTP status code string of last delivery attempt (null if never delivered)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateWebhookRequest:
      type: object
      required: [url, channel_pattern, secret]
      properties:
        url:
          type: string
          format: uri
          description: Delivery endpoint. Must be https (http allowed only when WEBHOOK_ALLOW_HTTP=true in local environments).
        channel_pattern:
          type: string
          description: Channel glob pattern that triggers this webhook (e.g. trades.*)
        secret:
          type: string
          description: Plaintext HMAC secret. Encrypted at rest; never returned in API responses.
        max_retries:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
          description: Maximum delivery attempts before entering degraded status (0 = use default of 5)

    UpdateWebhookRequest:
      type: object
      description: All fields are optional. Omitted fields are unchanged.
      properties:
        url:
          type: string
          format: uri
        channel_pattern:
          type: string
        max_retries:
          type: integer
          minimum: 1
          maximum: 10
        status:
          type: string
          enum: [enabled, degraded, suspended]
          description: Explicit status transition. Transitioning to 'enabled' resets retry_count to 0.

