                code: EDITION_LIMIT
                message: "webhooks require Pro edition or higher"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/tenants/{tenantSlug}/webhooks/{webhookID}:
    get:
      summary: Get a webhook by ID
      operationId: getWebhook
