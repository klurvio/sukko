analytics:
  address: '{namespace}.{tenant}.analytics'
  description: |
    Analytics events channel for metrics and analytics data.

    ## Topic Pattern
    `{namespace}.{tenant}.analytics`

    ## Example Topics
    - `dev.acme.analytics` - Development environment for tenant "acme"
    - `prod.mycompany.analytics` - Production environment for tenant "mycompany"

    ## Message Key
    Full channel identifier for partitioning (e.g., `acme.daily.analytics`)
  parameters:
    namespace:
      description: |
        Environment namespace (normalized):
        - `local` - local development, development, or empty
        - `dev` - develop, dev
        - `staging` - staging, stage
        - `prod` - production, prod
    tenant:
      description: Tenant identifier (dynamically provisioned via tenant_topics table)
  messages:
    event:
      $ref: '../components/messages/event.yaml#/event'
