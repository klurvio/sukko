liquidity:
  address: '{namespace}.{tenant}.liquidity'
  description: |
    Liquidity events channel for liquidity pool activity.

    ## Topic Pattern
    `{namespace}.{tenant}.liquidity`

    ## Example Topics
    - `dev.acme.liquidity` - Development environment for tenant "acme"
    - `prod.mycompany.liquidity` - Production environment for tenant "mycompany"

    ## Message Key
    Full channel identifier for partitioning (e.g., `acme.ETH.liquidity`)
  parameters:
    namespace:
      description: |
        Environment namespace (normalized):
        - `local` - local development, development, or empty
        - `dev` - develop, dev
        - `staging` - staging, stage
        - `prod` - production, prod
    tenant:
      description: Tenant identifier (dynamically provisioned via tenant_topics table)
  messages:
    event:
      $ref: '../components/messages/event.yaml#/event'
