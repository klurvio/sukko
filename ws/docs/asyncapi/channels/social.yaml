social:
  address: '{namespace}.{tenant}.social'
  description: |
    Social events channel for social activity and interactions.

    ## Topic Pattern
    `{namespace}.{tenant}.social`

    ## Example Topics
    - `dev.acme.social` - Development environment for tenant "acme"
    - `prod.mycompany.social` - Production environment for tenant "mycompany"

    ## Message Key
    Full channel identifier for partitioning (e.g., `acme.user123.social`)
  parameters:
    namespace:
      description: |
        Environment namespace (normalized):
        - `local` - local development, development, or empty
        - `dev` - develop, dev
        - `staging` - staging, stage
        - `prod` - production, prod
    tenant:
      description: Tenant identifier (dynamically provisioned via tenant_topics table)
  messages:
    event:
      $ref: '../components/messages/event.yaml#/event'
