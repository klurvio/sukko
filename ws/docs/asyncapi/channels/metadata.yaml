metadata:
  address: '{namespace}.{tenant}.metadata'
  description: |
    Metadata events channel for token and asset metadata updates.

    ## Topic Pattern
    `{namespace}.{tenant}.metadata`

    ## Example Topics
    - `dev.acme.metadata` - Development environment for tenant "acme"
    - `prod.mycompany.metadata` - Production environment for tenant "mycompany"

    ## Message Key
    Full channel identifier for partitioning (e.g., `acme.BTC.metadata`)
  parameters:
    namespace:
      description: |
        Environment namespace (normalized):
        - `local` - local development, development, or empty
        - `dev` - develop, dev
        - `staging` - staging, stage
        - `prod` - production, prod
    tenant:
      description: Tenant identifier (dynamically provisioned via tenant_topics table)
  messages:
    event:
      $ref: '../components/messages/event.yaml#/event'
