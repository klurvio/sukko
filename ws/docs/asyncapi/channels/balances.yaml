balances:
  address: '{namespace}.{tenant}.balances'
  description: |
    Balances events channel for account balance updates.

    ## Topic Pattern
    `{namespace}.{tenant}.balances`

    ## Example Topics
    - `dev.acme.balances` - Development environment for tenant "acme"
    - `prod.mycompany.balances` - Production environment for tenant "mycompany"

    ## Message Key
    Full channel identifier for partitioning (e.g., `acme.wallet123.balances`)
  parameters:
    namespace:
      description: |
        Environment namespace (normalized):
        - `local` - local development, development, or empty
        - `dev` - develop, dev
        - `staging` - staging, stage
        - `prod` - production, prod
    tenant:
      description: Tenant identifier (dynamically provisioned via tenant_topics table)
  messages:
    event:
      $ref: '../components/messages/event.yaml#/event'
