creation:
  address: '{namespace}.{tenant}.creation'
  description: |
    Creation events channel for token and asset creation activity.

    ## Topic Pattern
    `{namespace}.{tenant}.creation`

    ## Example Topics
    - `dev.acme.creation` - Development environment for tenant "acme"
    - `prod.mycompany.creation` - Production environment for tenant "mycompany"

    ## Message Key
    Full channel identifier for partitioning (e.g., `acme.NEWTOKEN.creation`)
  parameters:
    namespace:
      description: |
        Environment namespace (normalized):
        - `local` - local development, development, or empty
        - `dev` - develop, dev
        - `staging` - staging, stage
        - `prod` - production, prod
    tenant:
      description: Tenant identifier (dynamically provisioned via tenant_topics table)
  messages:
    event:
      $ref: '../components/messages/event.yaml#/event'
