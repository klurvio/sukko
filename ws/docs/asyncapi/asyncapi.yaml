asyncapi: 3.1.0

info:
  title: Odin WebSocket Event Bus
  version: 1.0.0
  description: |
    AsyncAPI specification for internal services publishing messages to Redpanda.

    ## Topic Naming Convention

    Topics follow the pattern: `{namespace}.{tenant}.{category}`

    ### Namespaces
    Namespaces are configured via Helm charts. No code-level mapping is performed;
    values pass through as-is (lowercase, trimmed). Default valid namespaces:
    - `local` - Local development
    - `dev` - Development environment
    - `stag` - Staging environment
    - `prod` - Production environment

    Empty namespace defaults to `local` for backward compatibility.

    ### Categories
    Categories are dynamically provisioned per-tenant via the provisioning API.
    Any category name is valid - examples include: trade, liquidity, metadata, social,
    community, creation, analytics, balances, chat, notifications, etc.

    ### Dynamic Provisioning
    Topics are dynamically provisioned per-tenant via PostgreSQL (`tenant_topics` table).
    Both categories and event types are dynamic and not hardcoded in the system.

    ## Message Key
    The Kafka record key is the full channel identifier (e.g., `acme.BTC.trade`) used for partitioning.

servers:
  redpanda:
    host: redpanda.redpanda.svc.cluster.local:9093
    protocol: kafka
    description: Internal Redpanda broker within the Kubernetes cluster
    tags:
      - name: internal
        description: Cluster-internal access only

defaultContentType: application/json

channels:
  trade:
    $ref: './channels/trade.yaml#/trade'
  liquidity:
    $ref: './channels/liquidity.yaml#/liquidity'
  metadata:
    $ref: './channels/metadata.yaml#/metadata'
  social:
    $ref: './channels/social.yaml#/social'
  community:
    $ref: './channels/community.yaml#/community'
  creation:
    $ref: './channels/creation.yaml#/creation'
  analytics:
    $ref: './channels/analytics.yaml#/analytics'
  balances:
    $ref: './channels/balances.yaml#/balances'

operations:
  publishTrade:
    action: send
    channel:
      $ref: '#/channels/trade'
    messages:
      - $ref: '#/channels/trade/messages/event'
  publishLiquidity:
    action: send
    channel:
      $ref: '#/channels/liquidity'
    messages:
      - $ref: '#/channels/liquidity/messages/event'
  publishMetadata:
    action: send
    channel:
      $ref: '#/channels/metadata'
    messages:
      - $ref: '#/channels/metadata/messages/event'
  publishSocial:
    action: send
    channel:
      $ref: '#/channels/social'
    messages:
      - $ref: '#/channels/social/messages/event'
  publishCommunity:
    action: send
    channel:
      $ref: '#/channels/community'
    messages:
      - $ref: '#/channels/community/messages/event'
  publishCreation:
    action: send
    channel:
      $ref: '#/channels/creation'
    messages:
      - $ref: '#/channels/creation/messages/event'
  publishAnalytics:
    action: send
    channel:
      $ref: '#/channels/analytics'
    messages:
      - $ref: '#/channels/analytics/messages/event'
  publishBalances:
    action: send
    channel:
      $ref: '#/channels/balances'
    messages:
      - $ref: '#/channels/balances/messages/event'

components:
  messages:
    event:
      $ref: './components/messages/event.yaml#/event'
  schemas:
    eventEnvelope:
      $ref: './components/schemas/event.yaml#/eventEnvelope'
