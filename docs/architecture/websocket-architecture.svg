<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1180">
  <defs>
    <style>
      .box { fill: #2d3748; stroke: #4a5568; stroke-width: 2; }
      .text { fill: #e2e8f0; font-family: 'Courier New', monospace; font-size: 14px; }
      .title { fill: #f7fafc; font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; }
      .small-text { fill: #cbd5e0; font-family: 'Courier New', monospace; font-size: 12px; }
      .line { stroke: #4a5568; stroke-width: 2; fill: none; }
      .arrow { fill: #4a5568; }
      .section-title { fill: #90cdf4; font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" class="arrow" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="775" y="30" class="title" text-anchor="middle">WebSocket Infrastructure Architecture</text>
  
  <!-- Clients -->
  <rect x="475" y="60" width="600" height="60" class="box" rx="4"/>
  <text x="775" y="95" class="text" text-anchor="middle">Clients (18K+ connections)</text>
  
  <!-- Arrow from Clients to GCP Load Balancer -->
  <line x1="775" y1="120" x2="775" y2="160" class="line" marker-end="url(#arrowhead)"/>
  
  <!-- GCP Load Balancer -->
  <rect x="475" y="160" width="600" height="50" class="box" rx="4"/>
  <text x="775" y="190" class="text" text-anchor="middle">GCP Load Balancer</text>
  
  <!-- Arrows to WS Instances -->
  <line x1="600" y1="210" x2="275" y2="260" class="line" marker-end="url(#arrowhead)"/>
  <line x1="775" y1="210" x2="775" y2="260" class="line" marker-end="url(#arrowhead)"/>
  <line x1="1000" y1="210" x2="1275" y2="260" class="line" marker-end="url(#arrowhead)"/>
  
  <!-- WS Instance 1 -->
  <rect x="50" y="260" width="450" height="220" class="box" rx="4" stroke="#718096" stroke-width="3"/>
  <text x="275" y="285" class="text" text-anchor="middle" font-weight="bold">WS Instance 1</text>
  
  <!-- Custom LB inside Instance 1 -->
  <rect x="125" y="300" width="300" height="70" class="box" rx="4"/>
  <text x="275" y="325" class="small-text" text-anchor="middle">Custom Load Balancer (:3001)</text>
  <text x="275" y="345" class="small-text" text-anchor="middle">Least Connections Strategy</text>
  <text x="275" y="360" class="small-text" text-anchor="middle" fill="#90cdf4">per-instance balancer</text>
  
  <!-- Arrows from LB to Shards -->
  <line x1="175" y1="370" x2="110" y2="400" class="line" marker-end="url(#arrowhead)"/>
  <line x1="275" y1="370" x2="275" y2="400" class="line" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="370" x2="440" y2="400" class="line" marker-end="url(#arrowhead)"/>
  
  <!-- Shards for Instance 1 -->
  <rect x="60" y="400" width="100" height="60" class="box" rx="4"/>
  <text x="110" y="425" class="small-text" text-anchor="middle">Shard :3002</text>
  <text x="110" y="445" class="small-text" text-anchor="middle">6K conns</text>
  
  <rect x="225" y="400" width="100" height="60" class="box" rx="4"/>
  <text x="275" y="425" class="small-text" text-anchor="middle">Shard :3003</text>
  <text x="275" y="445" class="small-text" text-anchor="middle">6K conns</text>
  
  <rect x="390" y="400" width="100" height="60" class="box" rx="4"/>
  <text x="440" y="425" class="small-text" text-anchor="middle">Shard :3004</text>
  <text x="440" y="445" class="small-text" text-anchor="middle">6K conns</text>
  
  <!-- WS Instance 2 -->
  <rect x="550" y="260" width="450" height="220" class="box" rx="4" stroke="#718096" stroke-width="3"/>
  <text x="775" y="285" class="text" text-anchor="middle" font-weight="bold">WS Instance 2</text>
  
  <!-- Custom LB inside Instance 2 -->
  <rect x="625" y="300" width="300" height="70" class="box" rx="4"/>
  <text x="775" y="325" class="small-text" text-anchor="middle">Custom Load Balancer (:3001)</text>
  <text x="775" y="345" class="small-text" text-anchor="middle">Least Connections Strategy</text>
  <text x="775" y="360" class="small-text" text-anchor="middle" fill="#90cdf4">per-instance balancer</text>
  
  <!-- Arrows from LB to Shards -->
  <line x1="675" y1="370" x2="610" y2="400" class="line" marker-end="url(#arrowhead)"/>
  <line x1="775" y1="370" x2="775" y2="400" class="line" marker-end="url(#arrowhead)"/>
  <line x1="875" y1="370" x2="940" y2="400" class="line" marker-end="url(#arrowhead)"/>
  
  <!-- Shards for Instance 2 -->
  <rect x="560" y="400" width="100" height="60" class="box" rx="4"/>
  <text x="610" y="425" class="small-text" text-anchor="middle">Shard :3002</text>
  <text x="610" y="445" class="small-text" text-anchor="middle">6K conns</text>
  
  <rect x="725" y="400" width="100" height="60" class="box" rx="4"/>
  <text x="775" y="425" class="small-text" text-anchor="middle">Shard :3003</text>
  <text x="775" y="445" class="small-text" text-anchor="middle">6K conns</text>
  
  <rect x="890" y="400" width="100" height="60" class="box" rx="4"/>
  <text x="940" y="425" class="small-text" text-anchor="middle">Shard :3004</text>
  <text x="940" y="445" class="small-text" text-anchor="middle">6K conns</text>
  
  <!-- WS Instance N -->
  <rect x="1050" y="260" width="450" height="220" class="box" rx="4" stroke="#718096" stroke-width="3"/>
  <text x="1275" y="285" class="text" text-anchor="middle" font-weight="bold">WS Instance N</text>
  
  <!-- Custom LB inside Instance N -->
  <rect x="1125" y="300" width="300" height="70" class="box" rx="4"/>
  <text x="1275" y="325" class="small-text" text-anchor="middle">Custom Load Balancer (:3001)</text>
  <text x="1275" y="345" class="small-text" text-anchor="middle">Least Connections Strategy</text>
  <text x="1275" y="360" class="small-text" text-anchor="middle" fill="#90cdf4">per-instance balancer</text>
  
  <!-- Arrows from LB to Shards -->
  <line x1="1175" y1="370" x2="1110" y2="400" class="line" marker-end="url(#arrowhead)"/>
  <line x1="1275" y1="370" x2="1275" y2="400" class="line" marker-end="url(#arrowhead)"/>
  <line x1="1375" y1="370" x2="1440" y2="400" class="line" marker-end="url(#arrowhead)"/>
  
  <!-- Shards for Instance N -->
  <rect x="1060" y="400" width="100" height="60" class="box" rx="4"/>
  <text x="1110" y="425" class="small-text" text-anchor="middle">Shard :3002</text>
  <text x="1110" y="445" class="small-text" text-anchor="middle">6K conns</text>
  
  <rect x="1225" y="400" width="100" height="60" class="box" rx="4"/>
  <text x="1275" y="425" class="small-text" text-anchor="middle">Shard :3003</text>
  <text x="1275" y="445" class="small-text" text-anchor="middle">6K conns</text>
  
  <rect x="1390" y="400" width="100" height="60" class="box" rx="4"/>
  <text x="1440" y="425" class="small-text" text-anchor="middle">Shard :3004</text>
  <text x="1440" y="445" class="small-text" text-anchor="middle">6K conns</text>
  
  <!-- Connection Bus Line between all instances -->
  <line x1="100" y1="510" x2="1450" y2="510" class="line" stroke-width="3"/>
  
  <!-- Vertical connectors from instances to bus -->
  <line x1="275" y1="480" x2="275" y2="510" class="line"/>
  <line x1="775" y1="480" x2="775" y2="510" class="line"/>
  <line x1="1275" y1="480" x2="1275" y2="510" class="line"/>
  
  <!-- Pub/Sub Section Title -->
  <text x="800" y="530" class="section-title" text-anchor="middle">Message Distribution Layer</text>
  
  <!-- Connection from bus to Redis (bidirectional) -->
  <line x1="375" y1="510" x2="375" y2="540" class="line" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="395" y="525" class="small-text" fill="#90cdf4">Pub/Sub</text>
  
  <!-- Redis BroadcastBus -->
  <rect x="150" y="540" width="450" height="150" class="box" rx="4"/>
  <text x="375" y="570" class="text" text-anchor="middle" font-weight="bold">Redis BroadcastBus</text>
  <text x="375" y="595" class="small-text" text-anchor="middle">Pub/Sub: ws.broadcast</text>
  <text x="375" y="615" class="small-text" text-anchor="middle">Cross-instance sync</text>
  <text x="375" y="635" class="small-text" text-anchor="middle">Auto-detect mode:</text>
  <text x="375" y="655" class="small-text" text-anchor="middle">• 1 addr = direct</text>
  <text x="375" y="675" class="small-text" text-anchor="middle">• 3+ addr = Sentinel</text>
  
  <!-- Connection from bus to Kafka (bidirectional) -->
  <line x1="1175" y1="510" x2="1175" y2="540" class="line" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="1195" y="525" class="small-text" fill="#90cdf4">Pub/Sub</text>
  
  <!-- Kafka/Redpanda -->
  <rect x="950" y="540" width="450" height="90" class="box" rx="4"/>
  <text x="1175" y="570" class="text" text-anchor="middle" font-weight="bold">Kafka/Redpanda</text>
  <text x="1175" y="595" class="small-text" text-anchor="middle">12 partitions/topic</text>
  <text x="1175" y="615" class="small-text" text-anchor="middle">Consumer groups</text>
  
  <!-- Arrow from Kafka to Publisher Service -->
  <line x1="1175" y1="630" x2="1175" y2="690" class="line" marker-end="url(#arrowhead)"/>
  
  <!-- Publisher Service -->
  <rect x="1000" y="690" width="350" height="80" class="box" rx="4"/>
  <text x="1175" y="720" class="text" text-anchor="middle" font-weight="bold">Publisher Service</text>
  <text x="1175" y="745" class="small-text" text-anchor="middle">Event generation</text>
  
  <!-- Observability Section -->
  <text x="800" y="840" class="section-title" text-anchor="middle">Observability Stack</text>
  
  <rect x="150" y="850" width="1300" height="290" class="box" rx="4"/>
  
  <!-- Metrics Pipeline -->
  <text x="170" y="880" class="text" font-weight="bold">Metrics:</text>
  <rect x="190" y="890" width="200" height="50" class="box" rx="4"/>
  <text x="290" y="920" class="small-text" text-anchor="middle">Prometheus</text>
  
  <line x1="390" y1="915" x2="430" y2="915" class="line" marker-end="url(#arrowhead)"/>
  
  <rect x="430" y="890" width="200" height="50" class="box" rx="4"/>
  <text x="530" y="920" class="small-text" text-anchor="middle">Grafana</text>
  <text x="530" y="935" class="small-text" text-anchor="middle" fill="#90cdf4">(visualization)</text>
  
  <!-- Logs Pipeline -->
  <text x="170" y="970" class="text" font-weight="bold">Logs:</text>
  <rect x="190" y="980" width="150" height="50" class="box" rx="4"/>
  <text x="265" y="1010" class="small-text" text-anchor="middle">Promtail</text>
  
  <line x1="340" y1="1005" x2="380" y2="1005" class="line" marker-end="url(#arrowhead)"/>
  
  <rect x="380" y="980" width="150" height="50" class="box" rx="4"/>
  <text x="455" y="1010" class="small-text" text-anchor="middle">Loki</text>
  
  <line x1="530" y1="1005" x2="570" y2="1005" class="line" marker-end="url(#arrowhead)"/>
  
  <rect x="570" y="980" width="150" height="50" class="box" rx="4"/>
  <text x="645" y="1010" class="small-text" text-anchor="middle">Grafana</text>
  <text x="645" y="1025" class="small-text" text-anchor="middle" fill="#90cdf4">(aggregation)</text>
  
  <!-- Redis Metrics Pipeline -->
  <text x="170" y="1070" class="text" font-weight="bold">Redis Metrics:</text>
  <rect x="190" y="1080" width="200" height="50" class="box" rx="4"/>
  <text x="290" y="1110" class="small-text" text-anchor="middle">Redis Exporter</text>
  
  <line x1="390" y1="1105" x2="430" y2="1105" class="line" marker-end="url(#arrowhead)"/>
  
  <rect x="430" y="1080" width="200" height="50" class="box" rx="4"/>
  <text x="530" y="1110" class="small-text" text-anchor="middle">Prometheus</text>
  
  <!-- Connection lines from services to observability stack container -->
  <!-- From WS Instance 2 to horizontal monitoring bus -->
  <line x1="775" y1="480" x2="775" y2="820" class="line" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- From Redis BroadcastBus to horizontal monitoring bus -->
  <line x1="375" y1="690" x2="375" y2="820" class="line" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- From Publisher Service to horizontal monitoring bus -->
  <line x1="1175" y1="770" x2="1175" y2="820" class="line" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Horizontal monitoring bus connecting all sources -->
  <line x1="150" y1="820" x2="1450" y2="820" class="line" stroke-dasharray="5,5" opacity="0.5" stroke-width="2"/>
  
  <!-- Single arrow from bus to Observability Stack -->
  <line x1="200" y1="820" x2="200" y2="850" class="line" stroke-dasharray="5,5" opacity="0.5" marker-end="url(#arrowhead)" stroke-width="2"/>
  
</svg>