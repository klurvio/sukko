<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1210">
  <defs>
    <style>
      .box { fill: #2d3748; stroke: #4a5568; stroke-width: 2; }
      .text { fill: #e2e8f0; font-family: 'Courier New', monospace; font-size: 14px; }
      .title { fill: #f7fafc; font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; }
      .small-text { fill: #cbd5e0; font-family: 'Courier New', monospace; font-size: 12px; }
      .line { stroke: #4a5568; stroke-width: 2; fill: none; }
      .arrow { fill: #4a5568; }
      .section-title { fill: #90cdf4; font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="12" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" class="arrow" />
    </marker>
    <marker id="arrowhead-start" markerWidth="10" markerHeight="10" refX="-2" refY="3" orient="auto">
      <polygon points="10 0, 0 3, 10 6" class="arrow" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="775" y="30" class="title" text-anchor="middle">WebSocket Infrastructure Architecture</text>
  
  <!-- Clients -->
  <rect x="475" y="60" width="600" height="60" class="box" rx="4"/>
  <text x="775" y="95" class="text" text-anchor="middle">Clients (18K+ connections)</text>
  
  <!-- Bidirectional arrow from Clients to GCP Load Balancer -->
  <line x1="775" y1="120" x2="775" y2="180" class="line" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)"/>
  
  <!-- GCP Load Balancer -->
  <rect x="475" y="180" width="600" height="50" class="box" rx="4"/>
  <text x="775" y="210" class="text" text-anchor="middle">GCP Load Balancer</text>
  
  <!-- Bidirectional arrows from GCP Load Balancer to WS Instances -->
  <line x1="600" y1="230" x2="275" y2="290" class="line" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)"/>
  <line x1="775" y1="230" x2="775" y2="290" class="line" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)"/>
  <line x1="1000" y1="230" x2="1275" y2="290" class="line" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)"/>
  
  <!-- WS Instance 1 -->
  <rect x="50" y="290" width="450" height="220" class="box" rx="4" stroke="#718096" stroke-width="3"/>
  <text x="275" y="315" class="text" text-anchor="middle" font-weight="bold">WS Instance 1</text>
  
  <!-- Custom LB inside Instance 1 -->
  <rect x="125" y="330" width="300" height="70" class="box" rx="4"/>
  <text x="275" y="355" class="small-text" text-anchor="middle">Custom Load Balancer (:3001)</text>
  <text x="275" y="375" class="small-text" text-anchor="middle">Least Connections Strategy</text>
  <text x="275" y="390" class="small-text" text-anchor="middle" fill="#90cdf4">per-instance balancer</text>
  
  <!-- Bidirectional arrows from LB to Shards (Instance 1) -->
  <line x1="175" y1="400" x2="110" y2="430" class="line" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)"/>
  <line x1="275" y1="415" x2="275" y2="400" class="line" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="275" y1="415" x2="275" y2="430" class="line" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="400" x2="440" y2="430" class="line" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)"/>
  
  <!-- Shards for Instance 1 -->
  <rect x="60" y="430" width="100" height="60" class="box" rx="4"/>
  <text x="110" y="455" class="small-text" text-anchor="middle">Shard :3002</text>
  <text x="110" y="475" class="small-text" text-anchor="middle">6K conns</text>
  
  <rect x="225" y="430" width="100" height="60" class="box" rx="4"/>
  <text x="275" y="455" class="small-text" text-anchor="middle">Shard :3003</text>
  <text x="275" y="475" class="small-text" text-anchor="middle">6K conns</text>
  
  <rect x="390" y="430" width="100" height="60" class="box" rx="4"/>
  <text x="440" y="455" class="small-text" text-anchor="middle">Shard :3004</text>
  <text x="440" y="475" class="small-text" text-anchor="middle">6K conns</text>
  
  <!-- WS Instance 2 -->
  <rect x="550" y="290" width="450" height="220" class="box" rx="4" stroke="#718096" stroke-width="3"/>
  <text x="775" y="315" class="text" text-anchor="middle" font-weight="bold">WS Instance 2</text>
  
  <!-- Custom LB inside Instance 2 -->
  <rect x="625" y="330" width="300" height="70" class="box" rx="4"/>
  <text x="775" y="355" class="small-text" text-anchor="middle">Custom Load Balancer (:3001)</text>
  <text x="775" y="375" class="small-text" text-anchor="middle">Least Connections Strategy</text>
  <text x="775" y="390" class="small-text" text-anchor="middle" fill="#90cdf4">per-instance balancer</text>
  
  <!-- Bidirectional arrows from LB to Shards (Instance 2) -->
  <line x1="675" y1="400" x2="610" y2="430" class="line" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)"/>
  <line x1="775" y1="415" x2="775" y2="400" class="line" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="775" y1="415" x2="775" y2="430" class="line" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="875" y1="400" x2="940" y2="430" class="line" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)"/>
  
  <!-- Shards for Instance 2 -->
  <rect x="560" y="430" width="100" height="60" class="box" rx="4"/>
  <text x="610" y="455" class="small-text" text-anchor="middle">Shard :3002</text>
  <text x="610" y="475" class="small-text" text-anchor="middle">6K conns</text>
  
  <rect x="725" y="430" width="100" height="60" class="box" rx="4"/>
  <text x="775" y="455" class="small-text" text-anchor="middle">Shard :3003</text>
  <text x="775" y="475" class="small-text" text-anchor="middle">6K conns</text>
  
  <rect x="890" y="430" width="100" height="60" class="box" rx="4"/>
  <text x="940" y="455" class="small-text" text-anchor="middle">Shard :3004</text>
  <text x="940" y="475" class="small-text" text-anchor="middle">6K conns</text>
  
  <!-- WS Instance N -->
  <rect x="1050" y="290" width="450" height="220" class="box" rx="4" stroke="#718096" stroke-width="3"/>
  <text x="1275" y="315" class="text" text-anchor="middle" font-weight="bold">WS Instance N</text>
  
  <!-- Custom LB inside Instance N -->
  <rect x="1125" y="330" width="300" height="70" class="box" rx="4"/>
  <text x="1275" y="355" class="small-text" text-anchor="middle">Custom Load Balancer (:3001)</text>
  <text x="1275" y="375" class="small-text" text-anchor="middle">Least Connections Strategy</text>
  <text x="1275" y="390" class="small-text" text-anchor="middle" fill="#90cdf4">per-instance balancer</text>
  
  <!-- Bidirectional arrows from LB to Shards (Instance N) -->
  <line x1="1175" y1="400" x2="1110" y2="430" class="line" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)"/>
  <line x1="1275" y1="415" x2="1275" y2="400" class="line" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1275" y1="415" x2="1275" y2="430" class="line" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="1375" y1="400" x2="1440" y2="430" class="line" marker-start="url(#arrowhead-start)" marker-end="url(#arrowhead)"/>
  
  <!-- Shards for Instance N -->
  <rect x="1060" y="430" width="100" height="60" class="box" rx="4"/>
  <text x="1110" y="455" class="small-text" text-anchor="middle">Shard :3002</text>
  <text x="1110" y="475" class="small-text" text-anchor="middle">6K conns</text>
  
  <rect x="1225" y="430" width="100" height="60" class="box" rx="4"/>
  <text x="1275" y="455" class="small-text" text-anchor="middle">Shard :3003</text>
  <text x="1275" y="475" class="small-text" text-anchor="middle">6K conns</text>
  
  <rect x="1390" y="430" width="100" height="60" class="box" rx="4"/>
  <text x="1440" y="455" class="small-text" text-anchor="middle">Shard :3004</text>
  <text x="1440" y="475" class="small-text" text-anchor="middle">6K conns</text>
  
  <!-- Connection Bus Line between all instances -->
  <line x1="100" y1="540" x2="1450" y2="540" class="line" stroke-width="3"/>
  
  <!-- Vertical connectors from instances to bus -->
  <line x1="275" y1="510" x2="275" y2="540" class="line"/>
  <line x1="775" y1="510" x2="775" y2="540" class="line"/>
  <line x1="1275" y1="510" x2="1275" y2="540" class="line"/>
  
  <!-- Pub/Sub Section Title -->
  <text x="800" y="575" class="section-title" text-anchor="middle">Message Distribution Layer</text>
  
  <!-- Bidirectional arrows with gap between bus and Redis (Pub/Sub) -->
  <line x1="375" y1="570" x2="375" y2="540" class="line" stroke-width="3" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="570" x2="375" y2="600" class="line" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="395" y="570" class="small-text" fill="#90cdf4">Pub/Sub</text>
  
  <!-- Redis BroadcastBus -->
  <rect x="150" y="600" width="450" height="150" class="box" rx="4"/>
  <text x="375" y="630" class="text" text-anchor="middle" font-weight="bold">Redis BroadcastBus</text>
  <text x="375" y="655" class="small-text" text-anchor="middle">Pub/Sub: ws.broadcast</text>
  <text x="375" y="675" class="small-text" text-anchor="middle">Cross-instance sync</text>
  <text x="375" y="695" class="small-text" text-anchor="middle">Auto-detect mode:</text>
  <text x="375" y="715" class="small-text" text-anchor="middle">• 1 addr = direct</text>
  <text x="375" y="735" class="small-text" text-anchor="middle">• 3+ addr = Sentinel</text>
  
  <!-- Connection from Kafka to bus (Consumers) -->
  <line x1="1175" y1="540" x2="1175" y2="600" class="line" stroke-width="3" marker-start="url(#arrowhead-start)"/>
  <text x="1195" y="570" class="small-text" fill="#90cdf4">Consume</text>
  
  <!-- Kafka/Redpanda -->
  <rect x="950" y="600" width="450" height="90" class="box" rx="4"/>
  <text x="1175" y="630" class="text" text-anchor="middle" font-weight="bold">Kafka/Redpanda</text>
  <text x="1175" y="655" class="small-text" text-anchor="middle">12 partitions/topic</text>
  <text x="1175" y="675" class="small-text" text-anchor="middle">Consumer groups</text>
  
  <!-- Arrow from Publisher Service to Kafka (produces events) -->
  <line x1="1175" y1="750" x2="1175" y2="690" class="line" marker-end="url(#arrowhead)"/>
  
  <!-- Publisher Service -->
  <rect x="1000" y="750" width="350" height="80" class="box" rx="4"/>
  <text x="1175" y="780" class="text" text-anchor="middle" font-weight="bold">Publisher Service</text>
  <text x="1175" y="805" class="small-text" text-anchor="middle">Event generation</text>
  
  <!-- Observability Section -->
  <text x="800" y="870" class="section-title" text-anchor="middle">Observability Stack</text>
  
  <rect x="150" y="880" width="1300" height="290" class="box" rx="4"/>
  
  <!-- Metrics Pipeline -->
  <text x="170" y="910" class="text" font-weight="bold">Metrics:</text>
  <rect x="190" y="920" width="200" height="50" class="box" rx="4"/>
  <text x="290" y="950" class="small-text" text-anchor="middle">Prometheus</text>
  
  <line x1="390" y1="945" x2="430" y2="945" class="line" marker-end="url(#arrowhead)"/>
  
  <rect x="430" y="920" width="200" height="50" class="box" rx="4"/>
  <text x="530" y="950" class="small-text" text-anchor="middle">Grafana</text>
  <text x="530" y="965" class="small-text" text-anchor="middle" fill="#90cdf4">(visualization)</text>
  
  <!-- Logs Pipeline -->
  <text x="170" y="1000" class="text" font-weight="bold">Logs:</text>
  <rect x="190" y="1010" width="150" height="50" class="box" rx="4"/>
  <text x="265" y="1040" class="small-text" text-anchor="middle">Promtail</text>
  
  <line x1="340" y1="1035" x2="380" y2="1035" class="line" marker-end="url(#arrowhead)"/>
  
  <rect x="380" y="1010" width="150" height="50" class="box" rx="4"/>
  <text x="455" y="1040" class="small-text" text-anchor="middle">Loki</text>
  
  <line x1="530" y1="1035" x2="570" y2="1035" class="line" marker-end="url(#arrowhead)"/>
  
  <rect x="570" y="1010" width="150" height="50" class="box" rx="4"/>
  <text x="645" y="1040" class="small-text" text-anchor="middle">Grafana</text>
  <text x="645" y="1055" class="small-text" text-anchor="middle" fill="#90cdf4">(aggregation)</text>
  
  <!-- Redis Metrics Pipeline -->
  <text x="170" y="1100" class="text" font-weight="bold">Redis Metrics:</text>
  <rect x="190" y="1110" width="200" height="50" class="box" rx="4"/>
  <text x="290" y="1140" class="small-text" text-anchor="middle">Redis Exporter</text>
  
  <line x1="390" y1="1135" x2="430" y2="1135" class="line" marker-end="url(#arrowhead)"/>
  
  <rect x="430" y="1110" width="200" height="50" class="box" rx="4"/>
  <text x="530" y="1140" class="small-text" text-anchor="middle">Prometheus</text>
  
  <!-- Connection lines from services to observability stack container -->
  <!-- From WS Instance 2 to horizontal monitoring bus -->
  <line x1="775" y1="480" x2="775" y2="850" class="line" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- From Redis BroadcastBus to horizontal monitoring bus -->
  <line x1="375" y1="720" x2="375" y2="850" class="line" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- From Publisher Service to horizontal monitoring bus -->
  <line x1="1175" y1="800" x2="1175" y2="850" class="line" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Horizontal monitoring bus connecting all sources -->
  <line x1="150" y1="850" x2="1450" y2="850" class="line" stroke-dasharray="5,5" opacity="0.5" stroke-width="2"/>
  
  <!-- Single arrow from bus to Observability Stack -->
  <line x1="200" y1="850" x2="200" y2="880" class="line" stroke-dasharray="5,5" opacity="0.5" marker-end="url(#arrowhead)" stroke-width="2"/>
  
</svg>