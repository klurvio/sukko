# Metadata Payload Schemas
# Data structures for odin.metadata events

MetadataPayload:
  type: object
  description: Payload for metadata-related events
  oneOf:
    - $ref: '#/MetadataUpdatedPayload'
    - $ref: '#/TokenNameChangedPayload'
    - $ref: '#/TokenFlagsChangedPayload'

MetadataUpdatedPayload:
  type: object
  title: Metadata Updated
  description: General metadata change
  properties:
    name:
      type: string
      description: Token name
      example: "Bitcoin"
    symbol:
      type: string
      description: Token symbol
      example: "BTC"
    description:
      type: string
      description: Token description
      example: "The original cryptocurrency"
    image:
      type: string
      format: uri
      description: Token image URL
      example: "https://example.com/btc.png"

TokenNameChangedPayload:
  type: object
  title: Token Name Changed
  description: Token name updated
  required:
    - oldName
    - newName
  properties:
    oldName:
      type: string
      description: Previous token name
      example: "Bitcoin Cash"
    newName:
      type: string
      description: New token name
      example: "Bitcoin"

TokenFlagsChangedPayload:
  type: object
  title: Token Flags Changed
  description: Token flag updates
  required:
    - flags
  properties:
    flags:
      type: object
      description: Token flags object
      properties:
        verified:
          type: boolean
          description: Whether token is verified
          example: true
        featured:
          type: boolean
          description: Whether token is featured
          example: false
        trending:
          type: boolean
          description: Whether token is trending
          example: true
