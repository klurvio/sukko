# Creation Payload Schemas
# Data structures for odin.creation events

CreationPayload:
  type: object
  description: Payload for creation-related events
  oneOf:
    - $ref: '#/TokenCreatedPayload'
    - $ref: '#/TokenListedPayload'

TokenCreatedPayload:
  type: object
  title: Token Created
  description: New token created
  required:
    - creator
    - name
    - symbol
    - supply
    - timestamp
  properties:
    creator:
      type: string
      description: Token creator wallet address
      example: "0x1234567890abcdef1234567890abcdef12345678"
    name:
      type: string
      description: Token name
      example: "My Token"
    symbol:
      type: string
      description: Token symbol
      example: "MYTKN"
    supply:
      type: string
      description: Total supply as decimal string
      example: "1000000000"
    timestamp:
      type: integer
      format: int64
      description: Creation timestamp in milliseconds
      example: 1699901234567

TokenListedPayload:
  type: object
  title: Token Listed
  description: Token listed on exchange
  required:
    - exchange
    - initialPrice
    - timestamp
  properties:
    exchange:
      type: string
      description: Exchange name
      example: "Odin DEX"
    initialPrice:
      type: string
      description: Initial listing price as decimal string
      example: "0.01"
    timestamp:
      type: integer
      format: int64
      description: Listing timestamp in milliseconds
      example: 1699901234567
