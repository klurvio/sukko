# Balances Channel
# User balance and transfer events

OdinBalances:
  address: odin.balances
  description: |
    User balance changes and token transfers.

    **Event Types:**
    - `BALANCE_UPDATED` - User balance changed
    - `TRANSFER_COMPLETED` - Token transfer completed

    **Frequency:** High (3% of all events)
    **Retention:** 30 seconds
  messages:
    TokenEventMessage:
      $ref: '../component/message/token_event.yaml#/TokenEventMessage'
  bindings:
    kafka:
      partitions: 12
      replicas: 1
      topicConfiguration:
        retention.ms: 30000
