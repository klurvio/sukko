# Creation Channel
# Token creation and listing events

OdinCreation:
  address: odin.creation
  description: |
    Token creation and exchange listing events.

    **Event Types:**
    - `TOKEN_CREATED` - New token created
    - `TOKEN_LISTED` - Token listed on exchange

    **Frequency:** Low
    **Retention:** 1 hour
  messages:
    TokenEventMessage:
      $ref: '../component/message/token_event.yaml#/TokenEventMessage'
  bindings:
    kafka:
      partitions: 12
      replicas: 1
      topicConfiguration:
        retention.ms: 3600000
