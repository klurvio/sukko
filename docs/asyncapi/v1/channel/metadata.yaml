# Metadata Channel
# Token metadata updates

OdinMetadata:
  address: odin.metadata
  description: |
    Token metadata and configuration updates.

    **Event Types:**
    - `METADATA_UPDATED` - General metadata change
    - `TOKEN_NAME_CHANGED` - Token name updated
    - `TOKEN_FLAGS_CHANGED` - Flag updates (verified, featured, trending)

    **Frequency:** Low (5% of all events)
    **Retention:** 1 hour
  messages:
    TokenEventMessage:
      $ref: '../component/message/token_event.yaml#/TokenEventMessage'
  bindings:
    kafka:
      partitions: 12
      replicas: 1
      topicConfiguration:
        retention.ms: 3600000
