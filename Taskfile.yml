version: "3"

# =============================================================================
# Main Taskfile - Entry Point
# =============================================================================
# Pattern: {domain}:{action} [ENV=value]
#
# Domains:
#   local - Kind cluster (no ENV needed)
#   k8s   - Remote DOKS (ENV=demo)
#
# Run 'task --list-all' to see all available tasks

includes:
  # Domain taskfiles
  local:
    taskfile: ./taskfiles/local.yml
    dir: .
  k8s:
    taskfile: ./taskfiles/k8s.yml
    dir: .

  tester:
    taskfile: ./taskfiles/tester.yml
    dir: .

  # Shared utilities (environment-independent)
  helm:
    taskfile: ./taskfiles/shared/helm.yml
    dir: .
  test:
    taskfile: ./taskfiles/shared/test.yml
    dir: .
  version:
    taskfile: ./taskfiles/shared/version.yml
    dir: .

tasks:
  default:
    desc: Show available commands
    silent: true
    cmds:
      - echo "SUKKO WEBSOCKET SERVER"
      - echo ""
      - echo "=== LOCAL DEVELOPMENT ==="
      - echo "  task local                     Full setup (Kind + deploy)"
      - echo "  task local:status              Show pods and services"
      - echo "  task local:logs                Tail ws-server logs"
      - echo "  task local:build               Build and reload images"
      - echo "  task local:provision:create    Create topics + tenant"
      - echo ""
      - echo "=== TESTER DEPLOYMENT ==="
      - echo "  task tester:do:deploy          Deploy tester to DO Droplet"
      - echo "  task tester:do:destroy         Destroy tester Droplet"
      - echo "  task tester:do:logs            View tester logs"
      - echo "  task tester:do:ssh             SSH into tester Droplet"
      - echo ""
      - echo "=== REMOTE KUBERNETES (DOKS) ==="
      - echo "  task k8s:deploy ENV=demo       Deploy to demo"
      - echo "  task k8s:status ENV=demo       Show cluster status"
      - echo "  task k8s:logs ENV=demo         Tail logs"
      - echo ""
      - echo "=== TESTING ==="
      - echo "  task test                      Run unit tests"
      - echo "  task test:unit                 Run unit tests"
      - echo "  task test:integration          Run integration tests"
      - echo ""
      - echo "Run 'task --list-all' for complete list"

  # ===========================================================================
  # Minimal Shortcuts (to avoid confusion)
  # ===========================================================================
  local:
    desc: Full local setup (Kind + deploy)
    cmds:
      - task: local:setup

  test:
    desc: Run unit tests
    cmds:
      - task: test:unit
