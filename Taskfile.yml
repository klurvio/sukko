version: "3"

# =============================================================================
# Main Taskfile - Entry Point
# =============================================================================
# Pattern: {domain}:{service}:{action} [ENV=value]
#
# Domains:
#   local - Kind cluster (no ENV needed)
#   k8s   - Remote GKE (ENV=dev|stg|prod)
#   gce   - GCE VMs (ENV=dev|stg|prod)
#
# Run 'task --list-all' to see all available tasks

includes:
  # Domain taskfiles
  local:
    taskfile: ./taskfiles/local.yml
    dir: .
  k8s:
    taskfile: ./taskfiles/k8s.yml
    dir: .
  gce:
    taskfile: ./taskfiles/gce.yml
    dir: .

  # Shared utilities (environment-independent)
  test:
    taskfile: ./taskfiles/shared/test.yml
    dir: .
  version:
    taskfile: ./taskfiles/shared/version.yml
    dir: .

tasks:
  default:
    desc: Show available commands
    silent: true
    cmds:
      - echo "ODIN WEBSOCKET SERVER"
      - echo ""
      - echo "=== LOCAL DEVELOPMENT ==="
      - echo "  task local                     Full setup (Kind + deploy)"
      - echo "  task local:status              Show pods and services"
      - echo "  task local:logs                Tail ws-server logs"
      - echo "  task local:build               Build and reload images"
      - echo "  task local:provision:create    Create topics + tenant"
      - echo "  task local:loadtest:smoke      Quick load test"
      - echo "  task local:publisher:run       Run message publisher"
      - echo ""
      - echo "=== REMOTE KUBERNETES (GKE) ==="
      - echo "  task k8s:deploy ENV=dev        Deploy to dev"
      - echo "  task k8s:deploy ENV=stg        Deploy to staging"
      - echo "  task k8s:deploy ENV=prod       Deploy to production"
      - echo "  task k8s:status ENV=dev        Show cluster status"
      - echo "  task k8s:logs ENV=dev          Tail logs"
      - echo ""
      - echo "=== GCE VMs ==="
      - echo "  task gce:loadtest:deploy ENV=dev   Deploy load test VM"
      - echo "  task gce:publisher:deploy ENV=dev  Deploy publisher VM"
      - echo ""
      - echo "=== TESTING ==="
      - echo "  task test                      Run unit tests"
      - echo "  task test:unit                 Run unit tests"
      - echo "  task test:integration          Run integration tests"
      - echo ""
      - echo "Run 'task --list-all' for complete list"

  # ===========================================================================
  # Minimal Shortcuts (to avoid confusion)
  # ===========================================================================
  local:
    desc: Full local setup (Kind + deploy)
    cmds:
      - task: local:setup

  test:
    desc: Run unit tests
    cmds:
      - task: test:unit
