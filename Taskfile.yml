version: "3"

# =============================================================================
# Main Taskfile - Entry Point
# =============================================================================
# Run 'task' or 'task --list' to see available commands

includes:
  # Shared utilities
  build:
    taskfile: ./taskfiles/shared/build.yml
    dir: .
  test:
    taskfile: ./taskfiles/shared/test.yml
    dir: .
  version:
    taskfile: ./taskfiles/shared/version.yml
    dir: .

  # Provisioning (DB + API)
  provisioning:
    taskfile: ./taskfiles/provisioning.yml
    dir: .

  # Kubernetes
  k8s:
    taskfile: ./taskfiles/k8s/Taskfile.yml
    dir: .

  # Terraform
  terraform:
    taskfile: ./taskfiles/terraform/Taskfile.yml
    dir: .

tasks:
  default:
    desc: Show available commands
    silent: true
    cmds:
      - echo "ODIN WEBSOCKET SERVER - TASK COMMANDS"
      - echo ""
      - echo "=== QUICK SHORTCUTS ==="
      - echo "  task dev              - Start local development (Kind)"
      - echo "  task dev:deploy       - Deploy to local Kind cluster"
      - echo "  task dev:status       - Show local cluster status"
      - echo ""
      - echo "=== REMOTE DEPLOYMENT ==="
      - echo "  task deploy:develop   - Deploy to GKE Standard develop"
      - echo "  task deploy:staging   - Deploy to GKE Standard staging"
      - echo "  task deploy:production- Deploy to GKE Standard production"
      - echo ""
      - echo "=== BUILD & TEST ==="
      - echo "  task build            - Build all Docker images"
      - echo "  task test             - Run unit tests"
      - echo "  task lint             - Lint Helm charts"
      - echo ""
      - echo "=== PROVISIONING ==="
      - echo "  task provisioning:db:migrate    - Run DB migrations"
      - echo "  task provisioning:api:tenant:list - List tenants"
      - echo ""
      - echo "=== DETAILED COMMANDS ==="
      - echo "  task k8s              - Kubernetes commands"
      - echo "  task terraform        - Terraform commands"
      - echo "  task version:info     - Show version info"
      - echo ""
      - echo "Run 'task --list-all' to see all available tasks"

  # ===========================================================================
  # Quick Shortcuts - Local Development
  # ===========================================================================
  dev:
    desc: Start local development (Kind)
    cmds:
      - task: k8s:local:setup

  dev:deploy:
    desc: Deploy to local Kind cluster
    cmds:
      - task: k8s:local:deploy

  dev:status:
    desc: Show local cluster status
    cmds:
      - task: k8s:local:status

  dev:logs:
    desc: Tail local ws-server logs
    cmds:
      - task: k8s:local:logs

  dev:build:
    desc: Build and reload local images
    cmds:
      - task: k8s:local:build:reload

  # ===========================================================================
  # Remote Deployment Shortcuts
  # ===========================================================================
  deploy:develop:
    desc: Deploy to GKE Standard develop
    cmds:
      - task: k8s:remote:standard:deploy
        vars: { ENV: develop }

  deploy:staging:
    desc: Deploy to GKE Standard staging
    cmds:
      - task: k8s:remote:standard:deploy
        vars: { ENV: staging }

  deploy:production:
    desc: Deploy to GKE Standard production
    cmds:
      - task: k8s:remote:standard:deploy
        vars: { ENV: production }

  # ===========================================================================
  # Build & Test Shortcuts
  # ===========================================================================
  build:
    desc: Build all Docker images
    cmds:
      - task: build:all

  test:
    desc: Run unit tests
    cmds:
      - task: test:unit

  lint:
    desc: Lint Helm charts
    cmds:
      - task: k8s:common:helm:lint

  # ===========================================================================
  # AsyncAPI
  # ===========================================================================
  asyncapi:bundle:
    desc: Bundle AsyncAPI spec into single file
    cmds:
      - task: k8s:common:asyncapi:bundle
