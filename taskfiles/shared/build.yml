# =============================================================================
# Shared Build Tasks - Docker image building
# =============================================================================

version: "3"

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT_HASH:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_TIME:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  # Registry can be overridden for remote builds
  PROJECT: '{{.PROJECT | default "odin-9e902"}}'
  REGISTRY: '{{.REGISTRY | default ""}}'
  # PUSH_REGISTRY: defaults to GCP Artifact Registry when REGISTRY is not set
  PUSH_REGISTRY: '{{.REGISTRY | default (printf "us-central1-docker.pkg.dev/%s/odin-ws" .PROJECT)}}'
  # Image prefix (empty for local, "registry/" for remote)
  IMAGE_PREFIX: '{{if .REGISTRY}}{{.REGISTRY}}/{{end}}'

tasks:
  ws-server:
    desc: Build ws-server Docker image
    dir: "{{.ROOT_DIR}}/ws"
    vars:
      IMAGE: '{{.IMAGE_PREFIX}}{{.WS_SERVER_IMAGE | default "odin-ws"}}'
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - docker build -t {{.IMAGE}}:{{.TAG}}
          --build-arg VERSION={{.VERSION}}
          --build-arg COMMIT_HASH={{.COMMIT_HASH}}
          --build-arg BUILD_TIME={{.BUILD_TIME}}
          -f build/server/Dockerfile .

  gateway:
    desc: Build ws-gateway Docker image
    dir: "{{.ROOT_DIR}}/ws"
    vars:
      IMAGE: '{{.IMAGE_PREFIX}}{{.GATEWAY_IMAGE | default "odin-gateway"}}'
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - docker build -t {{.IMAGE}}:{{.TAG}}
          --build-arg VERSION={{.VERSION}}
          --build-arg COMMIT_HASH={{.COMMIT_HASH}}
          --build-arg BUILD_TIME={{.BUILD_TIME}}
          -f build/gateway/Dockerfile .

  provisioning:
    desc: Build provisioning Docker image
    dir: "{{.ROOT_DIR}}/ws"
    vars:
      IMAGE: '{{.IMAGE_PREFIX}}{{.PROVISIONING_IMAGE | default "odin-provisioning"}}'
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - docker build -t {{.IMAGE}}:{{.TAG}}
          --build-arg VERSION={{.VERSION}}
          --build-arg COMMIT_HASH={{.COMMIT_HASH}}
          --build-arg BUILD_TIME={{.BUILD_TIME}}
          -f build/provisioning/Dockerfile .

  cli:
    desc: Build odin CLI Docker image
    dir: "{{.ROOT_DIR}}/ws"
    vars:
      IMAGE: '{{.IMAGE_PREFIX}}{{.CLI_IMAGE | default "odin-cli"}}'
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - docker build -t {{.IMAGE}}:{{.TAG}}
          --build-arg VERSION={{.VERSION}}
          --build-arg COMMIT_HASH={{.COMMIT_HASH}}
          --build-arg BUILD_TIME={{.BUILD_TIME}}
          -f build/cli/Dockerfile .

  loadtest:
    desc: Build wsloadtest image
    cmds:
      - docker build -t wsloadtest:latest {{.ROOT_DIR}}/wsloadtest

  publisher:
    desc: Build wspublisher image
    cmds:
      - docker build -t wspublisher:latest {{.ROOT_DIR}}/wspublisher

  all:
    desc: Build all Docker images
    cmds:
      - task: ws-server
      - task: gateway
      - task: provisioning
      - task: cli

  # Cross-platform build for remote registries (linux/amd64)
  push:ws-server:
    desc: Build and push ws-server to registry
    dir: "{{.ROOT_DIR}}/ws"
    vars:
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - docker buildx build --platform linux/amd64
          -t {{.PUSH_REGISTRY}}/ws-server:{{.TAG}}
          --build-arg VERSION={{.VERSION}}
          --build-arg COMMIT_HASH={{.COMMIT_HASH}}
          --build-arg BUILD_TIME={{.BUILD_TIME}}
          -f build/server/Dockerfile .
          --push

  push:gateway:
    desc: Build and push ws-gateway to registry
    dir: "{{.ROOT_DIR}}/ws"
    vars:
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - docker buildx build --platform linux/amd64
          -t {{.PUSH_REGISTRY}}/ws-gateway:{{.TAG}}
          --build-arg VERSION={{.VERSION}}
          --build-arg COMMIT_HASH={{.COMMIT_HASH}}
          --build-arg BUILD_TIME={{.BUILD_TIME}}
          -f build/gateway/Dockerfile .
          --push

  push:provisioning:
    desc: Build and push provisioning to registry
    dir: "{{.ROOT_DIR}}/ws"
    vars:
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - docker buildx build --platform linux/amd64
          -t {{.PUSH_REGISTRY}}/odin-provisioning:{{.TAG}}
          --build-arg VERSION={{.VERSION}}
          --build-arg COMMIT_HASH={{.COMMIT_HASH}}
          --build-arg BUILD_TIME={{.BUILD_TIME}}
          -f build/provisioning/Dockerfile .
          --push

  push:cli:
    desc: Build and push CLI to registry
    dir: "{{.ROOT_DIR}}/ws"
    vars:
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - docker buildx build --platform linux/amd64
          -t {{.PUSH_REGISTRY}}/odin-cli:{{.TAG}}
          --build-arg VERSION={{.VERSION}}
          --build-arg COMMIT_HASH={{.COMMIT_HASH}}
          --build-arg BUILD_TIME={{.BUILD_TIME}}
          -f build/cli/Dockerfile .
          --push

  push:loadtest:
    desc: Build and push wsloadtest to registry
    dir: "{{.ROOT_DIR}}/wsloadtest"
    vars:
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - docker buildx build --platform linux/amd64
          -t {{.PUSH_REGISTRY}}/wsloadtest:{{.TAG}}
          .
          --push

  push:publisher:
    desc: Build and push wspublisher to registry
    dir: "{{.ROOT_DIR}}/wspublisher"
    vars:
      TAG: '{{.TAG | default "latest"}}'
    cmds:
      - docker buildx build --platform linux/amd64
          -t {{.PUSH_REGISTRY}}/wspublisher:{{.TAG}}
          .
          --push

  push:all:
    desc: Build and push all images to registry
    cmds:
      - task: push:ws-server
        vars:
          PUSH_REGISTRY: "{{.PUSH_REGISTRY}}"
      - task: push:gateway
        vars:
          PUSH_REGISTRY: "{{.PUSH_REGISTRY}}"
      - task: push:provisioning
        vars:
          PUSH_REGISTRY: "{{.PUSH_REGISTRY}}"
      - task: push:loadtest
        vars:
          PUSH_REGISTRY: "{{.PUSH_REGISTRY}}"
      - task: push:publisher
        vars:
          PUSH_REGISTRY: "{{.PUSH_REGISTRY}}"
