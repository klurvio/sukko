# =============================================================================
# Shared Test Tasks - Go testing
# =============================================================================

version: "3"

tasks:
  unit:
    desc: Run all Go unit tests
    dir: "{{.ROOT_DIR}}/ws"
    cmds:
      - go test ./... -v

  unit:short:
    desc: Run Go unit tests (short mode, skip slow tests)
    dir: "{{.ROOT_DIR}}/ws"
    cmds:
      - go test ./... -short

  unit:cover:
    desc: Run Go unit tests with coverage report
    dir: "{{.ROOT_DIR}}/ws"
    cmds:
      - go test ./... -cover

  unit:race:
    desc: Run Go unit tests with race detector
    dir: "{{.ROOT_DIR}}/ws"
    cmds:
      - go test ./... -race

  bench:
    desc: Run Go benchmarks
    dir: "{{.ROOT_DIR}}/ws"
    cmds:
      - go test ./... -bench=. -benchmem

  lint:
    desc: Run Go linter (golangci-lint)
    dir: "{{.ROOT_DIR}}/ws"
    preconditions:
      - sh: command -v golangci-lint
        msg: "golangci-lint not installed. Install with: brew install golangci-lint"
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format Go code
    dir: "{{.ROOT_DIR}}/ws"
    cmds:
      - go fmt ./...

  vet:
    desc: Run Go vet
    dir: "{{.ROOT_DIR}}/ws"
    cmds:
      - go vet ./...

  all:
    desc: Run all checks (fmt, vet, lint, test)
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: unit:short
