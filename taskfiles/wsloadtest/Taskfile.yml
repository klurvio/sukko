# =============================================================================
# wsloadtest Taskfile - Main Entry Point
# =============================================================================
# Usage: task wsloadtest:<category>:<command>
# Examples:
#   task wsloadtest:build
#   task wsloadtest:local:run
#   task wsloadtest:remote:deploy

version: "3"

includes:
  build:
    taskfile: ./build.yml
    dir: "{{.ROOT_DIR}}"
  local:
    taskfile: ./local.yml
    dir: "{{.ROOT_DIR}}"
  remote:
    taskfile: ./remote.yml
    dir: "{{.ROOT_DIR}}"

tasks:
  default:
    desc: Show wsloadtest commands
    silent: true
    cmds:
      - 'echo "wsloadtest - WebSocket Load Testing Tool"'
      - 'echo ""'
      - 'echo "=== Build ==="'
      - 'echo "  task wsloadtest:build          - Build Go binary"'
      - 'echo "  task wsloadtest:build:docker   - Build Docker image"'
      - 'echo "  task wsloadtest:build:push     - Push to Artifact Registry"'
      - 'echo ""'
      - 'echo "=== Local (Kind cluster) ==="'
      - 'echo "  task wsloadtest:local:run      - Run test (CONNECTIONS=100)"'
      - 'echo "  task wsloadtest:local:quick    - Quick smoke test (10 conns, 30s)"'
      - 'echo ""'
      - 'echo "=== Remote (GCE VM) ==="'
      - 'echo "  task wsloadtest:remote:deploy  - Create GCE VM and run test"'
      - 'echo "  task wsloadtest:remote:destroy - Delete GCE VM"'
      - 'echo "  task wsloadtest:remote:logs    - View VM logs"'
      - 'echo "  task wsloadtest:remote:ssh     - SSH into VM"'
