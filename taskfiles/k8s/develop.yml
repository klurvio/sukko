# =============================================================================
# Develop Environment Tasks (GKE Autopilot)
# =============================================================================

version: '3'

vars:
  DEV_CHART: "{{.ROOT_DIR}}/deployments/k8s/helm/odin"
  DEV_NS: odin-dev
  DEV_VALUES: "{{.ROOT_DIR}}/deployments/k8s/helm/odin/values/autopilot/develop.yaml"
  GKE_CLUSTER: odin-ws-dev
  GKE_REGION: us-central1
  GKE_PROJECT: '{{.GKE_PROJECT | default "YOUR_PROJECT"}}'
  REGISTRY: us-central1-docker.pkg.dev/{{.GKE_PROJECT}}/odin

tasks:
  # ===========================================================================
  # Connection / Setup
  # ===========================================================================
  connect:
    desc: Connect to GKE develop cluster
    cmds:
      - gcloud container clusters get-credentials {{.GKE_CLUSTER}} --region {{.GKE_REGION}} --project {{.GKE_PROJECT}}

  # ===========================================================================
  # Build & Images
  # ===========================================================================
  build:
    desc: Build and push images to Artifact Registry
    cmds:
      - docker build -t {{.REGISTRY}}/ws-server:latest {{.ROOT_DIR}}/ws
      - docker push {{.REGISTRY}}/ws-server:latest
      # - docker build -t {{.REGISTRY}}/publisher:latest {{.ROOT_DIR}}/publisher
      # - docker push {{.REGISTRY}}/publisher:latest

  build:reload:
    desc: Rebuild images and restart pods
    cmds:
      - task: build
      - kubectl rollout restart deployment -n {{.DEV_NS}}

  # ===========================================================================
  # Deployment
  # ===========================================================================
  deploy:
    desc: Build, push, and deploy to GKE develop
    cmds:
      - task: build
      - task: upgrade

  upgrade:
    desc: Upgrade existing deployment
    cmds:
      - helm upgrade --install odin {{.DEV_CHART}} -f {{.DEV_VALUES}} -n {{.DEV_NS}} --create-namespace

  down:
    desc: Uninstall Helm release
    cmds:
      - helm uninstall odin -n {{.DEV_NS}} || true

  # ===========================================================================
  # Observability
  # ===========================================================================
  status:
    desc: Show deployment status
    cmds:
      - kubectl get pods -n {{.DEV_NS}}
      - echo ""
      - kubectl get svc -n {{.DEV_NS}}

  logs:
    desc: Tail ws-server logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=ws-server -n {{.DEV_NS}} --tail=100

  logs:all:
    desc: Tail all pod logs
    cmds:
      - kubectl logs -f --all-containers=true -l app.kubernetes.io/instance=odin -n {{.DEV_NS}} --tail=50

  logs:auth:
    desc: Tail auth-service logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=auth-service -n {{.DEV_NS}} --tail=100

  logs:publisher:
    desc: Tail publisher logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=publisher -n {{.DEV_NS}} --tail=100

  port-forward:
    desc: Port-forward ws-server for local testing
    cmds:
      - kubectl port-forward -n {{.DEV_NS}} svc/odin-ws-server 3005:3001

  # ===========================================================================
  # Testing
  # ===========================================================================
  health:
    desc: Check develop environment health
    cmds:
      - |
        DEV_IP=$(kubectl get svc -n {{.DEV_NS}} -l app.kubernetes.io/name=ws-server -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "localhost")
        if [ "$DEV_IP" = "localhost" ]; then
          echo "No external IP found, trying port-forward..."
          curl -s http://localhost:3005/health | jq .
        else
          echo "Develop IP: $DEV_IP"
          curl -s http://$DEV_IP/health | jq .
        fi
