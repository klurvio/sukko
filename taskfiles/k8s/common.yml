# =============================================================================
# Common K8s Tasks - Shared across environments
# =============================================================================

version: "3"

includes:
  build:
    taskfile: ../shared/build.yml
    dir: "{{.ROOT_DIR}}"
  helm:
    taskfile: ../shared/helm.yml
    dir: "{{.ROOT_DIR}}"
    vars:
      CHART_PATH: "{{.ROOT_DIR}}/deployments/helm/odin"
  test:
    taskfile: ../shared/test.yml
    dir: "{{.ROOT_DIR}}"

tasks:
  # ===========================================================================
  # Documentation
  # ===========================================================================
  asyncapi:bundle:
    desc: Bundle AsyncAPI spec into single file
    cmds:
      - npx @asyncapi/cli bundle {{.ROOT_DIR}}/ws/asyncapi/asyncapi.yaml -o {{.ROOT_DIR}}/ws/asyncapi/bundled.yaml
