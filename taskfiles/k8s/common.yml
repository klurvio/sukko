# =============================================================================
# Common K8s Tasks - Shared across environments
# =============================================================================

version: '3'

vars:
  # Common chart path used by utility tasks (lint, template, deps)
  COMMON_CHART: "{{.ROOT_DIR}}/deployments/k8s/helm/odin"

tasks:
  # ===========================================================================
  # Helm Operations
  # ===========================================================================
  helm:lint:
    desc: Lint Helm charts
    cmds:
      - helm lint {{.COMMON_CHART}}

  helm:template:
    desc: "Dry-run render templates (ENV=local|develop|staging|production)"
    vars:
      ENV: '{{default "local" .ENV}}'
    cmds:
      - helm template odin {{.COMMON_CHART}} -f {{.COMMON_CHART}}/values-{{.ENV}}.yaml

  helm:deps:
    desc: Update Helm dependencies
    cmds:
      - helm dependency update {{.COMMON_CHART}}

  helm:diff:
    desc: "Show diff before upgrade (ENV=local|develop|staging|production)"
    vars:
      ENV: '{{default "local" .ENV}}'
      NS: '{{default "odin-local" .NS}}'
    cmds:
      - helm diff upgrade odin {{.COMMON_CHART}} -f {{.COMMON_CHART}}/values-{{.ENV}}.yaml -n {{.NS}}

  # ===========================================================================
  # Build Operations
  # ===========================================================================
  build:ws-server:
    desc: Build ws-server Docker image
    dir: "{{.ROOT_DIR}}/ws"
    cmds:
      - docker build -t odin-ws:latest .

  build:publisher:
    desc: Build publisher Docker image
    dir: "{{.ROOT_DIR}}/publisher"
    cmds:
      - docker build -t odin-publisher:latest .

  build:auth-service:
    desc: Build auth-service Docker image
    dir: "{{.ROOT_DIR}}/ws"
    cmds:
      - docker build -t odin-auth:latest -f Dockerfile.auth .

  build:all:
    desc: Build all Docker images
    cmds:
      - task: build:ws-server
      - task: build:auth-service
      - task: build:publisher
