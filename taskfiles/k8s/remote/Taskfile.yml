# =============================================================================
# Remote K8s Clusters Entry Point
# =============================================================================

version: "3"

includes:
  standard:
    taskfile: ./standard/Taskfile.yml
    dir: "{{.ROOT_DIR}}"

tasks:
  default:
    desc: Show available remote cluster commands
    cmds:
      - 'echo "Remote Kubernetes deployment tasks"'
      - 'echo ""'
      - 'echo "=== GKE Standard (Spot VMs, 60-90% cheaper) ==="'
      - 'echo "  task k8s:remote:standard                    - Show all commands"'
      - 'echo "  task k8s:remote:standard:setup ENV=develop  - Full setup"'
      - 'echo "  task k8s:remote:standard:deploy ENV=staging - Deploy only"'
      - 'echo "  task k8s:remote:standard:status             - Show status"'
      - 'echo ""'
      - 'echo "Note: Autopilot support can be added in the future"'
