# =============================================================================
# Local Environment Tasks (kind)
# =============================================================================

version: '3'

vars:
  LOCAL_HELM_CHART: "{{.ROOT_DIR}}/deployments/k8s/helm/odin"
  LOCAL_KIND_CONFIG: "{{.ROOT_DIR}}/deployments/k8s/environments/local/kind-config.yaml"
  LOCAL_CLUSTER: odin-ws-local
  LOCAL_NS: odin-local
  LOCAL_VALUES: "{{.ROOT_DIR}}/deployments/k8s/helm/odin/values-local.yaml"

tasks:
  # ===========================================================================
  # Connection / Setup
  # ===========================================================================
  setup:
    desc: Create kind cluster and deploy full stack
    cmds:
      - task: cluster:create
      - task: build
      - task: deploy

  cluster:create:
    desc: Create kind cluster
    cmds:
      - kind create cluster --config {{.LOCAL_KIND_CONFIG}} || true
      - kubectl create namespace {{.LOCAL_NS}} --dry-run=client -o yaml | kubectl apply -f -

  cluster:delete:
    desc: Delete kind cluster
    cmds:
      - kind delete cluster --name {{.LOCAL_CLUSTER}}

  destroy:
    desc: Delete kind cluster
    cmds:
      - task: cluster:delete

  # ===========================================================================
  # Build & Images
  # ===========================================================================
  build:
    desc: Build and load images into kind
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
      COMMIT_HASH:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - docker build -t odin-ws:latest
          --build-arg VERSION={{.VERSION}}
          --build-arg COMMIT_HASH={{.COMMIT_HASH}}
          --build-arg BUILD_TIME={{.BUILD_TIME}}
          -f {{.ROOT_DIR}}/ws/build/server/Dockerfile {{.ROOT_DIR}}/ws
      - kind load docker-image odin-ws:latest --name {{.LOCAL_CLUSTER}}
      - docker build -t odin-gateway:latest
          --build-arg VERSION={{.VERSION}}
          --build-arg COMMIT_HASH={{.COMMIT_HASH}}
          --build-arg BUILD_TIME={{.BUILD_TIME}}
          -f {{.ROOT_DIR}}/ws/build/gateway/Dockerfile {{.ROOT_DIR}}/ws
      - kind load docker-image odin-gateway:latest --name {{.LOCAL_CLUSTER}}
      - docker build -t odin-publisher:latest {{.ROOT_DIR}}/publisher
      - kind load docker-image odin-publisher:latest --name {{.LOCAL_CLUSTER}}

  build:reload:
    desc: Rebuild images and restart pods
    cmds:
      - task: build
      - kubectl rollout restart deployment -n {{.LOCAL_NS}}

  # ===========================================================================
  # Deployment
  # ===========================================================================
  asyncapi:bundle:
    desc: Bundle AsyncAPI spec into single file
    cmds:
      - npx @asyncapi/cli bundle {{.ROOT_DIR}}/ws/asyncapi/asyncapi.yaml -o {{.ROOT_DIR}}/ws/asyncapi/bundled.yaml

  deploy:
    desc: Deploy/upgrade Helm release
    cmds:
      - task: asyncapi:bundle
      - helm upgrade --install odin {{.LOCAL_HELM_CHART}} -f {{.LOCAL_VALUES}} -n {{.LOCAL_NS}} --create-namespace

  down:
    desc: Uninstall Helm release
    cmds:
      - helm uninstall odin -n {{.LOCAL_NS}} || true

  # ===========================================================================
  # Observability
  # ===========================================================================
  status:
    desc: Show deployment status
    cmds:
      - kubectl get pods -n {{.LOCAL_NS}}
      - echo ""
      - kubectl get svc -n {{.LOCAL_NS}}

  logs:
    desc: Tail ws-server logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=ws-server -n {{.LOCAL_NS}} --tail=100

  logs:all:
    desc: Tail all pod logs
    cmds:
      - kubectl logs -f --all-containers=true -l app.kubernetes.io/instance=odin -n {{.LOCAL_NS}} --tail=50

  logs:gateway:
    desc: Tail ws-gateway logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=ws-gateway -n {{.LOCAL_NS}} --tail=100

  logs:publisher:
    desc: Tail publisher logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=publisher -n {{.LOCAL_NS}} --tail=100

  shell:
    desc: Open shell in ws-server pod
    cmds:
      - kubectl exec -it $(kubectl get pods -n {{.LOCAL_NS}} -l app.kubernetes.io/name=ws-server -o jsonpath='{.items[0].metadata.name}') -n {{.LOCAL_NS}} -- sh

  # ===========================================================================
  # Testing
  # ===========================================================================
  health:
    desc: Test ws-server health endpoint
    cmds:
      - curl -s http://localhost:3005/health | jq .

  test:ws:
    desc: Connect to WebSocket (requires wscat)
    cmds:
      - wscat -c ws://localhost:3005/ws
