# =============================================================================
# Production Environment Tasks (GKE Autopilot)
# =============================================================================
# WARNING: Production commands require extra confirmation

version: '3'

vars:
  PROD_CHART: "{{.ROOT_DIR}}/deployments/k8s/helm/odin"
  PROD_NS: odin-prod
  PROD_VALUES: "{{.ROOT_DIR}}/deployments/k8s/helm/odin/values-production.yaml"
  GKE_CLUSTER: odin-prod
  GKE_REGION: us-central1
  GKE_PROJECT: '{{.GKE_PROJECT | default "YOUR_PROJECT"}}'
  REGISTRY: us-central1-docker.pkg.dev/{{.GKE_PROJECT}}/odin

tasks:
  # ===========================================================================
  # Cluster Connection
  # ===========================================================================
  connect:
    desc: Connect to GKE production cluster
    cmds:
      - gcloud container clusters get-credentials {{.GKE_CLUSTER}} --region {{.GKE_REGION}} --project {{.GKE_PROJECT}}

  # ===========================================================================
  # Build & Push
  # ===========================================================================
  build:
    desc: Build and push images to Artifact Registry
    cmds:
      - |
        TAG=$(git describe --tags --always)
        docker build -t {{.REGISTRY}}/ws-server:$TAG {{.ROOT_DIR}}/ws
        docker push {{.REGISTRY}}/ws-server:$TAG
        docker tag {{.REGISTRY}}/ws-server:$TAG {{.REGISTRY}}/ws-server:latest
        docker push {{.REGISTRY}}/ws-server:latest

  # ===========================================================================
  # Deployment
  # ===========================================================================
  deploy:
    desc: Build, push, and deploy to GKE production
    prompt: "⚠️  This will deploy to PRODUCTION. Are you sure?"
    cmds:
      - task: build
      - task: upgrade

  upgrade:
    desc: Upgrade existing deployment (rolling update)
    prompt: "⚠️  This will upgrade PRODUCTION. Are you sure?"
    cmds:
      - helm upgrade --install odin {{.PROD_CHART}} -f {{.PROD_VALUES}} -n {{.PROD_NS}} --create-namespace --wait

  rollback:
    desc: Rollback to previous release
    cmds:
      - helm rollback odin -n {{.PROD_NS}}

  # ===========================================================================
  # Scaling
  # ===========================================================================
  scale:
    desc: "Manual scaling (REPLICAS=N)"
    vars:
      REPLICAS: '{{default "3" .REPLICAS}}'
    cmds:
      - kubectl scale deployment odin-ws-server -n {{.PROD_NS}} --replicas={{.REPLICAS}}

  # ===========================================================================
  # Status & Debugging
  # ===========================================================================
  status:
    desc: Show deployment status
    cmds:
      - kubectl get pods -n {{.PROD_NS}}
      - echo ""
      - kubectl get svc -n {{.PROD_NS}}
      - echo ""
      - kubectl get hpa -n {{.PROD_NS}}

  logs:
    desc: Tail ws-server logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=ws-server -n {{.PROD_NS}} --tail=100

  # ===========================================================================
  # Health & Monitoring
  # ===========================================================================
  health:
    desc: Check production health
    cmds:
      - |
        PROD_IP=$(kubectl get svc -n {{.PROD_NS}} -l app.kubernetes.io/name=ws-server -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}')
        echo "Production IP: $PROD_IP"
        curl -s http://$PROD_IP/health | jq .
