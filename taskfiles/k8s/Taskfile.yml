# =============================================================================
# Kubernetes Taskfile - Main Entry Point
# =============================================================================
# Usage: task k8s:<cluster-type>:<command>
# Examples:
#   task k8s:local:setup
#   task k8s:standard:deploy:develop
#   task k8s:autopilot:deploy:staging

version: '3'

includes:
  local: ./local.yml
  autopilot: ./autopilot.yml
  standard: ./standard.yml
  common: ./common.yml

# NOTE: Each cluster type taskfile uses environment variables (ENV, GKE_AP_ENV, GKE_STD_ENV)
# to select the target environment (develop, staging, production).

tasks:
  default:
    desc: Show available K8s commands
    cmds:
      - echo "Kubernetes deployment tasks"
      - echo ""
      - echo "=== Local (kind cluster) ==="
      - echo "  task k8s:local:setup       - Create cluster and deploy"
      - echo "  task k8s:local:deploy      - Deploy/upgrade Helm release"
      - echo "  task k8s:local:status      - Show pod/service status"
      - echo "  task k8s:local:logs        - Tail ws-server logs"
      - echo ""
      - echo "=== GKE Standard (Spot VMs, 60-90% cheaper) ==="
      - echo "  task k8s:standard:deploy:develop    - Deploy to develop"
      - echo "  task k8s:standard:deploy:staging    - Deploy to staging"
      - echo "  task k8s:standard:deploy:production - Deploy to production"
      - echo "  task k8s:standard:tf:*              - Terraform commands"
      - echo "  task k8s:standard:status            - Show deployment status"
      - echo ""
      - echo "=== GKE Autopilot (managed nodes, simpler) ==="
      - echo "  task k8s:autopilot:deploy:develop    - Deploy to develop"
      - echo "  task k8s:autopilot:deploy:staging    - Deploy to staging"
      - echo "  task k8s:autopilot:deploy:production - Deploy to production"
      - echo ""
      - echo "Common tasks:"
      - echo "  task k8s:common:helm:lint     - Lint Helm charts"
      - echo "  task k8s:common:helm:template - Dry-run render templates"
