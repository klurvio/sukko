# =============================================================================
# Kubernetes Taskfile - Main Entry Point
# =============================================================================
# Usage: task k8s:<cluster-type>:<command>
# Examples:
#   task k8s:local:setup
#   task k8s:remote:standard:deploy ENV=develop

version: "3"

includes:
  local:
    taskfile: ./local/Taskfile.yml
    dir: "{{.ROOT_DIR}}"
  remote:
    taskfile: ./remote/Taskfile.yml
    dir: "{{.ROOT_DIR}}"
  common:
    taskfile: ./common.yml
    dir: "{{.ROOT_DIR}}"

tasks:
  default:
    desc: Show available K8s commands
    cmds:
      - echo "Kubernetes deployment tasks"
      - echo ""
      - echo "=== Local (Kind cluster) ==="
      - echo "  task k8s:local:setup       - Create cluster and deploy"
      - echo "  task k8s:local:deploy      - Deploy/upgrade Helm release"
      - echo "  task k8s:local:status      - Show pod/service status"
      - echo "  task k8s:local:logs        - Tail ws-server logs"
      - echo ""
      - echo "=== GKE Standard (Spot VMs, 60-90% cheaper) ==="
      - echo "  task k8s:remote:standard:deploy ENV=develop"
      - echo "  task k8s:remote:standard:deploy ENV=staging"
      - echo "  task k8s:remote:standard:deploy ENV=production"
      - echo "  task k8s:remote:standard:status"
      - echo "  task k8s:remote:standard:tf:init"
      - echo ""
      - echo "Common tasks:"
      - echo "  task k8s:common:helm:lint     - Lint Helm charts"
      - echo "  task k8s:common:build:all     - Build all images"
      - echo "  task k8s:common:test:unit     - Run unit tests"
