# =============================================================================
# Kubernetes Taskfile - Main Entry Point
# =============================================================================
# Usage: task k8s:<environment>:<command>
# Examples:
#   task k8s:local:setup
#   task k8s:develop:deploy
#   task k8s:staging:status
#   task k8s:production:rollback

version: '3'

includes:
  local: ./local.yml
  develop: ./develop.yml
  staging: ./staging.yml
  production: ./production.yml
  gke-standard: ./gke-standard.yml
  common: ./common.yml

# NOTE: Each environment taskfile defines its own chart/namespace/values variables
# with environment-specific prefixes (LOCAL_*, DEV_*, STAGING_*, PROD_*) to
# prevent variable name collisions across includes.

tasks:
  default:
    desc: Show available K8s commands
    cmds:
      - echo "Kubernetes deployment tasks"
      - echo ""
      - echo "=== GKE Autopilot (managed nodes, simpler) ==="
      - echo "  task k8s:local:*        - Local kind cluster"
      - echo "  task k8s:develop:*      - GKE Autopilot develop"
      - echo "  task k8s:staging:*      - GKE Autopilot staging"
      - echo "  task k8s:production:*   - GKE Autopilot production"
      - echo ""
      - echo "=== GKE Standard (Spot VMs, 60-90% cheaper) ==="
      - echo "  task k8s:gke-standard:deploy:develop    - Deploy to develop"
      - echo "  task k8s:gke-standard:deploy:staging    - Deploy to staging"
      - echo "  task k8s:gke-standard:deploy:production - Deploy to production"
      - echo "  task k8s:gke-standard:tf:*              - Terraform commands"
      - echo ""
      - echo "Common tasks:"
      - echo "  task k8s:helm:lint     - Lint Helm charts"
      - echo "  task k8s:helm:template - Dry-run render templates"
