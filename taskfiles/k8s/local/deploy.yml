# =============================================================================
# Local Deployment Tasks
# =============================================================================

version: "3"

vars:
  CLUSTER_NAME: odin-ws-local

tasks:
  default:
    desc: Deploy/upgrade Helm release (runs migrations first)
    cmds:
      - kubectl config use-context kind-{{.CLUSTER_NAME}}
      - task: k8s:local:migrate
      - npx @asyncapi/cli bundle {{.ROOT_DIR}}/ws/docs/asyncapi/client-ws.asyncapi.yaml -o {{.ROOT_DIR}}/ws/docs/asyncapi/bundled.yaml
      - task: k8s:local:helm:upgrade

  down:
    desc: Uninstall Helm release
    cmds:
      - task: k8s:local:helm:uninstall
