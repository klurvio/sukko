# =============================================================================
# Local Provisioning API Tasks
# =============================================================================

version: "3"

vars:
  PROVISIONING_URL: "http://localhost:8082"

tasks:
  quick-setup:
    desc: Create test tenant with topics (local)
    cmds:
      - task: provisioning:api:quick-setup
        vars:
          PROVISIONING_URL: "{{.PROVISIONING_URL}}"
          TENANT_ID: '{{.TENANT_ID | default "local-test"}}'
          TENANT_NAME: '{{.TENANT_NAME | default "Local Test Tenant"}}'

  tenant:list:
    desc: List tenants (local)
    cmds:
      - task: provisioning:api:tenant:list
        vars:
          PROVISIONING_URL: "{{.PROVISIONING_URL}}"

  tenant:get:
    desc: Get tenant details (local)
    requires:
      vars: [TENANT_ID]
    cmds:
      - task: provisioning:api:tenant:get
        vars:
          PROVISIONING_URL: "{{.PROVISIONING_URL}}"
          TENANT_ID: "{{.TENANT_ID}}"

  topics:create:
    desc: Create topics for tenant (local)
    requires:
      vars: [TENANT_ID]
    cmds:
      - task: provisioning:api:topics:create
        vars:
          PROVISIONING_URL: "{{.PROVISIONING_URL}}"
          TENANT_ID: "{{.TENANT_ID}}"

  health:
    desc: Check provisioning API health
    cmds:
      - task: provisioning:api:health
        vars:
          PROVISIONING_URL: "{{.PROVISIONING_URL}}"
