# =============================================================================
# Local Environment Tasks (Kind cluster) - Main Entry Point
# =============================================================================
# Usage: task k8s:local:<category>:<command>
# Examples:
#   task k8s:local:setup
#   task k8s:local:deploy
#   task k8s:local:logs

version: "3"

includes:
  # Shared utilities
  helm:
    taskfile: ../../shared/helm.yml
    dir: "{{.ROOT_DIR}}"
    vars:
      CHART_PATH: "{{.ROOT_DIR}}/deployments/helm/odin"
      VALUES_FILE: "{{.ROOT_DIR}}/deployments/helm/odin/values/local.yaml"
      NAMESPACE: odin-local
  # Modular local tasks
  cluster:
    taskfile: ./cluster.yml
    dir: "{{.ROOT_DIR}}"
  build:
    taskfile: ./build.yml
    dir: "{{.ROOT_DIR}}"
  migrate:
    taskfile: ./migrate.yml
    dir: "{{.ROOT_DIR}}"
  deploy:
    taskfile: ./deploy.yml
    dir: "{{.ROOT_DIR}}"
  observe:
    taskfile: ./observe.yml
    dir: "{{.ROOT_DIR}}"
  pf:
    taskfile: ./port-forward.yml
    dir: "{{.ROOT_DIR}}"
  provision:
    taskfile: ./provision.yml
    dir: "{{.ROOT_DIR}}"

vars:
  CLUSTER_NAME: odin-ws-local
  NAMESPACE: odin-local

tasks:
  # ===========================================================================
  # Top-level Commands
  # ===========================================================================
  default:
    desc: Show local environment commands
    silent: true
    cmds:
      - 'echo "Local Environment (Kind cluster)"'
      - 'echo ""'
      - 'echo "=== Quick Start ==="'
      - 'echo "  task k8s:local:setup            - Create cluster and deploy full stack"'
      - 'echo "  task k8s:local:destroy          - Delete cluster"'
      - 'echo ""'
      - 'echo "=== Cluster ==="'
      - 'echo "  task k8s:local:cluster:create   - Create Kind cluster"'
      - 'echo "  task k8s:local:cluster:delete   - Delete Kind cluster"'
      - 'echo ""'
      - 'echo "=== Build & Deploy ==="'
      - 'echo "  task k8s:local:build            - Build and load images"'
      - 'echo "  task k8s:local:build:reload     - Rebuild and restart pods"'
      - 'echo "  task k8s:local:deploy           - Deploy Helm release"'
      - 'echo "  task k8s:local:deploy:down      - Uninstall Helm release"'
      - 'echo ""'
      - 'echo "=== Database ==="'
      - 'echo "  task k8s:local:migrate          - Run migrations"'
      - 'echo "  task k8s:local:migrate:status   - Show migration status"'
      - 'echo ""'
      - 'echo "=== Observability ==="'
      - 'echo "  task k8s:local:observe:status   - Show pod/service status"'
      - 'echo "  task k8s:local:observe:logs     - Tail ws-server logs"'
      - 'echo "  task k8s:local:observe:shell    - Shell into ws-server pod"'
      - 'echo ""'
      - 'echo "=== Port Forwarding ==="'
      - 'echo "  task k8s:local:pf:start         - Start all port-forwards"'
      - 'echo "  task k8s:local:pf:stop          - Stop all port-forwards"'
      - 'echo ""'
      - 'echo "=== Publisher (use wspublisher) ==="'
      - 'echo "  task wspublisher:local:run      - Run wspublisher locally"'

  # ===========================================================================
  # Top-level Shortcuts
  # ===========================================================================
  setup:
    desc: Create Kind cluster and deploy full stack
    cmds:
      - task: cluster:create
      - task: build
      - task: deploy
      - task: pf:start
      - task: observe:status

  destroy:
    desc: Delete Kind cluster
    cmds:
      - task: cluster:delete

  status:
    desc: Show deployment status
    cmds:
      - task: observe:status

  logs:
    desc: Tail ws-server logs
    cmds:
      - task: observe:logs

  down:
    desc: Uninstall Helm release
    cmds:
      - task: deploy:down

  health:
    desc: Test ws-gateway health endpoint
    cmds:
      - curl -s http://localhost:3006/health | jq .
