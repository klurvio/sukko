# =============================================================================
# Staging Environment Tasks (GKE Autopilot)
# =============================================================================

version: '3'

vars:
  STAGING_CHART: "{{.ROOT_DIR}}/deployments/k8s/helm/odin"
  STAGING_NS: odin-staging
  STAGING_VALUES: "{{.ROOT_DIR}}/deployments/k8s/helm/odin/values-staging.yaml"
  GKE_CLUSTER: odin-ws-staging
  GKE_REGION: us-central1
  GKE_PROJECT: '{{.GKE_PROJECT | default "YOUR_PROJECT"}}'
  REGISTRY: us-central1-docker.pkg.dev/{{.GKE_PROJECT}}/odin

tasks:
  # ===========================================================================
  # Connection / Setup
  # ===========================================================================
  connect:
    desc: Connect to GKE staging cluster
    cmds:
      - gcloud container clusters get-credentials {{.GKE_CLUSTER}} --region {{.GKE_REGION}} --project {{.GKE_PROJECT}}

  # ===========================================================================
  # Build & Images
  # ===========================================================================
  build:
    desc: Build and push images to Artifact Registry
    cmds:
      - docker build -t {{.REGISTRY}}/ws-server:staging {{.ROOT_DIR}}/ws
      - docker push {{.REGISTRY}}/ws-server:staging

  # ===========================================================================
  # Deployment
  # ===========================================================================
  deploy:
    desc: Build, push, and deploy to GKE staging
    cmds:
      - task: build
      - task: upgrade

  upgrade:
    desc: Upgrade existing deployment
    cmds:
      - helm upgrade --install odin {{.STAGING_CHART}} -f {{.STAGING_VALUES}} -n {{.STAGING_NS}} --create-namespace

  down:
    desc: Uninstall Helm release
    cmds:
      - helm uninstall odin -n {{.STAGING_NS}} || true

  rollback:
    desc: Rollback to previous release
    cmds:
      - helm rollback odin -n {{.STAGING_NS}}

  # ===========================================================================
  # Observability
  # ===========================================================================
  status:
    desc: Show deployment status
    cmds:
      - kubectl get pods -n {{.STAGING_NS}}
      - echo ""
      - kubectl get svc -n {{.STAGING_NS}}
      - echo ""
      - kubectl get hpa -n {{.STAGING_NS}}

  logs:
    desc: Tail ws-server logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=ws-server -n {{.STAGING_NS}} --tail=100

  logs:all:
    desc: Tail all pod logs
    cmds:
      - kubectl logs -f --all-containers=true -l app.kubernetes.io/instance=odin -n {{.STAGING_NS}} --tail=50

  logs:auth:
    desc: Tail auth-service logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=auth-service -n {{.STAGING_NS}} --tail=100

  logs:publisher:
    desc: Tail publisher logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=publisher -n {{.STAGING_NS}} --tail=100

  # ===========================================================================
  # Testing
  # ===========================================================================
  health:
    desc: Check staging environment health
    cmds:
      - |
        STAGING_IP=$(kubectl get svc -n {{.STAGING_NS}} -l app.kubernetes.io/name=ws-server -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}')
        echo "Staging IP: $STAGING_IP"
        curl -s http://$STAGING_IP/health | jq .

  test:load:
    desc: Run load test against staging
    vars:
      CONNECTIONS: '{{default "5000" .CONNECTIONS}}'
      DURATION: '{{default "300" .DURATION}}'
    cmds:
      - |
        STAGING_IP=$(kubectl get svc -n {{.STAGING_NS}} -l app.kubernetes.io/name=ws-server -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}')
        echo "Running load test against $STAGING_IP"
        # Add your load testing tool here
