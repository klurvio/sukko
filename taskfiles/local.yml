# =============================================================================
# Local Development Tasks (Kind cluster)
# =============================================================================
# Domain: local
# Pattern: local:{service}:{action}
# No ENV needed - always "local" environment

version: "3"

vars:
  LOCAL_CLUSTER_NAME: sukko-local
  LOCAL_NAMESPACE: sukko-local
  LOCAL_RELEASE_NAME: sukko
  LOCAL_KIND_CONFIG: "{{.ROOT_DIR}}/deployments/k8s/local/kind-config.yaml"
  LOCAL_CHART_PATH: "{{.ROOT_DIR}}/deployments/helm/sukko"
  LOCAL_VALUES_FILE: "{{.ROOT_DIR}}/deployments/helm/sukko/values/local.yaml"
  LOCAL_DB_URL: "postgres://sukko:sukko_local_dev@localhost:5432/sukko_provisioning?sslmode=disable"
  LOCAL_MIGRATIONS_DIR: "{{.ROOT_DIR}}/ws/internal/provisioning/repository/migrations"
  # Images
  LOCAL_WS_IMAGE: sukko-server
  LOCAL_GATEWAY_IMAGE: sukko-gateway
  LOCAL_PROVISIONING_IMAGE: sukko-provisioning
  LOCAL_IMAGE_TAG: latest
  # Ports (must match Kind extraPortMappings in deployments/k8s/local/kind-config.yaml)
  LOCAL_GATEWAY_PORT: 3000      # Kind: containerPort 30000 → hostPort 3000
  LOCAL_PROVISIONING_PORT: 8081 # Kind: containerPort 30081 → hostPort 8081
  LOCAL_REDPANDA_PORT: 9092     # Kind: containerPort 31092 → hostPort 9092
  LOCAL_GRAFANA_PORT: 3010      # Kind: containerPort 30300 → hostPort 3010

includes:
  build:
    taskfile: ./shared/build.yml
    dir: "{{.ROOT_DIR}}"

tasks:
  # ===========================================================================
  # Core Cluster Operations
  # ===========================================================================
  setup:
    desc: Create Kind cluster and deploy full stack
    cmds:
      - task: cluster:create
      - task: images:build
      - task: deploy
      - task: status

  destroy:
    desc: Delete Kind cluster
    cmds:
      - kind delete cluster --name {{.LOCAL_CLUSTER_NAME}}

  deploy:
    desc: Deploy/upgrade Helm release and run migrations
    cmds:
      - kubectl config use-context kind-{{.LOCAL_CLUSTER_NAME}}
      - SUPPRESS_NO_CONFIG_WARNING=1 npx @asyncapi/cli bundle {{.ROOT_DIR}}/ws/docs/asyncapi/client-ws.asyncapi.yaml -o {{.ROOT_DIR}}/ws/docs/asyncapi/bundled.yaml
      - helm upgrade --install {{.LOCAL_RELEASE_NAME}} {{.LOCAL_CHART_PATH}} -f {{.LOCAL_VALUES_FILE}} -n {{.LOCAL_NAMESPACE}} --create-namespace
      - task: wait-for-db
      - task: db:migrate

  status:
    desc: Show pods and services
    cmds:
      - kubectl get pods -n {{.LOCAL_NAMESPACE}}
      - 'echo ""'
      - kubectl get svc -n {{.LOCAL_NAMESPACE}}

  logs:
    desc: Tail ws-server logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=ws-server -n {{.LOCAL_NAMESPACE}} --tail=100

  logs:gateway:
    desc: Tail ws-gateway logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=ws-gateway -n {{.LOCAL_NAMESPACE}} --tail=100

  logs:all:
    desc: Tail all pod logs
    cmds:
      - kubectl logs -f --all-containers=true -l app.kubernetes.io/instance={{.LOCAL_RELEASE_NAME}} -n {{.LOCAL_NAMESPACE}} --tail=50

  build:
    desc: Build and reload images
    cmds:
      - task: images:build
      - task: db:migrate
      - kubectl rollout restart deployment -n {{.LOCAL_NAMESPACE}}

  health:
    desc: Check health endpoint
    cmds:
      - curl -s http://localhost:{{.LOCAL_GATEWAY_PORT}}/health | jq .

  shell:
    desc: Shell into ws-server pod
    cmds:
      - kubectl exec -it $(kubectl get pods -n {{.LOCAL_NAMESPACE}} -l app.kubernetes.io/name=ws-server -o jsonpath='{.items[0].metadata.name}') -n {{.LOCAL_NAMESPACE}} -- sh

  # ===========================================================================
  # Internal Tasks
  # ===========================================================================
  cluster:create:
    desc: Create Kind cluster
    internal: true
    cmds:
      - kind create cluster --config {{.LOCAL_KIND_CONFIG}} --name {{.LOCAL_CLUSTER_NAME}} || true
      - kubectl config use-context kind-{{.LOCAL_CLUSTER_NAME}}
      - kubectl create namespace {{.LOCAL_NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -

  images:build:
    desc: Build and load images into Kind
    internal: true
    cmds:
      - task: build:all
      - kind load docker-image {{.LOCAL_WS_IMAGE}}:{{.LOCAL_IMAGE_TAG}} --name {{.LOCAL_CLUSTER_NAME}}
      - kind load docker-image {{.LOCAL_GATEWAY_IMAGE}}:{{.LOCAL_IMAGE_TAG}} --name {{.LOCAL_CLUSTER_NAME}}
      - kind load docker-image {{.LOCAL_PROVISIONING_IMAGE}}:{{.LOCAL_IMAGE_TAG}} --name {{.LOCAL_CLUSTER_NAME}}

  wait-for-db:
    desc: Wait for postgres to be ready
    internal: true
    cmds:
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=postgresql -n {{.LOCAL_NAMESPACE}} --timeout=120s

  # ===========================================================================
  # Provisioning (routing rules + DB tenant)
  # ===========================================================================
  provision:create:
    desc: Create sukko tenant + routing rules + channel rules
    cmds:
      - |
        set -e

        # Wait for provisioning API to be accessible via Kind NodePort
        echo "Checking provisioning API..."
        for i in $(seq 1 10); do
          if curl -sf http://localhost:{{.LOCAL_PROVISIONING_PORT}}/health >/dev/null 2>&1; then
            echo "Provisioning API ready"
            break
          fi
          echo "Waiting for provisioning API..."
          sleep 1
        done

        if ! curl -sf http://localhost:{{.LOCAL_PROVISIONING_PORT}}/health >/dev/null 2>&1; then
          echo "ERROR: Provisioning API not accessible at localhost:{{.LOCAL_PROVISIONING_PORT}}"
          exit 1
        fi

        # Create tenant via API
        echo "Creating tenant..."
        RESULT=$(curl -sf -X POST http://localhost:{{.LOCAL_PROVISIONING_PORT}}/api/v1/tenants \
          -H "Content-Type: application/json" \
          -d '{"id": "sukko", "name": "Sukko Trading Platform"}' 2>&1) || {
          # Tenant might already exist - check if it's a conflict error
          if echo "$RESULT" | grep -q "already exists"; then
            echo "Tenant already exists, continuing..."
          else
            echo "Tenant creation response: $RESULT"
          fi
        }
        echo "$RESULT" | jq . 2>/dev/null || echo "$RESULT"

        # Set routing rules
        echo "Setting routing rules..."
        RESULT=$(curl -sf -X PUT http://localhost:{{.LOCAL_PROVISIONING_PORT}}/api/v1/tenants/sukko/routing-rules \
          -H "Content-Type: application/json" \
          -d '{"rules": [{"pattern": "*.trade", "topic_suffix": "trade"}]}' 2>&1) || {
          echo "Routing rules failed: $RESULT"
          exit 1
        }
        echo "$RESULT" | jq .

        # Set channel rules
        echo "Setting channel rules..."
        RESULT=$(curl -sf -X PUT http://localhost:{{.LOCAL_PROVISIONING_PORT}}/api/v1/tenants/sukko/channel-rules \
          -H "Content-Type: application/json" \
          -d '{"public_patterns": ["*.metadata"], "user_scoped_patterns": ["balances.{subject}"], "group_scoped_patterns": []}' 2>&1) || {
          echo "Channel rules failed: $RESULT"
          exit 1
        }
        echo "$RESULT" | jq .

        echo "Provisioning complete"

  provision:status:
    desc: List Kafka topics + tenants + routing rules
    cmds:
      - |
        echo "=== Kafka Topics ==="
        kubectl exec -n {{.LOCAL_NAMESPACE}} {{.LOCAL_RELEASE_NAME}}-redpanda-0 -- rpk topic list
        echo ""
        echo "=== Tenants ==="
        curl -s http://localhost:{{.LOCAL_PROVISIONING_PORT}}/api/v1/tenants | jq .
        echo ""
        echo "=== Routing Rules (sukko) ==="
        curl -s http://localhost:{{.LOCAL_PROVISIONING_PORT}}/api/v1/tenants/sukko/routing-rules | jq .

  provision:delete:
    desc: Delete all local.sukko.* topics
    cmds:
      - kubectl exec -n {{.LOCAL_NAMESPACE}} {{.LOCAL_RELEASE_NAME}}-redpanda-0 -- rpk topic delete -r 'local.sukko.*' || true
      - 'echo "Deleted Kafka topics"'

  # ===========================================================================
  # Load Testing (Docker)
  # ===========================================================================
  loadtest:run:
    desc: Run load test (CONNECTIONS=100 DURATION=1m)
    vars:
      CONNECTIONS: '{{.CONNECTIONS | default "100"}}'
      DURATION: '{{.DURATION | default "1m"}}'
      RAMP: '{{.RAMP | default "10"}}'
    cmds:
      - docker build -t wsloadtest:latest {{.ROOT_DIR}}/wsloadtest
      - |
        docker run --rm --name wsloadtest-local \
          --add-host=host.docker.internal:host-gateway \
          -e WS_URL=ws://host.docker.internal:{{.LOCAL_GATEWAY_PORT}}/ws \
          -e HEALTH_URL=http://host.docker.internal:{{.LOCAL_GATEWAY_PORT}}/health \
          -e TARGET_CONNECTIONS={{.CONNECTIONS}} \
          -e RAMP_RATE={{.RAMP}} \
          -e DURATION={{.DURATION}} \
          -e TENANT_ID=sukko \
          -e CHANNELS=sukko.BTC.trade,sukko.ETH.trade,sukko.SOL.trade \
          -e CHANNELS_PER_CLIENT=1 \
          -e WS_PONG_WAIT=120s \
          -e WS_PING_PERIOD=90s \
          wsloadtest:latest

  loadtest:smoke:
    desc: Quick smoke test (10 connections, 30s)
    cmds:
      - task: loadtest:run
        vars:
          CONNECTIONS: "10"
          DURATION: "30s"
          RAMP: "5"

  loadtest:stop:
    desc: Stop load test
    cmds:
      - docker stop wsloadtest-local 2>/dev/null || true
      - 'echo "Stopped wsloadtest"'

  # ===========================================================================
  # Publisher (Docker)
  # ===========================================================================
  publisher:run:
    desc: Run publisher (RATE=10 msg/sec)
    vars:
      RATE: '{{.RATE | default "10"}}'
    cmds:
      - docker build -t wspublisher:latest {{.ROOT_DIR}}/wspublisher
      - |
        docker run --rm --name wspublisher-local \
          --add-host=host.docker.internal:host-gateway \
          -e KAFKA_BROKERS=host.docker.internal:{{.LOCAL_REDPANDA_PORT}} \
          -e KAFKA_NAMESPACE=local \
          -e TIMING_MODE=poisson \
          -e POISSON_LAMBDA={{.RATE}} \
          -e DURATION=0 \
          -e TENANT_ID=sukko \
          -e IDENTIFIERS=BTC,ETH,SOL \
          -e CATEGORIES=trade \
          -e LOG_LEVEL=info \
          wspublisher:latest

  publisher:stop:
    desc: Stop publisher
    cmds:
      - docker stop wspublisher-local 2>/dev/null || true
      - 'echo "Stopped wspublisher"'

  # ===========================================================================
  # Database
  # ===========================================================================
  db:migrate:
    desc: Run database migrations
    cmds:
      - |
        if ! nc -z localhost 5432 2>/dev/null; then
          echo "Starting port-forward to postgres..."
          kubectl port-forward -n {{.LOCAL_NAMESPACE}} svc/{{.LOCAL_RELEASE_NAME}}-postgresql 5432:5432 &
          sleep 3
        fi
      - atlas migrate apply --url "{{.LOCAL_DB_URL}}" --dir "file://{{.LOCAL_MIGRATIONS_DIR}}"

  db:status:
    desc: Show migration status
    cmds:
      - |
        if ! nc -z localhost 5432 2>/dev/null; then
          kubectl port-forward -n {{.LOCAL_NAMESPACE}} svc/{{.LOCAL_RELEASE_NAME}}-postgresql 5432:5432 &
          sleep 2
        fi
      - atlas migrate status --url "{{.LOCAL_DB_URL}}" --dir "file://{{.LOCAL_MIGRATIONS_DIR}}"
