version: "3"

# =============================================================================
# GCP Deployment Tasks
# =============================================================================
# Purpose: GCP infrastructure and application deployment
# Scope: Instance creation, firewall, initial setup, code updates

includes:
  redis:
    taskfile: ./redis.yml
    vars:
      GIT_BRANCH: "{{.GIT_BRANCH}}"
      GIT_REPO_SSH: "{{.GIT_REPO_SSH}}"

tasks:
  # === HIGH-LEVEL WORKFLOWS ===

  setup:
    desc: Complete GCP deployment from scratch (fully automated)
    cmds:
      - task: "infrastructure"
      - echo ""
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo "🤖 AUTOMATED APPLICATION SETUP"
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo ""
      - task: "setup:backend"
      - echo ""
      - echo "📦 Deploying Redis (BroadcastBus infrastructure)..."
      - task: "redis:deploy-single"
      - echo ""
      - task: "setup:ws"
      - echo ""
      - task: "setup:loadtest"
      - echo ""
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo "✅ DEPLOYMENT COMPLETE"
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo ""
      - echo "📊 Service Status:"
      - task: "redis:get-ip"
      - echo ""
      - echo "💡 Update ws-server .env with Redis IP before starting"

  quick-start:
    desc: Quick start all services (daily use - assumes infrastructure exists)
    cmds:
      - echo "🚀 Starting all GCP services..."
      - echo ""
      - task: :gcp:start:all
      - echo ""
      - echo "⏳ Waiting for services to be ready..."
      - sleep 15
      - echo ""
      - task: health:all
      - echo ""
      - task: stats:urls
      - echo ""
      - echo "✅ All services started and healthy"

  stop:
    desc: Stop all services (keeps volumes)
    cmds:
      - task: :gcp:stop:all
      - echo "✅ Services stopped (containers removed, infrastructure preserved)"

  reset:
    desc: Reset deployment (stop + rebuild + start - for config changes)
    cmds:
      - echo "⚠️  Resetting deployment (stop + rebuild + start)..."
      - echo "   Press Ctrl+C to cancel, or wait 5 seconds..."
      - sleep 5
      - task: :gcp:stop:all
      - echo "🔨 Rebuilding services..."
      - task: "rebuild:all"
      - echo "⏳ Waiting for services to be ready..."
      - sleep 15
      - task: health:all
      - echo "✅ Deployment reset complete"

  rebuild-code:
    desc: Rebuild services after code changes
    cmds:
      - echo "🔨 Rebuilding services..."
      - task: "rebuild:all"
      - echo "🔍 Checking health..."
      - sleep 5
      - task: health:all
      - echo "✅ Rebuild complete"

  infrastructure:
    desc: Complete infrastructure setup (instances + networking + IP)
    cmds:
      - echo "🏗️  Starting complete infrastructure setup..."
      - echo ""
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - 'echo "Phase 1: Creating GCP Instances"'
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - task: "create:backend"
      - echo ""
      - task: "redis:create"
      - echo ""
      - task: "create:ws"
      - echo ""
      - task: "create:loadtest"
      - echo ""
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - 'echo "Phase 2: Configuring Firewall Rules"'
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - task: "firewall:backend"
      - echo ""
      - task: "redis:setup-firewall"
      - echo ""
      - task: "firewall:ws"
      - echo ""
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - 'echo "Phase 3: Reserving Static IP"'
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - task: "reserve-ip:ws"
      - echo ""
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo "✅ INFRASTRUCTURE SETUP COMPLETE"
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo ""
      - 'echo "💡 Next steps:"'
      - 'echo "   Complete setup: task gcp:deploy"'
      - 'echo "   Or run individually:"'
      - 'echo "     - task gcp:deployment:setup:backend"'
      - 'echo "     - task gcp:deployment:setup:redis"'
      - 'echo "     - task gcp:deployment:setup:ws"'
      - 'echo "     - task gcp:deployment:setup:loadtest"'

  # === INFRASTRUCTURE SETUP (Individual Tasks) ===

  fix-docker-group:
    desc: Fix docker group for deploy user on existing instances (one-time migration)
    cmds:
      - |
        echo "🔧 Ensuring deploy user has docker group access..."

        # Fix backend instance
        if gcloud compute instances describe {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} 2>/dev/null | grep -q "name:"; then
          echo "📦 Fixing backend..."
          gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} \
            --command="sudo usermod -aG docker deploy 2>/dev/null || true" 2>/dev/null
          echo "✅ Backend docker group updated"
        fi

        # Fix WS instance
        if gcloud compute instances describe {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} 2>/dev/null | grep -q "name:"; then
          echo "📦 Fixing WS server..."
          gcloud compute ssh {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} \
            --command="sudo usermod -aG docker deploy 2>/dev/null || true" 2>/dev/null
          echo "✅ WS server docker group updated"
        fi

        # Fix loadtest instance
        if gcloud compute instances describe {{.LOADTEST_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} 2>/dev/null | grep -q "name:"; then
          echo "📦 Fixing loadtest..."
          gcloud compute ssh {{.LOADTEST_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} \
            --command="sudo usermod -aG docker deploy 2>/dev/null || true" 2>/dev/null
          echo "✅ Loadtest docker group updated"
        fi

        echo "✅ Docker group fix complete - deploy user can now run docker without sudo"

  create:backend:
    desc: Create backend GCP instance (e2-medium) - smart, idempotent
    cmds:
      - |
        echo "🔍 Checking backend instance..."
        if gcloud compute instances describe {{.BACKEND_INSTANCE}} \
          --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} \
          --format="value(status)" 2>/dev/null | grep -q "RUNNING"; then
          echo "✅ Backend already running"
          exit 0
        fi

        if gcloud compute instances describe {{.BACKEND_INSTANCE}} \
          --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} \
          2>/dev/null | grep -q "name:"; then
          echo "⚡ Starting existing instance..."
          gcloud compute instances start {{.BACKEND_INSTANCE}} \
            --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --quiet
        else
          echo "📦 Creating new instance..."
          gcloud compute instances create {{.BACKEND_INSTANCE}} \
            --project={{.GCP_PROJECT}} --zone={{.GCP_ZONE}} \
            --machine-type=e2-medium --image-family=ubuntu-2204-lts \
            --image-project=ubuntu-os-cloud --boot-disk-size=20GB \
            --boot-disk-type=pd-standard --tags=odin-backend --quiet \
            --metadata=startup-script='#!/bin/bash
              apt-get update && apt-get install -y docker.io docker-compose git curl jq
              systemctl enable docker && systemctl start docker
              usermod -aG docker $(whoami)
              id -u deploy &>/dev/null || useradd -m -s /bin/bash deploy
              usermod -aG docker deploy
              echo "* soft nofile 262144" >> /etc/security/limits.conf
              echo "* hard nofile 262144" >> /etc/security/limits.conf
              echo "fs.file-max = 524288" >> /etc/sysctl.conf
              echo "net.ipv4.ip_local_port_range = 1024 65535" >> /etc/sysctl.conf
              echo "net.ipv4.tcp_tw_reuse = 1" >> /etc/sysctl.conf
              echo "net.core.somaxconn = 32768" >> /etc/sysctl.conf
              sysctl -p
              SSH_DIR=/home/deploy/.ssh
              mkdir -p $SSH_DIR && chown deploy:deploy $SSH_DIR && chmod 700 $SSH_DIR
              for i in $(seq 1 30); do
                curl -sf "http://metadata.google.internal/computeMetadata/v1/project/attributes/github-deploy-key" -H "Metadata-Flavor: Google" > $SSH_DIR/github_deploy_key
                if [ -s $SSH_DIR/github_deploy_key ]; then break; fi
                sleep 10
              done
              chmod 600 $SSH_DIR/github_deploy_key && chown deploy:deploy $SSH_DIR/github_deploy_key
              printf "Host github.com\n  HostName github.com\n  User git\n  IdentityFile ~/.ssh/github_deploy_key\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n" > $SSH_DIR/config
              chown deploy:deploy $SSH_DIR/config && chmod 600 $SSH_DIR/config
              echo "Startup completed" > /var/log/startup-complete.log'
        fi

        echo "⏳ Waiting for SSH..."
        for i in {1..30}; do
          if gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} \
            --project={{.GCP_PROJECT}} --command="echo ok" \
            --ssh-flag="-o ConnectTimeout=5" --ssh-flag="-o StrictHostKeyChecking=no" \
            2>/dev/null | grep -q "ok"; then
            echo "✅ SSH ready ($((i*10))s)"
            break
          fi
          sleep 10
        done

        echo "⏳ Waiting for startup script..."
        for i in {1..30}; do
          if gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} \
            --project={{.GCP_PROJECT}} --command="test -f /var/log/startup-complete.log && echo ok" \
            --ssh-flag="-o ConnectTimeout=5" --ssh-flag="-o StrictHostKeyChecking=no" \
            2>/dev/null | grep -q "ok"; then
            echo "✅ Backend ready ($((i*10))s)"
            exit 0
          fi
          sleep 10
        done
        echo "⚠️  Startup timeout (may still be installing)"

  create:ws:
    desc: Create WebSocket server GCP instance (e2-highcpu-8) - smart, idempotent
    cmds:
      - |
        echo "🔍 Checking WS server instance..."
        if gcloud compute instances describe {{.WS_INSTANCE}} \
          --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} \
          --format="value(status)" 2>/dev/null | grep -q "RUNNING"; then
          echo "✅ WS server already running"
          exit 0
        fi

        if gcloud compute instances describe {{.WS_INSTANCE}} \
          --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} \
          2>/dev/null | grep -q "name:"; then
          echo "⚡ Starting existing instance..."
          gcloud compute instances start {{.WS_INSTANCE}} \
            --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --quiet
        else
          echo "📦 Creating new instance..."
          gcloud compute instances create {{.WS_INSTANCE}} \
            --project={{.GCP_PROJECT}} --zone={{.GCP_ZONE}} \
            --machine-type=e2-highcpu-8 --image-family=ubuntu-2204-lts \
            --image-project=ubuntu-os-cloud --boot-disk-size=20GB \
            --boot-disk-type=pd-standard --tags=odin-ws-server --quiet \
            --metadata=startup-script='#!/bin/bash
              apt-get update && apt-get install -y docker.io docker-compose git curl jq
              systemctl enable docker && systemctl start docker
              usermod -aG docker $(whoami)
              id -u deploy &>/dev/null || useradd -m -s /bin/bash deploy
              usermod -aG docker deploy
              echo "* soft nofile 1048576" >> /etc/security/limits.conf
              echo "* hard nofile 1048576" >> /etc/security/limits.conf
              echo "fs.file-max = 2097152" >> /etc/sysctl.conf
              echo "net.ipv4.ip_local_port_range = 1024 65535" >> /etc/sysctl.conf
              echo "net.ipv4.tcp_tw_reuse = 1" >> /etc/sysctl.conf
              echo "net.core.somaxconn = 65535" >> /etc/sysctl.conf
              echo "net.ipv4.tcp_max_syn_backlog = 65535" >> /etc/sysctl.conf
              sysctl -p
              SSH_DIR=/home/deploy/.ssh
              mkdir -p $SSH_DIR && chown deploy:deploy $SSH_DIR && chmod 700 $SSH_DIR
              for i in $(seq 1 30); do
                curl -sf "http://metadata.google.internal/computeMetadata/v1/project/attributes/github-deploy-key" -H "Metadata-Flavor: Google" > $SSH_DIR/github_deploy_key
                if [ -s $SSH_DIR/github_deploy_key ]; then break; fi
                sleep 10
              done
              chmod 600 $SSH_DIR/github_deploy_key && chown deploy:deploy $SSH_DIR/github_deploy_key
              printf "Host github.com\n  HostName github.com\n  User git\n  IdentityFile ~/.ssh/github_deploy_key\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n" > $SSH_DIR/config
              chown deploy:deploy $SSH_DIR/config && chmod 600 $SSH_DIR/config
              echo "Startup completed" > /var/log/startup-complete.log'
        fi

        echo "⏳ Waiting for SSH..."
        for i in {1..30}; do
          if gcloud compute ssh {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} \
            --project={{.GCP_PROJECT}} --command="echo ok" \
            --ssh-flag="-o ConnectTimeout=5" --ssh-flag="-o StrictHostKeyChecking=no" \
            2>/dev/null | grep -q "ok"; then
            echo "✅ SSH ready ($((i*10))s)"
            break
          fi
          sleep 10
        done

        echo "⏳ Waiting for startup script..."
        for i in {1..30}; do
          if gcloud compute ssh {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} \
            --project={{.GCP_PROJECT}} --command="test -f /var/log/startup-complete.log && echo ok" \
            --ssh-flag="-o ConnectTimeout=5" --ssh-flag="-o StrictHostKeyChecking=no" \
            2>/dev/null | grep -q "ok"; then
            echo "✅ WS server ready ($((i*10))s)"
            exit 0
          fi
          sleep 10
        done
        echo "⚠️  Startup timeout (may still be installing)"

  create:loadtest:
    desc: Create load test GCP instance (e2-standard-8) - smart, idempotent
    cmds:
      - |
        echo "🔍 Checking loadtest instance..."
        if gcloud compute instances describe {{.LOADTEST_INSTANCE}} \
          --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} \
          --format="value(status)" 2>/dev/null | grep -q "RUNNING"; then
          echo "✅ Loadtest already running"
          exit 0
        fi

        if gcloud compute instances describe {{.LOADTEST_INSTANCE}} \
          --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} \
          2>/dev/null | grep -q "name:"; then
          echo "⚡ Starting existing instance..."
          gcloud compute instances start {{.LOADTEST_INSTANCE}} \
            --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --quiet
        else
          echo "📦 Creating new instance..."
          gcloud compute instances create {{.LOADTEST_INSTANCE}} \
            --project={{.GCP_PROJECT}} --zone={{.GCP_ZONE}} \
            --machine-type=e2-standard-8 --image-family=ubuntu-2204-lts \
            --image-project=ubuntu-os-cloud --boot-disk-size=30GB \
            --boot-disk-type=pd-standard --tags=odin-loadtest --quiet \
            --metadata=startup-script='#!/bin/bash
              apt-get update && apt-get install -y docker.io docker-compose git curl jq
              systemctl enable docker && systemctl start docker
              usermod -aG docker $(whoami)
              id -u deploy &>/dev/null || useradd -m -s /bin/bash deploy
              usermod -aG docker deploy
              echo "* soft nofile 1048576" >> /etc/security/limits.conf
              echo "* hard nofile 1048576" >> /etc/security/limits.conf
              echo "fs.file-max = 2097152" >> /etc/sysctl.conf
              echo "net.ipv4.ip_local_port_range = 1024 65535" >> /etc/sysctl.conf
              echo "net.ipv4.tcp_tw_reuse = 1" >> /etc/sysctl.conf
              echo "net.core.somaxconn = 65535" >> /etc/sysctl.conf
              echo "net.ipv4.tcp_max_syn_backlog = 65535" >> /etc/sysctl.conf
              sysctl -p
              SSH_DIR=/home/deploy/.ssh
              mkdir -p $SSH_DIR && chown deploy:deploy $SSH_DIR && chmod 700 $SSH_DIR
              for i in $(seq 1 30); do
                curl -sf "http://metadata.google.internal/computeMetadata/v1/project/attributes/github-deploy-key" -H "Metadata-Flavor: Google" > $SSH_DIR/github_deploy_key
                if [ -s $SSH_DIR/github_deploy_key ]; then break; fi
                sleep 10
              done
              chmod 600 $SSH_DIR/github_deploy_key && chown deploy:deploy $SSH_DIR/github_deploy_key
              printf "Host github.com\n  HostName github.com\n  User git\n  IdentityFile ~/.ssh/github_deploy_key\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n" > $SSH_DIR/config
              chown deploy:deploy $SSH_DIR/config && chmod 600 $SSH_DIR/config
              echo "Startup completed" > /var/log/startup-complete.log'
        fi

        echo "⏳ Waiting for SSH..."
        for i in {1..30}; do
          if gcloud compute ssh {{.LOADTEST_INSTANCE}} --zone={{.GCP_ZONE}} \
            --project={{.GCP_PROJECT}} --command="echo ok" \
            --ssh-flag="-o ConnectTimeout=5" --ssh-flag="-o StrictHostKeyChecking=no" \
            2>/dev/null | grep -q "ok"; then
            echo "✅ SSH ready ($((i*10))s)"
            break
          fi
          sleep 10
        done

        echo "⏳ Waiting for startup script..."
        for i in {1..30}; do
          if gcloud compute ssh {{.LOADTEST_INSTANCE}} --zone={{.GCP_ZONE}} \
            --project={{.GCP_PROJECT}} --command="test -f /var/log/startup-complete.log && echo ok" \
            --ssh-flag="-o ConnectTimeout=5" --ssh-flag="-o StrictHostKeyChecking=no" \
            2>/dev/null | grep -q "ok"; then
            echo "✅ Loadtest ready ($((i*10))s)"
            exit 0
          fi
          sleep 10
        done
        echo "⚠️  Startup timeout (may still be installing)"

  # === DELETE INSTANCES ===

  delete:backend:
    desc: Delete backend GCP instance (saves costs)
    cmds:
      - echo "Deleting backend instance..."
      - echo "WARNING - This will permanently delete the instance and all data!"
      - echo ""
      - |
        read -p "Type 'yes' to confirm deletion: " CONFIRM
        if [ "$CONFIRM" = "yes" ]; then
          gcloud compute instances delete {{.BACKEND_INSTANCE}} \
            --zone={{.GCP_ZONE}} \
            --project={{.GCP_PROJECT}} \
            --quiet
          echo "Backend instance deleted"
        else
          echo "Deletion cancelled"
        fi

  delete:ws:
    desc: Delete WebSocket server GCP instance (saves costs)
    cmds:
      - echo "Deleting WebSocket server instance..."
      - echo "WARNING - This will permanently delete the instance and all data!"
      - echo ""
      - |
        read -p "Type 'yes' to confirm deletion: " CONFIRM
        if [ "$CONFIRM" = "yes" ]; then
          gcloud compute instances delete {{.WS_INSTANCE}} \
            --zone={{.GCP_ZONE}} \
            --project={{.GCP_PROJECT}} \
            --quiet
          echo "WebSocket server instance deleted"
        else
          echo "Deletion cancelled"
        fi

  delete:loadtest:
    desc: Delete load test GCP instance (saves costs when not testing)
    cmds:
      - echo "Deleting load test instance..."
      - echo "WARNING - This will permanently delete the instance and all data!"
      - echo ""
      - |
        read -p "Type 'yes' to confirm deletion: " CONFIRM
        if [ "$CONFIRM" = "yes" ]; then
          gcloud compute instances delete {{.LOADTEST_INSTANCE}} \
            --zone={{.GCP_ZONE}} \
            --project={{.GCP_PROJECT}} \
            --quiet
          echo "Load test instance deleted"
          echo ""
          echo "Recreate when needed - task gcp:deployment:create:loadtest"
        else
          echo "Deletion cancelled"
        fi

  delete:all:
    desc: Delete ALL GCP instances (DESTRUCTIVE - saves maximum costs)
    cmds:
      - echo "Deleting ALL GCP instances..."
      - echo ""
      - 'echo "WARNING - This will delete ALL instances:"'
      - 'echo "   - {{.BACKEND_INSTANCE}} (backend)"'
      - 'echo "   - {{.WS_INSTANCE}} (WebSocket server)"'
      - 'echo "   - {{.LOADTEST_INSTANCE}} (load test)"'
      - 'echo "   - ws-redis (Redis)"'
      - echo ""
      - echo "All data will be permanently lost!"
      - echo ""
      - |
        read -p "Type 'DELETE-ALL' to confirm: " CONFIRM
        if [ "$CONFIRM" = "DELETE-ALL" ]; then
          echo ""
          echo "Deleting instances..."
          gcloud compute instances delete {{.BACKEND_INSTANCE}} {{.WS_INSTANCE}} {{.LOADTEST_INSTANCE}} ws-redis \
            --zone={{.GCP_ZONE}} \
            --project={{.GCP_PROJECT}} \
            --quiet
          echo ""
          echo "All instances deleted"
          echo ""
          echo "Recreate infrastructure with - task gcp:deployment:infrastructure"
        else
          echo "Deletion cancelled"
        fi

  # === FIREWALL RULES ===

  firewall:backend:
    desc: Create backend firewall rules
    cmds:
      - echo "🔥 Creating backend firewall rules..."
      - |
        # Grafana (public access for management)
        gcloud compute firewall-rules create odin-backend-grafana \
          --project={{.GCP_PROJECT}} \
          --direction=INGRESS \
          --priority=1000 \
          --network=default \
          --action=ALLOW \
          --rules=tcp:3010 \
          --source-ranges=0.0.0.0/0 \
          --target-tags=odin-backend \
          2>/dev/null || echo "⚠️  Grafana firewall rule already exists"

        # Redpanda Console (public access for management)
        gcloud compute firewall-rules create odin-backend-console \
          --project={{.GCP_PROJECT}} \
          --direction=INGRESS \
          --priority=1000 \
          --network=default \
          --action=ALLOW \
          --rules=tcp:8080 \
          --source-ranges=0.0.0.0/0 \
          --target-tags=odin-backend \
          2>/dev/null || echo "⚠️  Console firewall rule already exists"

        # Kafka (internal access from WS server)
        gcloud compute firewall-rules create odin-backend-kafka \
          --project={{.GCP_PROJECT}} \
          --direction=INGRESS \
          --priority=1000 \
          --network=default \
          --action=ALLOW \
          --rules=tcp:9092 \
          --source-tags=odin-ws-server \
          --target-tags=odin-backend \
          2>/dev/null || echo "⚠️  Kafka firewall rule already exists"

        # Loki (internal access from WS server)
        gcloud compute firewall-rules create odin-backend-loki \
          --project={{.GCP_PROJECT}} \
          --direction=INGRESS \
          --priority=1000 \
          --network=default \
          --action=ALLOW \
          --rules=tcp:3100 \
          --source-tags=odin-ws-server \
          --target-tags=odin-backend \
          2>/dev/null || echo "⚠️  Loki firewall rule already exists"
      - echo "✅ Backend firewall rules created"

  firewall:ws:
    desc: Create WebSocket server firewall rules
    cmds:
      - echo "🔥 Creating WebSocket server firewall rules..."
      - |
        # WebSocket + Health endpoint (public access)
        gcloud compute firewall-rules create odin-ws-server-public \
          --project={{.GCP_PROJECT}} \
          --direction=INGRESS \
          --priority=1000 \
          --network=default \
          --action=ALLOW \
          --rules=tcp:3004 \
          --source-ranges=0.0.0.0/0 \
          --target-tags=odin-ws-server \
          2>/dev/null || echo "⚠️  WebSocket firewall rule already exists"
      - echo "✅ WebSocket server firewall rules created"

  # === STATIC IP ===

  reserve-ip:ws:
    desc: Reserve static IP for WebSocket server
    cmds:
      - echo "📍 Reserving static IP for WebSocket server..."
      - |
        gcloud compute addresses create {{.WS_INSTANCE}}-static-ip \
          --region={{.GCP_REGION}} \
          --project={{.GCP_PROJECT}} \
          2>/dev/null || echo "⚠️  Static IP already exists"
      - |
        STATIC_IP=$(gcloud compute addresses describe {{.WS_INSTANCE}}-static-ip \
          --region={{.GCP_REGION}} \
          --project={{.GCP_PROJECT}} \
          --format='get(address)')
        echo "Static IP: $STATIC_IP"
      - |
        # Remove existing access config
        gcloud compute instances delete-access-config {{.WS_INSTANCE}} \
          --access-config-name="external-nat" \
          --zone={{.GCP_ZONE}} \
          --project={{.GCP_PROJECT}} \
          2>/dev/null || true
      - |
        # Assign static IP
        STATIC_IP=$(gcloud compute addresses describe {{.WS_INSTANCE}}-static-ip \
          --region={{.GCP_REGION}} \
          --project={{.GCP_PROJECT}} \
          --format='get(address)')
        gcloud compute instances add-access-config {{.WS_INSTANCE}} \
          --access-config-name="external-nat" \
          --address=$STATIC_IP \
          --zone={{.GCP_ZONE}} \
          --project={{.GCP_PROJECT}}
      - echo "✅ Static IP assigned"

  # === APPLICATION SETUP ===

  setup:backend:
    desc: Automated backend setup (SSH key auth, idempotent)
    cmds:
      - |
        echo "🤖 Automated Backend Setup"
        echo "🔐 Using SSH authentication"

        # Wait for SSH key to be ready (startup script may still be running)
        echo "⏳ Waiting for SSH key to be ready..."
        for i in {1..30}; do
          READY=$(gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} \
            --command="sudo test -f /home/deploy/.ssh/github_deploy_key && echo ready" \
            --ssh-flag="-o ConnectTimeout=5" 2>/dev/null || echo "")
          if [ "$READY" = "ready" ]; then
            echo "✅ SSH key ready"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "❌ Timeout waiting for SSH key"
            exit 1
          fi
          echo "   Waiting... ($((i*10))s)"
          sleep 10
        done

        # Test GitHub connectivity
        echo "🔗 Testing GitHub connectivity..."
        GH_TEST=$(gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} \
          --command="sudo -i -u deploy ssh -T git@github.com 2>&1 | grep -q 'successfully authenticated' && echo ok || echo fail" 2>/dev/null || echo "fail")
        if [ "$GH_TEST" != "ok" ]; then
          echo "⚠️  GitHub SSH test inconclusive, proceeding anyway..."
        fi

        # Check if repo exists
        REPO_EXISTS=$(gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy test -d /home/deploy/ws_poc && echo true || echo false" 2>/dev/null || echo "false")

        if [ "$REPO_EXISTS" = "true" ]; then
          echo "✅ Repository exists, updating..."
          gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy bash -c 'cd /home/deploy/ws_poc && git fetch origin {{.GIT_BRANCH}} 2>&1 | grep -v From && git reset --hard origin/{{.GIT_BRANCH}} 2>&1 | head -1'" 2>/dev/null
        else
          echo "📦 Cloning repository..."
          gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy git clone -b {{.GIT_BRANCH}} -q {{.GIT_REPO_SSH}} /home/deploy/ws_poc" 2>&1 | grep -v "Cloning" | grep -v "remote" || true
        fi

        # Get backend internal IP
        BACKEND_IP=$(gcloud compute instances describe {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --format='get(networkInterfaces[0].networkIP)')
        echo "📍 Backend internal IP: $BACKEND_IP"

        # Get WS server internal IP for Prometheus scrape configuration
        WS_IP=$(gcloud compute instances describe {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --format='get(networkInterfaces[0].networkIP)')
        echo "📍 WS server internal IP: $WS_IP"

        # Get Redis internal IP for Prometheus scrape configuration
        REDIS_IP=$(gcloud compute instances describe ws-redis --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --format='get(networkInterfaces[0].networkIP)' 2>/dev/null || echo "")
        echo "📍 Redis internal IP: ${REDIS_IP:-not found}"

        # Create .env file with BACKEND_INTERNAL_IP for docker-compose
        echo "📝 Creating .env file for docker-compose..."
        gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy bash -c 'echo \"BACKEND_INTERNAL_IP=$BACKEND_IP\" > /home/deploy/ws_poc/deployments/v1/gcp/distributed/backend/.env'" 2>/dev/null

        # Substitute WS_GO_INTERNAL_IP and REDIS_INTERNAL_IP in prometheus.yml before starting services
        echo "📝 Configuring Prometheus scrape targets..."
        gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy bash -c 'cd /home/deploy/ws_poc/deployments/v1/gcp/distributed/backend && sed -i.bak \"s/\\\${WS_GO_INTERNAL_IP}/$WS_IP/g; s/\\\${REDIS_INTERNAL_IP}/$REDIS_IP/g\" prometheus.yml && echo \"✅ Prometheus config updated: WS at $WS_IP:3004, Redis at $REDIS_IP:9121\"'" 2>/dev/null

        echo "🐳 Starting Docker services..."
        gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy bash -c 'cd /home/deploy/ws_poc/deployments/v1/gcp/distributed/backend && docker-compose up -d 2>&1 | grep -E \"(Created|Started|Running)\"'" 2>/dev/null || true
        sleep 15

        # Create topics if needed
        TOPICS=$(gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy docker exec redpanda rpk topic list 2>/dev/null | grep -q odin.trades && echo exists || echo missing" 2>/dev/null || echo "missing")

        if [ "$TOPICS" = "missing" ]; then
          echo "📋 Creating Kafka topics..."
          gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy docker exec redpanda rpk topic create odin.trades odin.liquidity odin.balances odin.metadata odin.social odin.community odin.creation odin.analytics --partitions 12 --replicas 1 2>&1 | grep TOPIC" 2>/dev/null || echo "⚠️  Failed to create topics"
        else
          echo "✅ Topics already exist"
        fi

        echo "✅ Backend setup complete"

  setup:ws:
    desc: Automated WS setup (SSH key auth, idempotent)
    cmds:
      - |
        echo "🤖 Automated WebSocket Server Setup"
        echo "🔐 Using SSH authentication"

        # Wait for SSH key to be ready (startup script may still be running)
        echo "⏳ Waiting for SSH key to be ready..."
        for i in {1..30}; do
          READY=$(gcloud compute ssh {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} \
            --command="sudo test -f /home/deploy/.ssh/github_deploy_key && echo ready" \
            --ssh-flag="-o ConnectTimeout=5" 2>/dev/null || echo "")
          if [ "$READY" = "ready" ]; then
            echo "✅ SSH key ready"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "❌ Timeout waiting for SSH key"
            exit 1
          fi
          echo "   Waiting... ($((i*10))s)"
          sleep 10
        done

        # Get internal IPs
        BACKEND_IP=$(gcloud compute instances describe {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --format='get(networkInterfaces[0].networkIP)')
        REDIS_IP=$(gcloud compute instances describe ws-redis --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --format='get(networkInterfaces[0].networkIP)' 2>/dev/null || echo "")

        echo "📍 Backend IP: $BACKEND_IP"
        echo "📍 Redis IP: $REDIS_IP"

        if [ -z "$REDIS_IP" ]; then
          echo "⚠️  Redis VM not found - WS server will start without Redis BroadcastBus"
        fi

        # Check if repo exists
        REPO_EXISTS=$(gcloud compute ssh {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy test -d /home/deploy/ws_poc && echo true || echo false" 2>/dev/null || echo "false")

        if [ "$REPO_EXISTS" = "true" ]; then
          echo "✅ Repository exists, updating..."
          gcloud compute ssh {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy bash -c 'cd /home/deploy/ws_poc && git fetch origin {{.GIT_BRANCH}} 2>&1 | grep -v From && git reset --hard origin/{{.GIT_BRANCH}} 2>&1 | head -1'" 2>/dev/null
        else
          echo "📦 Cloning repository..."
          gcloud compute ssh {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy git clone -b {{.GIT_BRANCH}} -q {{.GIT_REPO_SSH}} /home/deploy/ws_poc" 2>&1 | grep -v "Cloning" | grep -v "remote" || true
        fi

        # Fetch Redis password from Redis VM
        REDIS_PASSWORD=""
        if [ -n "$REDIS_IP" ]; then
          echo "🔐 Fetching Redis password from ws-redis..."
          REDIS_PASSWORD=$(gcloud compute ssh ws-redis --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy bash -c 'grep \"^REDIS_PASSWORD=\" /home/deploy/ws_poc/deployments/v1/gcp/distributed/redis/.env 2>/dev/null | cut -d= -f2'" 2>/dev/null || echo "")
          if [ -n "$REDIS_PASSWORD" ]; then
            echo "✅ Got Redis password from ws-redis"
          else
            echo "⚠️  Could not fetch Redis password - using placeholder"
            REDIS_PASSWORD="CHANGEME_GENERATE_STRONG_PASSWORD"
          fi
        fi

        echo "⚙️  Creating environment files..."

        # Create complete .env.production with all required variables
        gcloud compute ssh {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy bash -c 'cd /home/deploy/ws_poc/deployments/v1/gcp/distributed/ws-server && printf \"WS_MODE=multi\nBACKEND_INTERNAL_IP=$BACKEND_IP\nKAFKA_BROKERS=$BACKEND_IP:9092\nREDIS_SENTINEL_ADDRS=$REDIS_IP:6379\nREDIS_PASSWORD=$REDIS_PASSWORD\n\" > .env.production && chmod 600 .env.production'" 2>/dev/null

        # Create empty .env.debug (required by docker-compose.multi.yml)
        gcloud compute ssh {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy bash -c 'touch /home/deploy/ws_poc/deployments/v1/gcp/distributed/ws-server/.env.debug'" 2>/dev/null

        echo "✅ Environment files created"

        echo "🐳 Starting Docker services..."
        gcloud compute ssh {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy bash -c 'cd /home/deploy/ws_poc/deployments/v1/gcp/distributed/ws-server && docker-compose -f docker-compose.multi.yml up -d 2>&1'" 2>/dev/null || true

        echo "⏳ Waiting for containers to start (20s)..."
        sleep 20

        # Verify health
        WS_EXTERNAL_IP=$(gcloud compute instances describe {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --format='get(networkInterfaces[0].accessConfigs[0].natIP)')
        HEALTH=$(curl -sf "http://$WS_EXTERNAL_IP:3004/health" 2>/dev/null | head -c 100 || echo "")

        if echo "$HEALTH" | grep -q "healthy"; then
          echo "✅ WS server setup complete and healthy"
        else
          echo "⚠️  WS server started but health check pending"
          echo "   Check logs: task gcp:logs:ws"
        fi

  setup:loadtest:
    desc: Automated loadtest setup (SSH key auth, idempotent)
    cmds:
      - |
        echo "🤖 Automated Load Test Setup"
        echo "🔐 Using SSH authentication"

        # Wait for SSH key to be ready (startup script may still be running)
        echo "⏳ Waiting for SSH key to be ready..."
        for i in {1..30}; do
          READY=$(gcloud compute ssh {{.LOADTEST_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} \
            --command="sudo test -f /home/deploy/.ssh/github_deploy_key && echo ready" \
            --ssh-flag="-o ConnectTimeout=5" 2>/dev/null || echo "")
          if [ "$READY" = "ready" ]; then
            echo "✅ SSH key ready"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "❌ Timeout waiting for SSH key"
            exit 1
          fi
          echo "   Waiting... ($((i*10))s)"
          sleep 10
        done

        # Check if repo exists
        REPO_EXISTS=$(gcloud compute ssh {{.LOADTEST_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy test -d /home/deploy/ws_poc && echo true || echo false" 2>/dev/null || echo "false")

        if [ "$REPO_EXISTS" = "true" ]; then
          echo "✅ Repository exists, updating..."
          gcloud compute ssh {{.LOADTEST_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy bash -c 'cd /home/deploy/ws_poc && git fetch origin {{.GIT_BRANCH}} 2>&1 | grep -v From && git reset --hard origin/{{.GIT_BRANCH}} 2>&1 | head -1'" 2>/dev/null
        else
          echo "📦 Cloning repository..."
          gcloud compute ssh {{.LOADTEST_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy git clone -b {{.GIT_BRANCH}} -q {{.GIT_REPO_SSH}} /home/deploy/ws_poc" 2>&1 | grep -v "Cloning" | grep -v "remote" || true
        fi

        # Build Docker image (deploy user in docker group, no sudo needed)
        echo "🐳 Building Docker image..."
        gcloud compute ssh {{.LOADTEST_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy docker build -t loadtest /home/deploy/ws_poc/loadtest 2>&1 | tail -10" 2>/dev/null || true

        # Verify image was built
        IMAGE_EXISTS=$(gcloud compute ssh {{.LOADTEST_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="sudo -i -u deploy docker images -q loadtest 2>/dev/null" 2>/dev/null)

        if [ -n "$IMAGE_EXISTS" ]; then
          echo "✅ Load test Docker image ready"
        else
          echo "❌ Failed to build Docker image"
          exit 1
        fi

        echo "✅ Load test setup complete"

  # === CODE UPDATES / REBUILDS ===

  rebuild:backend:
    desc: Rebuild backend with latest code
    cmds:
      - echo "🔄 Rebuilding backend code..."
      - |
        gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="\
          sudo su - deploy -c '\
            cd ws_poc && \
            git pull origin {{.GIT_BRANCH}} && \
            cd deployments/v1/gcp/distributed/backend && \
            docker-compose build && \
            docker-compose up -d && \
            sleep 10 && \
            curl -sf http://localhost:3003/status'"
      - echo "✅ Backend rebuilt"
      - task: :gcp:health:backend

  rebuild:ws:
    desc: Rebuild WebSocket server with latest code (mode-aware)
    cmds:
      - echo "🔄 Rebuilding WebSocket server code..."
      - |
        BACKEND_IP=$(gcloud compute instances describe {{.BACKEND_INSTANCE}} \
          --zone={{.GCP_ZONE}} \
          --project={{.GCP_PROJECT}} \
          --format='get(networkInterfaces[0].networkIP)')

        gcloud compute ssh {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}} --command="\
          sudo su - deploy -c '\
            cd ws_poc && \
            git pull origin {{.GIT_BRANCH}} && \
            cd deployments/v1/gcp/distributed/ws-server && \
            source .env.production && \
            export BACKEND_INTERNAL_IP=$BACKEND_IP && \
            COMPOSE_FILE=\$([ \"\$WS_MODE\" = \"multi\" ] && echo \"docker-compose.multi.yml\" || echo \"docker-compose.yml\") && \
            echo \"Mode: \$WS_MODE, Rebuilding with: \$COMPOSE_FILE\" && \
            docker-compose -f \$COMPOSE_FILE build && \
            docker-compose -f \$COMPOSE_FILE up -d && \
            sleep 10 && \
            curl -sf http://localhost:3004/health'"
      - echo "✅ WebSocket server rebuilt"
      - task: :gcp:health:ws

  rebuild:all:
    desc: Rebuild all services with latest code
    cmds:
      - task: "rebuild:backend"
      - task: "rebuild:ws"
      - echo ""
      - echo "✅ All services rebuilt"

  # Legacy aliases (for backwards compatibility)
  update:backend:
    desc: (Deprecated - use rebuild:backend)
    cmds:
      - task: "rebuild:backend"

  update:ws:
    desc: (Deprecated - use rebuild:ws)
    cmds:
      - task: "rebuild:ws"

  update:all:
    desc: (Deprecated - use rebuild:all)
    cmds:
      - task: "rebuild:all"

  # === SSH ACCESS ===

  ssh:backend:
    desc: SSH into backend instance
    cmds:
      - gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}}

  ssh:ws:
    desc: SSH into WebSocket server instance
    cmds:
      - gcloud compute ssh {{.WS_INSTANCE}} --zone={{.GCP_ZONE}} --project={{.GCP_PROJECT}}
