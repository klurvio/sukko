version: "3"

# =============================================================================
# GCP Deployment Tasks (v1)
# =============================================================================
# Purpose: Orchestrate GCP distributed deployment (Kafka/Redpanda)
# Architecture: Two instances (backend + ws-server) with shared configuration
#
# Usage:
#   task gcp:COMMAND         - Run GCP task
#   task gcp:deploy:backend  - Deploy backend services
#   task gcp:deploy:ws       - Deploy WebSocket server
#   task gcp:health          - Check all services health
#   task gcp:stats:urls      - Show service URLs
#
# Configuration:
#   - GCP_PROJECT: Google Cloud project ID
#   - GCP_REGION: Deployment region (default: us-central1)
#   - GCP_ZONE: Deployment zone (default: us-central1-a)
#   - BACKEND_INSTANCE: Backend instance name (default: odin-backend)
#   - WS_INSTANCE: WebSocket server instance name (default: odin-ws-go)

vars:
  # GCP Configuration
  GCP_PROJECT: '{{.GCP_PROJECT | default "odin-ws-server"}}'
  GCP_REGION: '{{.GCP_REGION | default "us-central1"}}'
  GCP_ZONE: '{{.GCP_ZONE | default "us-central1-a"}}'

  # Instance Names
  BACKEND_INSTANCE: '{{.BACKEND_INSTANCE | default "odin-backend"}}'
  WS_INSTANCE: '{{.WS_INSTANCE | default "odin-ws-go"}}'
  LOADTEST_INSTANCE: '{{.LOADTEST_INSTANCE | default "odin-loadtest"}}'

  # Git Configuration
  GIT_BRANCH: '{{.GIT_BRANCH | default "feature/cpu-optimization-backpressure"}}'
  GIT_REPO_SSH: '{{.GIT_REPO_SSH | default "git@github.com:Toniq-Labs/odin-ws.git"}}'

  # Deployment Paths
  BACKEND_DEPLOY_PATH: "{{.USER_WORKING_DIR}}/deployments/v1/gcp/distributed/backend"
  WS_DEPLOY_PATH: "{{.USER_WORKING_DIR}}/deployments/v1/gcp/distributed/ws-server"

includes:
  utilities:
    taskfile: ./utilities.yml
    vars:
      GCP_PROJECT: "{{.GCP_PROJECT}}"
      GCP_REGION: "{{.GCP_REGION}}"
      GCP_ZONE: "{{.GCP_ZONE}}"
      BACKEND_INSTANCE: "{{.BACKEND_INSTANCE}}"
      WS_INSTANCE: "{{.WS_INSTANCE}}"
      LOADTEST_INSTANCE: "{{.LOADTEST_INSTANCE}}"

  services:
    taskfile: ./services.yml
    vars:
      GCP_PROJECT: "{{.GCP_PROJECT}}"
      GCP_REGION: "{{.GCP_REGION}}"
      GCP_ZONE: "{{.GCP_ZONE}}"
      BACKEND_INSTANCE: "{{.BACKEND_INSTANCE}}"
      WS_INSTANCE: "{{.WS_INSTANCE}}"
      GIT_BRANCH: "{{.GIT_BRANCH}}"
      GIT_REPO_SSH: "{{.GIT_REPO_SSH}}"
      BACKEND_DEPLOY_PATH: "{{.BACKEND_DEPLOY_PATH}}"
      WS_DEPLOY_PATH: "{{.WS_DEPLOY_PATH}}"

  deployment:
    taskfile: ./deployment.yml
    vars:
      GCP_PROJECT: "{{.GCP_PROJECT}}"
      GCP_REGION: "{{.GCP_REGION}}"
      GCP_ZONE: "{{.GCP_ZONE}}"
      BACKEND_INSTANCE: "{{.BACKEND_INSTANCE}}"
      WS_INSTANCE: "{{.WS_INSTANCE}}"
      LOADTEST_INSTANCE: "{{.LOADTEST_INSTANCE}}"
      GIT_BRANCH: "{{.GIT_BRANCH}}"
      GIT_REPO_SSH: "{{.GIT_REPO_SSH}}"
      BACKEND_DEPLOY_PATH: "{{.BACKEND_DEPLOY_PATH}}"
      WS_DEPLOY_PATH: "{{.WS_DEPLOY_PATH}}"

  health:
    taskfile: ./health.yml
    vars:
      GCP_PROJECT: "{{.GCP_PROJECT}}"
      GCP_ZONE: "{{.GCP_ZONE}}"
      BACKEND_INSTANCE: "{{.BACKEND_INSTANCE}}"
      WS_INSTANCE: "{{.WS_INSTANCE}}"

  stats:
    taskfile: ./stats.yml
    vars:
      GCP_PROJECT: "{{.GCP_PROJECT}}"
      GCP_ZONE: "{{.GCP_ZONE}}"
      BACKEND_INSTANCE: "{{.BACKEND_INSTANCE}}"
      WS_INSTANCE: "{{.WS_INSTANCE}}"

  load-test:
    taskfile: ./load-test.yml
    vars:
      GCP_PROJECT: "{{.GCP_PROJECT}}"
      GCP_ZONE: "{{.GCP_ZONE}}"
      WS_INSTANCE: "{{.WS_INSTANCE}}"
      LOADTEST_INSTANCE: "{{.LOADTEST_INSTANCE}}"
      GIT_BRANCH: "{{.GIT_BRANCH}}"
      GIT_REPO_SSH: "{{.GIT_REPO_SSH}}"

  redis:
    taskfile: ./redis.yml
    vars:
      GCP_PROJECT: "{{.GCP_PROJECT}}"
      GCP_ZONE: "{{.GCP_ZONE}}"
      GIT_BRANCH: "{{.GIT_BRANCH}}"
      GIT_REPO_SSH: "{{.GIT_REPO_SSH}}"

tasks:
  default:
    desc: Show available GCP tasks
    cmds:
      - task --list
    silent: true

  # === HIGH-LEVEL CONVENIENCE TASKS ===

  up:
    desc: Start all GCP services (quick start)
    cmds:
      - task: deployment:quick-start

  down:
    desc: Stop all GCP services
    cmds:
      - task: deployment:stop

  restart:
    desc: Restart all GCP services
    cmds:
      - task: services:restart:all
      - echo ""
      - echo "⏳ Waiting for services to be ready..."
      - sleep 15
      - echo ""
      - task: health:all
      - echo ""
      - echo "✅ All services restarted"

  status:
    desc: Show GCP deployment status
    cmds:
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo "📊 GCP DEPLOYMENT STATUS"
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo ""
      - task: health:all
      - echo ""
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo ""
      - task: stats:urls
      - echo ""
      - task: services:ps

  verify:
    desc: Verify GCP deployment health
    cmds:
      - echo "🏥 Verifying GCP deployment health..."
      - echo ""
      - task: health:all
      - echo ""
      - echo "✅ Health verification complete"

  deploy:
    desc: Complete GCP deployment from scratch
    cmds:
      - task: deployment:setup
      - echo ""
      - echo "⏳ Waiting for services to fully start (30 seconds)..."
      - sleep 30
      - echo ""
      - task: health:all
      - echo ""
      - task: stats:urls

  delete:
    desc: Delete ALL GCP instances (DESTRUCTIVE - saves maximum costs)
    cmds:
      - task: deployment:delete:all

  urls:
    desc: Show GCP service URLs
    cmds:
      - task: stats:urls

  # === SSH DEPLOY KEY MANAGEMENT ===

  ssh-key:setup:
    desc: Upload SSH deploy key to GCP project metadata
    cmds:
      - |
        echo "=== SSH Deploy Key Setup ==="
        KEY_FILE="${SSH_KEY_FILE:-$HOME/.ssh/id_ed25519}"
        if [ ! -f "$KEY_FILE" ]; then
          echo "❌ Key file not found: $KEY_FILE"
          echo "Set SSH_KEY_FILE to specify a different key"
          exit 1
        fi
        echo "Using key: $KEY_FILE"
        echo "Uploading to GCP project metadata..."
        gcloud compute project-info add-metadata \
          --project={{.GCP_PROJECT}} \
          --metadata-from-file=github-deploy-key=$KEY_FILE
        echo "✅ SSH deploy key uploaded!"

  ssh-key:verify:
    desc: Verify SSH deploy key is configured in GCP
    cmds:
      - |
        echo "Checking GCP project metadata..."
        KEY_DATA=$(gcloud compute project-info describe --project={{.GCP_PROJECT}} \
          --format="value(commonInstanceMetadata.items[github-deploy-key])" 2>/dev/null | head -c 50)
        if [ -n "$KEY_DATA" ]; then
          echo "$KEY_DATA..."
          echo ""
          echo "✅ SSH deploy key found in project metadata"
        else
          echo "❌ SSH deploy key NOT found"
          echo "Run: task gcp:ssh-key:setup"
        fi
