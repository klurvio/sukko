version: "3"

# Valkey Infrastructure Management Tasks
# Supports: Single node, Sentinel cluster, monitoring, debugging

vars:
  VALKEY_VM_NAME: ws-valkey
  VALKEY_ZONE: us-central1-a
  VALKEY_MACHINE_TYPE: e2-standard-2
  VALKEY_DISK_SIZE: 50GB
  VALKEY_DISK_TYPE: pd-ssd
  VALKEY_DEPLOY_PATH: /home/deploy/odin-ws/deployments/v1/gcp/distributed/valkey
  # Git config (inherited from parent or use defaults)
  GIT_BRANCH: '{{.GIT_BRANCH | default "feature/kubernetes-helm-deployment"}}'
  GIT_REPO_SSH: '{{.GIT_REPO_SSH | default "git@github.com:Toniq-Labs/odin-ws.git"}}'

tasks:
  # ==================== DEPLOYMENT ====================

  create:
    desc: Create Valkey VM on GCP
    cmds:
      - |
        echo "🔍 Checking Valkey instance..."
        if gcloud compute instances describe {{.VALKEY_VM_NAME}} \
          --zone={{.VALKEY_ZONE}} \
          --format="value(status)" 2>/dev/null | grep -q "RUNNING"; then
          echo "✅ Valkey VM already running"
          echo "Internal IP:"
          gcloud compute instances describe {{.VALKEY_VM_NAME}} \
            --zone={{.VALKEY_ZONE}} \
            --format='get(networkInterfaces[0].networkIP)'
          exit 0
        fi

        if gcloud compute instances describe {{.VALKEY_VM_NAME}} \
          --zone={{.VALKEY_ZONE}} 2>/dev/null | grep -q "name:"; then
          echo "⚡ Starting existing Valkey instance..."
          gcloud compute instances start {{.VALKEY_VM_NAME}} \
            --zone={{.VALKEY_ZONE}} --quiet
        else
          echo "📦 Creating new Valkey VM: {{.VALKEY_VM_NAME}}"
          gcloud compute instances create {{.VALKEY_VM_NAME}} \
            --zone={{.VALKEY_ZONE}} \
            --machine-type={{.VALKEY_MACHINE_TYPE}} \
            --boot-disk-size={{.VALKEY_DISK_SIZE}} \
            --boot-disk-type={{.VALKEY_DISK_TYPE}} \
            --image-family=ubuntu-2204-lts \
            --image-project=ubuntu-os-cloud \
            --tags=valkey-server \
            --metadata=startup-script='#!/bin/bash
              apt-get update
              apt-get install -y docker.io docker-compose git curl
              systemctl enable docker
              systemctl start docker
              usermod -aG docker $(whoami)
              id -u deploy &>/dev/null || useradd -m -s /bin/bash deploy
              usermod -aG docker deploy
              SSH_DIR=/home/deploy/.ssh
              mkdir -p $SSH_DIR && chown deploy:deploy $SSH_DIR && chmod 700 $SSH_DIR
              for i in $(seq 1 30); do
                curl -sf "http://metadata.google.internal/computeMetadata/v1/project/attributes/github-deploy-key" -H "Metadata-Flavor: Google" > $SSH_DIR/github_deploy_key
                if [ -s $SSH_DIR/github_deploy_key ]; then break; fi
                sleep 10
              done
              chmod 600 $SSH_DIR/github_deploy_key && chown deploy:deploy $SSH_DIR/github_deploy_key
              printf "Host github.com\n  HostName github.com\n  User git\n  IdentityFile ~/.ssh/github_deploy_key\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n" > $SSH_DIR/config
              chown deploy:deploy $SSH_DIR/config && chmod 600 $SSH_DIR/config
            '
        fi

        echo "⏳ Waiting for SSH..."
        for i in {1..30}; do
          if gcloud compute ssh {{.VALKEY_VM_NAME}} --zone={{.VALKEY_ZONE}} \
            --command="echo ok" \
            --ssh-flag="-o ConnectTimeout=5" --ssh-flag="-o StrictHostKeyChecking=no" \
            2>/dev/null | grep -q "ok"; then
            echo "✅ Valkey VM ready"
            break
          fi
          sleep 10
        done

        echo "Internal IP:"
        gcloud compute instances describe {{.VALKEY_VM_NAME}} \
          --zone={{.VALKEY_ZONE}} \
          --format='get(networkInterfaces[0].networkIP)'

  setup-firewall:
    desc: Configure firewall rules for Valkey
    cmds:
      - |
        echo "Creating firewall rule: valkey-internal"
        gcloud compute firewall-rules create valkey-internal \
          --allow=tcp:6379 \
          --source-tags=ws-server \
          --target-tags=valkey-server \
          --description="Allow WS servers to connect to Valkey" \
          --direction=INGRESS \
          --priority=1000 \
          || echo "Rule valkey-internal already exists"
      - |
        echo "Creating firewall rule: valkey-exporter"
        gcloud compute firewall-rules create valkey-exporter \
          --allow=tcp:9121 \
          --source-tags=monitoring \
          --target-tags=valkey-server \
          --description="Allow Prometheus to scrape Valkey exporter" \
          --direction=INGRESS \
          --priority=1000 \
          || echo "Rule valkey-exporter already exists"
      - echo "Firewall rules configured successfully"

  deploy-single:
    desc: Deploy single-node Valkey to GCP VM
    cmds:
      - |
        echo "🤖 Deploying Valkey to {{.VALKEY_VM_NAME}}"
        echo "🔐 Using SSH authentication"

        # Wait for SSH key to be ready (startup script may still be running)
        echo "⏳ Waiting for SSH key to be ready..."
        for i in {1..30}; do
          READY=$(gcloud compute ssh {{.VALKEY_VM_NAME}} --zone={{.VALKEY_ZONE}} \
            --command="sudo test -f /home/deploy/.ssh/github_deploy_key && echo ready" \
            --ssh-flag="-o ConnectTimeout=5" 2>/dev/null || echo "")
          if [ "$READY" = "ready" ]; then
            echo "✅ SSH key ready"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "❌ Timeout waiting for SSH key"
            exit 1
          fi
          echo "   Waiting... ($((i*10))s)"
          sleep 10
        done

        # Check if repo exists
        REPO_EXISTS=$(gcloud compute ssh {{.VALKEY_VM_NAME}} --zone={{.VALKEY_ZONE}} --command="sudo -i -u deploy test -d /home/deploy/odin-ws && echo true || echo false" 2>/dev/null || echo "false")

        if [ "$REPO_EXISTS" = "true" ]; then
          echo "✅ Repository exists, updating..."
          gcloud compute ssh {{.VALKEY_VM_NAME}} --zone={{.VALKEY_ZONE}} --command="sudo -i -u deploy bash -c 'cd /home/deploy/odin-ws && git fetch origin {{.GIT_BRANCH}} 2>&1 | grep -v From && git reset --hard origin/{{.GIT_BRANCH}} 2>&1 | head -1'" 2>/dev/null
        else
          echo "📦 Cloning repository..."
          gcloud compute ssh {{.VALKEY_VM_NAME}} --zone={{.VALKEY_ZONE}} --command="sudo -i -u deploy git clone -b {{.GIT_BRANCH}} -q {{.GIT_REPO_SSH}} /home/deploy/odin-ws" 2>&1 | grep -v "Cloning" | grep -v "remote" || true
        fi

        # Create .env with auto-generated password if it doesn't exist
        echo "📝 Setting up Valkey configuration..."
        gcloud compute ssh {{.VALKEY_VM_NAME}} --zone={{.VALKEY_ZONE}} --command='sudo -i -u deploy bash << "SETUP_ENV"
        cd /home/deploy/odin-ws/deployments/v1/gcp/distributed/valkey
        if [ ! -f .env ]; then
          echo "🔐 Generating secure Valkey password..."
          GENERATED_PASSWORD=$(openssl rand -base64 32 | tr -d "=+/" | cut -c1-32)
          cp .env.example .env
          sed -i "s/CHANGEME_GENERATE_STRONG_PASSWORD/$GENERATED_PASSWORD/" .env
          chmod 600 .env
          echo "✅ Created .env with auto-generated password"
        else
          echo "✅ .env already exists (keeping existing password)"
        fi
        SETUP_ENV
        ' 2>/dev/null || true

        # Start Valkey
        echo "🐳 Starting Valkey containers..."
        gcloud compute ssh {{.VALKEY_VM_NAME}} \
          --zone={{.VALKEY_ZONE}} \
          --command="sudo -i -u deploy bash -c 'cd {{.VALKEY_DEPLOY_PATH}} && docker-compose -f docker-compose.single.yml up -d 2>&1 | grep -E \"(Created|Started|Running)\"'" 2>/dev/null || true

        echo "⏳ Waiting for Valkey to start (10s)..."
        sleep 10

        # Verify Valkey is running
        echo "🔍 Verifying Valkey..."
        gcloud compute ssh {{.VALKEY_VM_NAME}} \
          --zone={{.VALKEY_ZONE}} \
          --command="sudo -i -u deploy docker ps --filter name=valkey --format 'table {{.Names}}\t{{.Status}}'" 2>/dev/null || true

        echo ""
        echo "✅ Valkey deployment complete!"
        echo "Run 'task gcp:valkey:health' to verify"

  # ==================== HEALTH & MONITORING ====================

  health:
    desc: Run comprehensive health check on Valkey
    cmds:
      - |
        echo "Running health check on {{.VALKEY_VM_NAME}}"
        # Use heredoc to avoid shell quoting issues with gcloud ssh
        gcloud compute ssh {{.VALKEY_VM_NAME}} --zone={{.VALKEY_ZONE}} --command='sudo -i -u deploy bash << "HEALTHCHECK"
        cd /home/deploy/odin-ws/deployments/v1/gcp/distributed/valkey
        export VALKEY_PASSWORD=$(grep "^VALKEY_PASSWORD=" .env 2>/dev/null | cut -d= -f2)

        echo "========================================"
        echo "Valkey Health Check"
        echo "========================================"

        echo -n "1. Connectivity (PING)... "
        PONG=$(docker exec valkey-single valkey-cli -a "$VALKEY_PASSWORD" --no-auth-warning PING 2>/dev/null)
        if [ "$PONG" = "PONG" ]; then
          echo "✓ OK"
        else
          echo "✗ FAILED"
          exit 1
        fi

        echo -n "2. Valkey Version... "
        docker exec valkey-single valkey-cli -a "$VALKEY_PASSWORD" --no-auth-warning INFO server 2>/dev/null | grep valkey_version | cut -d: -f2 | tr -d "\r"

        echo -n "3. Memory... "
        docker exec valkey-single valkey-cli -a "$VALKEY_PASSWORD" --no-auth-warning INFO memory 2>/dev/null | grep used_memory_human | cut -d: -f2 | tr -d "\r"

        echo -n "4. Clients... "
        docker exec valkey-single valkey-cli -a "$VALKEY_PASSWORD" --no-auth-warning INFO clients 2>/dev/null | grep connected_clients | cut -d: -f2 | tr -d "\r"

        echo -n "5. Container... "
        docker ps --filter name=valkey-single --format "table {{.Status}}" | tail -1

        echo "========================================"
        echo "✓ Valkey is healthy"
        echo "========================================"
        HEALTHCHECK
        ' 2>/dev/null || echo "Note: Ensure Valkey is deployed on VM"

  logs:
    desc: Tail Valkey logs (real-time)
    cmds:
      - |
        echo "Tailing Valkey logs (Ctrl+C to exit)..."
        gcloud compute ssh {{.VALKEY_VM_NAME}} \
          --zone={{.VALKEY_ZONE}} \
          --command="sudo -i -u deploy docker logs -f valkey-single --tail=100"

  metrics:
    desc: Show real-time Valkey metrics
    cmds:
      - |
        echo "Valkey Metrics (refreshing every 5s, Ctrl+C to exit)"
        gcloud compute ssh {{.VALKEY_VM_NAME}} \
          --zone={{.VALKEY_ZONE}} \
          --command="sudo -i -u deploy bash -c '
            while true; do
              clear
              echo \"==================== Valkey Stats ====================\"
              docker exec valkey-single valkey-cli -a \$VALKEY_PASSWORD --no-auth-warning INFO stats | grep -E \"total_commands_processed|instantaneous_ops_per_sec\"
              echo \"\"
              echo \"==================== Memory ====================\"
              docker exec valkey-single valkey-cli -a \$VALKEY_PASSWORD --no-auth-warning INFO memory | grep -E \"used_memory_human|maxmemory_human\"
              echo \"\"
              echo \"==================== Clients ====================\"
              docker exec valkey-single valkey-cli -a \$VALKEY_PASSWORD --no-auth-warning INFO clients | grep connected_clients
              sleep 5
            done
          '"

  cli:
    desc: Open Valkey CLI (debug only)
    cmds:
      - |
        echo "Opening Valkey CLI on {{.VALKEY_VM_NAME}}"
        gcloud compute ssh {{.VALKEY_VM_NAME}} \
          --zone={{.VALKEY_ZONE}} \
          --command="sudo -i -u deploy docker exec -it valkey-single valkey-cli -a \$VALKEY_PASSWORD"

  # ==================== TESTING ====================

  load-test:
    desc: Run Valkey benchmark
    cmds:
      - |
        echo "Running Valkey benchmark on {{.VALKEY_VM_NAME}}"
        gcloud compute ssh {{.VALKEY_VM_NAME}} \
          --zone={{.VALKEY_ZONE}} \
          --command="sudo -i -u deploy docker run --rm --network host valkey:7.2-alpine \
            valkey-benchmark -h localhost -p 6379 -a \$VALKEY_PASSWORD -t ping,set,get -q"

  # ==================== MAINTENANCE ====================

  restart:
    desc: Restart Valkey
    cmds:
      - |
        echo "Restarting Valkey on {{.VALKEY_VM_NAME}}"
        gcloud compute ssh {{.VALKEY_VM_NAME}} \
          --zone={{.VALKEY_ZONE}} \
          --command="sudo -i -u deploy bash -c 'cd {{.VALKEY_DEPLOY_PATH}} && docker-compose -f docker-compose.single.yml restart valkey'"

  get-ip:
    desc: Get Valkey internal IP
    cmds:
      - |
        VALKEY_IP=$(gcloud compute instances describe {{.VALKEY_VM_NAME}} \
          --zone={{.VALKEY_ZONE}} \
          --format='get(networkInterfaces[0].networkIP)')
        echo "Valkey Internal IP: $VALKEY_IP"
        echo ""
        echo "Update ws-server .env with:"
        echo "VALKEY_ADDRS=$VALKEY_IP:6379"
