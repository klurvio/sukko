version: "3"

# Redis Infrastructure Management Tasks
# Supports: Single node, Sentinel cluster, monitoring, debugging

vars:
  REDIS_VM_NAME: ws-redis
  REDIS_ZONE: us-central1-a
  REDIS_MACHINE_TYPE: e2-standard-2
  REDIS_DISK_SIZE: 50GB
  REDIS_DISK_TYPE: pd-ssd
  REDIS_DEPLOY_PATH: /home/deploy/ws_poc/deployments/v1/gcp/distributed/redis
  # Git config (inherited from parent or use defaults)
  GIT_BRANCH: '{{.GIT_BRANCH | default "feature/redis-broadcast-bus"}}'
  GIT_REPO_SSH: '{{.GIT_REPO_SSH | default "git@github.com:Toniq-Labs/odin-ws.git"}}'

tasks:
  # ==================== DEPLOYMENT ====================

  create:
    desc: Create Redis VM on GCP
    cmds:
      - |
        echo "🔍 Checking Redis instance..."
        if gcloud compute instances describe {{.REDIS_VM_NAME}} \
          --zone={{.REDIS_ZONE}} \
          --format="value(status)" 2>/dev/null | grep -q "RUNNING"; then
          echo "✅ Redis VM already running"
          echo "Internal IP:"
          gcloud compute instances describe {{.REDIS_VM_NAME}} \
            --zone={{.REDIS_ZONE}} \
            --format='get(networkInterfaces[0].networkIP)'
          exit 0
        fi

        if gcloud compute instances describe {{.REDIS_VM_NAME}} \
          --zone={{.REDIS_ZONE}} 2>/dev/null | grep -q "name:"; then
          echo "⚡ Starting existing Redis instance..."
          gcloud compute instances start {{.REDIS_VM_NAME}} \
            --zone={{.REDIS_ZONE}} --quiet
        else
          echo "📦 Creating new Redis VM: {{.REDIS_VM_NAME}}"
          gcloud compute instances create {{.REDIS_VM_NAME}} \
            --zone={{.REDIS_ZONE}} \
            --machine-type={{.REDIS_MACHINE_TYPE}} \
            --boot-disk-size={{.REDIS_DISK_SIZE}} \
            --boot-disk-type={{.REDIS_DISK_TYPE}} \
            --image-family=ubuntu-2204-lts \
            --image-project=ubuntu-os-cloud \
            --tags=redis-server \
            --metadata=startup-script='#!/bin/bash
              apt-get update
              apt-get install -y docker.io docker-compose git curl
              systemctl enable docker
              systemctl start docker
              usermod -aG docker $(whoami)
              id -u deploy &>/dev/null || useradd -m -s /bin/bash deploy
              usermod -aG docker deploy
              SSH_DIR=/home/deploy/.ssh
              mkdir -p $SSH_DIR && chown deploy:deploy $SSH_DIR && chmod 700 $SSH_DIR
              for i in $(seq 1 30); do
                curl -sf "http://metadata.google.internal/computeMetadata/v1/project/attributes/github-deploy-key" -H "Metadata-Flavor: Google" > $SSH_DIR/github_deploy_key
                if [ -s $SSH_DIR/github_deploy_key ]; then break; fi
                sleep 10
              done
              chmod 600 $SSH_DIR/github_deploy_key && chown deploy:deploy $SSH_DIR/github_deploy_key
              printf "Host github.com\n  HostName github.com\n  User git\n  IdentityFile ~/.ssh/github_deploy_key\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n" > $SSH_DIR/config
              chown deploy:deploy $SSH_DIR/config && chmod 600 $SSH_DIR/config
            '
        fi

        echo "⏳ Waiting for SSH..."
        for i in {1..30}; do
          if gcloud compute ssh {{.REDIS_VM_NAME}} --zone={{.REDIS_ZONE}} \
            --command="echo ok" \
            --ssh-flag="-o ConnectTimeout=5" --ssh-flag="-o StrictHostKeyChecking=no" \
            2>/dev/null | grep -q "ok"; then
            echo "✅ Redis VM ready"
            break
          fi
          sleep 10
        done

        echo "Internal IP:"
        gcloud compute instances describe {{.REDIS_VM_NAME}} \
          --zone={{.REDIS_ZONE}} \
          --format='get(networkInterfaces[0].networkIP)'

  setup-firewall:
    desc: Configure firewall rules for Redis
    cmds:
      - |
        echo "Creating firewall rule: redis-internal"
        gcloud compute firewall-rules create redis-internal \
          --allow=tcp:6379 \
          --source-tags=ws-server \
          --target-tags=redis-server \
          --description="Allow WS servers to connect to Redis" \
          --direction=INGRESS \
          --priority=1000 \
          || echo "Rule redis-internal already exists"
      - |
        echo "Creating firewall rule: redis-exporter"
        gcloud compute firewall-rules create redis-exporter \
          --allow=tcp:9121 \
          --source-tags=monitoring \
          --target-tags=redis-server \
          --description="Allow Prometheus to scrape Redis exporter" \
          --direction=INGRESS \
          --priority=1000 \
          || echo "Rule redis-exporter already exists"
      - echo "Firewall rules configured successfully"

  deploy-single:
    desc: Deploy single-node Redis to GCP VM
    cmds:
      - |
        echo "🤖 Deploying Redis to {{.REDIS_VM_NAME}}"
        echo "🔐 Using SSH authentication"

        # Wait for SSH key to be ready (startup script may still be running)
        echo "⏳ Waiting for SSH key to be ready..."
        for i in {1..30}; do
          READY=$(gcloud compute ssh {{.REDIS_VM_NAME}} --zone={{.REDIS_ZONE}} \
            --command="sudo test -f /home/deploy/.ssh/github_deploy_key && echo ready" \
            --ssh-flag="-o ConnectTimeout=5" 2>/dev/null || echo "")
          if [ "$READY" = "ready" ]; then
            echo "✅ SSH key ready"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "❌ Timeout waiting for SSH key"
            exit 1
          fi
          echo "   Waiting... ($((i*10))s)"
          sleep 10
        done

        # Check if repo exists
        REPO_EXISTS=$(gcloud compute ssh {{.REDIS_VM_NAME}} --zone={{.REDIS_ZONE}} --command="sudo -i -u deploy test -d /home/deploy/ws_poc && echo true || echo false" 2>/dev/null || echo "false")

        if [ "$REPO_EXISTS" = "true" ]; then
          echo "✅ Repository exists, updating..."
          gcloud compute ssh {{.REDIS_VM_NAME}} --zone={{.REDIS_ZONE}} --command="sudo -i -u deploy bash -c 'cd /home/deploy/ws_poc && git fetch origin {{.GIT_BRANCH}} 2>&1 | grep -v From && git reset --hard origin/{{.GIT_BRANCH}} 2>&1 | head -1'" 2>/dev/null
        else
          echo "📦 Cloning repository..."
          gcloud compute ssh {{.REDIS_VM_NAME}} --zone={{.REDIS_ZONE}} --command="sudo -i -u deploy git clone -b {{.GIT_BRANCH}} -q {{.GIT_REPO_SSH}} /home/deploy/ws_poc" 2>&1 | grep -v "Cloning" | grep -v "remote" || true
        fi

        # Create .env with auto-generated password if it doesn't exist
        echo "📝 Setting up Redis configuration..."
        gcloud compute ssh {{.REDIS_VM_NAME}} --zone={{.REDIS_ZONE}} --command='sudo -i -u deploy bash << "SETUP_ENV"
        cd /home/deploy/ws_poc/deployments/v1/gcp/distributed/redis
        if [ ! -f .env ]; then
          echo "🔐 Generating secure Redis password..."
          GENERATED_PASSWORD=$(openssl rand -base64 32 | tr -d "=+/" | cut -c1-32)
          cp .env.example .env
          sed -i "s/CHANGEME_GENERATE_STRONG_PASSWORD/$GENERATED_PASSWORD/" .env
          chmod 600 .env
          echo "✅ Created .env with auto-generated password"
        else
          echo "✅ .env already exists (keeping existing password)"
        fi
        SETUP_ENV
        ' 2>/dev/null || true

        # Start Redis
        echo "🐳 Starting Redis containers..."
        gcloud compute ssh {{.REDIS_VM_NAME}} \
          --zone={{.REDIS_ZONE}} \
          --command="sudo -i -u deploy bash -c 'cd {{.REDIS_DEPLOY_PATH}} && docker-compose -f docker-compose.single.yml up -d 2>&1 | grep -E \"(Created|Started|Running)\"'" 2>/dev/null || true

        echo "⏳ Waiting for Redis to start (10s)..."
        sleep 10

        # Verify Redis is running
        echo "🔍 Verifying Redis..."
        gcloud compute ssh {{.REDIS_VM_NAME}} \
          --zone={{.REDIS_ZONE}} \
          --command="sudo -i -u deploy docker ps --filter name=redis --format 'table {{.Names}}\t{{.Status}}'" 2>/dev/null || true

        echo ""
        echo "✅ Redis deployment complete!"
        echo "Run 'task gcp:redis:health' to verify"

  # ==================== HEALTH & MONITORING ====================

  health:
    desc: Run comprehensive health check on Redis
    cmds:
      - |
        echo "Running health check on {{.REDIS_VM_NAME}}"
        # Use heredoc to avoid shell quoting issues with gcloud ssh
        gcloud compute ssh {{.REDIS_VM_NAME}} --zone={{.REDIS_ZONE}} --command='sudo -i -u deploy bash << "HEALTHCHECK"
        cd /home/deploy/ws_poc/deployments/v1/gcp/distributed/redis
        export REDIS_PASSWORD=$(grep "^REDIS_PASSWORD=" .env 2>/dev/null | cut -d= -f2)

        echo "========================================"
        echo "Redis Health Check"
        echo "========================================"

        echo -n "1. Connectivity (PING)... "
        PONG=$(docker exec redis-single redis-cli -a "$REDIS_PASSWORD" --no-auth-warning PING 2>/dev/null)
        if [ "$PONG" = "PONG" ]; then
          echo "✓ OK"
        else
          echo "✗ FAILED"
          exit 1
        fi

        echo -n "2. Redis Version... "
        docker exec redis-single redis-cli -a "$REDIS_PASSWORD" --no-auth-warning INFO server 2>/dev/null | grep redis_version | cut -d: -f2 | tr -d "\r"

        echo -n "3. Memory... "
        docker exec redis-single redis-cli -a "$REDIS_PASSWORD" --no-auth-warning INFO memory 2>/dev/null | grep used_memory_human | cut -d: -f2 | tr -d "\r"

        echo -n "4. Clients... "
        docker exec redis-single redis-cli -a "$REDIS_PASSWORD" --no-auth-warning INFO clients 2>/dev/null | grep connected_clients | cut -d: -f2 | tr -d "\r"

        echo -n "5. Container... "
        docker ps --filter name=redis-single --format "table {{.Status}}" | tail -1

        echo "========================================"
        echo "✓ Redis is healthy"
        echo "========================================"
        HEALTHCHECK
        ' 2>/dev/null || echo "Note: Ensure Redis is deployed on VM"

  logs:
    desc: Tail Redis logs (real-time)
    cmds:
      - |
        echo "Tailing Redis logs (Ctrl+C to exit)..."
        gcloud compute ssh {{.REDIS_VM_NAME}} \
          --zone={{.REDIS_ZONE}} \
          --command="sudo -i -u deploy docker logs -f redis-single --tail=100"

  metrics:
    desc: Show real-time Redis metrics
    cmds:
      - |
        echo "Redis Metrics (refreshing every 5s, Ctrl+C to exit)"
        gcloud compute ssh {{.REDIS_VM_NAME}} \
          --zone={{.REDIS_ZONE}} \
          --command="sudo -i -u deploy bash -c '
            while true; do
              clear
              echo \"==================== Redis Stats ====================\"
              docker exec redis-single redis-cli -a \$REDIS_PASSWORD --no-auth-warning INFO stats | grep -E \"total_commands_processed|instantaneous_ops_per_sec\"
              echo \"\"
              echo \"==================== Memory ====================\"
              docker exec redis-single redis-cli -a \$REDIS_PASSWORD --no-auth-warning INFO memory | grep -E \"used_memory_human|maxmemory_human\"
              echo \"\"
              echo \"==================== Clients ====================\"
              docker exec redis-single redis-cli -a \$REDIS_PASSWORD --no-auth-warning INFO clients | grep connected_clients
              sleep 5
            done
          '"

  cli:
    desc: Open Redis CLI (debug only)
    cmds:
      - |
        echo "Opening Redis CLI on {{.REDIS_VM_NAME}}"
        gcloud compute ssh {{.REDIS_VM_NAME}} \
          --zone={{.REDIS_ZONE}} \
          --command="sudo -i -u deploy docker exec -it redis-single redis-cli -a \$REDIS_PASSWORD"

  # ==================== TESTING ====================

  load-test:
    desc: Run Redis benchmark
    cmds:
      - |
        echo "Running Redis benchmark on {{.REDIS_VM_NAME}}"
        gcloud compute ssh {{.REDIS_VM_NAME}} \
          --zone={{.REDIS_ZONE}} \
          --command="sudo -i -u deploy docker run --rm --network host redis:7.2-alpine \
            redis-benchmark -h localhost -p 6379 -a \$REDIS_PASSWORD -t ping,set,get -q"

  # ==================== MAINTENANCE ====================

  restart:
    desc: Restart Redis
    cmds:
      - |
        echo "Restarting Redis on {{.REDIS_VM_NAME}}"
        gcloud compute ssh {{.REDIS_VM_NAME}} \
          --zone={{.REDIS_ZONE}} \
          --command="sudo -i -u deploy bash -c 'cd {{.REDIS_DEPLOY_PATH}} && docker-compose -f docker-compose.single.yml restart redis'"

  get-ip:
    desc: Get Redis internal IP
    cmds:
      - |
        REDIS_IP=$(gcloud compute instances describe {{.REDIS_VM_NAME}} \
          --zone={{.REDIS_ZONE}} \
          --format='get(networkInterfaces[0].networkIP)')
        echo "Redis Internal IP: $REDIS_IP"
        echo ""
        echo "Update ws-server .env with:"
        echo "REDIS_SENTINEL_ADDRS=$REDIS_IP:6379"
