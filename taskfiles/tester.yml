# =============================================================================
# Tester Deployment Tasks
# =============================================================================
# Pattern: tester:{provider}:{action}
# Providers: do (DigitalOcean), gce (Google Compute Engine)

version: "3"

tasks:
  # ===========================================================================
  # DigitalOcean Provider
  # ===========================================================================
  do:deploy:
    desc: Deploy sukko-tester to DigitalOcean Droplet
    cmds:
      - bash {{.ROOT_DIR}}/deployments/tester/do/deploy.sh

  do:destroy:
    desc: Destroy sukko-tester Droplet
    cmds:
      - bash {{.ROOT_DIR}}/deployments/tester/do/destroy.sh

  do:logs:
    desc: View sukko-tester container logs
    cmds:
      - bash {{.ROOT_DIR}}/deployments/tester/do/logs.sh

  do:ssh:
    desc: SSH into sukko-tester Droplet
    cmds:
      - bash {{.ROOT_DIR}}/deployments/tester/do/ssh.sh

  # ===========================================================================
  # Google Compute Engine Provider
  # ===========================================================================
  gce:deploy:
    desc: Deploy sukko-tester to GCE VM (IAP SSH, no public IP)
    cmds:
      - bash {{.ROOT_DIR}}/deployments/tester/gce/deploy.sh

  gce:destroy:
    desc: Destroy sukko-tester GCE VM
    cmds:
      - bash {{.ROOT_DIR}}/deployments/tester/gce/destroy.sh

  gce:logs:
    desc: View sukko-tester container logs (via IAP tunnel)
    cmds:
      - bash {{.ROOT_DIR}}/deployments/tester/gce/logs.sh

  gce:ssh:
    desc: SSH into sukko-tester GCE VM (via IAP tunnel)
    cmds:
      - bash {{.ROOT_DIR}}/deployments/tester/gce/ssh.sh
