version: "3"

# Local Deployment Workflow Tasks
# Complete deployment workflows using composed tasks

dotenv: ["{{.USER_WORKING_DIR}}/deployments/local/.env.local"]

includes:
  services:
    taskfile: ./services.yml
    internal: true
  health:
    taskfile: ./health.yml
    internal: true

tasks:
  setup:
    desc: Complete local deployment from scratch
    cmds:
      - echo "🚀 Setting up local deployment..."
      - task: check-prerequisites
      - task: init-env
      - task: services:start:all
      - task: wait-for-health
      - task: create-topics
      - task: show-urls
      - echo "✅ Local deployment ready!"

  check-prerequisites:
    desc: Check Docker and required tools
    cmds:
      - |
        echo "🔍 Checking prerequisites..."
        if ! docker info > /dev/null 2>&1; then
          echo "❌ Docker not running"
          exit 1
        fi
        if ! docker-compose version > /dev/null 2>&1; then
          echo "❌ docker-compose not found"
          exit 1
        fi
        echo "✅ Prerequisites OK"

  init-env:
    desc: Initialize environment file
    cmds:
      - |
        cd {{.USER_WORKING_DIR}}/deployments/local
        if [ ! -f .env.local ]; then
          echo "ℹ️  .env.local will be created with secrets template"
        else
          echo "ℹ️  .env.local already exists"
        fi

  wait-for-health:
    desc: Wait for all services to be healthy
    cmds:
      - echo "⏳ Waiting for services to be healthy..."
      - |
        echo "Waiting for Redpanda..."
        for i in {1..30}; do
          if docker exec redpanda-local rpk cluster health 2>/dev/null | grep -q "Healthy:.*true"; then
            echo "✅ Redpanda ready"
            break
          fi
          if [ $i -eq 30 ]; then
            echo "❌ Redpanda failed to become healthy"
            exit 1
          fi
          sleep 2
        done
      - sleep 5
      - echo "✅ Services ready"

  create-topics:
    desc: Create Kafka topics
    cmds:
      - echo "📝 Creating Kafka topics..."
      - bash {{.USER_WORKING_DIR}}/scripts/local/setup-redpanda-topics.sh redpanda-local

  show-urls:
    desc: Display service URLs
    cmds:
      - echo ""
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo "🔗 SERVICE URLs"
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo "Redpanda Console → http://localhost:8080"
      - echo "Publisher API    → http://localhost:3006"
      - echo "WS Server        → ws://localhost:3005"
      - echo "                    http://localhost:3005/health"
      - echo "Grafana          → http://localhost:3011 (admin/admin)"
      - echo "Prometheus       → http://localhost:9092"
      - echo "Loki             → http://localhost:3102"
      - echo ""
      - echo "Architecture: 3 shards + load balancer"
      - echo "  └─ Shard 0: internal port 3002"
      - echo "  └─ Shard 1: internal port 3003"
      - echo "  └─ Shard 2: internal port 3004"
      - echo "  └─ LoadBalancer: public port 3005"
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  reset:
    desc: Delete everything and redeploy (for config changes)
    cmds:
      - echo "⚠️  This will delete all containers and volumes!"
      - echo "   Press Ctrl+C to cancel, or wait 5 seconds..."
      - sleep 5
      - task: services:delete:all
      - echo "🔄 Redeploying..."
      - task: setup

  rebuild-code:
    desc: Rebuild services after code changes
    cmds:
      - echo "🔨 Rebuilding services..."
      - task: services:rebuild:all
      - echo "🔍 Checking health..."
      - sleep 5
      - task: health:all
      - echo "✅ Rebuild complete"

  quick-start:
    desc: Quick start (assumes topics exist)
    cmds:
      - echo "🚀 Quick starting services..."
      - task: services:start:all
      - task: wait-for-health
      - task: health:all
      - task: show-urls

  stop:
    desc: Stop all services (keeps volumes)
    cmds:
      - docker-compose -f {{.USER_WORKING_DIR}}/deployments/local/docker-compose.yml down
      - echo "✅ Services stopped (volumes preserved)"
