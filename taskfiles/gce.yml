# =============================================================================
# GCE VM Tasks (Standalone Services)
# =============================================================================
# Domain: gce
# Pattern: gce:{service}:{action} ENV=dev|stg|prod
# ENV is required for all commands

version: "3"

includes:
  build:
    taskfile: ./shared/build.yml
    dir: "{{.ROOT_DIR}}"

vars:
  GCE_ENV: '{{.ENV | default "dev"}}'
  GCE_PROJECT: '{{.PROJECT | default "odin-9e902"}}'
  GCE_ZONE: '{{.ZONE | default "us-central1-a"}}'
  GCE_LOADTEST_DIR: "{{.ROOT_DIR}}/deployments/wsloadtest"
  GCE_PUBLISHER_DIR: "{{.ROOT_DIR}}/deployments/wspublisher"
  GCE_REGISTRY: 'us-central1-docker.pkg.dev/{{.GCE_PROJECT}}/odin-ws'
  GCE_FOUNDATION_TF_DIR: "{{.ROOT_DIR}}/deployments/terraform/environments/standard/{{.GCE_ENV}}-foundation"

tasks:
  # ===========================================================================
  # Load Test VM
  # ===========================================================================
  loadtest:deploy:
    desc: Deploy load test VM (kernel tuning + docker only, use loadtest:run to start test)
    vars:
      VPC_NAME:
        sh: terraform -chdir={{.GCE_FOUNDATION_TF_DIR}} output -raw vpc_name 2>/dev/null || echo ""
      SUBNET_NAME:
        sh: terraform -chdir={{.GCE_FOUNDATION_TF_DIR}} output -raw ws_subnet_name 2>/dev/null || echo ""
    cmds:
      - gcloud services enable iap.googleapis.com --project={{.GCE_PROJECT}} --quiet
      - |
        VM_NAME="wsloadtest-{{.GCE_ENV}}"

        # Check if VM already exists
        if gcloud compute instances describe $VM_NAME --project={{.GCE_PROJECT}} --zone={{.GCE_ZONE}} &>/dev/null; then
          echo "ERROR: VM '$VM_NAME' already exists. Destroy it first:"
          echo "  task gce:loadtest:destroy ENV={{.GCE_ENV}}"
          exit 1
        fi

        echo "=== Deploying wsloadtest VM ==="
        echo "  VM:       $VM_NAME"
        echo "  VPC:      {{.VPC_NAME}}"
        echo "  Registry: {{.GCE_REGISTRY}}"
        echo ""

        gcloud compute instances create $VM_NAME \
          --project={{.GCE_PROJECT}} \
          --zone={{.GCE_ZONE}} \
          --machine-type=e2-standard-8 \
          --network={{.VPC_NAME}} \
          --subnet={{.SUBNET_NAME}} \
          --no-address \
          --preemptible \
          --scopes=cloud-platform \
          --labels="purpose=loadtest,env={{.GCE_ENV}}" \
          --metadata-from-file=startup-script={{.GCE_LOADTEST_DIR}}/startup-script.sh \
          --metadata=REGISTRY="{{.GCE_REGISTRY}}"

        echo ""
        echo "=== VM Created (startup: kernel tuning + docker install) ==="
        echo "  Run test: task gce:loadtest:run ENV={{.GCE_ENV}}"
        echo "  Logs:     task gce:loadtest:logs ENV={{.GCE_ENV}}"
        echo "  SSH:      task gce:loadtest:ssh ENV={{.GCE_ENV}}"
        echo "  Destroy:  task gce:loadtest:destroy ENV={{.GCE_ENV}}"

  loadtest:destroy:
    desc: Destroy load test VM
    cmds:
      - |
        VM_NAME="wsloadtest-{{.GCE_ENV}}"
        if ! gcloud compute instances describe $VM_NAME --project={{.GCE_PROJECT}} --zone={{.GCE_ZONE}} &>/dev/null; then
          echo "VM '$VM_NAME' does not exist. Nothing to delete."
          exit 0
        fi
        echo "Deleting wsloadtest VM: $VM_NAME"
        gcloud compute instances delete $VM_NAME \
          --project={{.GCE_PROJECT}} \
          --zone={{.GCE_ZONE}} \
          --quiet
        echo "VM deleted."
      - gcloud services disable iap.googleapis.com --project={{.GCE_PROJECT}} --quiet --force

  loadtest:run:
    desc: Run/restart loadtest (CONNECTIONS=5000 DURATION=10m)
    vars:
      GATEWAY_IP:
        sh: terraform -chdir={{.GCE_FOUNDATION_TF_DIR}} output -raw gateway_external_ip 2>/dev/null || echo ""
      CONNECTIONS: '{{.CONNECTIONS | default "5000"}}'
      DURATION: '{{.DURATION | default "10m"}}'
      RAMP: '{{.RAMP | default "100"}}'
    cmds:
      - |
        VM_NAME="wsloadtest-{{.GCE_ENV}}"
        WS_URL="ws://{{.GATEWAY_IP}}:443/ws"
        echo "Running wsloadtest on $VM_NAME (target: $WS_URL)..."
        gcloud compute ssh $VM_NAME --zone={{.GCE_ZONE}} --project={{.GCE_PROJECT}} --tunnel-through-iap --command="
          docker stop wsloadtest 2>/dev/null || true
          docker run -d --rm --name wsloadtest \
            --ulimit nofile=1000000:1000000 \
            -e WS_URL=$WS_URL \
            -e TARGET_CONNECTIONS={{.CONNECTIONS}} \
            -e RAMP_RATE={{.RAMP}} \
            -e DURATION={{.DURATION}} \
            -e TENANT_ID=odin \
            -e CHANNELS=odin.BTC.trade,odin.ETH.trade,odin.SOL.trade \
            -e CHANNELS_PER_CLIENT=1 \
            -e WS_PONG_WAIT=60s \
            -e WS_PING_PERIOD=45s \
            -e LOG_LEVEL=info \
            {{.GCE_REGISTRY}}/wsloadtest:latest
        "

  loadtest:stop:
    desc: Stop loadtest container
    cmds:
      - |
        echo "Stopping wsloadtest on VM for {{.GCE_ENV}}..."
        VM_NAME="wsloadtest-{{.GCE_ENV}}"
        gcloud compute ssh $VM_NAME --zone={{.GCE_ZONE}} --project={{.GCE_PROJECT}} --tunnel-through-iap --command="docker stop wsloadtest 2>/dev/null || true"

  loadtest:logs:
    desc: View load test logs
    cmds:
      - |
        VM_NAME="wsloadtest-{{.GCE_ENV}}"
        gcloud compute instances get-serial-port-output $VM_NAME \
          --project={{.GCE_PROJECT}} \
          --zone={{.GCE_ZONE}}

  loadtest:ssh:
    desc: SSH into load test VM
    cmds:
      - |
        VM_NAME="wsloadtest-{{.GCE_ENV}}"
        gcloud compute ssh $VM_NAME --zone={{.GCE_ZONE}} --project={{.GCE_PROJECT}} --tunnel-through-iap

  # ===========================================================================
  # Publisher VM
  # ===========================================================================
  publisher:deploy:
    desc: Deploy publisher VM (docker only, use publisher:run to start publishing)
    vars:
      VPC_NAME:
        sh: terraform -chdir={{.GCE_FOUNDATION_TF_DIR}} output -raw vpc_name 2>/dev/null || echo ""
      SUBNET_NAME:
        sh: terraform -chdir={{.GCE_FOUNDATION_TF_DIR}} output -raw ws_subnet_name 2>/dev/null || echo ""
    cmds:
      - gcloud services enable iap.googleapis.com --project={{.GCE_PROJECT}} --quiet
      - |
        VM_NAME="wspublisher-{{.GCE_ENV}}"

        # Check if VM already exists
        if gcloud compute instances describe $VM_NAME --project={{.GCE_PROJECT}} --zone={{.GCE_ZONE}} &>/dev/null; then
          echo "ERROR: VM '$VM_NAME' already exists. Destroy it first:"
          echo "  task gce:publisher:destroy ENV={{.GCE_ENV}}"
          exit 1
        fi

        echo "=== Deploying wspublisher VM ==="
        echo "  VM:       $VM_NAME"
        echo "  VPC:      {{.VPC_NAME}}"
        echo "  Registry: {{.GCE_REGISTRY}}"
        echo ""

        gcloud compute instances create $VM_NAME \
          --project={{.GCE_PROJECT}} \
          --zone={{.GCE_ZONE}} \
          --machine-type=e2-standard-2 \
          --network={{.VPC_NAME}} \
          --subnet={{.SUBNET_NAME}} \
          --no-address \
          --preemptible \
          --scopes=cloud-platform \
          --labels="purpose=loadtest,env={{.GCE_ENV}}" \
          --metadata-from-file=startup-script={{.GCE_PUBLISHER_DIR}}/startup-script.sh \
          --metadata=REGISTRY="{{.GCE_REGISTRY}}"

        echo ""
        echo "=== VM Created (startup: docker install + image pre-pull) ==="
        echo "  Run:     task gce:publisher:run ENV={{.GCE_ENV}}"
        echo "  Logs:    task gce:publisher:logs ENV={{.GCE_ENV}}"
        echo "  SSH:     task gce:publisher:ssh ENV={{.GCE_ENV}}"
        echo "  Destroy: task gce:publisher:destroy ENV={{.GCE_ENV}}"

  publisher:destroy:
    desc: Destroy publisher VM
    cmds:
      - |
        VM_NAME="wspublisher-{{.GCE_ENV}}"
        if ! gcloud compute instances describe $VM_NAME --project={{.GCE_PROJECT}} --zone={{.GCE_ZONE}} &>/dev/null; then
          echo "VM '$VM_NAME' does not exist. Nothing to delete."
          exit 0
        fi
        echo "Deleting wspublisher VM: $VM_NAME"
        gcloud compute instances delete $VM_NAME \
          --project={{.GCE_PROJECT}} \
          --zone={{.GCE_ZONE}} \
          --quiet
        echo "VM deleted."
      - gcloud services disable iap.googleapis.com --project={{.GCE_PROJECT}} --quiet --force

  publisher:run:
    desc: Run/restart publisher (RATE=100 msg/sec)
    vars:
      REDPANDA_IP:
        sh: terraform -chdir={{.GCE_FOUNDATION_TF_DIR}} output -raw redpanda_internal_ip 2>/dev/null || echo ""
      RATE: '{{.RATE | default "100"}}'
      DURATION: '{{.DURATION | default "0"}}'
    cmds:
      - |
        VM_NAME="wspublisher-{{.GCE_ENV}}"
        KAFKA_BROKERS="{{.REDPANDA_IP}}:9092"
        echo "Running wspublisher on $VM_NAME (brokers: $KAFKA_BROKERS, rate: {{.RATE}} msg/s)..."
        gcloud compute ssh $VM_NAME --zone={{.GCE_ZONE}} --project={{.GCE_PROJECT}} --tunnel-through-iap --command="
          docker stop wspublisher 2>/dev/null || true
          docker run -d --rm --name wspublisher \
            -e KAFKA_BROKERS=$KAFKA_BROKERS \
            -e KAFKA_NAMESPACE={{.GCE_ENV}} \
            -e TIMING_MODE=poisson \
            -e POISSON_LAMBDA={{.RATE}} \
            -e DURATION={{.DURATION}} \
            -e TENANT_ID=odin \
            -e IDENTIFIERS=BTC,ETH,SOL,all \
            -e CATEGORIES=trade,liquidity,orderbook \
            -e LOG_LEVEL=info \
            {{.GCE_REGISTRY}}/wspublisher:latest
        "

  publisher:stop:
    desc: Stop publisher container
    cmds:
      - |
        echo "Stopping wspublisher on VM for {{.GCE_ENV}}..."
        VM_NAME="wspublisher-{{.GCE_ENV}}"
        gcloud compute ssh $VM_NAME --zone={{.GCE_ZONE}} --project={{.GCE_PROJECT}} --tunnel-through-iap --command="docker stop wspublisher 2>/dev/null || true"

  publisher:logs:
    desc: View publisher logs
    cmds:
      - |
        VM_NAME="wspublisher-{{.GCE_ENV}}"
        gcloud compute instances get-serial-port-output $VM_NAME \
          --project={{.GCE_PROJECT}} \
          --zone={{.GCE_ZONE}}

  publisher:ssh:
    desc: SSH into publisher VM
    cmds:
      - |
        VM_NAME="wspublisher-{{.GCE_ENV}}"
        gcloud compute ssh $VM_NAME --zone={{.GCE_ZONE}} --project={{.GCE_PROJECT}} --tunnel-through-iap

  # ===========================================================================
  # Build (wrappers around shared/build.yml push tasks)
  # ===========================================================================
  publisher:build:
    desc: Build and push publisher image
    cmds:
      - task: build:push:publisher

  loadtest:build:
    desc: Build and push loadtest image
    cmds:
      - task: build:push:loadtest
