# =============================================================================
# Remote Kubernetes Tasks
# =============================================================================
# Domain: k8s
# Pattern: k8s:{action} PLATFORM=doks|gke ENV=demo
# Default: PLATFORM=doks (backward compatible)

version: "3"

vars:
  PLATFORM: '{{.PLATFORM | default "doks"}}'
  K8S_ENV: '{{.ENV | default "demo"}}'
  K8S_NAMESPACE: 'sukko-{{.K8S_ENV}}'
  K8S_RELEASE_NAME: sukko
  K8S_CHART_PATH: "{{.ROOT_DIR}}/deployments/helm/sukko"
  K8S_VALUES_FILE: "{{.ROOT_DIR}}/deployments/helm/sukko/values/{{.PLATFORM}}/{{.K8S_ENV}}.yaml"
  K8S_TF_DIR: "{{.ROOT_DIR}}/deployments/terraform/environments/{{.PLATFORM}}/{{.K8S_ENV}}"
  K8S_FOUNDATION_TF_DIR: "{{.ROOT_DIR}}/deployments/terraform/environments/{{.PLATFORM}}/{{.K8S_ENV}}-foundation"
  K8S_CLUSTER: 'sukko-{{.K8S_ENV}}'
  # GKE-specific (only needed when PLATFORM=gke)
  GKE_PROJECT: '{{.GKE_PROJECT | default ""}}'
  GKE_ZONE: '{{.GKE_ZONE | default "us-central1-a"}}'
  # Ports
  K8S_GATEWAY_PORT: 3006
  K8S_GRAFANA_PORT: 3000
  K8S_PROMETHEUS_PORT: 9090
  K8S_PROVISIONING_LOCAL_PORT: 48080

tasks:
  # ===========================================================================
  # Core Cluster Operations
  # ===========================================================================
  setup:
    desc: Full setup (foundation + cluster + connect + deploy)
    cmds:
      - task: foundation:init
      - task: foundation:plan
      - task: foundation:apply
      - task: tf:init
      - task: tf:plan
      - task: tf:apply
      - task: connect
      - task: deploy
      - task: status

  destroy:
    desc: Destroy cluster (preserves foundation resources)
    prompt: 'This will DESTROY the {{.PLATFORM}} cluster for {{.K8S_ENV}}. Are you sure?'
    cmds:
      - helm uninstall {{.K8S_RELEASE_NAME}} -n {{.K8S_NAMESPACE}} || true
      - task: tf:destroy

  deploy:
    desc: Deploy/upgrade Helm release
    cmds:
      - task: connect
      - |
        EXTRA_SETS=""
        if [ "{{.PLATFORM}}" = "gke" ]; then
          GATEWAY_IP=$(terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} output -raw gateway_external_ip 2>/dev/null || echo "")
          if [ -n "$GATEWAY_IP" ]; then
            EXTRA_SETS="--set ws-gateway.service.loadBalancerIP=$GATEWAY_IP"
            echo "Using static gateway IP: $GATEWAY_IP"
          fi
        fi
        helm upgrade --install {{.K8S_RELEASE_NAME}} {{.K8S_CHART_PATH}} \
          -f {{.K8S_VALUES_FILE}} -n {{.K8S_NAMESPACE}} --create-namespace $EXTRA_SETS

  connect:
    desc: Connect kubectl to cluster
    cmds:
      - |
        case "{{.PLATFORM}}" in
          doks)
            doctl kubernetes cluster kubeconfig save {{.K8S_CLUSTER}}
            ;;
          gke)
            if [ -z "{{.GKE_PROJECT}}" ]; then
              echo "ERROR: GKE_PROJECT is required for PLATFORM=gke"
              echo "  Usage: task k8s:connect PLATFORM=gke ENV={{.K8S_ENV}} GKE_PROJECT=your-project"
              exit 1
            fi
            gcloud container clusters get-credentials {{.K8S_CLUSTER}} \
              --zone {{.GKE_ZONE}} \
              --project {{.GKE_PROJECT}}
            ;;
          *)
            echo "Unknown platform: {{.PLATFORM}}. Supported: doks, gke"
            exit 1
            ;;
        esac

  status:
    desc: Show pods and services
    cmds:
      - 'echo "=== Nodes ==="'
      - kubectl get nodes -o wide
      - 'echo ""'
      - 'echo "=== Pods ==="'
      - kubectl get pods -n {{.K8S_NAMESPACE}} -o wide
      - 'echo ""'
      - 'echo "=== Services ==="'
      - kubectl get svc -n {{.K8S_NAMESPACE}}

  logs:
    desc: Tail ws-server logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=ws-server -n {{.K8S_NAMESPACE}} --tail=100

  logs:gateway:
    desc: Tail ws-gateway logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=ws-gateway -n {{.K8S_NAMESPACE}} --tail=100

  logs:all:
    desc: Tail all pod logs
    cmds:
      - kubectl logs -f --all-containers=true -l app.kubernetes.io/instance={{.K8S_RELEASE_NAME}} -n {{.K8S_NAMESPACE}} --tail=50

  health:
    desc: Check health endpoint via gateway
    cmds:
      - |
        GATEWAY_IP=$(terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} output -raw gateway_external_ip 2>/dev/null || echo "")
        if [ -z "$GATEWAY_IP" ]; then
          GATEWAY_IP=$(kubectl get svc -n {{.K8S_NAMESPACE}} -l app.kubernetes.io/name=ws-gateway -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
        fi
        if [ -n "$GATEWAY_IP" ]; then
          echo "Gateway IP: $GATEWAY_IP"
          curl -s http://$GATEWAY_IP/health | jq .
        else
          echo "No external IP found. Try port-forward:"
          echo "  task k8s:port-forward:gateway ENV={{.K8S_ENV}}"
        fi

  reload:
    desc: Restart all pods (no rebuild)
    cmds:
      - kubectl rollout restart deployment -n {{.K8S_NAMESPACE}}
      - kubectl rollout status deployment -n {{.K8S_NAMESPACE}} --timeout=120s

  rollback:
    desc: Rollback to previous release
    cmds:
      - helm rollback {{.K8S_RELEASE_NAME}} -n {{.K8S_NAMESPACE}}

  events:
    desc: Show recent events
    cmds:
      - kubectl get events -n {{.K8S_NAMESPACE}} --sort-by='.lastTimestamp' | tail -20

  external-ips:
    desc: Get external IPs for services
    cmds:
      - |
        GATEWAY_IP=$(kubectl get svc -n {{.K8S_NAMESPACE}} -l app.kubernetes.io/name=ws-gateway -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
        if [ -z "$GATEWAY_IP" ]; then
          GATEWAY_IP=$(terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} output -raw gateway_external_ip 2>/dev/null || echo "not set")
        fi
        echo "Gateway (public): $GATEWAY_IP"
        echo ""
        echo "WS_URL=ws://$GATEWAY_IP/ws"

  # ===========================================================================
  # Port Forwarding
  # ===========================================================================
  port-forward:gateway:
    desc: Port-forward ws-gateway
    cmds:
      - kubectl port-forward -n {{.K8S_NAMESPACE}} svc/{{.K8S_RELEASE_NAME}}-ws-gateway {{.K8S_GATEWAY_PORT}}:3000

  port-forward:grafana:
    desc: Port-forward Grafana
    cmds:
      - kubectl port-forward -n {{.K8S_NAMESPACE}} svc/{{.K8S_RELEASE_NAME}}-monitoring-grafana {{.K8S_GRAFANA_PORT}}:3000

  port-forward:prometheus:
    desc: Port-forward Prometheus
    cmds:
      - kubectl port-forward -n {{.K8S_NAMESPACE}} svc/{{.K8S_RELEASE_NAME}}-monitoring-prometheus {{.K8S_PROMETHEUS_PORT}}:9090

  # ===========================================================================
  # Provisioning (routing rules + DB tenant)
  # ===========================================================================
  provision:create:
    desc: Create sukko tenant + routing rules + channel rules
    cmds:
      - |
        lsof -ti:{{.K8S_PROVISIONING_LOCAL_PORT}} | xargs kill 2>/dev/null || true
        sleep 1
        kubectl port-forward -n {{.K8S_NAMESPACE}} svc/{{.K8S_RELEASE_NAME}}-provisioning {{.K8S_PROVISIONING_LOCAL_PORT}}:8080 &
        PF_PID=$!
        sleep 2

        API="http://localhost:{{.K8S_PROVISIONING_LOCAL_PORT}}"

        # Wait for provisioning API
        echo "Checking provisioning API..."
        for i in $(seq 1 10); do
          if curl -sf $API/health >/dev/null 2>&1; then
            echo "Provisioning API ready"
            break
          fi
          echo "Waiting for provisioning API..."
          sleep 1
        done

        if ! curl -sf $API/health >/dev/null 2>&1; then
          echo "ERROR: Provisioning API not accessible at $API"
          kill $PF_PID 2>/dev/null || true
          exit 1
        fi

        # Create tenant
        echo "Creating tenant..."
        RESULT=$(curl -sf -X POST $API/api/v1/tenants \
          -H "Content-Type: application/json" \
          -d '{"id": "sukko", "name": "Sukko Trading Platform"}' 2>&1) || {
          if echo "$RESULT" | grep -q "already exists"; then
            echo "Tenant already exists, continuing..."
          else
            echo "Tenant creation response: $RESULT"
          fi
        }
        echo "$RESULT" | jq . 2>/dev/null || echo "$RESULT"

        # Set routing rules
        echo "Setting routing rules..."
        RESULT=$(curl -sf -X PUT $API/api/v1/tenants/sukko/routing-rules \
          -H "Content-Type: application/json" \
          -d '{"rules": [{"pattern": "*.trade", "topic_suffix": "trade"}]}' 2>&1) || {
          echo "Routing rules failed: $RESULT"
        }
        echo "$RESULT" | jq . 2>/dev/null || echo "$RESULT"

        # Set channel rules
        echo "Setting channel rules..."
        RESULT=$(curl -sf -X PUT $API/api/v1/tenants/sukko/channel-rules \
          -H "Content-Type: application/json" \
          -d '{"public_patterns": ["*.metadata"], "user_scoped_patterns": ["balances.{subject}"], "group_scoped_patterns": []}' 2>&1) || {
          echo "Channel rules failed: $RESULT"
        }
        echo "$RESULT" | jq . 2>/dev/null || echo "$RESULT"

        echo "Provisioning complete"
        kill $PF_PID 2>/dev/null || true

  provision:status:
    desc: Show tenants and routing rules via provisioning API
    cmds:
      - |
        lsof -ti:{{.K8S_PROVISIONING_LOCAL_PORT}} | xargs kill 2>/dev/null || true
        sleep 1
        kubectl port-forward -n {{.K8S_NAMESPACE}} svc/{{.K8S_RELEASE_NAME}}-provisioning {{.K8S_PROVISIONING_LOCAL_PORT}}:8080 &
        PF_PID=$!
        sleep 2
        API="http://localhost:{{.K8S_PROVISIONING_LOCAL_PORT}}"
        echo "=== Tenants ==="
        curl -s $API/api/v1/tenants | jq .
        echo ""
        echo "=== Routing Rules (sukko) ==="
        curl -s $API/api/v1/tenants/sukko/routing-rules | jq .
        echo ""
        echo "=== Channel Rules (sukko) ==="
        curl -s $API/api/v1/tenants/sukko/channel-rules | jq .
        kill $PF_PID 2>/dev/null || true

  # ===========================================================================
  # Foundation (VPC, static IPs — persists across cluster lifecycle)
  # ===========================================================================
  foundation:init:
    desc: Initialize foundation Terraform
    cmds:
      - terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} init

  foundation:plan:
    desc: Plan foundation changes
    cmds:
      - terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} plan -out=tfplan

  foundation:apply:
    desc: Apply foundation (VPC, static IPs)
    cmds:
      - terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} apply tfplan

  foundation:destroy:
    desc: Destroy foundation (DANGEROUS — loses static IPs)
    prompt: 'This will DESTROY the foundation for {{.PLATFORM}}/{{.K8S_ENV}}. Are you sure?'
    cmds:
      - terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} destroy

  # ===========================================================================
  # Terraform (cluster)
  # ===========================================================================
  tf:init:
    desc: Initialize Terraform
    cmds:
      - terraform -chdir={{.K8S_TF_DIR}} init

  tf:plan:
    desc: Plan infrastructure changes
    cmds:
      - terraform -chdir={{.K8S_TF_DIR}} plan -out=tfplan

  tf:apply:
    desc: Apply infrastructure
    cmds:
      - terraform -chdir={{.K8S_TF_DIR}} apply tfplan

  tf:destroy:
    desc: Destroy infrastructure (DANGEROUS)
    prompt: 'This will DESTROY the {{.PLATFORM}} cluster for {{.K8S_ENV}}. Are you sure?'
    cmds:
      - terraform -chdir={{.K8S_TF_DIR}} destroy
