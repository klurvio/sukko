# =============================================================================
# Remote Kubernetes Tasks (GKE)
# =============================================================================
# Domain: k8s
# Pattern: k8s:{service}:{action} ENV=dev|stg|prod
# ENV is required for all commands

version: "3"

vars:
  K8S_ENV: '{{.ENV | default "dev"}}'
  K8S_NAMESPACE: 'odin-ws-{{.K8S_ENV}}'
  K8S_RELEASE_NAME: odin
  K8S_CHART_PATH: "{{.ROOT_DIR}}/deployments/helm/odin"
  K8S_VALUES_FILE: "{{.ROOT_DIR}}/deployments/helm/odin/values/standard/{{.K8S_ENV}}.yaml"
  K8S_TF_DIR: "{{.ROOT_DIR}}/deployments/terraform/environments/standard/{{.K8S_ENV}}"
  K8S_FOUNDATION_TF_DIR: "{{.ROOT_DIR}}/deployments/terraform/environments/standard/{{.K8S_ENV}}-foundation"
  K8S_MIGRATIONS_DIR: "{{.ROOT_DIR}}/ws/internal/provisioning/repository/migrations"
  K8S_PROJECT: '{{.PROJECT | default "odin-9e902"}}'
  K8S_ZONE: '{{.ZONE | default "us-central1-a"}}'
  K8S_CLUSTER: 'odin-ws-{{.K8S_ENV}}'
  K8S_REGISTRY: 'us-central1-docker.pkg.dev/{{.K8S_PROJECT}}/odin-ws'
  # Ports
  K8S_GATEWAY_PORT: 3006
  K8S_GRAFANA_PORT: 3000
  K8S_PROMETHEUS_PORT: 9090
  K8S_PG_LOCAL_PORT: 45432
  K8S_PROVISIONING_LOCAL_PORT: 48080

includes:
  build:
    taskfile: ./shared/build.yml
    dir: "{{.ROOT_DIR}}"

tasks:
  # ===========================================================================
  # Core Cluster Operations
  # ===========================================================================
  setup:
    desc: Full setup (foundation + cluster + build + deploy)
    cmds:
      - task: foundation:init
      - task: foundation:plan
      - task: foundation:apply
      - task: tf:init
      - task: tf:plan
      - task: tf:apply
      - task: connect
      - task: build
      - task: deploy
      - task: status

  destroy:
    desc: Full teardown
    prompt: 'This will DESTROY everything for {{.K8S_ENV}}. Are you sure?'
    cmds:
      - helm uninstall {{.K8S_RELEASE_NAME}} -n {{.K8S_NAMESPACE}} || true
      - task: tf:destroy

  deploy:
    desc: Deploy/upgrade Helm release
    vars:
      GATEWAY_IP:
        sh: terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} output -raw gateway_external_ip 2>/dev/null || echo ""
      REDPANDA_IP:
        sh: terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} output -raw redpanda_internal_ip 2>/dev/null || echo ""
    cmds:
      - task: connect
      - npx @asyncapi/cli bundle {{.ROOT_DIR}}/ws/docs/asyncapi/client-ws.asyncapi.yaml -o {{.ROOT_DIR}}/ws/docs/asyncapi/bundled.yaml
      - |
        HELM_CMD="helm upgrade --install {{.K8S_RELEASE_NAME}} {{.K8S_CHART_PATH}} -f {{.K8S_VALUES_FILE}} -n {{.K8S_NAMESPACE}} --create-namespace"
        if [ -n "{{.GATEWAY_IP}}" ]; then
          echo "Using Gateway static IP: {{.GATEWAY_IP}}"
          HELM_CMD="$HELM_CMD --set ws-gateway.service.loadBalancerIP={{.GATEWAY_IP}}"
        fi
        if [ -n "{{.REDPANDA_IP}}" ]; then
          echo "Using Redpanda internal IP: {{.REDPANDA_IP}}"
          HELM_CMD="$HELM_CMD --set redpanda.externalAccess.advertisedHost={{.REDPANDA_IP}} --set redpanda.externalAccess.loadBalancerIP={{.REDPANDA_IP}}"
        fi
        DB_PASSWORD=$(kubectl get secret {{.K8S_RELEASE_NAME}}-postgresql -n {{.K8S_NAMESPACE}} -o jsonpath='{.data.postgresql-password}' 2>/dev/null | base64 --decode 2>/dev/null)
        if [ -z "$DB_PASSWORD" ]; then
          DB_PASSWORD=$(openssl rand -hex 16)
          echo "Generated new PostgreSQL password"
        else
          echo "Reusing existing PostgreSQL password from cluster"
        fi
        HELM_CMD="$HELM_CMD --set postgresql.auth.password=$DB_PASSWORD"
        eval $HELM_CMD
      - task: wait-for-db
      - task: db:migrate

  connect:
    desc: Connect kubectl to cluster
    cmds:
      - gcloud container clusters get-credentials {{.K8S_CLUSTER}} --zone {{.K8S_ZONE}} --project {{.K8S_PROJECT}}

  status:
    desc: Show pods and services
    cmds:
      - 'echo "=== Nodes (Spot VMs) ==="'
      - kubectl get nodes -o wide
      - 'echo ""'
      - 'echo "=== Pods ==="'
      - kubectl get pods -n {{.K8S_NAMESPACE}} -o wide
      - 'echo ""'
      - 'echo "=== Services ==="'
      - kubectl get svc -n {{.K8S_NAMESPACE}}

  logs:
    desc: Tail ws-server logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=ws-server -n {{.K8S_NAMESPACE}} --tail=100

  logs:gateway:
    desc: Tail ws-gateway logs
    cmds:
      - kubectl logs -f -l app.kubernetes.io/name=ws-gateway -n {{.K8S_NAMESPACE}} --tail=100

  logs:all:
    desc: Tail all pod logs
    cmds:
      - kubectl logs -f --all-containers=true -l app.kubernetes.io/instance={{.K8S_RELEASE_NAME}} -n {{.K8S_NAMESPACE}} --tail=50

  build:
    desc: Build and push images to registry
    cmds:
      - 'echo "Building and pushing images to {{.K8S_REGISTRY}}..."'
      - task: build:push:all
        vars:
          REGISTRY: "{{.K8S_REGISTRY}}"

  health:
    desc: Check health endpoint
    cmds:
      - |
        WS_IP=$(kubectl get svc -n {{.K8S_NAMESPACE}} -l app.kubernetes.io/name=ws-server -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
        if [ -n "$WS_IP" ]; then
          echo "WS Server IP: $WS_IP"
          curl -s http://$WS_IP:3001/health | jq .
        else
          echo "No external IP found. Try port-forward:"
          echo "  task k8s:port-forward:gateway ENV={{.K8S_ENV}}"
        fi

  reload:
    desc: Restart all pods (no rebuild)
    cmds:
      - kubectl rollout restart deployment -n {{.K8S_NAMESPACE}}
      - kubectl rollout status deployment -n {{.K8S_NAMESPACE}} --timeout=120s

  rollback:
    desc: Rollback to previous release
    cmds:
      - helm rollback {{.K8S_RELEASE_NAME}} -n {{.K8S_NAMESPACE}}

  events:
    desc: Show recent events (useful for Spot preemption)
    cmds:
      - kubectl get events -n {{.K8S_NAMESPACE}} --sort-by='.lastTimestamp' | tail -20

  external-ips:
    desc: Get external IPs for services
    cmds:
      - |
        GATEWAY_IP=$(terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} output -raw gateway_external_ip 2>/dev/null || echo "not set")
        REDPANDA_IP=$(terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} output -raw redpanda_internal_ip 2>/dev/null || echo "not set")
        echo "Gateway (public):        $GATEWAY_IP"
        echo "Redpanda (VPC-internal): $REDPANDA_IP"
        echo ""
        echo "WS_URL=wss://$GATEWAY_IP:443/ws"
        echo "KAFKA_BROKERS=$REDPANDA_IP:9092"

  # ===========================================================================
  # Internal Tasks
  # ===========================================================================
  wait-for-db:
    desc: Wait for postgres to be ready
    internal: true
    cmds:
      - kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=postgresql -n {{.K8S_NAMESPACE}} --timeout=180s

  # ===========================================================================
  # Port Forwarding
  # ===========================================================================
  port-forward:gateway:
    desc: Port-forward ws-gateway
    cmds:
      - kubectl port-forward -n {{.K8S_NAMESPACE}} svc/{{.K8S_RELEASE_NAME}}-ws-gateway {{.K8S_GATEWAY_PORT}}:3000

  port-forward:grafana:
    desc: Port-forward Grafana
    cmds:
      - kubectl port-forward -n {{.K8S_NAMESPACE}} svc/{{.K8S_RELEASE_NAME}}-monitoring-grafana {{.K8S_GRAFANA_PORT}}:3000

  port-forward:prometheus:
    desc: Port-forward Prometheus
    cmds:
      - kubectl port-forward -n {{.K8S_NAMESPACE}} svc/{{.K8S_RELEASE_NAME}}-monitoring-prometheus {{.K8S_PROMETHEUS_PORT}}:9090

  # ===========================================================================
  # Provisioning (Kafka topics + DB tenant)
  # ===========================================================================
  provision:create:
    desc: Create odin tenant + Kafka topics + channel rules
    cmds:
      - |
        lsof -ti:{{.K8S_PROVISIONING_LOCAL_PORT}} | xargs kill 2>/dev/null || true
        sleep 1
        kubectl port-forward -n {{.K8S_NAMESPACE}} svc/{{.K8S_RELEASE_NAME}}-provisioning {{.K8S_PROVISIONING_LOCAL_PORT}}:8080 &
        PF_PID=$!
        sleep 2

        API="http://localhost:{{.K8S_PROVISIONING_LOCAL_PORT}}"

        # Wait for provisioning API
        echo "Checking provisioning API..."
        for i in $(seq 1 10); do
          if curl -sf $API/health >/dev/null 2>&1; then
            echo "Provisioning API ready"
            break
          fi
          echo "Waiting for provisioning API..."
          sleep 1
        done

        if ! curl -sf $API/health >/dev/null 2>&1; then
          echo "ERROR: Provisioning API not accessible at $API"
          kill $PF_PID 2>/dev/null || true
          exit 1
        fi

        # Create tenant
        echo "Creating tenant..."
        RESULT=$(curl -sf -X POST $API/api/v1/tenants \
          -H "Content-Type: application/json" \
          -d '{"id": "odin", "name": "Odin Trading Platform"}' 2>&1) || {
          if echo "$RESULT" | grep -q "already exists"; then
            echo "Tenant already exists, continuing..."
          else
            echo "Tenant creation response: $RESULT"
          fi
        }
        echo "$RESULT" | jq . 2>/dev/null || echo "$RESULT"

        # Create Kafka topics (same 8 categories as local)
        echo "Creating Kafka topics..."
        RESULT=$(curl -sf -X POST $API/api/v1/tenants/odin/topics \
          -H "Content-Type: application/json" \
          -d '{"categories": ["trade", "liquidity", "metadata", "social", "community", "creation", "analytics", "balances"]}' 2>&1) || {
          echo "Topic creation failed: $RESULT"
        }
        echo "$RESULT" | jq . 2>/dev/null || echo "$RESULT"

        # Set channel rules
        echo "Setting channel rules..."
        RESULT=$(curl -sf -X PUT $API/api/v1/tenants/odin/channel-rules \
          -H "Content-Type: application/json" \
          -d '{"public_patterns": ["*.metadata"], "user_scoped_patterns": ["balances.{subject}"], "group_scoped_patterns": []}' 2>&1) || {
          echo "Channel rules failed: $RESULT"
        }
        echo "$RESULT" | jq . 2>/dev/null || echo "$RESULT"

        echo "Provisioning complete"
        kill $PF_PID 2>/dev/null || true

  provision:status:
    desc: Show tenants and topics via provisioning API
    cmds:
      - |
        lsof -ti:{{.K8S_PROVISIONING_LOCAL_PORT}} | xargs kill 2>/dev/null || true
        sleep 1
        kubectl port-forward -n {{.K8S_NAMESPACE}} svc/{{.K8S_RELEASE_NAME}}-provisioning {{.K8S_PROVISIONING_LOCAL_PORT}}:8080 &
        PF_PID=$!
        sleep 2
        API="http://localhost:{{.K8S_PROVISIONING_LOCAL_PORT}}"
        echo "=== Tenants ==="
        curl -s $API/api/v1/tenants | jq .
        echo ""
        echo "=== Topics (odin) ==="
        curl -s $API/api/v1/tenants/odin/topics | jq .
        echo ""
        echo "=== Channel Rules (odin) ==="
        curl -s $API/api/v1/tenants/odin/channel-rules | jq .
        kill $PF_PID 2>/dev/null || true


  # ===========================================================================
  # Foundation (VPC, static IPs - persists across cluster lifecycle)
  # ===========================================================================
  foundation:init:
    desc: Initialize foundation Terraform
    cmds:
      - terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} init

  foundation:plan:
    desc: Plan foundation changes
    cmds:
      - terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} plan -out=tfplan

  foundation:apply:
    desc: Apply foundation (VPC, static IPs)
    cmds:
      - terraform -chdir={{.K8S_FOUNDATION_TF_DIR}} apply tfplan

  # ===========================================================================
  # Terraform (cluster)
  # ===========================================================================
  tf:init:
    desc: Initialize Terraform
    cmds:
      - terraform -chdir={{.K8S_TF_DIR}} init

  tf:plan:
    desc: Plan infrastructure changes
    cmds:
      - terraform -chdir={{.K8S_TF_DIR}} plan -out=tfplan

  tf:apply:
    desc: Apply infrastructure
    cmds:
      - terraform -chdir={{.K8S_TF_DIR}} apply tfplan

  tf:destroy:
    desc: Destroy infrastructure (DANGEROUS)
    prompt: 'This will DESTROY the GKE cluster for {{.K8S_ENV}}. Are you sure?'
    cmds:
      - terraform -chdir={{.K8S_TF_DIR}} destroy

  # ===========================================================================
  # Database
  # ===========================================================================
  db:migrate:
    desc: Run database migrations
    cmds:
      - |
        echo "Running migrations for {{.K8S_ENV}}..."
        # Kill any stale port-forward on this port
        lsof -ti:{{.K8S_PG_LOCAL_PORT}} | xargs kill 2>/dev/null || true
        sleep 1
        # Port-forward PostgreSQL to localhost for local atlas access
        kubectl port-forward -n {{.K8S_NAMESPACE}} svc/{{.K8S_RELEASE_NAME}}-postgresql {{.K8S_PG_LOCAL_PORT}}:5432 &
        PF_PID=$!
        sleep 2
        # Read password from secret
        DB_PASS=$(kubectl get secret {{.K8S_RELEASE_NAME}}-postgresql -n {{.K8S_NAMESPACE}} -o jsonpath='{.data.postgresql-password}' | base64 --decode)
        DB_URL="postgres://odin:${DB_PASS}@localhost:{{.K8S_PG_LOCAL_PORT}}/odin_provisioning?sslmode=disable"
        # atlas returns 0 on success, 2 when no pending migrations
        atlas migrate apply --url "$DB_URL" --dir "file://{{.K8S_MIGRATIONS_DIR}}" || test $? -eq 2
        kill $PF_PID 2>/dev/null || true

  db:status:
    desc: Show migration status
    cmds:
      - |
        lsof -ti:{{.K8S_PG_LOCAL_PORT}} | xargs kill 2>/dev/null || true
        sleep 1
        kubectl port-forward -n {{.K8S_NAMESPACE}} svc/{{.K8S_RELEASE_NAME}}-postgresql {{.K8S_PG_LOCAL_PORT}}:5432 &
        PF_PID=$!
        sleep 2
        DB_PASS=$(kubectl get secret {{.K8S_RELEASE_NAME}}-postgresql -n {{.K8S_NAMESPACE}} -o jsonpath='{.data.postgresql-password}' | base64 --decode)
        DB_URL="postgres://odin:${DB_PASS}@localhost:{{.K8S_PG_LOCAL_PORT}}/odin_provisioning?sslmode=disable"
        atlas migrate status --url "$DB_URL" --dir "file://{{.K8S_MIGRATIONS_DIR}}"
        kill $PF_PID 2>/dev/null || true
