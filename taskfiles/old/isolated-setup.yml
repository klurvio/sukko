version: "3"

# Isolated Three-Instance Setup (GCP Distributed Deployment)
# Based on docs/INSTANCE_ISOLATION_PLAN.md
#
# Docker Compose manifests located in:
#   - deployments/gcp-distributed/ws-server/docker-compose.yml
#   - deployments/gcp-distributed/backend/docker-compose.yml
#   - deployments/gcp-distributed/backend/prometheus.yml
#
# Architecture:
#   - odin-ws-go (e2-small): WebSocket server only
#   - odin-backend (e2-small): NATS, Prometheus, Grafana, Loki, Promtail, Publisher
#   - odin-test-runner (e2-micro): Load testing client (ephemeral)

vars:
  GCP_PROJECT_ID:
    sh: echo "${GCP_PROJECT_ID:-odin-ws-server}"
  GCP_ZONE:
    sh: echo "${GCP_ZONE:-us-central1-a}"

  # Instance names
  WS_GO_INSTANCE: odin-ws-go
  BACKEND_INSTANCE: odin-backend
  TEST_RUNNER_INSTANCE: odin-test-runner

  # Machine types
  WS_GO_MACHINE_TYPE: e2-standard-4
  BACKEND_MACHINE_TYPE: e2-small
  TEST_RUNNER_MACHINE_TYPE: e2-standard-4

  # Get instance IPs dynamically
  WS_GO_EXTERNAL_IP:
    sh: gcloud compute instances describe {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}} --format='get(networkInterfaces[0].accessConfigs[0].natIP)' 2>/dev/null || echo "not-found"
  WS_GO_INTERNAL_IP:
    sh: gcloud compute instances describe {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}} --format='get(networkInterfaces[0].networkIP)' 2>/dev/null || echo "not-found"
  BACKEND_EXTERNAL_IP:
    sh: gcloud compute instances describe {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --format='get(networkInterfaces[0].accessConfigs[0].natIP)' 2>/dev/null || echo "not-found"
  BACKEND_INTERNAL_IP:
    sh: gcloud compute instances describe {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --format='get(networkInterfaces[0].networkIP)' 2>/dev/null || echo "not-found"
  TEST_RUNNER_INTERNAL_IP:
    sh: gcloud compute instances describe {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --format='get(networkInterfaces[0].networkIP)' 2>/dev/null || echo "not-found"

# ============================================================================
# SETUP & PREREQUISITES
# ============================================================================

tasks:
  setup:
    desc: Configure gcloud CLI and authenticate
    cmds:
      - echo "🔧 Setting up GCP environment..."
      - gcloud --version
      - gcloud auth login
      - gcloud config set project {{.GCP_PROJECT_ID}}
      - gcloud config set compute/zone {{.GCP_ZONE}}
      - echo "✅ GCP configuration complete"
      - echo "   Project → {{.GCP_PROJECT_ID}}"
      - echo "   Zone → {{.GCP_ZONE}}"

  firewall:
    desc: Create firewall rules for isolated setup
    cmds:
      - echo "🔥 Creating firewall rules..."

      # WebSocket (ws-go external access)
      - |
        gcloud compute firewall-rules create allow-websocket-isolated \
          --network=default \
          --allow=tcp:3004 \
          --source-ranges=0.0.0.0/0 \
          --target-tags=ws-server \
          --description="Allow WebSocket connections to ws-go" \
          2>/dev/null || echo "⚠️  Rule 'allow-websocket-isolated' exists"

      # Prometheus scraping (backend → ws-go metrics)
      - |
        gcloud compute firewall-rules create allow-prometheus-scrape-isolated \
          --network=default \
          --allow=tcp:3004 \
          --source-tags=backend \
          --target-tags=ws-server \
          --description="Allow Prometheus to scrape ws-go metrics (port 3004)" \
          2>/dev/null || echo "⚠️  Rule 'allow-prometheus-scrape-isolated' exists"

      # NATS client (ws-go → backend NATS)
      - |
        gcloud compute firewall-rules create allow-nats-internal \
          --network=default \
          --allow=tcp:4222 \
          --source-tags=ws-server \
          --target-tags=backend \
          --description="Allow ws-go to connect to NATS" \
          2>/dev/null || echo "⚠️  Rule 'allow-nats-internal' exists"

      # Grafana UI (external access)
      - |
        gcloud compute firewall-rules create allow-grafana-isolated \
          --network=default \
          --allow=tcp:3010 \
          --source-ranges=0.0.0.0/0 \
          --target-tags=backend \
          --description="Allow Grafana UI access" \
          2>/dev/null || echo "⚠️  Rule 'allow-grafana-isolated' exists"

      # Publisher API (testing)
      - |
        gcloud compute firewall-rules create allow-publisher-isolated \
          --network=default \
          --allow=tcp:3003 \
          --source-ranges=0.0.0.0/0 \
          --target-tags=backend \
          --description="Allow Publisher API access" \
          2>/dev/null || echo "⚠️  Rule 'allow-publisher-isolated' exists"

      # Loki log ingestion (ws-go Promtail → backend Loki)
      - |
        gcloud compute firewall-rules create allow-loki-push-isolated \
          --network=default \
          --allow=tcp:3100 \
          --source-tags=ws-server \
          --target-tags=backend \
          --description="Allow ws-go Promtail to push logs to Loki" \
          2>/dev/null || echo "⚠️  Rule 'allow-loki-push-isolated' exists"

      - gcloud compute firewall-rules list --filter="name~'isolated'"
      - echo "✅ Firewall rules configured"

  # ============================================================================
  # INFRASTRUCTURE - CREATE INSTANCES
  # ============================================================================

  create:ws-go:
    desc: Create dedicated ws-go instance (e2-small)
    cmds:
      - echo "🖥️  Creating ws-go instance..."
      - |
        gcloud compute instances create {{.WS_GO_INSTANCE}} \
          --zone={{.GCP_ZONE}} \
          --machine-type={{.WS_GO_MACHINE_TYPE}} \
          --network=default \
          --subnet=default \
          --tags=ws-server \
          --boot-disk-size=10GB \
          --boot-disk-type=pd-standard \
          --image-family=ubuntu-2404-lts-amd64 \
          --image-project=ubuntu-os-cloud \
          --metadata=startup-script='#!/bin/bash
            set -e
            apt-get update
            apt-get install -y curl git

            # Install Docker
            curl -fsSL https://get.docker.com -o get-docker.sh
            sh get-docker.sh

            # Install Docker Compose
            curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            chmod +x /usr/local/bin/docker-compose

            # TCP SYN queue tuning (handle high connection ramp rates)
            # See: docs/production/IMPLEMENTATION_PLAN.md:1048-1120
            sysctl -w net.ipv4.tcp_max_syn_backlog=8192
            sysctl -w net.core.somaxconn=8192
            sysctl -w net.ipv4.tcp_syncookies=1
            printf "net.ipv4.tcp_max_syn_backlog = 8192\nnet.core.somaxconn = 8192\nnet.ipv4.tcp_syncookies = 1\n" >> /etc/sysctl.conf

            # Create deploy user and add to docker group
            useradd -m -s /bin/bash deploy
            usermod -aG docker deploy

            echo "✅ ws-go instance ready"
          '
      - echo "⏳ Waiting for instance to be ready..."
      - sleep 30
      - task: info:ws-go
      - echo "✅ ws-go instance created"

  create:backend:
    desc: Create backend instance (e2-small) for NATS, monitoring, etc.
    cmds:
      - echo "🖥️  Creating backend instance..."
      - |
        gcloud compute instances create {{.BACKEND_INSTANCE}} \
          --zone={{.GCP_ZONE}} \
          --machine-type={{.BACKEND_MACHINE_TYPE}} \
          --network=default \
          --subnet=default \
          --tags=backend \
          --boot-disk-size=20GB \
          --boot-disk-type=pd-standard \
          --image-family=ubuntu-2404-lts-amd64 \
          --image-project=ubuntu-os-cloud \
          --metadata=startup-script='#!/bin/bash
            set -e
            apt-get update
            apt-get install -y curl git

            # Install Docker
            curl -fsSL https://get.docker.com -o get-docker.sh
            sh get-docker.sh

            # Install Docker Compose
            curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            chmod +x /usr/local/bin/docker-compose

            # Create deploy user and add to docker group
            useradd -m -s /bin/bash deploy
            usermod -aG docker deploy

            echo "✅ backend instance ready"
          '
      - echo "⏳ Waiting for instance to be ready..."
      - sleep 30
      - task: info:backend
      - echo "✅ backend instance created"

  create:test-runner:
    desc: Create test runner instance (supports both Node.js and Go test runners)
    cmds:
      - echo "🖥️  Creating test runner instance (e2-standard-4)..."
      - echo "   Supports both Node.js (event loop demo) and Go (7K capacity testing)"
      - |
        gcloud compute instances create {{.TEST_RUNNER_INSTANCE}} \
          --zone={{.GCP_ZONE}} \
          --machine-type={{.TEST_RUNNER_MACHINE_TYPE}} \
          --network=default \
          --subnet=default \
          --tags=test-runner \
          --boot-disk-size=10GB \
          --boot-disk-type=pd-standard \
          --image-family=ubuntu-2404-lts-amd64 \
          --image-project=ubuntu-os-cloud \
          --metadata=startup-script='#!/bin/bash
            set -e
            apt-get update
            apt-get install -y curl

            # Install Docker
            curl -fsSL https://get.docker.com -o get-docker.sh
            sh get-docker.sh

            # TCP tuning for high connection count load testing
            # See: docs/production/IMPLEMENTATION_PLAN.md:1144-1276
            # Increase ephemeral port range (28K → 64K ports)
            sysctl -w net.ipv4.ip_local_port_range="1024 65535"
            # Enable TIME_WAIT socket reuse (critical for high connection tests)
            sysctl -w net.ipv4.tcp_tw_reuse=1
            # Reduce TIME_WAIT timeout (4x faster cleanup)
            sysctl -w net.ipv4.tcp_fin_timeout=15
            # Increase connection tracking table
            sysctl -w net.netfilter.nf_conntrack_max=200000
            printf "net.ipv4.ip_local_port_range = 1024 65535\nnet.ipv4.tcp_tw_reuse = 1\nnet.ipv4.tcp_fin_timeout = 15\nnet.netfilter.nf_conntrack_max = 200000\n" >> /etc/sysctl.conf

            # Create deploy user and add to docker group
            useradd -m -s /bin/bash deploy
            usermod -aG docker deploy

            echo "✅ test-runner instance ready (supports Node.js and Go test runners)"
          '
      - echo "⏳ Waiting for instance to be ready..."
      - sleep 30
      - echo "✅ test-runner instance created"

  create:test-runner-go:
    desc: Create test runner instance for Go-based load testing (alias to create:test-runner)
    cmds:
      - task: create:test-runner

  create:all:
    desc: Create all instances (backend + ws-go + test-runner)
    cmds:
      - task: create:backend
      - task: create:ws-go
      - task: create:test-runner
      - echo ""
      - echo "🎉 All instances created!"
      - task: info:all

  # ============================================================================
  # DEPLOYMENT - COPY FILES & START SERVICES
  # ============================================================================

  deploy:ws-go:
    desc: Deploy ws-go service to dedicated instance
    cmds:
      - echo "📦 Deploying ws-go..."

      # Copy source code (self-contained ws/ directory with go.mod, Dockerfile)
      - echo "📤 Copying ws-server source files..."
      - gcloud compute ssh {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}} --command='rm -rf /tmp/odin-ws_deploy && mkdir -p /tmp/odin-ws_deploy'
      - gcloud compute scp --recurse {{.USER_WORKING_DIR}}/ws {{.WS_GO_INSTANCE}}:/tmp/odin-ws_deploy/ --zone={{.GCP_ZONE}}
      - gcloud compute scp {{.USER_WORKING_DIR}}/deployments/gcp-distributed/ws-server/docker-compose.yml {{.WS_GO_INSTANCE}}:/tmp/odin-ws_deploy/docker-compose.template.yml --zone={{.GCP_ZONE}}
      - gcloud compute scp {{.USER_WORKING_DIR}}/deployments/gcp-distributed/ws-server/promtail-config.yml {{.WS_GO_INSTANCE}}:/tmp/odin-ws_deploy/promtail-config.template.yml --zone={{.GCP_ZONE}}
      - gcloud compute scp {{.USER_WORKING_DIR}}/deployments/gcp-distributed/ws-server/.env.production {{.WS_GO_INSTANCE}}:/tmp/odin-ws_deploy/.env.production --zone={{.GCP_ZONE}}
      - gcloud compute ssh {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo rm -rf /home/deploy/odin-ws && sudo mkdir -p /home/deploy/odin-ws && sudo sh -c "mv /tmp/odin-ws_deploy/* /tmp/odin-ws_deploy/.[!.]* /home/deploy/odin-ws/ 2>/dev/null || true" && sudo chown -R deploy:deploy /home/deploy/odin-ws'

      # Substitute variables and deploy
      - echo "📝 Substituting variables (BACKEND_INTERNAL_IP={{.BACKEND_INTERNAL_IP}})..."
      - |
        gcloud compute ssh {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}} --command="sudo bash -c 'cd /home/deploy/odin-ws && export BACKEND_INTERNAL_IP={{.BACKEND_INTERNAL_IP}} && envsubst < docker-compose.template.yml > docker-compose.yml && envsubst < promtail-config.template.yml > promtail-config.yml && envsubst < .env.production > .env.production.final && mv .env.production.final .env.production'"

      # Build and start
      - echo "🚀 Building and starting ws-go..."
      - gcloud compute ssh {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}} --command="sudo docker compose -f /home/deploy/odin-ws/docker-compose.yml build"
      - gcloud compute ssh {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}} --command="sudo docker compose -f /home/deploy/odin-ws/docker-compose.yml up -d"

      # Wait and check
      - echo "⏳ Waiting for ws-go to start..."
      - sleep 10
      - task: health:ws-go
      - echo "✅ ws-go deployed"

  deploy:backend:
    desc: Deploy backend services (NATS, monitoring, publisher)
    cmds:
      - echo "📦 Deploying backend services..."

      # Copy manifests and configs to deploy user's home
      - echo "📤 Copying manifests and configuration files..."
      - gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --command='rm -rf /tmp/odin-ws_deploy && mkdir -p /tmp/odin-ws_deploy'
      - gcloud compute scp {{.USER_WORKING_DIR}}/deployments/gcp-distributed/backend/docker-compose.yml {{.BACKEND_INSTANCE}}:/tmp/odin-ws_deploy/docker-compose.yml --zone={{.GCP_ZONE}}
      - gcloud compute scp {{.USER_WORKING_DIR}}/deployments/gcp-distributed/backend/prometheus.yml {{.BACKEND_INSTANCE}}:/tmp/odin-ws_deploy/prometheus.template.yml --zone={{.GCP_ZONE}}
      - gcloud compute scp {{.USER_WORKING_DIR}}/deployments/local/configs/loki-config.yml {{.BACKEND_INSTANCE}}:/tmp/odin-ws_deploy/loki-config.yml --zone={{.GCP_ZONE}}
      - gcloud compute scp {{.USER_WORKING_DIR}}/deployments/local/configs/promtail-config.yml {{.BACKEND_INSTANCE}}:/tmp/odin-ws_deploy/promtail-config.yml --zone={{.GCP_ZONE}}
      - gcloud compute scp --recurse {{.USER_WORKING_DIR}}/deployments/local/grafana {{.BACKEND_INSTANCE}}:/tmp/odin-ws_deploy/ --zone={{.GCP_ZONE}}
      - gcloud compute scp --recurse {{.USER_WORKING_DIR}}/publisher {{.BACKEND_INSTANCE}}:/tmp/odin-ws_deploy/ --zone={{.GCP_ZONE}}
      - gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo rm -rf /home/deploy/odin-ws && sudo mkdir -p /home/deploy/odin-ws && sudo mv /tmp/odin-ws_deploy/* /home/deploy/odin-ws/ && sudo chown -R deploy:deploy /home/deploy/odin-ws'

      # Substitute Prometheus config variables
      - echo "📝 Substituting Prometheus variables (WS_GO_INTERNAL_IP={{.WS_GO_INTERNAL_IP}})..."
      - |
        gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --command="sudo bash -c 'cd /home/deploy/odin-ws && export WS_GO_INTERNAL_IP={{.WS_GO_INTERNAL_IP}} && envsubst < prometheus.template.yml > prometheus.yml && cat prometheus.yml'"

      # Build and start
      - echo "🚀 Building and starting backend services..."
      - gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --command="sudo docker compose -f /home/deploy/odin-ws/docker-compose.yml build"
      - gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --command="sudo docker compose -f /home/deploy/odin-ws/docker-compose.yml up -d"

      # Wait and check
      - echo "⏳ Waiting for services to start..."
      - sleep 15
      - task: health:backend
      - echo "✅ Backend services deployed"

  deploy:all:
    desc: Deploy all instances (backend + ws-go + Go test-runner)
    cmds:
      - task: deploy:backend
      - task: deploy:ws-go
      - task: deploy:test-runner-go
      - echo ""
      - echo "🎉 Full deployment complete!"
      - echo ""
      - task: info:all

  deploy:test-runner:
    desc: Deploy Node.js test runner (demonstrates event loop bottleneck)
    cmds:
      - echo "📦 Deploying Node.js test runner to test-runner instance..."
      - |
        echo "⚠️  NOTE: Node.js test runner will hit event loop bottleneck at ~3K connections"

      # Prepare directories
      - gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='rm -rf /tmp/test_runner_deploy && mkdir -p /tmp/test_runner_deploy'

      # Copy test runner files to temp
      - gcloud compute scp {{.USER_WORKING_DIR}}/deployments/gcp-distributed/test-runner/Dockerfile {{.TEST_RUNNER_INSTANCE}}:/tmp/test_runner_deploy/ --zone={{.GCP_ZONE}}
      - gcloud compute scp {{.USER_WORKING_DIR}}/scripts/sustained-load-test.cjs {{.TEST_RUNNER_INSTANCE}}:/tmp/test_runner_deploy/ --zone={{.GCP_ZONE}}
      - gcloud compute scp {{.USER_WORKING_DIR}}/scripts/test-connection-rate.cjs {{.TEST_RUNNER_INSTANCE}}:/tmp/test_runner_deploy/ --zone={{.GCP_ZONE}}
      - gcloud compute scp {{.USER_WORKING_DIR}}/scripts/test-message-throughput.cjs {{.TEST_RUNNER_INSTANCE}}:/tmp/test_runner_deploy/ --zone={{.GCP_ZONE}}

      # Move to deploy user's home and build
      - gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo rm -rf /home/deploy/test-runner && sudo mkdir -p /home/deploy/test-runner && sudo mv /tmp/test_runner_deploy/* /home/deploy/test-runner/ && sudo chown -R deploy:deploy /home/deploy/test-runner'
      - gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker build -t ws-test-runner /home/deploy/test-runner'
      - echo "✅ Node.js test runner deployed and built"

  deploy:test-runner-go:
    desc: Deploy Go test runner (solves event loop bottleneck - RECOMMENDED)
    cmds:
      - echo "📦 Deploying Go test runner to test-runner instance..."
      - echo "✨ Go test runner uses goroutines - no event loop bottleneck!"

      # Prepare directories
      - gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='rm -rf /tmp/test_runner_go_deploy && mkdir -p /tmp/test_runner_go_deploy'

      # Copy Go test runner files (self-contained loadtest directory)
      - echo "📤 Copying loadtest tool..."
      - gcloud compute scp --recurse {{.USER_WORKING_DIR}}/loadtest {{.TEST_RUNNER_INSTANCE}}:/tmp/test_runner_go_deploy/ --zone={{.GCP_ZONE}}

      # Move to deploy user's home and build
      - gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo rm -rf /home/deploy/loadtest && sudo mkdir -p /home/deploy/loadtest && sudo mv /tmp/test_runner_go_deploy/loadtest/* /home/deploy/loadtest/ && sudo chown -R deploy:deploy /home/deploy/loadtest'
      - echo "🔨 Building loadtest image (goroutine-based, no event loop bottleneck)..."
      - gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker build -t loadtest /home/deploy/loadtest'
      - echo "✅ Go test runner deployed and built"

  # ============================================================================
  # HEALTH & STATUS
  # ============================================================================

  health:ws-go:
    desc: Check ws-go health
    cmds:
      - echo "🏥 Checking ws-go health..."
      - |
        curl -s http://{{.WS_GO_EXTERNAL_IP}}:3004/health | jq '.' || echo "❌ Health check failed"

  health:backend:
    desc: Check backend services health
    cmds:
      - echo "🏥 Checking backend services..."
      - echo ""
      - echo "📊 NATS status:"
      - gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --command="curl -s http://localhost:8222/varz | jq -r '.server_name, .version'" && echo "✅ NATS running" || echo "❌ NATS check failed"
      - echo ""
      - echo "📈 Prometheus status:"
      - gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --command="curl -s http://localhost:9091/-/ready" && echo "✅ Prometheus ready" || echo "❌ Prometheus not ready"
      - echo ""
      - echo "📉 Grafana status:"
      - curl -s http://{{.BACKEND_EXTERNAL_IP}}:3010/api/health | jq '.' || echo "❌ Grafana check failed"

  health:test-runner:
    desc: Check test-runner instance status
    cmds:
      - echo "🏥 Checking test-runner instance..."
      - gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command="sudo docker --version" && echo "✅ Test-runner ready" || echo "❌ Test-runner not accessible"

  health:all:
    desc: Check health of all services
    cmds:
      - task: health:backend
      - echo ""
      - task: health:ws-go
      - echo ""
      - task: health:test-runner

  info:ws-go:
    desc: Show ws-go instance information
    cmds:
      - echo "📍 ws-go Instance Info:"
      - echo "   Name → {{.WS_GO_INSTANCE}}"
      - echo "   Zone → {{.GCP_ZONE}}"
      - echo "   External IP → {{.WS_GO_EXTERNAL_IP}}"
      - echo "   Internal IP → {{.WS_GO_INTERNAL_IP}}"
      - echo "   WebSocket → ws://{{.WS_GO_EXTERNAL_IP}}:3004/ws"
      - echo "   Health → http://{{.WS_GO_EXTERNAL_IP}}:3004/health"
      - echo "   Metrics → http://{{.WS_GO_EXTERNAL_IP}}:3004/metrics"

  info:backend:
    desc: Show backend instance information
    cmds:
      - echo "📍 Backend Instance Info:"
      - echo "   Name → {{.BACKEND_INSTANCE}}"
      - echo "   Zone → {{.GCP_ZONE}}"
      - echo "   External IP → {{.BACKEND_EXTERNAL_IP}}"
      - echo "   Internal IP → {{.BACKEND_INTERNAL_IP}}"
      - echo "   Grafana → http://{{.BACKEND_EXTERNAL_IP}}:3010"
      - echo "   Prometheus → http://{{.BACKEND_EXTERNAL_IP}}:9091"
      - echo "   Publisher → http://{{.BACKEND_EXTERNAL_IP}}:3003"

  info:test-runner:
    desc: Show test-runner instance information
    cmds:
      - echo "📍 Test Runner Instance Info:"
      - echo "   Name → {{.TEST_RUNNER_INSTANCE}}"
      - echo "   Zone → {{.GCP_ZONE}}"
      - echo "   Internal IP → {{.TEST_RUNNER_INTERNAL_IP}}"
      - echo "   Machine Type → {{.TEST_RUNNER_MACHINE_TYPE}}"
      - echo "   Resources → 4 vCPU (sustained), 16GB RAM"

  info:all:
    desc: Show information for all instances
    cmds:
      - task: info:backend
      - echo ""
      - task: info:ws-go
      - echo ""
      - task: info:test-runner
      - echo ""
      - echo "🔗 Quick Access:"
      - echo "   Grafana → http://{{.BACKEND_EXTERNAL_IP}}:3010 (admin/admin)"
      - echo "   Test WS → wscat -c ws://{{.WS_GO_EXTERNAL_IP}}:3004/ws"

  list:
    desc: List all running VMs in the project
    cmds:
      - echo "🖥️  Listing all compute instances..."
      - gcloud compute instances list

  ip:
    desc: Show key URLs (quick access)
    cmds:
      - echo "🔗 WebSocket Server:"
      - echo "ws://{{.WS_GO_EXTERNAL_IP}}:3004/ws"
      - echo ""
      - echo "🏥 Health Check:"
      - echo "http://{{.WS_GO_EXTERNAL_IP}}:3004/health"
      - echo ""
      - echo "📊 Grafana:"
      - echo "http://{{.BACKEND_EXTERNAL_IP}}:3010"
      - echo "(admin/admin)"
      - echo ""
      - echo "📡 Publisher:"
      - echo "http://{{.BACKEND_EXTERNAL_IP}}:3003"

  # ============================================================================
  # SSH & LOGS
  # ============================================================================

  ssh:ws-go:
    desc: SSH into ws-go instance
    cmds:
      - gcloud compute ssh {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}}

  ssh:backend:
    desc: SSH into backend instance
    cmds:
      - gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}}

  logs:ws-go:
    desc: Show ws-go logs
    cmds:
      - gcloud compute ssh {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker compose -f /home/deploy/odin-ws/docker-compose.yml logs -f --tail=100'

  logs:backend:
    desc: Show backend services logs
    cmds:
      - gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker compose -f /home/deploy/odin-ws/docker-compose.yml logs -f --tail=100'

  logs:nats:
    desc: Show NATS logs
    cmds:
      - gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker logs -f odin-nats'

  logs:prometheus:
    desc: Show Prometheus logs
    cmds:
      - gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker logs -f odin-prometheus'

  # ============================================================================
  # PUBLISHER CONTROL
  # ============================================================================

  publisher:health:
    desc: Check publisher health
    cmds:
      - curl -s http://{{.BACKEND_EXTERNAL_IP}}:3003/health | jq '.'

  publisher:stats:
    desc: Show publisher statistics
    cmds:
      - curl -s http://{{.BACKEND_EXTERNAL_IP}}:3003/stats | jq '.'

  publisher:start:
    desc: Start publishing messages (25 msg/sec - production rate)
    cmds:
      - echo "▶️  Starting publisher..."
      - |
        curl -X POST http://{{.BACKEND_EXTERNAL_IP}}:3003/control \
          -H "Content-Type: application/json" \
          -d '{"action": "start", "messagesPerSecond": 25, "connections": 7000}' | jq '.'
      - echo ""
      - echo "✅ Publisher started (25 messages/sec - production rate)"

  publisher:stop:
    desc: Stop publishing messages
    cmds:
      - echo "⏹️  Stopping publisher..."
      - |
        curl -X POST http://{{.BACKEND_EXTERNAL_IP}}:3003/control \
          -H "Content-Type: application/json" \
          -d '{"action": "stop"}' | jq '.'

  publisher:start:high:
    desc: Start publishing at high rate (50 msg/sec)
    cmds:
      - echo "▶️  Starting publisher at high rate..."
      - |
        curl -X POST http://{{.BACKEND_EXTERNAL_IP}}:3003/control \
          -H "Content-Type: application/json" \
          -d '{"action": "start", "messagesPerSecond": 50, "connections": 7000}' | jq '.'
      - echo ""
      - echo "✅ Publisher started (50 messages/sec - high rate)"

  # ============================================================================
  # TESTING
  # ============================================================================

  test:connection:
    desc: Test WebSocket connection
    cmds:
      - echo "🧪 Testing WebSocket connection..."
      - wscat -c ws://{{.WS_GO_EXTERNAL_IP}}:3004/ws

  test:light:
    desc: Light load test (1,000 connections, 60s)
    cmds:
      - echo "🧪 Running light load test..."
      - WS_URL=ws://{{.WS_GO_EXTERNAL_IP}}:3004/ws HEALTH_URL=http://{{.WS_GO_EXTERNAL_IP}}:3004/health WS_MAX_CONNECTIONS=7000 TARGET_CONNECTIONS=1000 DURATION=60 node scripts/sustained-load-test.cjs

  test:medium:
    desc: Medium load test (5,000 connections, 300s)
    cmds:
      - echo "🧪 Running medium load test..."
      - WS_URL=ws://{{.WS_GO_EXTERNAL_IP}}:3004/ws HEALTH_URL=http://{{.WS_GO_EXTERNAL_IP}}:3004/health WS_MAX_CONNECTIONS=7000 TARGET_CONNECTIONS=5000 DURATION=300 node scripts/sustained-load-test.cjs

  test:capacity:
    desc: Production capacity test (7,000 connections - target, 600s)
    cmds:
      - echo "🧪 Running production capacity test..."
      - WS_URL=ws://{{.WS_GO_EXTERNAL_IP}}:3004/ws HEALTH_URL=http://{{.WS_GO_EXTERNAL_IP}}:3004/health WS_MAX_CONNECTIONS=7000 TARGET_CONNECTIONS=7000 DURATION=600 node scripts/sustained-load-test.cjs

  test:overload:
    desc: Overload test (10,000 connections, should reject 3K gracefully)
    cmds:
      - echo "🧪 Running overload test (expect rejections above 7K)..."
      - WS_URL=ws://{{.WS_GO_EXTERNAL_IP}}:3004/ws HEALTH_URL=http://{{.WS_GO_EXTERNAL_IP}}:3004/health WS_MAX_CONNECTIONS=7000 TARGET_CONNECTIONS=10000 DURATION=300 node scripts/sustained-load-test.cjs

  # Remote tests (run in Docker on test-runner instance using Go - no event loop bottleneck)
  test:remote:light:
    desc: Light load test (1,000 connections, 60s) - runs remotely with Go test runner
    cmds:
      - echo "🧪 Running light load test remotely (Go)..."
      - |
        gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker run --rm \
          -e WS_URL=ws://{{.WS_GO_INTERNAL_IP}}:3004/ws \
          -e HEALTH_URL=http://{{.WS_GO_INTERNAL_IP}}:3004/health \
          -e WS_MAX_CONNECTIONS=7000 \
          -e TARGET_CONNECTIONS=1000 \
          -e DURATION=60 \
          loadtest'

  test:remote:medium:
    desc: Medium load test (5,000 connections, 300s) - runs remotely with Go test runner
    cmds:
      - echo "🧪 Running medium load test remotely (Go)..."
      - |
        gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker run --rm \
          -e WS_URL=ws://{{.WS_GO_INTERNAL_IP}}:3004/ws \
          -e HEALTH_URL=http://{{.WS_GO_INTERNAL_IP}}:3004/health \
          -e WS_MAX_CONNECTIONS=7000 \
          -e TARGET_CONNECTIONS=5000 \
          -e DURATION=300 \
          loadtest'

  test:remote:capacity:
    desc: Production capacity test (12,000 connections - target, 3600s) - runs remotely with Go test runner
    cmds:
      - echo "🧪 Running production capacity test remotely (Go)..."
      - |
        gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker run --rm \
          --ulimit nofile=200000:200000 \
          -e WS_URL=ws://{{.WS_GO_INTERNAL_IP}}:3004/ws \
          -e HEALTH_URL=http://{{.WS_GO_INTERNAL_IP}}:3004/health \
          -e WS_MAX_CONNECTIONS=12000 \
          -e TARGET_CONNECTIONS=12000 \
          -e DURATION=3600 \
          loadtest'

  test:remote:overload:
    desc: Overload test (10,000 connections - should reject excess, 300s) - runs remotely with Go test runner
    cmds:
      - echo "🧪 Running overload test remotely (Go) - expect rejections above 7K..."
      - |
        gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker run --rm \
          --ulimit nofile=200000:200000 \
          -e WS_URL=ws://{{.WS_GO_INTERNAL_IP}}:3004/ws \
          -e HEALTH_URL=http://{{.WS_GO_INTERNAL_IP}}:3004/health \
          -e WS_MAX_CONNECTIONS=7000 \
          -e TARGET_CONNECTIONS=10000 \
          -e DURATION=300 \
          loadtest'

  # ============================================================================
  # SPLIT TESTING STRATEGY - Isolate connection capacity from message throughput
  # ============================================================================

  test:throughput:500:
    desc: MESSAGE THROUGHPUT - 500 connections with full message load (5 min)
    cmds:
      - echo "📊 Running message throughput test (500 connections)..."
      - WS_URL=ws://{{.WS_GO_EXTERNAL_IP}}:3004/ws TARGET_CONNECTIONS=500 DURATION=300 node scripts/test-message-throughput.cjs

  test:throughput:1000:
    desc: MESSAGE THROUGHPUT - 1000 connections with full message load (5 min)
    cmds:
      - echo "📊 Running message throughput test (1000 connections)..."
      - WS_URL=ws://{{.WS_GO_EXTERNAL_IP}}:3004/ws TARGET_CONNECTIONS=1000 DURATION=300 node scripts/test-message-throughput.cjs

  test:capacity:5k:
    desc: CONNECTION CAPACITY - 5000 connections without messages (5 min)
    cmds:
      - echo "🔌 Running connection capacity test (5000 connections, no messages)..."
      - WS_URL=ws://{{.WS_GO_EXTERNAL_IP}}:3004/ws TARGET_CONNECTIONS=5000 DURATION=300 node scripts/test-connection-rate.cjs

  test:capacity:10k:
    desc: CONNECTION CAPACITY - 10000 connections without messages (5 min)
    cmds:
      - echo "🔌 Running connection capacity test (10000 connections, no messages)..."
      - WS_URL=ws://{{.WS_GO_EXTERNAL_IP}}:3004/ws TARGET_CONNECTIONS=10000 DURATION=300 node scripts/test-connection-rate.cjs

  # ============================================================================
  # REMOTE SPLIT TESTING - Run tests from test-runner instance (eliminates local client bottlenecks)
  # ============================================================================

  test:remote:throughput:500:
    desc: REMOTE MESSAGE THROUGHPUT - 500 connections with full message load (5 min)
    cmds:
      - echo "📊 Running remote message throughput test (500 connections)..."
      - |
        gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker run --rm \
          -e WS_URL=ws://{{.WS_GO_INTERNAL_IP}}:3004/ws \
          -e TARGET_CONNECTIONS=500 \
          -e DURATION=300 \
          ws-test-runner node test-message-throughput.cjs'

  test:remote:throughput:1000:
    desc: REMOTE MESSAGE THROUGHPUT - 1000 connections with full message load (5 min)
    cmds:
      - echo "📊 Running remote message throughput test (1000 connections)..."
      - |
        gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker run --rm \
          -e WS_URL=ws://{{.WS_GO_INTERNAL_IP}}:3004/ws \
          -e TARGET_CONNECTIONS=1000 \
          -e DURATION=300 \
          ws-test-runner node test-message-throughput.cjs'

  test:remote:capacity:5k:
    desc: REMOTE CONNECTION CAPACITY - 5000 connections without messages (5 min)
    cmds:
      - echo "🔌 Running remote connection capacity test (5000 connections, no messages)..."
      - |
        gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker run --rm \
          -e WS_URL=ws://{{.WS_GO_INTERNAL_IP}}:3004/ws \
          -e TARGET_CONNECTIONS=5000 \
          -e DURATION=300 \
          ws-test-runner node test-connection-rate.cjs'

  test:remote:capacity:10k:
    desc: REMOTE CONNECTION CAPACITY - 10000 connections without messages (5 min)
    cmds:
      - echo "🔌 Running remote connection capacity test (10000 connections, no messages)..."
      - |
        gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker run --rm \
          -e WS_URL=ws://{{.WS_GO_INTERNAL_IP}}:3004/ws \
          -e TARGET_CONNECTIONS=10000 \
          -e DURATION=300 \
          ws-test-runner node test-connection-rate.cjs'

  test:remote:capacity:7k:
    desc: REMOTE CONNECTION CAPACITY - 7000 connections production target (10 min)
    cmds:
      - echo "🔌 Running remote connection capacity test (7000 connections - production target)..."
      - |
        gcloud compute ssh {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --command='sudo docker run --rm \
          --ulimit nofile=200000:200000 \
          -e WS_URL=ws://{{.WS_GO_INTERNAL_IP}}:3004/ws \
          -e TARGET_CONNECTIONS=7000 \
          -e DURATION=600 \
          ws-test-runner node test-connection-rate.cjs'

  # ============================================================================
  # RESTART & UPDATE
  # ============================================================================

  restart:ws-go:
    desc: Restart ws-go service
    cmds:
      - echo "🔄 Restarting ws-go..."
      - gcloud compute ssh {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}} --command="sudo docker compose -f /home/deploy/odin-ws/docker-compose.yml restart"
      - sleep 5
      - task: health:ws-go

  restart:backend:
    desc: Restart backend services
    cmds:
      - echo "🔄 Restarting backend services..."
      - gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --command="sudo docker compose -f /home/deploy/odin-ws/docker-compose.yml restart"
      - sleep 10
      - task: health:backend

  restart:test-runner:
    desc: Restart test-runner (no-op - no persistent services)
    cmds:
      - echo "ℹ️  Test-runner has no persistent services to restart"

  restart:all:
    desc: Restart all services
    cmds:
      - task: restart:backend
      - task: restart:ws-go
      - task: restart:test-runner
      - echo "✅ All services restarted"

  update:ws-go:
    desc: Update ws-go code and restart
    cmds:
      - echo "📦 Updating ws-go..."
      - gcloud compute scp --recurse {{.USER_WORKING_DIR}}/src {{.WS_GO_INSTANCE}}:/tmp/ --zone={{.GCP_ZONE}}
      - gcloud compute ssh {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}} --command="sudo rm -rf /home/deploy/odin-ws/src && sudo mv /tmp/src /home/deploy/odin-ws/ && sudo chown -R deploy:deploy /home/deploy/odin-ws/src"
      - gcloud compute ssh {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}} --command="sudo docker compose -f /home/deploy/odin-ws/docker-compose.yml build && sudo docker compose -f /home/deploy/odin-ws/docker-compose.yml up -d"
      - sleep 5
      - task: health:ws-go

  update:config:ws-go:
    desc: Update ws-go configuration (rebuild required)
    cmds:
      - echo "📝 Updating ws-go configuration..."
      - task: deploy:ws-go

  # ============================================================================
  # CLEANUP
  # ============================================================================

  stop:ws-go:
    desc: Stop ws-go service (keep instance running)
    cmds:
      - echo "⏹️  Stopping ws-go..."
      - gcloud compute ssh {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}} --command="sudo docker compose -f /home/deploy/odin-ws/docker-compose.yml down"

  stop:backend:
    desc: Stop backend services (keep instance running)
    cmds:
      - echo "⏹️  Stopping backend services..."
      - gcloud compute ssh {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --command="sudo docker compose -f /home/deploy/odin-ws/docker-compose.yml down"

  stop:test-runner:
    desc: Stop test-runner (no-op - no persistent services)
    cmds:
      - echo "ℹ️  Test-runner has no persistent services to stop"

  stop:all:
    desc: Stop all services (keep instances running)
    cmds:
      - task: stop:ws-go
      - task: stop:backend
      - task: stop:test-runner
      - echo "✅ All services stopped"

  delete:ws-go:
    desc: Delete ws-go instance
    cmds:
      - echo "🗑️  Deleting ws-go instance..."
      - gcloud compute instances delete {{.WS_GO_INSTANCE}} --zone={{.GCP_ZONE}} --quiet || echo "⚠️  Instance {{.WS_GO_INSTANCE}} not found or already deleted"

  delete:backend:
    desc: Delete backend instance
    cmds:
      - echo "🗑️  Deleting backend instance..."
      - gcloud compute instances delete {{.BACKEND_INSTANCE}} --zone={{.GCP_ZONE}} --quiet || echo "⚠️  Instance {{.BACKEND_INSTANCE}} not found or already deleted"

  delete:test-runner:
    desc: Delete test-runner instance
    cmds:
      - echo "🗑️  Deleting test-runner instance..."
      - gcloud compute instances delete {{.TEST_RUNNER_INSTANCE}} --zone={{.GCP_ZONE}} --quiet || echo "⚠️  Instance {{.TEST_RUNNER_INSTANCE}} not found or already deleted"

  delete:all:
    desc: Delete all instances
    cmds:
      - task: delete:ws-go
      - task: delete:backend
      - task: delete:test-runner
      - echo "✅ All instances deleted"

  cleanup:firewall:
    desc: Delete firewall rules
    cmds:
      - echo "🗑️  Cleaning up firewall rules..."
      - gcloud compute firewall-rules delete allow-websocket-isolated --quiet || true
      - gcloud compute firewall-rules delete allow-prometheus-scrape-isolated --quiet || true
      - gcloud compute firewall-rules delete allow-nats-internal --quiet || true
      - gcloud compute firewall-rules delete allow-loki-push-isolated --quiet || true
      - gcloud compute firewall-rules delete allow-grafana-isolated --quiet || true
      - gcloud compute firewall-rules delete allow-publisher-isolated --quiet || true
      - echo "✅ Firewall rules cleaned up"

  cleanup:all:
    desc: Delete everything (instances + firewall rules)
    cmds:
      - task: delete:all
      - task: cleanup:firewall
      - echo "🎉 Complete cleanup done"
