version: "3"

# =============================================================================
# GCP v2 - Publisher Tasks
# =============================================================================
# Manage publisher container on GCP VM

vars:
  # Environment (develop, staging)
  ENV: '{{.ENV | default "develop"}}'
  V2_DEPLOY_DIR: '{{.USER_WORKING_DIR}}/deployments/gcp/v2'
  V2_ENV_FILE: '{{.V2_DEPLOY_DIR}}/environments/{{.ENV}}.env'
  # Read GCP_PROJECT from env file, with fallback
  GCP_PROJECT:
    sh: grep -E '^GCP_PROJECT=' "{{.V2_ENV_FILE}}" 2>/dev/null | cut -d= -f2 || echo "{{.GCP_PROJECT}}"
  GCP_ZONE:
    sh: grep -E '^GCP_ZONE=' "{{.V2_ENV_FILE}}" 2>/dev/null | cut -d= -f2 || echo "us-central1-a"
  INSTANCE_NAME: 'odin-tools-{{.ENV}}'
  REMOTE_DIR: '/home/deploy/odin-ws'

  # Publisher defaults (can be overridden via CLI)
  RATE: '{{.RATE | default "25"}}'
  LINES: '{{.LINES | default "100"}}'

tasks:
  # ===========================================================================
  # Container Management
  # ===========================================================================

  start:
    desc: Start publisher container and trigger API (RATE=1, TOKENS=BTC,ETH,SOL)
    vars:
      TOKENS: '{{.TOKENS | default "BTC,ETH,SOL"}}'
    cmds:
      - echo "Starting publisher on {{.INSTANCE_NAME}} ({{.RATE}} events/sec, tokens={{.TOKENS}})..."
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            PUBLISH_RATE={{.RATE}} sudo -E docker-compose --env-file environments/{{.ENV}}.env \
            --profile publisher up -d"
      - echo "Waiting for publisher API to be ready..."
      - sleep 3
      - |
        # Convert TOKENS to JSON array and call /start API
        TOKENS_JSON=$(echo '{{.TOKENS}}' | awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"", $i; if(i<NF) printf ","} printf "]"}')
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="curl -s -X POST http://localhost:3003/start \
            -H 'Content-Type: application/json' \
            -d '{\"rate\": {{.RATE}}, \"tokenIds\": ${TOKENS_JSON}}'"
      - echo ""
      - echo "Publisher started. Use 'task gcp:v2:publisher:logs' to view logs."

  stop:
    desc: Stop publisher container
    cmds:
      - echo "Stopping publisher on {{.INSTANCE_NAME}}..."
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            sudo docker-compose --profile publisher stop publisher"
      - echo "Publisher stopped."

  restart:
    desc: Restart publisher container
    cmds:
      - task: stop
      - task: start

  logs:
    desc: View publisher logs
    cmds:
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            sudo docker-compose logs --tail={{.LINES}} -f publisher"

  status:
    desc: Show publisher container status
    cmds:
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            sudo docker-compose ps publisher"

  # ===========================================================================
  # Rate Control
  # ===========================================================================

  set-rate:
    desc: Update publish rate (requires restart)
    cmds:
      - echo "Setting publish rate to {{.RATE}} events/sec..."
      - task: stop
      - task: start

  # ===========================================================================
  # Utilities
  # ===========================================================================

  shell:
    desc: Open shell in publisher container
    cmds:
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            sudo docker-compose --profile publisher exec publisher /bin/sh"

  health:
    desc: Check publisher health endpoint
    cmds:
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="curl -s http://localhost:3003/health || echo 'Publisher not responding'"
