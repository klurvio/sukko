version: "3"

# =============================================================================
# GCP v2 - Loadtest Tasks
# =============================================================================
# Manage loadtest container on GCP VM

vars:
  # Environment (develop, staging)
  ENV: '{{.ENV | default "develop"}}'
  GCP_PROJECT: '{{.GCP_PROJECT | default "your-project-id"}}'
  GCP_ZONE: '{{.GCP_ZONE | default "us-central1-a"}}'
  INSTANCE_NAME: 'odin-tools-{{.ENV}}'
  REMOTE_DIR: '/home/deploy/odin-ws'

  # Loadtest defaults (can be overridden via CLI)
  CONNECTIONS: '{{.CONNECTIONS | default "18000"}}'
  RAMP_RATE: '{{.RAMP_RATE | default "100"}}'
  DURATION: '{{.DURATION | default "1800"}}'
  LINES: '{{.LINES | default "100"}}'

tasks:
  # ===========================================================================
  # Container Management
  # ===========================================================================

  start:
    desc: Start loadtest container
    cmds:
      - echo "Starting loadtest on {{.INSTANCE_NAME}}..."
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            sudo docker-compose --env-file environments/{{.ENV}}.env \
            --profile loadtest up -d"
      - echo "Loadtest started. Use 'task gcp:v2:loadtest:logs' to view logs."

  stop:
    desc: Stop loadtest container
    cmds:
      - echo "Stopping loadtest on {{.INSTANCE_NAME}}..."
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            sudo docker-compose --profile loadtest stop loadtest"
      - echo "Loadtest stopped."

  restart:
    desc: Restart loadtest container
    cmds:
      - task: stop
      - task: start

  logs:
    desc: View loadtest logs
    cmds:
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            sudo docker-compose logs --tail={{.LINES}} -f loadtest"

  status:
    desc: Show loadtest container status
    cmds:
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            sudo docker-compose ps loadtest"

  # ===========================================================================
  # Test Profiles
  # ===========================================================================

  run:
    desc: Run loadtest with custom parameters (CONNECTIONS=1000 DURATION=300)
    cmds:
      - echo "Running loadtest {{.CONNECTIONS}} connections, {{.DURATION}}s duration..."
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            sudo docker-compose --env-file environments/{{.ENV}}.env run --rm \
            -e TARGET_CONNECTIONS={{.CONNECTIONS}} \
            -e RAMP_RATE={{.RAMP_RATE}} \
            -e DURATION={{.DURATION}} \
            loadtest"

  capacity:
    desc: Run capacity test (18K connections, 30 min)
    cmds:
      - echo "Running capacity test 18,000 connections for 30 minutes..."
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            sudo docker-compose --env-file environments/{{.ENV}}.env run --rm \
            -e TARGET_CONNECTIONS=18000 \
            -e RAMP_RATE=100 \
            -e DURATION=1800 \
            loadtest"

  stress:
    desc: Run stress test (overload, find breaking point)
    cmds:
      - echo "Running stress test 25,000 connections..."
      - echo "WARNING This may exceed system capacity"
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            sudo docker-compose --env-file environments/{{.ENV}}.env run --rm \
            -e TARGET_CONNECTIONS=25000 \
            -e RAMP_RATE=200 \
            -e DURATION=900 \
            loadtest"

  quick:
    desc: Quick smoke test (100 connections, 60s)
    cmds:
      - echo "Running quick smoke test 100 connections for 60 seconds..."
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            sudo docker-compose --env-file environments/{{.ENV}}.env run --rm \
            -e TARGET_CONNECTIONS=100 \
            -e RAMP_RATE=10 \
            -e DURATION=60 \
            loadtest"

  # ===========================================================================
  # Utilities
  # ===========================================================================

  shell:
    desc: Open shell in loadtest container
    cmds:
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && \
            sudo docker-compose --profile loadtest exec loadtest /bin/sh"
