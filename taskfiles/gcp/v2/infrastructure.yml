version: "3"

# =============================================================================
# GCP v2 - Infrastructure Management
# =============================================================================
# VM create, delete, setup, SSH access

vars:
  # Environment (develop, staging)
  ENV: '{{.ENV | default "develop"}}'
  V2_DEPLOY_DIR: '{{.USER_WORKING_DIR}}/deployments/gcp/v2'
  V2_ENV_FILE: '{{.V2_DEPLOY_DIR}}/environments/{{.ENV}}.env'
  # Read GCP_PROJECT from env file, with fallback
  GCP_PROJECT:
    sh: grep -E '^GCP_PROJECT=' "{{.V2_ENV_FILE}}" 2>/dev/null | cut -d= -f2 || echo "{{.GCP_PROJECT}}"
  GCP_ZONE:
    sh: grep -E '^GCP_ZONE=' "{{.V2_ENV_FILE}}" 2>/dev/null | cut -d= -f2 || echo "us-central1-a"
  INSTANCE_NAME: 'odin-tools-{{.ENV}}'
  MACHINE_TYPE:
    sh: grep -E '^MACHINE_TYPE=' "{{.V2_ENV_FILE}}" 2>/dev/null | cut -d= -f2 || echo "e2-standard-8"
  BOOT_DISK_SIZE: '{{.BOOT_DISK_SIZE | default "50GB"}}'
  REMOTE_DIR: '/home/deploy/odin-ws'
  SYNC_TEMP_DIR: '/tmp/{{.INSTANCE_NAME}}-sync'

tasks:
  # ===========================================================================
  # VM Lifecycle
  # ===========================================================================

  create:
    desc: Create GCP VM for loadtest/publisher
    cmds:
      - echo "Creating VM {{.INSTANCE_NAME}} ({{.MACHINE_TYPE}})..."
      - |
        gcloud compute instances create {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --machine-type={{.MACHINE_TYPE}} \
          --image-family=ubuntu-2204-lts \
          --image-project=ubuntu-os-cloud \
          --boot-disk-size={{.BOOT_DISK_SIZE}} \
          --boot-disk-type=pd-ssd \
          --tags=odin-tools \
          --scopes=compute-rw,storage-ro \
          --metadata=enable-oslogin=TRUE
      - echo ""
      - echo "VM created. Run 'task gcp:v2:setup ENV={{.ENV}}' to initialize."

  create-spot:
    desc: Create Spot VM (cheaper, preemptible)
    cmds:
      - echo "Creating Spot VM {{.INSTANCE_NAME}} ({{.MACHINE_TYPE}})..."
      - |
        gcloud compute instances create {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --machine-type={{.MACHINE_TYPE}} \
          --image-family=ubuntu-2204-lts \
          --image-project=ubuntu-os-cloud \
          --boot-disk-size={{.BOOT_DISK_SIZE}} \
          --boot-disk-type=pd-ssd \
          --tags=odin-tools \
          --scopes=compute-rw,storage-ro \
          --provisioning-model=SPOT \
          --instance-termination-action=STOP \
          --metadata=enable-oslogin=TRUE
      - echo ""
      - echo "Spot VM created. Run 'task gcp:v2:setup ENV={{.ENV}}' to initialize."

  delete:
    desc: Delete GCP VM
    cmds:
      - echo "Deleting VM {{.INSTANCE_NAME}}..."
      - |
        gcloud compute instances delete {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --quiet
      - echo "VM deleted."

  delete-all:
    desc: Delete VMs for all environments (develop, staging, production)
    cmds:
      - echo "Deleting all GCP v2 VMs..."
      - echo ""
      - for: [develop, staging, production]
        cmd: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Deleting odin-tools-{{.ITEM}}..."
          GCP_PROJECT=$(grep -E '^GCP_PROJECT=' "{{.V2_DEPLOY_DIR}}/environments/{{.ITEM}}.env" 2>/dev/null | cut -d= -f2)
          GCP_ZONE=$(grep -E '^GCP_ZONE=' "{{.V2_DEPLOY_DIR}}/environments/{{.ITEM}}.env" 2>/dev/null | cut -d= -f2 || echo "us-central1-a")
          if [ -n "$GCP_PROJECT" ]; then
            gcloud compute instances delete "odin-tools-{{.ITEM}}" \
              --project="$GCP_PROJECT" \
              --zone="$GCP_ZONE" \
              --quiet 2>/dev/null && echo "Deleted odin-tools-{{.ITEM}}" || echo "odin-tools-{{.ITEM}} not found or already deleted"
          else
            echo "Skipping {{.ITEM}} - no GCP_PROJECT configured"
          fi
      - echo ""
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo "All VMs deleted."

  start:
    desc: Start stopped VM
    cmds:
      - |
        gcloud compute instances start {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}}
      - echo "VM started."

  stop:
    desc: Stop running VM
    cmds:
      - |
        gcloud compute instances stop {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}}
      - echo "VM stopped."

  # ===========================================================================
  # VM Setup
  # ===========================================================================

  setup:
    desc: Setup VM (install Docker, sync code, build images)
    cmds:
      - echo "Setting up VM {{.INSTANCE_NAME}}..."
      - echo ""
      - echo "[1/4] Copying and running setup script..."
      - |
        gcloud compute scp {{.V2_DEPLOY_DIR}}/scripts/setup-vm.sh \
          {{.INSTANCE_NAME}}:/tmp/setup-vm.sh \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}}
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="sudo bash /tmp/setup-vm.sh"
      - echo ""
      - echo "[2/4] Syncing code from local..."
      - task: sync-code
      - echo ""
      - echo "[3/4] Syncing environment file..."
      - task: sync-env
      - echo ""
      - echo "[4/4] Building Docker images..."
      - task: build-images
      - echo ""
      - echo "=================================================="
      - echo "Setup complete!"
      - echo "=================================================="
      - echo ""
      - echo "Next steps:"
      - echo "  task gcp:v2:publisher:start ENV={{.ENV}}"
      - echo "  task gcp:v2:loadtest:run ENV={{.ENV}}"
      - echo ""

  build-images:
    desc: Build Docker images on VM
    cmds:
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && sudo docker-compose --profile loadtest --profile publisher build"

  sync-env:
    desc: Sync environment file to VM
    cmds:
      - echo "Syncing {{.ENV}}.env to VM..."
      - |
        gcloud compute scp {{.V2_ENV_FILE}} \
          {{.INSTANCE_NAME}}:/tmp/{{.ENV}}.env \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}}
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="sudo cp /tmp/{{.ENV}}.env {{.REMOTE_DIR}}/deployments/gcp/v2/environments/{{.ENV}}.env && \
            sudo chown deploy:deploy {{.REMOTE_DIR}}/deployments/gcp/v2/environments/{{.ENV}}.env && \
            rm /tmp/{{.ENV}}.env"
      - echo "Environment file synced."

  sync-code:
    desc: Sync code from local to VM (no git clone needed)
    vars:
      LOCAL_ROOT: '{{.USER_WORKING_DIR}}'
    cmds:
      - echo "Syncing code to {{.INSTANCE_NAME}}..."
      - echo ""
      - echo "[1/5] Preparing remote directories..."
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="sudo rm -rf {{.SYNC_TEMP_DIR}} && mkdir -p {{.SYNC_TEMP_DIR}}"
      - echo "[2/5] Syncing loadtest/..."
      - |
        gcloud compute scp --recurse \
          {{.LOCAL_ROOT}}/loadtest \
          {{.INSTANCE_NAME}}:{{.SYNC_TEMP_DIR}}/ \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}}
      - echo "[3/5] Syncing publisher-go/..."
      - |
        gcloud compute scp --recurse \
          {{.LOCAL_ROOT}}/publisher-go \
          {{.INSTANCE_NAME}}:{{.SYNC_TEMP_DIR}}/ \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}}
      - echo "[4/5] Syncing deployments/gcp/v2/..."
      - |
        gcloud compute scp --recurse \
          {{.LOCAL_ROOT}}/deployments/gcp/v2 \
          {{.INSTANCE_NAME}}:{{.SYNC_TEMP_DIR}}/ \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}}
      - echo "[5/5] Moving files to deploy user directory..."
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="sudo mkdir -p {{.REMOTE_DIR}}/deployments/gcp && \
            sudo cp -r {{.SYNC_TEMP_DIR}}/loadtest {{.REMOTE_DIR}}/ && \
            sudo cp -r {{.SYNC_TEMP_DIR}}/publisher-go {{.REMOTE_DIR}}/ && \
            sudo cp -r {{.SYNC_TEMP_DIR}}/v2 {{.REMOTE_DIR}}/deployments/gcp/ && \
            sudo chown -R deploy:deploy {{.REMOTE_DIR}} && \
            sudo chmod 755 /home/deploy && \
            sudo chmod -R 755 {{.REMOTE_DIR}} && \
            sudo find {{.REMOTE_DIR}} -type f -exec chmod 644 {} \; && \
            sudo rm -rf {{.SYNC_TEMP_DIR}}"
      - echo ""
      - echo "Code synced successfully."

  # ===========================================================================
  # SSH Access
  # ===========================================================================

  ssh:
    desc: SSH into VM
    cmds:
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}}

  # ===========================================================================
  # Status
  # ===========================================================================

  status:
    desc: Show VM and container status
    cmds:
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo "VM Status - {{.INSTANCE_NAME}}"
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - |
        gcloud compute instances describe {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --format="table(name,status,machineType.basename(),networkInterfaces[0].accessConfigs[0].natIP)" 2>/dev/null || echo "VM not found"
      - echo ""
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - echo "Container Status"
      - echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - |
        gcloud compute ssh {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --command="cd {{.REMOTE_DIR}}/deployments/gcp/v2 && sudo docker-compose ps" 2>/dev/null || echo "Unable to get container status"

  ip:
    desc: Get VM external IP
    cmds:
      - |
        gcloud compute instances describe {{.INSTANCE_NAME}} \
          --project={{.GCP_PROJECT}} \
          --zone={{.GCP_ZONE}} \
          --format="get(networkInterfaces[0].accessConfigs[0].natIP)"
