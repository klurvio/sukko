# =============================================================================
# Terraform Taskfile - Infrastructure Management
# =============================================================================
# Usage: task terraform:<command>
# Examples:
#   task terraform:standard:init ENV=develop
#   task terraform:standard:plan ENV=staging
#   task terraform:standard:apply ENV=production

version: '3'

vars:
  TF_DIR: '{{.ROOT_DIR}}/deployments/terraform'
  # Default environment
  ENV: '{{.ENV | default "develop"}}'

tasks:
  default:
    desc: Show Terraform commands
    cmds:
      - task: help

  help:
    desc: Show available Terraform commands
    silent: true
    cmds:
      - echo "TERRAFORM INFRASTRUCTURE MANAGEMENT"
      - echo ""
      - echo "GKE STANDARD ENVIRONMENTS"
      - 'echo "  task terraform:standard:init ENV=develop     - Initialize Terraform"'
      - 'echo "  task terraform:standard:plan ENV=develop     - Plan infrastructure"'
      - 'echo "  task terraform:standard:apply ENV=develop    - Apply infrastructure"'
      - 'echo "  task terraform:standard:destroy ENV=develop  - Destroy (DANGEROUS)"'
      - 'echo "  task terraform:standard:output ENV=develop   - Show outputs"'
      - echo ""
      - echo "SHORTCUTS"
      - 'echo "  task terraform:standard:develop:*    - Develop environment"'
      - 'echo "  task terraform:standard:staging:*    - Staging environment"'
      - 'echo "  task terraform:standard:production:* - Production environment"'
      - echo ""
      - echo "UTILITIES"
      - 'echo "  task terraform:fmt                   - Format all Terraform files"'
      - 'echo "  task terraform:status                - Show all environments status"'
      - echo ""
      - 'echo "Environments: develop, staging, production"'

  # ============================================================================
  # GENERIC COMMANDS (GKE Standard with ENV variable)
  # ============================================================================

  standard:init:
    desc: Initialize Terraform for an environment
    cmds:
      - terraform -chdir={{.TF_DIR}}/environments/standard/{{.ENV}} init

  standard:plan:
    desc: Plan Terraform changes
    cmds:
      - terraform -chdir={{.TF_DIR}}/environments/standard/{{.ENV}} plan -out=tfplan

  standard:apply:
    desc: Apply Terraform changes
    cmds:
      - terraform -chdir={{.TF_DIR}}/environments/standard/{{.ENV}} apply tfplan

  standard:apply-auto:
    desc: Apply Terraform changes with auto-approve
    cmds:
      - terraform -chdir={{.TF_DIR}}/environments/standard/{{.ENV}} apply -auto-approve

  standard:destroy:
    desc: Destroy Terraform resources (DANGEROUS)
    prompt: 'Are you sure you want to destroy {{.ENV}}? This action is irreversible!'
    cmds:
      - terraform -chdir={{.TF_DIR}}/environments/standard/{{.ENV}} destroy

  standard:output:
    desc: Show Terraform outputs
    cmds:
      - terraform -chdir={{.TF_DIR}}/environments/standard/{{.ENV}} output

  standard:validate:
    desc: Validate Terraform configuration
    cmds:
      - terraform -chdir={{.TF_DIR}}/environments/standard/{{.ENV}} validate

  # ============================================================================
  # DEVELOP ENVIRONMENT SHORTCUTS
  # ============================================================================

  standard:develop:init:
    desc: Initialize develop environment
    cmds:
      - task: standard:init
        vars: { ENV: develop }

  standard:develop:plan:
    desc: Plan develop cluster
    cmds:
      - task: standard:plan
        vars: { ENV: develop }

  standard:develop:apply:
    desc: Apply develop cluster
    cmds:
      - task: standard:apply
        vars: { ENV: develop }

  standard:develop:output:
    desc: Show develop outputs
    cmds:
      - task: standard:output
        vars: { ENV: develop }

  standard:develop:kubeconfig:
    desc: Get kubeconfig for develop cluster
    cmds:
      - |
        CLUSTER=$(terraform -chdir={{.TF_DIR}}/environments/standard/develop output -raw cluster_name 2>/dev/null || echo "")
        LOCATION=$(terraform -chdir={{.TF_DIR}}/environments/standard/develop output -raw cluster_location 2>/dev/null || echo "")
        if [ -n "$CLUSTER" ] && [ -n "$LOCATION" ]; then
          gcloud container clusters get-credentials $CLUSTER --zone $LOCATION
          echo "Kubeconfig configured for $CLUSTER"
        else
          echo "Could not retrieve cluster info. Run 'task terraform:standard:develop:apply' first."
          exit 1
        fi

  # ============================================================================
  # STAGING ENVIRONMENT SHORTCUTS
  # ============================================================================

  standard:staging:init:
    desc: Initialize staging environment
    cmds:
      - task: standard:init
        vars: { ENV: staging }

  standard:staging:plan:
    desc: Plan staging cluster
    cmds:
      - task: standard:plan
        vars: { ENV: staging }

  standard:staging:apply:
    desc: Apply staging cluster
    cmds:
      - task: standard:apply
        vars: { ENV: staging }

  standard:staging:output:
    desc: Show staging outputs
    cmds:
      - task: standard:output
        vars: { ENV: staging }

  standard:staging:kubeconfig:
    desc: Get kubeconfig for staging cluster
    cmds:
      - |
        CLUSTER=$(terraform -chdir={{.TF_DIR}}/environments/standard/staging output -raw cluster_name 2>/dev/null || echo "")
        LOCATION=$(terraform -chdir={{.TF_DIR}}/environments/standard/staging output -raw cluster_location 2>/dev/null || echo "")
        if [ -n "$CLUSTER" ] && [ -n "$LOCATION" ]; then
          gcloud container clusters get-credentials $CLUSTER --zone $LOCATION
          echo "Kubeconfig configured for $CLUSTER"
        else
          echo "Could not retrieve cluster info. Run 'task terraform:standard:staging:apply' first."
          exit 1
        fi

  # ============================================================================
  # PRODUCTION ENVIRONMENT SHORTCUTS
  # ============================================================================

  standard:production:init:
    desc: Initialize production environment
    cmds:
      - task: standard:init
        vars: { ENV: production }

  standard:production:plan:
    desc: Plan production cluster
    cmds:
      - task: standard:plan
        vars: { ENV: production }

  standard:production:apply:
    desc: Apply production cluster
    prompt: "This will apply to PRODUCTION. Are you sure?"
    cmds:
      - task: standard:apply
        vars: { ENV: production }

  standard:production:output:
    desc: Show production outputs
    cmds:
      - task: standard:output
        vars: { ENV: production }

  standard:production:kubeconfig:
    desc: Get kubeconfig for production cluster
    cmds:
      - |
        CLUSTER=$(terraform -chdir={{.TF_DIR}}/environments/standard/production output -raw cluster_name 2>/dev/null || echo "")
        LOCATION=$(terraform -chdir={{.TF_DIR}}/environments/standard/production output -raw cluster_location 2>/dev/null || echo "")
        if [ -n "$CLUSTER" ] && [ -n "$LOCATION" ]; then
          gcloud container clusters get-credentials $CLUSTER --zone $LOCATION
          echo "Kubeconfig configured for $CLUSTER"
        else
          echo "Could not retrieve cluster info. Run 'task terraform:standard:production:apply' first."
          exit 1
        fi

  # ============================================================================
  # FORMATTING
  # ============================================================================

  fmt:
    desc: Format all Terraform files
    cmds:
      - terraform fmt -recursive {{.TF_DIR}}

  # ============================================================================
  # STATUS
  # ============================================================================

  status:
    desc: Show infrastructure status for all environments
    cmds:
      - echo "TERRAFORM INFRASTRUCTURE STATUS"
      - echo ""
      - echo "=== DEVELOP ==="
      - terraform -chdir={{.TF_DIR}}/environments/standard/develop output 2>/dev/null || echo "   Not deployed or not initialized"
      - echo ""
      - echo "=== STAGING ==="
      - terraform -chdir={{.TF_DIR}}/environments/standard/staging output 2>/dev/null || echo "   Not deployed or not initialized"
      - echo ""
      - echo "=== PRODUCTION ==="
      - terraform -chdir={{.TF_DIR}}/environments/standard/production output 2>/dev/null || echo "   Not deployed or not initialized"
