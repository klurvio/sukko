# =============================================================================
# E2E License Testing — Edition Matrix
# =============================================================================
# Runs boundary tests and claims assertions across all editions
# using sukko-cli against a local docker-compose deployment.
#
# Usage:
#   task e2e:license              Run full matrix
#   task e2e:license:setup        Start services
#   task e2e:license:community    Test Community limits (no key)
#   task e2e:license:pro          Test Pro limits + claims
#   task e2e:license:enterprise   Test Enterprise (unlimited) + claims
#   task e2e:license:expired      Test expired Pro → Community degradation
#   task e2e:license:teardown     Cleanup

version: "3"

vars:
  DEV_KEY_PATH: ws/internal/shared/license/keys/sukko.dev.key
  GENTOKEN_CMD: cd ws && go run ./internal/shared/license/gentoken
  PROVISIONING_URL: http://localhost:8080

tasks:
  license:
    desc: Run full E2E license matrix (Community → Pro → Enterprise → Expired)
    cmds:
      - task: license:setup
      - task: license:community
      - task: license:pro
      - task: license:enterprise
      - task: license:expired
      - task: license:teardown

  license:setup:
    desc: Auto-generate dev keypair if missing, init and start services
    cmds:
      - |
        if [ ! -f "{{.DEV_KEY_PATH}}" ]; then
          echo "Dev keypair not found — generating..."
          cd ws && go run ./internal/shared/license/genkeys
        else
          echo "Dev keypair exists"
        fi
      - sukko init --defaults 2>/dev/null || true
      - sukko up

  license:community:
    desc: Test Community edition (no license key)
    cmds:
      - echo "=== Testing Community edition (no key) ==="
      - sukko license remove 2>/dev/null || true
      - sukko down 2>/dev/null || true
      - sukko up
      - sleep 5
      # Claims assertion
      - |
        echo "Checking /edition claims..."
        EDITION=$(curl -sf {{.PROVISIONING_URL}}/edition | jq -r '.edition')
        if [ "$EDITION" != "community" ]; then
          echo "FAIL: expected edition=community, got $EDITION"
          exit 1
        fi
        echo "  edition: $EDITION ✓"
      # Boundary tests
      - sukko test validate --suite edition-limits
      - echo "=== Community edition PASSED ==="

  license:pro:
    desc: Test Pro edition + claims assertion
    vars:
      TOKEN:
        sh: "{{.GENTOKEN_CMD}} --key internal/shared/license/keys/sukko.dev.key --edition pro --org 'E2E Test' --expires +1y"
    cmds:
      - echo "=== Testing Pro edition ==="
      - sukko license set "{{.TOKEN}}"
      - sukko down 2>/dev/null || true
      - sukko up
      - sleep 5
      # Claims assertion
      - |
        echo "Checking /edition claims..."
        RESPONSE=$(curl -sf {{.PROVISIONING_URL}}/edition)
        EDITION=$(echo "$RESPONSE" | jq -r '.edition')
        ORG=$(echo "$RESPONSE" | jq -r '.org')
        EXPIRED=$(echo "$RESPONSE" | jq -r '.expired')
        MAX_TENANTS=$(echo "$RESPONSE" | jq -r '.limits.max_tenants')
        if [ "$EDITION" != "pro" ]; then echo "FAIL: expected edition=pro, got $EDITION"; exit 1; fi
        if [ "$ORG" != "E2E Test" ]; then echo "FAIL: expected org='E2E Test', got $ORG"; exit 1; fi
        if [ "$EXPIRED" != "false" ]; then echo "FAIL: expected expired=false, got $EXPIRED"; exit 1; fi
        if [ "$MAX_TENANTS" != "50" ]; then echo "FAIL: expected max_tenants=50, got $MAX_TENANTS"; exit 1; fi
        echo "  edition: $EDITION ✓"
        echo "  org: $ORG ✓"
        echo "  expired: $EXPIRED ✓"
        echo "  max_tenants: $MAX_TENANTS ✓"
      # Boundary tests
      - sukko test validate --suite edition-limits
      - echo "=== Pro edition PASSED ==="

  license:enterprise:
    desc: Test Enterprise edition (unlimited) + claims assertion
    vars:
      TOKEN:
        sh: "{{.GENTOKEN_CMD}} --key internal/shared/license/keys/sukko.dev.key --edition enterprise --org 'E2E Enterprise' --expires +1y"
    cmds:
      - echo "=== Testing Enterprise edition ==="
      - sukko license set "{{.TOKEN}}"
      - sukko down 2>/dev/null || true
      - sukko up
      - sleep 5
      # Claims assertion — verify edition, org, and unlimited limits (0)
      - |
        echo "Checking /edition claims..."
        RESPONSE=$(curl -sf {{.PROVISIONING_URL}}/edition)
        EDITION=$(echo "$RESPONSE" | jq -r '.edition')
        ORG=$(echo "$RESPONSE" | jq -r '.org')
        EXPIRED=$(echo "$RESPONSE" | jq -r '.expired')
        MAX_TENANTS=$(echo "$RESPONSE" | jq -r '.limits.max_tenants')
        MAX_CONNECTIONS=$(echo "$RESPONSE" | jq -r '.limits.max_total_connections')
        if [ "$EDITION" != "enterprise" ]; then echo "FAIL: expected edition=enterprise, got $EDITION"; exit 1; fi
        if [ "$ORG" != "E2E Enterprise" ]; then echo "FAIL: expected org='E2E Enterprise', got $ORG"; exit 1; fi
        if [ "$EXPIRED" != "false" ]; then echo "FAIL: expected expired=false, got $EXPIRED"; exit 1; fi
        if [ "$MAX_TENANTS" != "0" ]; then echo "FAIL: expected max_tenants=0 (unlimited), got $MAX_TENANTS"; exit 1; fi
        if [ "$MAX_CONNECTIONS" != "0" ]; then echo "FAIL: expected max_total_connections=0 (unlimited), got $MAX_CONNECTIONS"; exit 1; fi
        echo "  edition: $EDITION ✓"
        echo "  org: $ORG ✓"
        echo "  expired: $EXPIRED ✓"
        echo "  max_tenants: $MAX_TENANTS (unlimited) ✓"
        echo "  max_total_connections: $MAX_CONNECTIONS (unlimited) ✓"
      # Smoke test — create a few tenants, verify no rejection
      - |
        echo "Smoke test: creating tenants (should not be rejected)..."
        for i in 1 2 3 4 5; do
          if ! sukko tenant create "_e2e_enterprise_$i" "E2E Enterprise Test $i" 2>&1; then
            echo "FAIL: tenant creation rejected — Enterprise should be unlimited"
            exit 1
          fi
        done
        echo "  5 tenants created without rejection ✓"
      # Cleanup test tenants
      - |
        for i in 1 2 3 4 5; do
          sukko tenant delete "_e2e_enterprise_$i" --force 2>/dev/null || true
        done
        echo "  test tenants cleaned up ✓"
      - echo "=== Enterprise edition PASSED ==="

  license:expired:
    desc: Test expired Pro → Community degradation + claims assertion
    vars:
      TOKEN:
        sh: "{{.GENTOKEN_CMD}} --key internal/shared/license/keys/sukko.dev.key --edition pro --org 'E2E Expired' --expires -1d 2>/dev/null"
    cmds:
      - echo "=== Testing expired Pro (Community degradation) ==="
      - sukko license set "{{.TOKEN}}"
      - sukko down 2>/dev/null || true
      - sukko up
      - sleep 5
      # Claims assertion — should degrade to community with expired=true
      - |
        echo "Checking /edition claims..."
        RESPONSE=$(curl -sf {{.PROVISIONING_URL}}/edition)
        EDITION=$(echo "$RESPONSE" | jq -r '.edition')
        EXPIRED=$(echo "$RESPONSE" | jq -r '.expired')
        MAX_TENANTS=$(echo "$RESPONSE" | jq -r '.limits.max_tenants')
        if [ "$EDITION" != "community" ]; then echo "FAIL: expected edition=community (degraded), got $EDITION"; exit 1; fi
        if [ "$EXPIRED" != "true" ]; then echo "FAIL: expected expired=true, got $EXPIRED"; exit 1; fi
        if [ "$MAX_TENANTS" != "3" ]; then echo "FAIL: expected max_tenants=3 (Community), got $MAX_TENANTS"; exit 1; fi
        echo "  edition: $EDITION (degraded) ✓"
        echo "  expired: $EXPIRED ✓"
        echo "  max_tenants: $MAX_TENANTS (Community limit) ✓"
      # Boundary tests — should enforce Community limits
      - sukko test validate --suite edition-limits
      - echo "=== Expired Pro degradation PASSED ==="

  license:teardown:
    desc: Cleanup after E2E tests
    cmds:
      - sukko license remove 2>/dev/null || true
      - echo "=== E2E license matrix complete ==="

  kafka-ingest:
    desc: >-
      E2E kafka-ingest round-trip regression — publish directly to Redpanda and verify a
      gateway-subscribed client receives it, against a Pro-gated kafka-backend server built
      from source. Fails (not skips) if the delivery check is absent or not "pass".
    vars:
      COMPOSE: docker compose -f docker-compose.yml -f taskfiles/e2e/kafka-ingest.override.yml --profile kafka
      # Raw 64-byte Ed25519 admin private key, generated per-run and mounted into the tester by
      # the override; its public half is wired to provisioning as ADMIN_BOOTSTRAP_KEY.
      ADMIN_KEY_FILE: taskfiles/e2e/.admin.key
      # The repo compose (build-from-source) maps provisioning to host 18080 (the CLI compose
      # used by the license tasks maps 8080 — hence the shared PROVISIONING_URL differs here).
      PROVISIONING_URL: http://localhost:18080
      # Matches the tester's TESTER_AUTH_TOKEN in docker-compose.yml.
      TESTER_TOKEN: sukko-dev-token
    cmds:
      # Teardown runs even on failure (Taskfile defer, LIFO): stack down, then remove the key.
      - defer: "{{.COMPOSE}} down -v"
      - defer: rm -f {{.ADMIN_KEY_FILE}}
      - |
        set -eu
        # All setup that `up` depends on runs in THIS shell so the values reach the boot env.
        echo "=== Generate keys + mint Pro token (before boot) ==="
        # Kafka mode fail-fasts at startup without a Pro edition (server_config.go), so the token
        # MUST exist before boot; `sukko license set` after boot is not usable here.
        if [ ! -f "{{.DEV_KEY_PATH}}" ]; then (cd ws && go run ./internal/shared/license/genkeys); fi
        TOKEN=$({{.GENTOKEN_CMD}} --key internal/shared/license/keys/sukko.dev.key --edition pro --org 'E2E Kafka' --expires +1y)
        # Admin keypair: raw private → tester (mounted by the override), base64 public → provisioning.
        ADMIN_ABS="$(pwd)/{{.ADMIN_KEY_FILE}}"
        ADMIN_BOOTSTRAP_KEY=$(cd ws && go run ./cmd/gen-admin-key "$ADMIN_ABS")
        echo "=== Boot kafka-mode stack (build from source, Pro license) ==="
        MESSAGE_BACKEND=kafka \
        SUKKO_LICENSE_KEY="$TOKEN" \
        ADMIN_BOOTSTRAP_KEY="$ADMIN_BOOTSTRAP_KEY" \
        CREDENTIALS_ENCRYPTION_KEY="$(openssl rand -hex 32)" \
        WEBHOOK_INTERNAL_TOKEN="$(openssl rand -hex 24)" \
        {{.COMPOSE}} up -d --build --wait
      - |
        set -eu
        echo "=== Readiness gate ==="
        {{.COMPOSE}} exec -T redpanda rpk cluster health
        EDITION=$(curl -sf {{.PROVISIONING_URL}}/edition | jq -r '.edition')
        [ "$EDITION" = "pro" ] || { echo "FAIL: expected edition=pro, got ${EDITION:-<empty>}"; exit 1; }
        echo "  edition: $EDITION ✓"
      - |
        set -eu
        echo "=== Run kafka-ingest suite ==="
        # --follow streams to completion so the final report is emitted; SUKKO_TESTER_TOKEN
        # authenticates the CLI to the tester. Run the CLI hermetically: an isolated HOME/
        # XDG_CONFIG_HOME means no ambient context leaks in (otherwise a developer's active
        # context — e.g. tenant "demo" — is sent, and the tester skips its throwaway-tenant
        # auto-create and fails). With no context the tester auto-creates a throwaway tenant.
        # Extract the final report JSON line (has "test_type"); progress lines are ignored.
        TMPCFG=$(mktemp -d)
        REPORT=$(HOME="$TMPCFG" XDG_CONFIG_HOME="$TMPCFG/.config" SUKKO_TESTER_TOKEN={{.TESTER_TOKEN}} sukko test validate --suite kafka-ingest --follow --output json 2>/dev/null | grep '"test_type"' | tail -1)
        rm -rf "$TMPCFG"
        echo "$REPORT" | jq .
        # Anti-vacuous-green guard: the delivery check MUST be present AND "pass". A skip emits
        # check name "kafka-ingest" (not "kafka-ingest delivery"); connect/setup failures emit
        # other names — so "present AND pass" closes skip/error/connect all at once.
        STATUS=$(echo "$REPORT" | jq -r '.checks[]? | select(.name=="kafka-ingest delivery") | .status')
        [ "$STATUS" = "pass" ] || { echo "FAIL: kafka-ingest delivery check status=${STATUS:-<absent>} (want pass)"; exit 1; }
        echo "=== kafka-ingest round-trip PASSED (delivery=$STATUS) ==="

  license-reload:
    desc: Run license hot-reload validation (requires dev signing key)
    cmds:
      - |
        if [ ! -f "{{.DEV_KEY_PATH}}" ]; then
          echo "Dev signing key not found — generating..."
          cd ws && go run ./internal/shared/license/genkeys
        fi
      - |
        echo "=== Running license-reload validation suite ==="
        KEY=$(base64 < {{.DEV_KEY_PATH}} | tr -d '\n')
        curl -sf http://localhost:8090/api/v1/tests \
          -H 'Content-Type: application/json' \
          -d "{\"type\":\"validate\",\"suite\":\"license-reload\",\"signing_key\":\"$KEY\"}"
        echo ""
        echo "=== License-reload validation complete ==="
