# =============================================================================
# E2E License Testing — Edition Matrix
# =============================================================================
# Runs boundary tests and claims assertions across all editions
# using sukko-cli against a local docker-compose deployment.
#
# Usage:
#   task e2e:license              Run full matrix
#   task e2e:license:setup        Start services
#   task e2e:license:community    Test Community limits (no key)
#   task e2e:license:pro          Test Pro limits + claims
#   task e2e:license:enterprise   Test Enterprise (unlimited) + claims
#   task e2e:license:expired      Test expired Pro → Community degradation
#   task e2e:license:teardown     Cleanup

version: "3"

vars:
  DEV_KEY_PATH: ws/internal/shared/license/keys/sukko.dev.key
  GENTOKEN_CMD: cd ws && go run ./internal/shared/license/gentoken
  PROVISIONING_URL: http://localhost:8080

tasks:
  license:
    desc: Run full E2E license matrix (Community → Pro → Enterprise → Expired)
    cmds:
      - task: license:setup
      - task: license:community
      - task: license:pro
      - task: license:enterprise
      - task: license:expired
      - task: license:teardown

  license:setup:
    desc: Auto-generate dev keypair if missing, init and start services
    cmds:
      - |
        if [ ! -f "{{.DEV_KEY_PATH}}" ]; then
          echo "Dev keypair not found — generating..."
          cd ws && go run ./internal/shared/license/genkeys
        else
          echo "Dev keypair exists"
        fi
      - sukko init --defaults 2>/dev/null || true
      - sukko up

  license:community:
    desc: Test Community edition (no license key)
    cmds:
      - echo "=== Testing Community edition (no key) ==="
      - sukko license remove 2>/dev/null || true
      - sukko down 2>/dev/null || true
      - sukko up
      - sleep 5
      # Claims assertion
      - |
        echo "Checking /edition claims..."
        EDITION=$(curl -sf {{.PROVISIONING_URL}}/edition | jq -r '.edition')
        if [ "$EDITION" != "community" ]; then
          echo "FAIL: expected edition=community, got $EDITION"
          exit 1
        fi
        echo "  edition: $EDITION ✓"
      # Boundary tests
      - sukko test validate --suite edition-limits
      - echo "=== Community edition PASSED ==="

  license:pro:
    desc: Test Pro edition + claims assertion
    vars:
      TOKEN:
        sh: "{{.GENTOKEN_CMD}} --key internal/shared/license/keys/sukko.dev.key --edition pro --org 'E2E Test' --expires +1y"
    cmds:
      - echo "=== Testing Pro edition ==="
      - sukko license set "{{.TOKEN}}"
      - sukko down 2>/dev/null || true
      - sukko up
      - sleep 5
      # Claims assertion
      - |
        echo "Checking /edition claims..."
        RESPONSE=$(curl -sf {{.PROVISIONING_URL}}/edition)
        EDITION=$(echo "$RESPONSE" | jq -r '.edition')
        ORG=$(echo "$RESPONSE" | jq -r '.org')
        EXPIRED=$(echo "$RESPONSE" | jq -r '.expired')
        MAX_TENANTS=$(echo "$RESPONSE" | jq -r '.limits.max_tenants')
        if [ "$EDITION" != "pro" ]; then echo "FAIL: expected edition=pro, got $EDITION"; exit 1; fi
        if [ "$ORG" != "E2E Test" ]; then echo "FAIL: expected org='E2E Test', got $ORG"; exit 1; fi
        if [ "$EXPIRED" != "false" ]; then echo "FAIL: expected expired=false, got $EXPIRED"; exit 1; fi
        if [ "$MAX_TENANTS" != "50" ]; then echo "FAIL: expected max_tenants=50, got $MAX_TENANTS"; exit 1; fi
        echo "  edition: $EDITION ✓"
        echo "  org: $ORG ✓"
        echo "  expired: $EXPIRED ✓"
        echo "  max_tenants: $MAX_TENANTS ✓"
      # Boundary tests
      - sukko test validate --suite edition-limits
      - echo "=== Pro edition PASSED ==="

  license:enterprise:
    desc: Test Enterprise edition (unlimited) + claims assertion
    vars:
      TOKEN:
        sh: "{{.GENTOKEN_CMD}} --key internal/shared/license/keys/sukko.dev.key --edition enterprise --org 'E2E Enterprise' --expires +1y"
    cmds:
      - echo "=== Testing Enterprise edition ==="
      - sukko license set "{{.TOKEN}}"
      - sukko down 2>/dev/null || true
      - sukko up
      - sleep 5
      # Claims assertion — verify edition, org, and unlimited limits (0)
      - |
        echo "Checking /edition claims..."
        RESPONSE=$(curl -sf {{.PROVISIONING_URL}}/edition)
        EDITION=$(echo "$RESPONSE" | jq -r '.edition')
        ORG=$(echo "$RESPONSE" | jq -r '.org')
        EXPIRED=$(echo "$RESPONSE" | jq -r '.expired')
        MAX_TENANTS=$(echo "$RESPONSE" | jq -r '.limits.max_tenants')
        MAX_CONNECTIONS=$(echo "$RESPONSE" | jq -r '.limits.max_total_connections')
        if [ "$EDITION" != "enterprise" ]; then echo "FAIL: expected edition=enterprise, got $EDITION"; exit 1; fi
        if [ "$ORG" != "E2E Enterprise" ]; then echo "FAIL: expected org='E2E Enterprise', got $ORG"; exit 1; fi
        if [ "$EXPIRED" != "false" ]; then echo "FAIL: expected expired=false, got $EXPIRED"; exit 1; fi
        if [ "$MAX_TENANTS" != "0" ]; then echo "FAIL: expected max_tenants=0 (unlimited), got $MAX_TENANTS"; exit 1; fi
        if [ "$MAX_CONNECTIONS" != "0" ]; then echo "FAIL: expected max_total_connections=0 (unlimited), got $MAX_CONNECTIONS"; exit 1; fi
        echo "  edition: $EDITION ✓"
        echo "  org: $ORG ✓"
        echo "  expired: $EXPIRED ✓"
        echo "  max_tenants: $MAX_TENANTS (unlimited) ✓"
        echo "  max_total_connections: $MAX_CONNECTIONS (unlimited) ✓"
      # Smoke test — create a few tenants, verify no rejection
      - |
        echo "Smoke test: creating tenants (should not be rejected)..."
        for i in 1 2 3 4 5; do
          if ! sukko tenant create "_e2e_enterprise_$i" "E2E Enterprise Test $i" 2>&1; then
            echo "FAIL: tenant creation rejected — Enterprise should be unlimited"
            exit 1
          fi
        done
        echo "  5 tenants created without rejection ✓"
      # Cleanup test tenants
      - |
        for i in 1 2 3 4 5; do
          sukko tenant delete "_e2e_enterprise_$i" --force 2>/dev/null || true
        done
        echo "  test tenants cleaned up ✓"
      - echo "=== Enterprise edition PASSED ==="

  license:expired:
    desc: Test expired Pro → Community degradation + claims assertion
    vars:
      TOKEN:
        sh: "{{.GENTOKEN_CMD}} --key internal/shared/license/keys/sukko.dev.key --edition pro --org 'E2E Expired' --expires -1d 2>/dev/null"
    cmds:
      - echo "=== Testing expired Pro (Community degradation) ==="
      - sukko license set "{{.TOKEN}}"
      - sukko down 2>/dev/null || true
      - sukko up
      - sleep 5
      # Claims assertion — should degrade to community with expired=true
      - |
        echo "Checking /edition claims..."
        RESPONSE=$(curl -sf {{.PROVISIONING_URL}}/edition)
        EDITION=$(echo "$RESPONSE" | jq -r '.edition')
        EXPIRED=$(echo "$RESPONSE" | jq -r '.expired')
        MAX_TENANTS=$(echo "$RESPONSE" | jq -r '.limits.max_tenants')
        if [ "$EDITION" != "community" ]; then echo "FAIL: expected edition=community (degraded), got $EDITION"; exit 1; fi
        if [ "$EXPIRED" != "true" ]; then echo "FAIL: expected expired=true, got $EXPIRED"; exit 1; fi
        if [ "$MAX_TENANTS" != "3" ]; then echo "FAIL: expected max_tenants=3 (Community), got $MAX_TENANTS"; exit 1; fi
        echo "  edition: $EDITION (degraded) ✓"
        echo "  expired: $EXPIRED ✓"
        echo "  max_tenants: $MAX_TENANTS (Community limit) ✓"
      # Boundary tests — should enforce Community limits
      - sukko test validate --suite edition-limits
      - echo "=== Expired Pro degradation PASSED ==="

  license:teardown:
    desc: Cleanup after E2E tests
    cmds:
      - sukko license remove 2>/dev/null || true
      - echo "=== E2E license matrix complete ==="

  kafka-ingest:
    desc: >-
      E2E kafka-ingest round-trip regression — publish directly to Redpanda and verify a
      gateway-subscribed client receives it, against a Pro-gated kafka-backend server built
      from source. Fails (not skips) if the delivery check is absent or not "pass".
    vars:
      COMPOSE: docker compose -f docker-compose.yml -f taskfiles/e2e/kafka-ingest.override.yml --profile kafka
      # Raw 64-byte Ed25519 admin private key, generated per-run and mounted into the tester by
      # the override; its public half is wired to provisioning as ADMIN_BOOTSTRAP_KEY.
      ADMIN_KEY_FILE: taskfiles/e2e/.admin.key
      # The repo compose (build-from-source) maps provisioning to host 18080 (the CLI compose
      # used by the license tasks maps 8080 — hence the shared PROVISIONING_URL differs here).
      PROVISIONING_URL: http://localhost:18080
      # Matches the tester's TESTER_AUTH_TOKEN in docker-compose.yml.
      TESTER_TOKEN: sukko-dev-token
    cmds:
      # Teardown runs even on failure (Taskfile defer, LIFO): stack down, then remove the key.
      - defer: "{{.COMPOSE}} down -v"
      - defer: rm -f {{.ADMIN_KEY_FILE}}
      - |
        set -eu
        . taskfiles/e2e/stack.sh
        # All setup that `up` depends on runs in THIS shell so the values reach the boot env.
        echo "=== Generate keys + mint Pro token (before boot) ==="
        TOKEN=$(e2e_mint_license pro 'E2E Kafka')
        ADMIN_BOOTSTRAP_KEY=$(e2e_gen_admin_key "$(pwd)/{{.ADMIN_KEY_FILE}}")
        echo "=== Boot kafka-mode stack (build from source, Pro license) ==="
        MESSAGE_BACKEND=kafka \
        SUKKO_LICENSE_KEY="$TOKEN" \
        ADMIN_BOOTSTRAP_KEY="$ADMIN_BOOTSTRAP_KEY" \
        CREDENTIALS_ENCRYPTION_KEY="$(openssl rand -hex 32)" \
        WEBHOOK_INTERNAL_TOKEN="$(openssl rand -hex 24)" \
        {{.COMPOSE}} up -d --build --wait
      - |
        set -eu
        . taskfiles/e2e/stack.sh
        echo "=== Readiness gate ==="
        {{.COMPOSE}} exec -T redpanda rpk cluster health
        e2e_readiness_gate {{.PROVISIONING_URL}} pro
      - |
        set -eu
        echo "=== Run kafka-ingest suite ==="
        # --follow streams to completion so the final report is emitted; SUKKO_TESTER_TOKEN
        # authenticates the CLI to the tester. Run the CLI hermetically: an isolated HOME/
        # XDG_CONFIG_HOME means no ambient context leaks in (otherwise a developer's active
        # context — e.g. tenant "demo" — is sent, and the tester skips its throwaway-tenant
        # auto-create and fails). With no context the tester auto-creates a throwaway tenant.
        # Extract the final report JSON line (has "test_type"); progress lines are ignored.
        TMPCFG=$(mktemp -d)
        REPORT=$(HOME="$TMPCFG" XDG_CONFIG_HOME="$TMPCFG/.config" SUKKO_TESTER_TOKEN={{.TESTER_TOKEN}} sukko test validate --suite kafka-ingest --follow --output json 2>/dev/null | grep '"test_type"' | tail -1)
        rm -rf "$TMPCFG"
        echo "$REPORT" | jq .
        # Anti-vacuous-green guard: the delivery check MUST be present AND "pass". A skip emits
        # check name "kafka-ingest" (not "kafka-ingest delivery"); connect/setup failures emit
        # other names — so "present AND pass" closes skip/error/connect all at once.
        STATUS=$(echo "$REPORT" | jq -r '.checks[]? | select(.name=="kafka-ingest delivery") | .status')
        [ "$STATUS" = "pass" ] || { echo "FAIL: kafka-ingest delivery check status=${STATUS:-<absent>} (want pass)"; exit 1; }
        echo "=== kafka-ingest round-trip PASSED (delivery=$STATUS) ==="
      - |
        set -eu
        # rest-publish suite (kafka mode) — regression guard for #179: the gateway REST →
        # gRPC → producer → Kafka PRODUCE path. Before #179 this returned HTTP 500
        # UNKNOWN_TOPIC_OR_PARTITION (producer ignored routing rules → wrong topic); the
        # "response format" check requires a 2xx {"status":"accepted"} response, so it is a
        # non-vacuous guard that the produce fix holds (kafka-ingest above injects directly
        # to Kafka and never exercises backend.Publish, so only this catches a produce regression).
        #
        # NOTE: the suite's ws/sse DELIVERY checks are NOT gated here. They depend on two
        # concerns outside #179 P1a's produce fix: (1) a consumer-subscription-timing race
        # (ws-server's Kafka consumer joins the tenant topic at AtEnd; a message produced
        # before partition assignment is missed — needs a tester re-publish/poll loop), and
        # (2) a pre-existing SSE-connect HTTP 400. Both are tracked separately; gating them
        # here would red the job on issues the produce fix doesn't own.
        echo "=== Run rest-publish suite (kafka mode) ==="
        TMPCFG=$(mktemp -d)
        REPORT=$(HOME="$TMPCFG" XDG_CONFIG_HOME="$TMPCFG/.config" SUKKO_TESTER_TOKEN={{.TESTER_TOKEN}} sukko test validate --suite rest-publish --follow --output json 2>/dev/null | grep '"test_type"' | tail -1)
        rm -rf "$TMPCFG"
        echo "$REPORT" | jq '{status, checks:[.checks[]|{name,status}]}'
        # Anti-vacuous guard: the "response format" check MUST be present AND pass (proves the
        # REST publish was accepted with 2xx — i.e. the produce path resolved a valid topic).
        ST=$(echo "$REPORT" | jq -r '.checks[]? | select(.name=="response format") | .status')
        [ "$ST" = "pass" ] || { echo "FAIL: rest-publish 'response format' status=${ST:-<absent>} (want pass — produce path regressed to non-2xx)"; exit 1; }
        echo "=== rest-publish PRODUCE path PASSED (publish accepted 2xx; delivery closure tracked separately) ==="

  push-validate:
    desc: >-
      E2E push (Web Push) delivery regression — boot push-service in a kafka-mode,
      Enterprise-licensed stack built from source and run the tester's `push` suite,
      asserting a real WebPush notification arrives at the tester's mock receiver. Fails
      (not skips) if the delivery check is absent/not-pass, any check skips, or the report
      status != pass.
    vars:
      COMPOSE: docker compose -f docker-compose.yml -f taskfiles/e2e/push-validate.override.yml --profile enterprise --profile kafka
      # Raw 64-byte Ed25519 admin private key, generated per-run and mounted into the tester
      # by the override; its public half is wired to provisioning as ADMIN_BOOTSTRAP_KEY.
      ADMIN_KEY_FILE: taskfiles/e2e/.admin.key
      # Repo compose (build-from-source) maps provisioning to host 18080.
      PROVISIONING_URL: http://localhost:18080
      # Matches the tester's TESTER_AUTH_TOKEN in docker-compose.yml.
      TESTER_TOKEN: sukko-dev-token
      # push-service /ready (host port 3009): 503 until the Enterprise license syncs over
      # the WatchLicense stream — gated separately from /health (always-200 liveness).
      PUSH_READY_URL: http://localhost:3009/ready
    cmds:
      # Teardown runs even on failure (Taskfile defer, LIFO): stack down, then remove the key.
      - defer: "{{.COMPOSE}} down -v"
      - defer: rm -f {{.ADMIN_KEY_FILE}}
      # Guard fixture test first — standalone, no Docker, ~1s. Fails fast if the anti-vacuous
      # guard regressed, before spending 20+ min booting the stack.
      - bash taskfiles/e2e/guard_test.sh
      - |
        set -eu
        . taskfiles/e2e/stack.sh
        # All setup that `up` depends on runs in THIS shell so the values reach the boot env.
        echo "=== Mint Enterprise token + admin key (before boot) ==="
        TOKEN=$(e2e_mint_license enterprise 'E2E Push')
        ADMIN_BOOTSTRAP_KEY=$(e2e_gen_admin_key "$(pwd)/{{.ADMIN_KEY_FILE}}")
        echo "=== Boot kafka-mode Enterprise stack (build from source, push-service) ==="
        MESSAGE_BACKEND=kafka \
        SUKKO_LICENSE_KEY="$TOKEN" \
        ADMIN_BOOTSTRAP_KEY="$ADMIN_BOOTSTRAP_KEY" \
        CREDENTIALS_ENCRYPTION_KEY="$(openssl rand -hex 32)" \
        WEBHOOK_INTERNAL_TOKEN="$(openssl rand -hex 24)" \
        {{.COMPOSE}} up -d --build --wait
      - |
        set -eu
        . taskfiles/e2e/stack.sh
        echo "=== Readiness gate ==="
        {{.COMPOSE}} exec -T redpanda rpk cluster health
        e2e_readiness_gate {{.PROVISIONING_URL}} enterprise
        # push-service /ready is 503 until the Enterprise license arrives over WatchLicense —
        # poll it (NOT /health) so the suite doesn't start before the edition syncs.
        echo "=== Poll push-service /ready ({{.PUSH_READY_URL}}) ==="
        for i in $(seq 1 30); do
          if curl -sf -o /dev/null "{{.PUSH_READY_URL}}"; then
            echo "  push-service ready ✓"; break
          fi
          [ "$i" = "30" ] && { echo "FAIL: push-service /ready not 200 after 30 tries"; exit 1; }
          sleep 2
        done
      - |
        set -eu
        . taskfiles/e2e/stack.sh
        echo "=== Run push suite (Web Push delivery) ==="
        # Hermetic CLI env (isolated HOME/XDG so no ambient context leaks in — otherwise the
        # tester skips its throwaway-tenant auto-create and misvalidates). The guard reads the
        # raw stream on stdin and owns report extraction; capture only its exit code (not the
        # report) so `rm` still runs and the step fails on a non-zero guard.
        TMPCFG=$(mktemp -d)
        rc=0
        HOME="$TMPCFG" XDG_CONFIG_HOME="$TMPCFG/.config" SUKKO_TESTER_TOKEN={{.TESTER_TOKEN}} \
          sukko test validate --suite push --follow --output json 2>/dev/null | push_validate_guard || rc=$?
        rm -rf "$TMPCFG"
        [ "$rc" -eq 0 ] || { echo "FAIL: push delivery guard failed (rc=$rc)"; exit 1; }
        echo "=== push delivery PASSED (real WebPush received by the mock receiver) ==="

  validate-battery:
    desc: >-
      Full validate-suite battery against an Enterprise-licensed direct-mode stack built
      from source. 17 suites, fail-closed: a suite fails the run on report status != pass
      OR any skipped check (empty allow-list). All suites run even after a failure; the
      task exits non-zero at the end if any failed.
    vars:
      # No compose profiles: the enterprise profile (push-service) needs kafka, and
      # the pro profile (webhook-worker) is deferred — the battery caught 3 boot bugs
      # in it (see the webhooks exclusion below). The Enterprise LICENSE (not a profile)
      # unlocks the SSE/revocation feature gates the battery exercises.
      COMPOSE: docker compose -f docker-compose.yml -f taskfiles/e2e/validate-battery.override.yml
      ADMIN_KEY_FILE: taskfiles/e2e/.admin.key
      PROVISIONING_URL: http://localhost:18080
      TESTER_TOKEN: sukko-dev-token
      # CONFIRMED-STABLE green set — deterministic pass across runs. The battery
      # grows as suites are triaged; the rest are tracked in the backlog issue:
      #  - push:               deferred — push-service does not boot (#158); its
      #                        delivery check (mock receiver already in the tester)
      #                        runs in the kafka-mode job once push-service boots.
      #  - webhooks:           webhook-worker does not boot — 3 bugs (#158) — deferred.
      #  - auth:               'wrong tenant JWT accepted' — potential cross-tenant finding.
      #  - rest-publish:       REST publish → WS/SSE delivery fails (negatives pass).
      #  - tenant-isolation:   passed once, failed once on delivery timing — verify stability.
      #  - token-revocation/api-key/upgrade: suite 'error' (auth-mode/setup).
      #  - edition-limits:     SSE/REST feature-gate assertions under Enterprise.
      #  - provisioning:       routing-rules topic assertion (test-default vs default).
      #  - ratelimit:          skips (gateway rate limiting disabled in the stack).
      #  - license-reload:     manual e2e:license family (mutates edition mid-run).
      #  - kafka-ingest:       own kafka-mode job.  smoke/load/soak/stress: not validate suites.
      SUITES: channels pubsub ordering reconnect sse auth
    cmds:
      - defer: "{{.COMPOSE}} down -v"
      - defer: rm -f {{.ADMIN_KEY_FILE}}
      - |
        set -eu
        . taskfiles/e2e/stack.sh
        echo "=== Mint Enterprise token + admin key (before boot) ==="
        TOKEN=$(e2e_mint_license enterprise 'E2E Battery')
        ADMIN_BOOTSTRAP_KEY=$(e2e_gen_admin_key "$(pwd)/{{.ADMIN_KEY_FILE}}")
        echo "=== Boot direct-mode stack (build from source, Enterprise license) ==="
        SUKKO_LICENSE_KEY="$TOKEN" \
        ADMIN_BOOTSTRAP_KEY="$ADMIN_BOOTSTRAP_KEY" \
        CREDENTIALS_ENCRYPTION_KEY="$(openssl rand -hex 32)" \
        WEBHOOK_INTERNAL_TOKEN="$(openssl rand -hex 24)" \
        {{.COMPOSE}} up -d --build --wait
      - |
        set -eu
        . taskfiles/e2e/stack.sh
        echo "=== Readiness gate ==="
        e2e_readiness_gate {{.PROVISIONING_URL}} enterprise
      - |
        set -eu
        echo "=== Run validate battery ==="
        # Hermetic CLI env (no ambient context; throwaway tenants per run). Gating parses
        # the report rather than relying on the CLI exit code — the extraction pipe masks
        # it — and fails closed on BOTH a non-pass status AND any skipped check. The skip
        # allow-list is EMPTY by design: in this fully-provisioned Enterprise stack no
        # suite has a legitimate reason to skip, and a skip in CI means coverage silently
        # vanished. Any future exemption must be added here with a written reason.
        TMPCFG=$(mktemp -d)
        FAILED=""
        for suite in {{.SUITES}}; do
          echo "--- suite: $suite ---"
          REPORT=$(HOME="$TMPCFG" XDG_CONFIG_HOME="$TMPCFG/.config" SUKKO_TESTER_TOKEN={{.TESTER_TOKEN}} sukko test validate --suite "$suite" --follow --output json 2>/dev/null | grep '"test_type"' | tail -1) || true
          if [ -z "$REPORT" ]; then
            echo "    verdict: NO REPORT"
            FAILED="$FAILED $suite(no-report)"
            continue
          fi
          STATUS=$(echo "$REPORT" | jq -r '.status // "missing"')
          SKIPS=$(echo "$REPORT" | jq -r '[.checks[]? | select(.status=="skip") | .name] | join(",")')
          FAILS=$(echo "$REPORT" | jq -r '[.checks[]? | select(.status=="fail") | .name] | join(",")')
          if [ "$STATUS" != "pass" ]; then
            echo "    verdict: $STATUS (failed checks: ${FAILS:-<none listed>})"
            FAILED="$FAILED $suite($STATUS)"
          elif [ -n "$SKIPS" ]; then
            echo "    verdict: SKIPPED CHECKS: $SKIPS"
            FAILED="$FAILED $suite(skip:$SKIPS)"
          else
            echo "    verdict: pass"
          fi
        done
        rm -rf "$TMPCFG"
        if [ -n "$FAILED" ]; then
          echo "=== validate battery FAILED:$FAILED ==="
          exit 1
        fi
        echo "=== validate battery PASSED ({{.SUITES}}) ==="

  license-reload:
    desc: Run license hot-reload validation (requires dev signing key)
    cmds:
      - |
        if [ ! -f "{{.DEV_KEY_PATH}}" ]; then
          echo "Dev signing key not found — generating..."
          cd ws && go run ./internal/shared/license/genkeys
        fi
      - |
        echo "=== Running license-reload validation suite ==="
        KEY=$(base64 < {{.DEV_KEY_PATH}} | tr -d '\n')
        curl -sf http://localhost:8090/api/v1/tests \
          -H 'Content-Type: application/json' \
          -d "{\"type\":\"validate\",\"suite\":\"license-reload\",\"signing_key\":\"$KEY\"}"
        echo ""
        echo "=== License-reload validation complete ==="
