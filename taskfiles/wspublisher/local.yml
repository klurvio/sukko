# =============================================================================
# wspublisher Local Tasks
# =============================================================================

version: "3"

vars:
  WSPUBLISHER_DIR: "{{.ROOT_DIR}}/wspublisher"

tasks:
  run:
    desc: Run wspublisher locally (RATE=10 msg/sec)
    dir: "{{.WSPUBLISHER_DIR}}"
    vars:
      RATE: '{{.RATE | default "10"}}'
    cmds:
      - task: wspublisher:build:docker
      - |
        docker run --rm \
          --add-host=host.docker.internal:host-gateway \
          -e KAFKA_BROKERS=host.docker.internal:19092 \
          -e KAFKA_NAMESPACE=local \
          -e TIMING_MODE=poisson \
          -e POISSON_LAMBDA={{.RATE}} \
          -e DURATION=0 \
          -e TENANT_ID=odin \
          -e IDENTIFIERS=BTC,ETH,SOL \
          -e CATEGORIES=trade,liquidity,orderbook \
          -e LOG_LEVEL=info \
          wspublisher:latest
