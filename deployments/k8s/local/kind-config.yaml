# =============================================================================
# kind Cluster Configuration for Local Development
# =============================================================================
# Usage: kind create cluster --config kind-config.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: sukko-local

nodes:
  - role: control-plane
    extraPortMappings:
      # WebSocket Gateway (client entry point)
      - containerPort: 30000
        hostPort: 3000
        protocol: TCP
      # Provisioning API (tenant management)
      - containerPort: 30081
        hostPort: 8081
        protocol: TCP
      # Redpanda (Kafka broker for publisher)
      - containerPort: 31092
        hostPort: 9092
        protocol: TCP
      # Grafana (metrics dashboard)
      - containerPort: 30300
        hostPort: 3010
        protocol: TCP

# Enable pod security admission (for Autopilot parity)
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        "enable-admission-plugins": "NodeRestriction,PodSecurity"
