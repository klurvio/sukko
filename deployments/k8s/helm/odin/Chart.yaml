apiVersion: v2
name: odin
description: Odin WebSocket Infrastructure - High-performance market data streaming
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: ws-server
    version: "1.0.0"
    condition: ws-server.enabled
  - name: auth-service
    version: "1.0.0"
    condition: auth-service.enabled
  - name: redpanda
    version: "1.0.0"
    condition: redpanda.enabled
  - name: valkey
    version: "1.0.0"
    condition: valkey.enabled
  - name: publisher
    version: "1.0.0"
    condition: publisher.enabled
  - name: monitoring
    version: "1.0.0"
    condition: monitoring.enabled

maintainers:
  - name: Odin Team
