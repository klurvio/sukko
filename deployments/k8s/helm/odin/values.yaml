# =============================================================================
# Odin WebSocket Infrastructure - Base Values
# =============================================================================
# This file contains base/default configuration values.
# Environment-specific overrides are in values-{local,develop,staging,production}.yaml

global:
  # Namespace (overridden per environment)
  namespace: odin

  # Image registry (overridden for GKE)
  imageRegistry: ""

  # Common labels applied to all resources
  labels:
    app.kubernetes.io/part-of: odin

# =============================================================================
# Kernel Tuning DaemonSet
# =============================================================================
# Applies sysctl settings for high WebSocket connections (18K+)
# See docs/architecture/CONNECTION_LIMITS.md for details
kernelTuning:
  enabled: true

# =============================================================================
# Shared Authentication Secrets
# =============================================================================
# JWT secret shared between odin-api (issues tokens) and ws-gateway (validates)
auth:
  # JWT signing secret (must be at least 32 bytes)
  # IMPORTANT: Override in values-{env}.yaml with real secrets!
  # Must match the JWT_SECRET configured in odin-api
  jwtSecret: "your-32-byte-jwt-secret-here!!!!"

# =============================================================================
# WebSocket Gateway
# =============================================================================
# The gateway handles authentication and permission filtering before proxying
# to ws-server. All external WebSocket connections go through the gateway.
ws-gateway:
  enabled: true

  replicaCount: 2

  image:
    repository: odin-gateway
    tag: latest
    pullPolicy: IfNotPresent

  config:
    port: 3000
    readTimeout: "15s"
    writeTimeout: "15s"
    idleTimeout: "60s"
    dialTimeout: "10s"
    logLevel: info
    logFormat: json
    # Authentication - disabled for now, enable when odin-api is ready
    authEnabled: false

  # Channel permission patterns
  permissions:
    # Public channels - any authenticated user can subscribe
    public:
      - "*.trade"
      - "*.liquidity"
      - "*.metadata"
    # User-scoped channels - JWT.sub must match {principal}
    userScoped:
      - "balances.{principal}"
      - "notifications.{principal}"
    # Group-scoped channels - JWT.groups must contain {group_id}
    groupScoped:
      - "community.{group_id}"
      - "social.{group_id}"

  # Rate limiting per principal
  rateLimit:
    enabled: true
    burst: 100
    rate: 10.0

  resources:
    requests:
      cpu: "250m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  service:
    type: LoadBalancer
    port: 443
    targetPort: 3000

# =============================================================================
# WebSocket Server
# =============================================================================
ws-server:
  enabled: true

  replicaCount: 1

  image:
    repository: odin-ws
    tag: latest
    pullPolicy: IfNotPresent

  # Server configuration
  config:
    shards: 2
    basePort: 3002
    lbAddr: ":3001"
    environment: local  # Topic naming: odin.{env}.{base}.refined (e.g., odin.local.trade.refined)

    # Rate limiting
    maxKafkaRate: 1000
    maxBroadcastRate: 25

    # Connection rate limiting (DoS protection)
    connRateLimit:
      enabled: true
      ipBurst: 100
      ipRate: 100.0
      globalBurst: 300
      globalRate: 50.0

    # CPU thresholds
    cpuRejectThreshold: 60.0
    cpuPauseThreshold: 70.0

    # TCP tuning
    tcpListenBacklog: 2048
    httpReadTimeout: "15s"
    httpWriteTimeout: "15s"
    httpIdleTimeout: "60s"

    # Logging
    logLevel: info
    logFormat: json

    # Metrics
    metricsInterval: "15s"

  # Connection limits (ResourceGuard enforces actual limits at runtime)
  connectionLimits:
    clusterMaxConnections: 100000

  # ==========================================================================
  # Broadcast Bus Configuration
  # ==========================================================================
  # The broadcast bus is used for inter-instance messaging (pub/sub)
  # Supports: "valkey" (Redis-compatible) or "nats" (NATS Core)
  broadcast:
    # Backend type: "valkey" or "nats"
    type: nats

  # Valkey (Redis) connection for BroadcastBus (when broadcast.type=valkey)
  valkey:
    # Empty string = use dynamic default: {{ .Release.Name }}-valkey:6379
    # Override this for external Valkey/Redis
    addrs: ""
    masterName: mymaster
    db: 0
    channel: ws.broadcast
    # Password set via secret

  # NATS connection for BroadcastBus (when broadcast.type=nats)
  nats:
    # Empty string = use dynamic default: nats://{{ .Release.Name }}-nats:4222
    # For cluster: nats://nats-1:4222,nats://nats-2:4222,nats://nats-3:4222
    urls: ""
    # Enable cluster mode (automatic failover, load balancing)
    clusterMode: false
    # NATS subject for broadcasting
    subject: ws.broadcast
    # Authentication (token preferred, or user/password)
    # Set via secret in production
    token: ""
    user: ""
    password: ""

  # Kafka configuration
  kafka:
    # Empty string = use dynamic default: {{ .Release.Name }}-redpanda:9092
    # Override this for external Kafka/Redpanda
    brokers: ""
    consumerGroup: odin-ws-consumer
    # NOTE: Topics are now dynamically determined based on config.environment
    # ws-server consumes from refined topics: odin.{env}.{base}.refined
    # Topics are created by Redpanda chart based on redpanda.topics config

    # SASL Authentication (for managed Kafka/Redpanda services)
    # Enable this for external/managed Redpanda that requires authentication
    sasl:
      enabled: false
      mechanism: scram-sha-256  # scram-sha-256 or scram-sha-512
      username: ""
      # Password: Set via existingSecret (recommended) or directly (not for production)
      password: ""
      # Use existing Kubernetes secret for password (recommended for production)
      existingSecret: ""
      existingSecretKey: "kafka-sasl-password"

    # TLS Encryption (for managed Kafka/Redpanda services)
    # Enable this for external/managed Redpanda that requires TLS
    tls:
      enabled: false
      insecureSkipVerify: false  # Skip CA verification (not recommended for production)
      caPath: ""  # Path to CA certificate (mounted from secret)

  # Resource allocation (overridden per environment)
  resources:
    requests:
      cpu: "1"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "1Gi"

  # Health checks
  livenessProbe:
    httpGet:
      path: /health
      port: 3001
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5

  readinessProbe:
    httpGet:
      path: /health
      port: 3001
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3

  # Service configuration
  service:
    type: NodePort
    port: 3001
    nodePort: 30080

  # Session Affinity - DISABLED
  # With gateway acting as proxy, session affinity causes uneven load distribution.
  # See ws-server/values.yaml for detailed explanation.
  sessionAffinity:
    enabled: false
    timeoutSeconds: 10800  # Only used if enabled

  # HPA (disabled by default, enabled in staging/production)
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# =============================================================================
# Auth Service - REMOVED
# =============================================================================
# Token issuance is now handled by odin-api (Firebase Functions)
# odin-api issues JWT tokens after IC Principal authentication
# ws-gateway validates these tokens using the shared JWT secret

# =============================================================================
# Redpanda (Kafka)
# =============================================================================
redpanda:
  enabled: true

  replicaCount: 1

  image:
    repository: redpandadata/redpanda
    tag: v23.3.5
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  # Kafka listener port
  kafkaPort: 9092

  # Admin port
  adminPort: 9644

  # Pandaproxy (REST) port
  pandaproxyPort: 8082

  # Schema registry port
  schemaRegistryPort: 8081

  # Console port
  consolePort: 8080

  # Storage
  storage:
    enabled: true
    size: 5Gi
    storageClass: ""  # Use default

  # Topic configuration
  # Topics use environment-prefixed naming: odin.{env}.{base} and odin.{env}.{base}.refined
  # Regular topics: Publisher publishes here
  # Refined topics: ws-server consumes from here (after external service processing)
  # NOTE: These are defaults for local environment. Override in values-{env}.yaml files.
  topics:
    # Regular topics (publisher → external service)
    - name: odin.local.trade
      partitions: 12
      replicationFactor: 1
    - name: odin.local.liquidity
      partitions: 12
      replicationFactor: 1
    - name: odin.local.balances
      partitions: 12
      replicationFactor: 1
    - name: odin.local.metadata
      partitions: 12
      replicationFactor: 1
    - name: odin.local.social
      partitions: 12
      replicationFactor: 1
    - name: odin.local.community
      partitions: 12
      replicationFactor: 1
    - name: odin.local.creation
      partitions: 12
      replicationFactor: 1
    - name: odin.local.analytics
      partitions: 12
      replicationFactor: 1
    # Refined topics (external service → ws-server)
    - name: odin.local.trade.refined
      partitions: 12
      replicationFactor: 1
    - name: odin.local.liquidity.refined
      partitions: 12
      replicationFactor: 1
    - name: odin.local.balances.refined
      partitions: 12
      replicationFactor: 1
    - name: odin.local.metadata.refined
      partitions: 12
      replicationFactor: 1
    - name: odin.local.social.refined
      partitions: 12
      replicationFactor: 1
    - name: odin.local.community.refined
      partitions: 12
      replicationFactor: 1
    - name: odin.local.creation.refined
      partitions: 12
      replicationFactor: 1
    - name: odin.local.analytics.refined
      partitions: 12
      replicationFactor: 1

  # External access for odin-api publisher (Firebase Functions → K8s)
  externalAccess:
    enabled: false
    type: LoadBalancer  # LoadBalancer or NodePort
    nodePort: ""        # Only used if type is NodePort

# =============================================================================
# Valkey (Redis-compatible) - Disabled by default, NATS is primary
# =============================================================================
valkey:
  enabled: false

  replicaCount: 1

  image:
    repository: valkey/valkey
    tag: 7.2-alpine
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  port: 6379

  # Configuration
  config:
    maxmemory: "256mb"
    maxmemoryPolicy: "allkeys-lru"

  # Password (set via secret in production)
  auth:
    enabled: true
    # password set via secret

# =============================================================================
# NATS (High-performance messaging) - Primary broadcast bus
# =============================================================================
nats:
  enabled: true

  # Number of NATS nodes (use 3 for cluster/HA)
  replicaCount: 1

  image:
    repository: nats
    tag: 2.10-alpine
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  # NATS ports
  ports:
    client: 4222
    cluster: 6222
    monitor: 8222

  # Cluster configuration
  cluster:
    enabled: false  # Enable for HA (requires replicaCount >= 3)
    name: "nats-cluster"

  # Authentication
  auth:
    enabled: false
    # token: set via secret

  # Logging
  logging:
    debug: false
    trace: false

  # JetStream (disabled - we use Core NATS for pub/sub)
  jetstream:
    enabled: false

# =============================================================================
# Monitoring Stack
# =============================================================================
monitoring:
  enabled: true

  # Prometheus
  prometheus:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    port: 9090
    nodePort: 30090
    retention: "7d"
    scrapeInterval: "15s"

  # Grafana
  grafana:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
    port: 3000
    nodePort: 30300
    # Admin credentials (set via secret in production)
    adminUser: admin

  # Loki (Log aggregation)
  loki:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    port: 3100
    retention: "168h"  # 7 days

  # Promtail (Log collector - DaemonSet)
  promtail:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
