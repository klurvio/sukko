# =============================================================================
# Odin WebSocket Infrastructure - Base Values
# =============================================================================
# This file contains base/default configuration values.
# Environment-specific overrides are in values-{local,develop,staging,production}.yaml

global:
  # Namespace (overridden per environment)
  namespace: odin

  # Image registry (overridden for GKE)
  imageRegistry: ""

  # Common labels applied to all resources
  labels:
    app.kubernetes.io/part-of: odin

# =============================================================================
# Shared Authentication Secrets
# =============================================================================
# These secrets are shared between auth-service and ws-server
auth:
  # JWT signing secret (must be at least 32 bytes)
  # IMPORTANT: Override in values-{env}.yaml with real secrets!
  jwtSecret: "your-32-byte-jwt-secret-here!!"

  # App secrets (key = env var name, value = secret)
  # These match the secret_env fields in auth-service.tenants config
  appSecrets:
    APP_SECRET_ODIN_WEB: "change-me-odin-web-secret"
    APP_SECRET_ODIN_MOBILE: "change-me-odin-mobile-secret"

# =============================================================================
# WebSocket Server
# =============================================================================
ws-server:
  enabled: true

  replicaCount: 1

  image:
    repository: odin-ws
    tag: latest
    pullPolicy: IfNotPresent

  # Server configuration
  config:
    shards: 2
    basePort: 3002
    lbAddr: ":3001"

    # Rate limiting
    maxKafkaRate: 1000
    maxBroadcastRate: 25

    # Connection rate limiting (DoS protection)
    connRateLimit:
      enabled: true
      ipBurst: 100
      ipRate: 100.0
      globalBurst: 300
      globalRate: 50.0

    # CPU thresholds
    cpuRejectThreshold: 75.0
    cpuPauseThreshold: 75.0

    # TCP tuning
    tcpListenBacklog: 2048
    httpReadTimeout: "15s"
    httpWriteTimeout: "15s"
    httpIdleTimeout: "60s"

    # Logging
    logLevel: info
    logFormat: json

    # Metrics
    metricsInterval: "15s"

  # Valkey (Redis) connection for BroadcastBus
  valkey:
    # Empty string = use dynamic default: {{ .Release.Name }}-valkey:6379
    # Override this for external Valkey/Redis
    addrs: ""
    masterName: mymaster
    db: 0
    channel: ws.broadcast
    # Password set via secret

  # Kafka configuration
  kafka:
    # Empty string = use dynamic default: {{ .Release.Name }}-redpanda:9092
    # Override this for external Kafka
    brokers: ""
    consumerGroup: odin-ws-consumer
    topics:
      - odin.trades
      - odin.liquidity
      - odin.balances
      - odin.metadata
      - odin.social
      - odin.community
      - odin.creation
      - odin.analytics

  # Resource allocation (overridden per environment)
  resources:
    requests:
      cpu: "1"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "1Gi"

  # Health checks
  livenessProbe:
    httpGet:
      path: /health
      port: 3001
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5

  readinessProbe:
    httpGet:
      path: /health
      port: 3001
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3

  # Service configuration
  service:
    type: NodePort
    port: 3001
    nodePort: 30080

  # Session affinity for WebSocket
  sessionAffinity:
    enabled: true
    timeoutSeconds: 10800  # 3 hours

  # HPA (disabled by default, enabled in staging/production)
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# =============================================================================
# Auth Service
# =============================================================================
auth-service:
  enabled: true

  replicaCount: 1

  image:
    repository: odin-auth
    tag: latest
    pullPolicy: IfNotPresent

  # Service configuration
  config:
    port: 3002
    tokenExpiry: "24h"
    logLevel: info

  # Tenant configuration (seeded via ConfigMap)
  # To add/modify tenants: Update values -> helm upgrade -> kubectl rollout restart
  tenants:
    - id: "odin-internal"
      name: "Odin Internal"
      apps:
        - id: "odin-web"
          name: "Odin Web Dashboard"
          secret_env: "APP_SECRET_ODIN_WEB"
        - id: "odin-mobile"
          name: "Odin Mobile App"
          secret_env: "APP_SECRET_ODIN_MOBILE"

  # Resource allocation (lightweight service)
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "128Mi"

  # Health checks
  livenessProbe:
    httpGet:
      path: /health
      port: 3002
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3

  readinessProbe:
    httpGet:
      path: /health
      port: 3002
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 2

  # Service configuration (ClusterIP - internal only)
  service:
    type: ClusterIP
    port: 3002

# =============================================================================
# Redpanda (Kafka)
# =============================================================================
redpanda:
  enabled: true

  replicaCount: 1

  image:
    repository: redpandadata/redpanda
    tag: v23.3.5
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  # Kafka listener port
  kafkaPort: 9092

  # Admin port
  adminPort: 9644

  # Pandaproxy (REST) port
  pandaproxyPort: 8082

  # Schema registry port
  schemaRegistryPort: 8081

  # Console port
  consolePort: 8080

  # Storage
  storage:
    enabled: true
    size: 5Gi
    storageClass: ""  # Use default

  # Topic configuration (matches v1 deployment)
  topics:
    - name: odin.trades
      partitions: 12
      replicationFactor: 1
    - name: odin.liquidity
      partitions: 12
      replicationFactor: 1
    - name: odin.balances
      partitions: 12
      replicationFactor: 1
    - name: odin.metadata
      partitions: 12
      replicationFactor: 1
    - name: odin.social
      partitions: 12
      replicationFactor: 1
    - name: odin.community
      partitions: 12
      replicationFactor: 1
    - name: odin.creation
      partitions: 12
      replicationFactor: 1
    - name: odin.analytics
      partitions: 12
      replicationFactor: 1

  # External access for odin-api publisher (Firebase Functions → K8s)
  externalAccess:
    enabled: false
    type: LoadBalancer  # LoadBalancer or NodePort
    nodePort: ""        # Only used if type is NodePort

# =============================================================================
# Valkey (Redis-compatible)
# =============================================================================
valkey:
  enabled: true

  replicaCount: 1

  image:
    repository: valkey/valkey
    tag: 7.2-alpine
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  port: 6379

  # Configuration
  config:
    maxmemory: "256mb"
    maxmemoryPolicy: "allkeys-lru"

  # Password (set via secret in production)
  auth:
    enabled: true
    # password set via secret

# =============================================================================
# Publisher (Event Generator)
# =============================================================================
publisher:
  enabled: true

  replicaCount: 1

  image:
    repository: odin-publisher
    tag: latest
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "512Mi"

  # Kafka connection
  kafka:
    # Empty = dynamic default ({{ .Release.Name }}-redpanda:9092)
    brokers: ""

  # Publishing rate
  config:
    ratePerSecond: 100
    tokens:
      - BTC
      - ETH
      - SOL
      - DOGE

# =============================================================================
# Monitoring Stack
# =============================================================================
monitoring:
  enabled: true

  # Prometheus
  prometheus:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    port: 9090
    nodePort: 30090
    retention: "7d"
    scrapeInterval: "15s"

  # Grafana
  grafana:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
    port: 3000
    nodePort: 30300
    # Admin credentials (set via secret in production)
    adminUser: admin

  # Loki (Log aggregation)
  loki:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    port: 3100
    retention: "168h"  # 7 days

  # Promtail (Log collector - DaemonSet)
  promtail:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
