{{- if and .Values.enabled .Values.grafana.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring.fullname" . }}-grafana-dashboards-provider
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'odin-dashboards'
        orgId: 1
        folder: 'Odin'
        folderUid: 'odin'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring.fullname" . }}-grafana-dashboards
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  overview.json: |
    {{ .Files.Get "dashboards/overview.json" | nindent 4 }}
  websocket.json: |
    {{- $dashboard := .Files.Get "dashboards/websocket.json" -}}
    {{- $dashboard = replace "__CPU_WARNING__" (printf "%.0f" .Values.dashboards.thresholds.cpu.warning) $dashboard -}}
    {{- $dashboard = replace "__CPU_CRITICAL__" (printf "%.0f" .Values.dashboards.thresholds.cpu.critical) $dashboard -}}
    {{- $dashboard = replace "__MEMORY_WARNING__" (printf "%.0f" .Values.dashboards.thresholds.memory.warning) $dashboard -}}
    {{- $dashboard = replace "__MEMORY_CRITICAL__" (printf "%.0f" .Values.dashboards.thresholds.memory.critical) $dashboard -}}
    {{ $dashboard | nindent 4 }}
  redpanda.json: |
    {{ .Files.Get "dashboards/redpanda.json" | nindent 4 }}
  nats.json: |
    {{ .Files.Get "dashboards/nats.json" | nindent 4 }}
  logs.json: |
    {{ .Files.Get "dashboards/logs.json" | nindent 4 }}
{{- end }}
