{{- if and .Values.enabled .Values.prometheus.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "monitoring.fullname" . }}-prometheus
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  type: NodePort
  ports:
    - port: {{ .Values.prometheus.port }}
      targetPort: http
      protocol: TCP
      name: http
      nodePort: {{ .Values.prometheus.nodePort }}
  selector:
    {{- include "monitoring.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
{{- end }}
