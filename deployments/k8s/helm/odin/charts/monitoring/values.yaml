# Default values for monitoring subchart

enabled: true

# Prometheus
prometheus:
  enabled: true
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  port: 9090
  retention: "7d"
  scrapeInterval: "15s"
  service:
    type: ClusterIP  # Use NodePort for external access
    nodePort: 30090  # Only used when type is NodePort
  image:
    repository: prom/prometheus
    tag: v2.47.0
    pullPolicy: IfNotPresent

# Grafana
grafana:
  enabled: true
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "250m"
      memory: "512Mi"
  port: 3000
  adminUser: admin
  # adminPassword set via secret
  service:
    type: ClusterIP  # Use NodePort for external access
    nodePort: 30300  # Only used when type is NodePort
  image:
    repository: grafana/grafana
    tag: 10.2.0
    pullPolicy: IfNotPresent

# Loki
loki:
  enabled: true
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  port: 3100
  retention: "168h"
  image:
    repository: grafana/loki
    tag: 2.9.2
    pullPolicy: IfNotPresent

# Promtail
promtail:
  enabled: true
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  image:
    repository: grafana/promtail
    tag: 2.9.2
    pullPolicy: IfNotPresent

# Dashboard thresholds (override per environment)
dashboards:
  thresholds:
    # CPU thresholds (percentage)
    cpu:
      warning: 60    # cpuRejectThreshold - new connections rejected
      critical: 70   # cpuPauseThreshold - Kafka consumption paused
    # Memory thresholds (MB) - set per environment based on ws-server limit
    # Formula: warning = limit * 0.8, critical = limit * 0.9
    memory:
      warning: 410   # 80% of 512Mi (develop default)
      critical: 460  # 90% of 512Mi (develop default)

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
