{{- if and .Values.enabled .Values.topics }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "redpanda.fullname" . }}-create-topics
  labels:
    {{- include "redpanda.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "redpanda.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-topics
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for Redpanda to be ready..."
              until rpk cluster info --brokers {{ include "redpanda.fullname" . }}:{{ .Values.kafkaPort }} 2>/dev/null; do
                echo "Waiting for Redpanda..."
                sleep 5
              done
              echo "Redpanda is ready. Creating topics..."
              {{- range .Values.topics }}
              echo "Creating topic {{ .name }}..."
              rpk topic create {{ .name }} \
                --brokers {{ include "redpanda.fullname" $ }}:{{ $.Values.kafkaPort }} \
                --partitions {{ .partitions }} \
                --replicas {{ .replicationFactor }} || true
              {{- end }}
              echo "All topics created successfully."
{{- end }}
