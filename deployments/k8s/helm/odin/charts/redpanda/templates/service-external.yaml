{{- if and .Values.enabled .Values.externalAccess.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "redpanda.fullname" . }}-external
  labels:
    {{- include "redpanda.labels" . | nindent 4 }}
spec:
  type: {{ .Values.externalAccess.type }}
  ports:
    - port: {{ .Values.kafkaPort }}
      targetPort: kafka
      protocol: TCP
      name: kafka
      {{- if and (eq .Values.externalAccess.type "NodePort") .Values.externalAccess.nodePort }}
      nodePort: {{ .Values.externalAccess.nodePort }}
      {{- end }}
  selector:
    {{- include "redpanda.selectorLabels" . | nindent 4 }}
{{- end }}
