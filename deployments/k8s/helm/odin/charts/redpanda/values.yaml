# Default values for redpanda subchart

enabled: true

replicaCount: 1

image:
  repository: redpandadata/redpanda
  tag: v23.3.5
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

# Ports
kafkaPort: 9092
adminPort: 9644
pandaproxyPort: 8082
schemaRegistryPort: 8081
consolePort: 8080

# Storage
storage:
  enabled: true
  size: 5Gi
  storageClass: ""

# External access for odin-api publisher
externalAccess:
  enabled: false
  type: LoadBalancer  # LoadBalancer or NodePort
  nodePort: ""        # Only used if type is NodePort

# Topic configuration (matches v1 deployment)
topics:
  - name: odin.trades
    partitions: 12
    replicationFactor: 1
  - name: odin.liquidity
    partitions: 12
    replicationFactor: 1
  - name: odin.balances
    partitions: 12
    replicationFactor: 1
  - name: odin.metadata
    partitions: 12
    replicationFactor: 1
  - name: odin.social
    partitions: 12
    replicationFactor: 1
  - name: odin.community
    partitions: 12
    replicationFactor: 1
  - name: odin.creation
    partitions: 12
    replicationFactor: 1
  - name: odin.analytics
    partitions: 12
    replicationFactor: 1

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
