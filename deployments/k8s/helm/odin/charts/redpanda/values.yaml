# Default values for redpanda subchart

enabled: true

replicaCount: 1

image:
  repository: redpandadata/redpanda
  tag: v23.3.5
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

# Ports
kafkaPort: 9092
adminPort: 9644
pandaproxyPort: 8082
schemaRegistryPort: 8081
consolePort: 8080

# Storage
storage:
  enabled: true
  size: 5Gi
  storageClass: ""

# External access for odin-api publisher
# When enabled with advertisedHost, Redpanda uses dual listeners:
# - internal://odin-redpanda:9092 for in-cluster clients (ws-server)
# - external://<advertisedHost>:<kafkaPort> for external clients (publisher VM)
externalAccess:
  enabled: false
  type: LoadBalancer  # LoadBalancer or NodePort
  nodePort: ""        # Only used if type is NodePort
  advertisedHost: ""  # External IP or hostname (required for external producers)
  # External listener port inside container (maps to kafkaPort on LoadBalancer)
  containerPort: 19092

# Topic configuration (matches v1 deployment)
topics:
  - name: odin.trades
    partitions: 12
    replicationFactor: 1
  - name: odin.liquidity
    partitions: 12
    replicationFactor: 1
  - name: odin.balances
    partitions: 12
    replicationFactor: 1
  - name: odin.metadata
    partitions: 12
    replicationFactor: 1
  - name: odin.social
    partitions: 12
    replicationFactor: 1
  - name: odin.community
    partitions: 12
    replicationFactor: 1
  - name: odin.creation
    partitions: 12
    replicationFactor: 1
  - name: odin.analytics
    partitions: 12
    replicationFactor: 1

# Pod Security Context
# Redpanda image runs as "redpanda" user (UID 101)
# fsGroup ensures PVC is accessible by the redpanda user
podSecurityContext:
  fsGroup: 101
  runAsUser: 101
  runAsGroup: 101

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
