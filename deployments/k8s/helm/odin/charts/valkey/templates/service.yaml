{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "valkey.fullname" . }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "valkey.selectorLabels" . | nindent 4 }}
{{- end }}
