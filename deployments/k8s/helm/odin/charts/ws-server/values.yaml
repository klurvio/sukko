# Default values for ws-server subchart
# These can be overridden from the parent chart

enabled: true

replicaCount: 1

image:
  repository: odin-ws
  tag: latest
  pullPolicy: IfNotPresent

config:
  shards: 2
  basePort: 3002
  lbAddr: ":3001"
  maxKafkaRate: 1000
  maxBroadcastRate: 25
  connRateLimit:
    enabled: true
    ipBurst: 100
    ipRate: 100.0
    globalBurst: 300
    globalRate: 50.0
  cpuRejectThreshold: 60.0
  cpuPauseThreshold: 70.0
  tcpListenBacklog: 2048
  httpReadTimeout: "15s"
  httpWriteTimeout: "15s"
  httpIdleTimeout: "60s"
  logLevel: info
  logFormat: json
  metricsInterval: "15s"

# Connection Limits Configuration
# See docs/architecture/CONNECTION_LIMITS.md for details
connectionLimits:
  # Cluster-wide max connections (ResourceGuard enforces actual limits at runtime)
  # Formula: WS_MAX_CONNECTIONS = clusterMaxConnections / replicaCount
  clusterMaxConnections: 100000
  # Read/write buffer sizes per connection (affects memory usage)
  # Lower = less memory, higher = better throughput for large messages
  readBufferSize: 4096
  writeBufferSize: 4096
  # Maximum message size in bytes (prevents memory exhaustion from large messages)
  maxMessageSize: 65536

# Pod Security Context
# Note: Node-level kernel tuning handles ulimits (see CONNECTION_LIMITS.md)
podSecurityContext:
  fsGroup: 1000

# Container Security Context
# Dockerfile creates non-root user (odin:1000) in /app directory
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Broadcast Bus Configuration
broadcast:
  # Backend type: "valkey" or "nats"
  type: valkey

valkey:
  # Empty = dynamic default ({{ .Release.Name }}-valkey:6379)
  addrs: ""
  masterName: mymaster
  db: 0
  channel: ws.broadcast

nats:
  # Empty = dynamic default (nats://{{ .Release.Name }}-nats:4222)
  urls: ""
  clusterMode: false
  subject: ws.broadcast
  token: ""
  user: ""
  password: ""

kafka:
  # Empty = dynamic default ({{ .Release.Name }}-redpanda:9092)
  brokers: ""
  consumerGroup: odin-ws-consumer
  topics:
    - odin.trades
    - odin.liquidity
    - odin.balances
    - odin.metadata
    - odin.social
    - odin.community
    - odin.creation
    - odin.analytics

  # SASL Authentication (for managed Kafka/Redpanda services)
  sasl:
    enabled: false
    mechanism: scram-sha-256  # scram-sha-256 or scram-sha-512
    username: ""
    # password: Set via existingSecret or directly (not recommended)
    password: ""
    # Use existing secret for password (recommended for production)
    existingSecret: ""
    existingSecretKey: "kafka-sasl-password"

  # TLS Encryption (for managed Kafka/Redpanda services)
  tls:
    enabled: false
    insecureSkipVerify: false  # Skip CA verification (not for production)
    caPath: ""  # Path to CA certificate (mounted from secret)

# JWT Authentication for WebSocket connections
# Requires shared secret from parent chart (odin-auth-secrets)
auth:
  enabled: false
  tokenExpiry: "24h"
  tokenExpiryWarning: "5m"
  tokenCheckInterval: "1m"

resources:
  requests:
    cpu: "1"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "1Gi"

livenessProbe:
  httpGet:
    path: /health
    port: 3001
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 3001
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3

service:
  type: NodePort
  port: 3001
  nodePort: 30080

sessionAffinity:
  enabled: true
  timeoutSeconds: 10800

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Network Policy - Restrict access to gateway only
networkPolicy:
  enabled: true
  # Allow Prometheus to scrape metrics
  allowPrometheus: true

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
