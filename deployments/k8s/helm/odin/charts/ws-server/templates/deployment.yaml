{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ws-server.fullname" . }}
  labels:
    {{- include "ws-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ws-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ws-server.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: ws-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "./odin-ws"
          args:
            - "--shards={{ .Values.config.shards }}"
            - "--base-port={{ .Values.config.basePort }}"
            - "--lb-addr={{ .Values.config.lbAddr }}"
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
            {{- range $i := until (int .Values.config.shards) }}
            - name: shard-{{ $i }}
              containerPort: {{ add 3002 $i }}
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "ws-server.fullname" . }}-config
            - secretRef:
                name: {{ include "ws-server.fullname" . }}-secrets
                optional: true
          env:
            # Kafka/Redpanda: Use provided value or default to release-name-redpanda:9092
            - name: KAFKA_BROKERS
              value: "{{ .Values.kafka.brokers | default (printf "%s-redpanda:9092" .Release.Name) }}"
            - name: KAFKA_CONSUMER_GROUP
              value: "{{ .Values.kafka.consumerGroup }}"
            # Valkey: Use provided value or default to release-name-valkey:6379
            - name: VALKEY_ADDRS
              value: "{{ .Values.valkey.addrs | default (printf "%s-valkey:6379" .Release.Name) }}"
            - name: VALKEY_MASTER_NAME
              value: "{{ .Values.valkey.masterName }}"
            - name: VALKEY_DB
              value: "{{ .Values.valkey.db }}"
            - name: VALKEY_CHANNEL
              value: "{{ .Values.valkey.channel }}"
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
