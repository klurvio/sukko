# Default values for ws-gateway subchart
# These can be overridden from the parent chart

enabled: true

replicaCount: 2

image:
  repository: odin-gateway
  tag: latest
  pullPolicy: IfNotPresent

config:
  port: 3000
  readTimeout: "15s"
  writeTimeout: "15s"
  idleTimeout: "60s"
  dialTimeout: "10s"
  messageTimeout: "60s"
  logLevel: info
  logFormat: json

  # Authentication - set to false to disable JWT validation
  authEnabled: false

  # Backend ws-server URL (empty = dynamic default)
  # Dynamic default: ws://{{ .Release.Name }}-ws-server:3001/ws
  backendURL: ""

# Channel permission patterns
permissions:
  # Public channels - any authenticated user can subscribe
  public:
    - "*.trade"
    - "*.liquidity"
    - "*.metadata"
  # User-scoped channels - JWT.sub must match {principal}
  userScoped:
    - "balances.{principal}"
    - "notifications.{principal}"
  # Group-scoped channels - JWT.groups must contain {group_id}
  groupScoped:
    - "community.{group_id}"
    - "social.{group_id}"

# Rate limiting per principal
rateLimit:
  enabled: true
  burst: 100
  rate: 10.0

# NATS Configuration for Least-Connections Routing
# When enabled, gateway routes to ws-server pod with fewest connections
# instead of relying on K8s Service random distribution
nats:
  enabled: false
  # Empty = dynamic default (nats://{{ .Release.Name }}-nats:4222)
  urls: ""

# WS-Server port (used when routing directly to pods)
wsServerPort: 3001

# Note: Gateway does not use connection limits (only rate limiting)
# Capacity control happens at the ws-server level via ResourceGuard

# Pod Security Context
podSecurityContext:
  fsGroup: 1000

# Container Security Context
# Dockerfile creates non-root user (odin:1000) in /app directory
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: "250m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2

service:
  type: LoadBalancer
  port: 443
  targetPort: 3000

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
