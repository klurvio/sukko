{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ws-gateway.fullname" . }}-config
  labels:
    {{- include "ws-gateway.labels" . | nindent 4 }}
data:
  # Permission patterns for channel access control
  public-patterns: {{ .Values.permissions.public | join "," | quote }}
  user-scoped-patterns: {{ .Values.permissions.userScoped | join "," | quote }}
  group-scoped-patterns: {{ .Values.permissions.groupScoped | join "," | quote }}
{{- end }}
