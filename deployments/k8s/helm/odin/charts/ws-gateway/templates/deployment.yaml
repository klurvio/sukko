{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ws-gateway.fullname" . }}
  labels:
    {{- include "ws-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ws-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ws-gateway.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            # Server configuration
            - name: GATEWAY_PORT
              value: "{{ .Values.config.port }}"
            - name: GATEWAY_READ_TIMEOUT
              value: "{{ .Values.config.readTimeout }}"
            - name: GATEWAY_WRITE_TIMEOUT
              value: "{{ .Values.config.writeTimeout }}"
            - name: GATEWAY_IDLE_TIMEOUT
              value: "{{ .Values.config.idleTimeout }}"
            - name: GATEWAY_DIAL_TIMEOUT
              value: "{{ .Values.config.dialTimeout }}"
            - name: GATEWAY_MESSAGE_TIMEOUT
              value: "{{ .Values.config.messageTimeout }}"

            # Backend URL (dynamic default if not specified)
            - name: GATEWAY_BACKEND_URL
              {{- if .Values.config.backendURL }}
              value: "{{ .Values.config.backendURL }}"
              {{- else }}
              value: "ws://{{ .Release.Name }}-ws-server:3001/ws"
              {{- end }}

            # Authentication
            - name: AUTH_ENABLED
              value: "{{ .Values.config.authEnabled }}"
            {{- if .Values.config.authEnabled }}
            # JWT Secret (from shared secret) - only required when auth is enabled
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-auth-secrets
                  key: jwt-secret
            {{- end }}

            # Permission patterns
            - name: GATEWAY_PUBLIC_PATTERNS
              value: "{{ join "," .Values.permissions.public }}"
            - name: GATEWAY_USER_SCOPED_PATTERNS
              value: "{{ join "," .Values.permissions.userScoped }}"
            - name: GATEWAY_GROUP_SCOPED_PATTERNS
              value: "{{ join "," .Values.permissions.groupScoped }}"

            # Rate limiting
            - name: GATEWAY_RATE_LIMIT_ENABLED
              value: "{{ .Values.rateLimit.enabled }}"
            - name: GATEWAY_RATE_LIMIT_BURST
              value: "{{ .Values.rateLimit.burst }}"
            - name: GATEWAY_RATE_LIMIT_RATE
              value: "{{ .Values.rateLimit.rate }}"

            # Logging
            - name: LOG_LEVEL
              value: "{{ .Values.config.logLevel }}"
            - name: LOG_FORMAT
              value: "{{ .Values.config.logFormat }}"

            # Environment
            - name: ENVIRONMENT
              value: "{{ .Release.Namespace }}"

            # Note: Gateway does not use connection limits (only rate limiting)
            # MAX_CONNECTIONS, READ_BUFFER_SIZE, etc. are NOT read by gateway code
            # Capacity control happens at the ws-server level

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
