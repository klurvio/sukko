# Shared authentication secrets for odin-api (issuer) and ws-gateway (validator)
# Contains JWT_SECRET for token signing/validation
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-auth-secrets
  labels:
    app.kubernetes.io/part-of: odin
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  # JWT signing secret (base64 encoded)
  # Must match the JWT_SECRET in odin-api (Firebase Functions)
  # Generate with: openssl rand -base64 32 | base64
  jwt-secret: {{ .Values.auth.jwtSecret | b64enc | quote }}
