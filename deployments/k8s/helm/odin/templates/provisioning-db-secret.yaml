# Provisioning database secret for multi-tenant configuration
# Used by ws-gateway (tenant keys) and ws-server (tenant topics)
#
# This secret is only created if global.provisioning.existingSecret is NOT set.
# For production, use an existing secret managed by Terraform or External Secrets Operator.

{{- if and (not .Values.global.provisioning.existingSecret) (not .Values.global.provisioning.databaseUrl) }}
  {{- fail "Provisioning database not configured. Set either global.provisioning.existingSecret (recommended) or global.provisioning.databaseUrl" }}
{{- end }}

{{- if not .Values.global.provisioning.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-provisioning-db
  labels:
    app.kubernetes.io/part-of: odin
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  # PostgreSQL connection string (base64 encoded)
  database-url: {{ .Values.global.provisioning.databaseUrl | b64enc | quote }}
{{- end }}
