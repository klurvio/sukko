# =============================================================================
# GKE Standard - Staging Environment (Spot VMs, Cost-Optimized)
# =============================================================================
# Staging environment using GKE Standard with Spot VMs for 60-90% cost savings.
# Fixed 2 nodes, production-like config, no persistent storage.
#
# Usage:
#   helm upgrade --install odin ./deployments/k8s/helm/odin \
#     -f ./deployments/k8s/helm/odin/values/standard/staging.yaml \
#     -n odin-std-staging --create-namespace

global:
  namespace: odin-std-staging
  # Update with your Artifact Registry path
  imageRegistry: "us-central1-docker.pkg.dev/YOUR_PROJECT/odin"

# =============================================================================
# WebSocket Gateway
# =============================================================================
ws-gateway:
  enabled: true
  replicaCount: 2

  image:
    repository: ws-gateway
    tag: latest
    pullPolicy: Always

  config:
    logLevel: info
    logFormat: json

  resources:
    requests:
      cpu: "250m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  service:
    type: LoadBalancer
    port: 443
    targetPort: 3000

  # Spot VM tolerations
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

  # Pod disruption budget for Spot preemption handling
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# =============================================================================
# WebSocket Server
# =============================================================================
ws-server:
  enabled: true
  replicaCount: 2

  image:
    repository: ws-server
    tag: latest
    pullPolicy: Always

  config:
    shards: 2
    logLevel: info
    logFormat: json
    environment: staging  # Deployment environment for logging/metrics
    # kafkaTopicNamespace: defaults to "staging" (normalized from "staging")
    # Uncomment to consume from production topics for testing:
    # kafkaTopicNamespace: main

  # Connection limits (ResourceGuard enforces actual limits at runtime)
  connectionLimits:
    clusterMaxConnections: 100000

  # Broadcast Bus - NATS
  broadcast:
    type: nats

  # NATS config
  nats:
    urls: ""  # Uses dynamic default
    clusterMode: false  # Single node for cost savings

  resources:
    requests:
      cpu: "500m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

  service:
    type: ClusterIP  # Internal only - gateway handles external traffic

  autoscaling:
    enabled: false

  # Spot VM tolerations
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

  # Pod disruption budget for graceful handling
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # Termination grace period for WebSocket connections
  terminationGracePeriodSeconds: 30

# =============================================================================
# Redpanda (Kafka) - Minimal Self-Hosted
# =============================================================================
redpanda:
  enabled: true
  replicaCount: 1

  # Minimal resources for self-hosted
  memory: "256M"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "384Mi"

  # Use emptyDir for cost savings (data not persisted)
  storage:
    enabled: false

  # Topic configuration for staging
  # Topics use environment-prefixed naming: odin.{env}.{base} and odin.{env}.{base}.refined
  # Regular topics: Publisher publishes here
  # Refined topics: ws-server consumes from here (after external service processing)
  topics:
    # Regular topics (publisher → external service)
    - name: odin.staging.trade
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.liquidity
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.balances
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.metadata
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.social
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.community
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.creation
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.analytics
      partitions: 1
      replicationFactor: 1
    # Refined topics (external service → ws-server)
    - name: odin.staging.trade.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.liquidity.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.balances.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.metadata.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.social.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.community.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.creation.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.staging.analytics.refined
      partitions: 1
      replicationFactor: 1

  # Spot VM tolerations
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

  # External access for odin-api publisher
  externalAccess:
    enabled: true
    type: LoadBalancer

# =============================================================================
# Valkey - Disabled (using NATS)
# =============================================================================
valkey:
  enabled: false

# =============================================================================
# NATS - Minimal Self-Hosted
# =============================================================================
nats:
  enabled: true
  replicaCount: 1

  cluster:
    enabled: false  # Single node for cost savings

  auth:
    enabled: false

  # Minimal resources
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

  # Spot VM tolerations
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

# =============================================================================
# Monitoring - Minimal
# =============================================================================
monitoring:
  enabled: true

  prometheus:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

  grafana:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

  loki:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

  promtail:
    enabled: true
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
