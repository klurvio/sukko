# =============================================================================
# GKE Standard - Develop Environment (Spot VMs, Cost-Optimized)
# =============================================================================
# Development environment using GKE Standard with Spot VMs for 60-90% cost savings.
# Fixed 2 nodes, minimal resources, no persistent storage.
#
# Usage:
#   helm upgrade --install odin ./deployments/k8s/helm/odin \
#     -f ./deployments/k8s/helm/odin/values/standard/develop.yaml \
#     -n odin-std-develop --create-namespace

global:
  namespace: odin-std-develop
  imageRegistry: "us-central1-docker.pkg.dev/trim-array-480700-j7/odin"

# =============================================================================
# WebSocket Gateway
# =============================================================================
ws-gateway:
  enabled: true
  replicaCount: 2

  image:
    repository: ws-gateway
    tag: latest
    pullPolicy: Always

  config:
    logLevel: info
    logFormat: json

  resources:
    requests:
      cpu: "250m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  service:
    type: LoadBalancer
    port: 443
    targetPort: 3000

  # Spot VM tolerations
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

  # Pod disruption budget for Spot preemption handling
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# =============================================================================
# WebSocket Server
# =============================================================================
ws-server:
  enabled: true
  replicaCount: 2

  image:
    repository: ws-server
    tag: latest
    pullPolicy: Always

  config:
    shards: 2
    logLevel: info
    logFormat: json

  # Broadcast Bus - NATS
  broadcast:
    type: nats

  # NATS config
  nats:
    urls: ""  # Uses dynamic default
    clusterMode: false  # Single node for cost savings

  resources:
    requests:
      cpu: "500m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

  service:
    type: ClusterIP  # Internal only - gateway handles external traffic

  autoscaling:
    enabled: false  # Enable for production

  # Spot VM tolerations
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

  # Pod disruption budget for graceful handling
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # Termination grace period for WebSocket connections
  terminationGracePeriodSeconds: 30

# =============================================================================
# Redpanda (Kafka) - Minimal Self-Hosted
# =============================================================================
redpanda:
  enabled: true
  replicaCount: 1

  # Minimal resources for self-hosted
  memory: "256M"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "384Mi"

  # Use emptyDir for cost savings (data not persisted)
  storage:
    enabled: false

  # Minimal partitions
  topics:
    - name: odin.trades
      partitions: 1
      replicationFactor: 1
    - name: odin.liquidity
      partitions: 1
      replicationFactor: 1
    - name: odin.balances
      partitions: 1
      replicationFactor: 1
    - name: odin.metadata
      partitions: 1
      replicationFactor: 1
    - name: odin.social
      partitions: 1
      replicationFactor: 1
    - name: odin.community
      partitions: 1
      replicationFactor: 1
    - name: odin.creation
      partitions: 1
      replicationFactor: 1
    - name: odin.analytics
      partitions: 1
      replicationFactor: 1

  # Spot VM tolerations
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

  # External access for odin-api publisher
  externalAccess:
    enabled: true
    type: LoadBalancer

# =============================================================================
# Valkey - Disabled (using NATS)
# =============================================================================
valkey:
  enabled: false

# =============================================================================
# NATS - Minimal Self-Hosted
# =============================================================================
nats:
  enabled: true
  replicaCount: 1

  cluster:
    enabled: false  # Single node for cost savings

  auth:
    enabled: false

  # Minimal resources
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

  # Spot VM tolerations
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

# =============================================================================
# Publisher
# =============================================================================
publisher:
  enabled: true

  image:
    repository: publisher
    tag: latest
    pullPolicy: Always

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

  # Spot VM tolerations
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

# =============================================================================
# Monitoring - Minimal
# =============================================================================
monitoring:
  enabled: true

  prometheus:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

  grafana:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

  loki:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

  promtail:
    enabled: true
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
