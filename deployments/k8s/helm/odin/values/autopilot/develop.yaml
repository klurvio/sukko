# =============================================================================
# Develop Environment (GKE Autopilot)
# =============================================================================

global:
  namespace: odin-dev
  imageRegistry: "us-central1-docker.pkg.dev/YOUR_PROJECT/odin"

# WebSocket Server
ws-server:
  enabled: true
  replicaCount: 1
  image:
    repository: us-central1-docker.pkg.dev/YOUR_PROJECT/odin/ws-server
    pullPolicy: Always
  config:
    shards: 2
    logLevel: debug
    logFormat: json
    environment: dev  # Topic naming: odin.dev.{base}.refined

  # Connection limits (ResourceGuard enforces actual limits at runtime)
  connectionLimits:
    clusterMaxConnections: 100000

  # Broadcast Bus - NATS for high performance
  broadcast:
    type: nats

  # NATS cluster config
  nats:
    urls: ""  # Uses dynamic default: nats://odin-dev-nats:4222
    clusterMode: true

  resources:
    requests:
      cpu: "1"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  service:
    type: ClusterIP  # Internal only - gateway handles external traffic
  autoscaling:
    enabled: false

# Redpanda
redpanda:
  enabled: true
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  storage:
    enabled: true
    size: 10Gi
  # Topic configuration for development
  # Topics use environment-prefixed naming: odin.{env}.{base} and odin.{env}.{base}.refined
  topics:
    # Regular topics (publisher → external service)
    - name: odin.dev.trade
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.liquidity
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.balances
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.metadata
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.social
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.community
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.creation
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.analytics
      partitions: 4
      replicationFactor: 1
    # Refined topics (external service → ws-server)
    - name: odin.dev.trade.refined
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.liquidity.refined
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.balances.refined
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.metadata.refined
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.social.refined
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.community.refined
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.creation.refined
      partitions: 4
      replicationFactor: 1
    - name: odin.dev.analytics.refined
      partitions: 4
      replicationFactor: 1

# Valkey - Disabled (using NATS instead)
valkey:
  enabled: false

# NATS - 3-node cluster for HA
nats:
  enabled: true
  replicaCount: 3
  cluster:
    enabled: true
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# Monitoring
monitoring:
  enabled: true
  prometheus:
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  grafana:
    resources:
      requests:
        cpu: "125m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
  loki:
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  promtail:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
