# =============================================================================
# Production Environment (GKE Autopilot)
# =============================================================================

global:
  namespace: odin-prod
  imageRegistry: "us-central1-docker.pkg.dev/YOUR_PROJECT/odin"

# WebSocket Server
ws-server:
  enabled: true
  replicaCount: 3
  image:
    repository: us-central1-docker.pkg.dev/YOUR_PROJECT/odin/ws-server
    pullPolicy: Always
  config:
    shards: 2
    logLevel: warn
    logFormat: json

  # Connection limits (ResourceGuard enforces actual limits at runtime)
  connectionLimits:
    clusterMaxConnections: 100000

  # Broadcast Bus - NATS for high performance
  broadcast:
    type: nats

  # NATS cluster config (3-node cluster for HA)
  nats:
    urls: ""  # Uses dynamic default: nats://odin-prod-nats:4222
    clusterMode: true
    # token: Set via Kubernetes secret

  # Kafka/Redpanda - External managed instance
  kafka:
    # IMPORTANT: Set this to your managed Redpanda cluster address
    brokers: "your-cluster.cloud.redpanda.com:9092"
    consumerGroup: odin-ws-consumer

    # SASL Authentication (required for managed Redpanda)
    sasl:
      enabled: true
      mechanism: scram-sha-256
      username: "odin-consumer"
      # IMPORTANT: Use existingSecret in production, never commit passwords!
      existingSecret: "kafka-credentials"
      existingSecretKey: "password"

    # TLS Encryption (required for managed Redpanda)
    tls:
      enabled: true
      insecureSkipVerify: false

  resources:
    requests:
      cpu: "1"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  service:
    type: ClusterIP  # Internal only - gateway handles external traffic
  sessionAffinity:
    enabled: false  # Disabled - gateway proxy makes this counterproductive
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Redpanda - Disabled in production (using managed Redpanda Cloud)
# ws-server connects to external managed Redpanda via kafka.brokers
redpanda:
  enabled: false

# Valkey - Disabled (using NATS instead)
valkey:
  enabled: false

# NATS - 3-node cluster for HA in production
nats:
  enabled: true
  replicaCount: 3
  cluster:
    enabled: true
  auth:
    enabled: true
    # token: Set via Kubernetes secret
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# Monitoring
monitoring:
  enabled: true
  prometheus:
    retention: "30d"
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  grafana:
    resources:
      requests:
        cpu: "125m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
  loki:
    retention: "720h"  # 30 days
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  promtail:
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
