# =============================================================================
# Local Environment (kind) - M1 MacBook optimized
# =============================================================================

global:
  namespace: odin-local

# WebSocket Gateway - Handles auth and permission filtering
ws-gateway:
  enabled: true
  replicaCount: 1
  config:
    logLevel: debug
    logFormat: pretty
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "128Mi"
  service:
    type: NodePort
    port: 3000
    nodePort: 30000

# WebSocket Server - Dumb broadcaster (no auth)
ws-server:
  enabled: true
  replicaCount: 1
  config:
    shards: 1  # Single shard for M1
    logLevel: debug
    logFormat: pretty

  # Broadcast Bus - NATS for high performance
  broadcast:
    type: nats

  # NATS config (single node for local dev)
  nats:
    urls: ""  # Uses dynamic default: nats://odin-local-nats:4222
    clusterMode: false  # Single node for local

  # Kafka/Redpanda - Self-hosted in cluster (no auth needed)
  kafka:
    brokers: ""  # Uses dynamic default: odin-local-redpanda:9092
    # SASL/TLS disabled for local self-hosted Redpanda (defaults from base values)

  # NOTE: Auth is now handled by ws-gateway
  # ws-server is a dumb broadcaster with network-level security

  resources:
    requests:
      cpu: "500m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  service:
    type: NodePort
    nodePort: 30080
  autoscaling:
    enabled: false

# Auth Service - REMOVED
# Token issuance is now handled by odin-api
# For local testing, use a test JWT or mock odin-api

# Redpanda - Reduced resources for kind
redpanda:
  enabled: true
  memory: "256M"  # Redpanda process memory (must be < container limit)
  # External access for local publisher via port-forward
  externalAccess:
    enabled: true
    advertisedHost: localhost  # Publisher connects via port-forward
    containerPort: 19092       # External listener port inside container
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "384Mi"  # 256M + overhead for container
  storage:
    enabled: false  # Use emptyDir for local
  # Fewer partitions for Kind hardware constraints
  topics:
    - name: odin.trades
      partitions: 1
      replicationFactor: 1
    - name: odin.liquidity
      partitions: 1
      replicationFactor: 1
    - name: odin.balances
      partitions: 1
      replicationFactor: 1
    - name: odin.metadata
      partitions: 1
      replicationFactor: 1
    - name: odin.social
      partitions: 1
      replicationFactor: 1
    - name: odin.community
      partitions: 1
      replicationFactor: 1
    - name: odin.creation
      partitions: 1
      replicationFactor: 1
    - name: odin.analytics
      partitions: 1
      replicationFactor: 1

# Valkey - Disabled (using NATS instead)
valkey:
  enabled: false
  auth:
    enabled: false

# NATS - Single node for local dev
nats:
  enabled: true
  replicaCount: 1
  cluster:
    enabled: false
  auth:
    enabled: false
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

# Monitoring - Reduced for local
monitoring:
  enabled: true
  prometheus:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
  grafana:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
  loki:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
  promtail:
    enabled: true
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
