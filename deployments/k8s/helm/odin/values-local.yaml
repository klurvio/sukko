# =============================================================================
# Local Environment (kind) - M1 MacBook optimized
# =============================================================================

global:
  namespace: odin-local

# WebSocket Server - Minimal for local dev
ws-server:
  enabled: true
  replicaCount: 1
  config:
    shards: 1  # Single shard for M1
    logLevel: debug
    logFormat: pretty
  resources:
    requests:
      cpu: "500m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  service:
    type: NodePort
    nodePort: 30080
  autoscaling:
    enabled: false

# Auth Service - JWT token issuer
auth-service:
  enabled: true
  config:
    logLevel: debug
  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# Redpanda - Reduced resources for kind
redpanda:
  enabled: true
  memory: "256M"  # Redpanda process memory (must be < container limit)
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "384Mi"  # 256M + overhead for container
  storage:
    enabled: false  # Use emptyDir for local
  # Fewer partitions for Kind hardware constraints
  topics:
    - name: odin.trades
      partitions: 1
      replicationFactor: 1
    - name: odin.liquidity
      partitions: 1
      replicationFactor: 1
    - name: odin.balances
      partitions: 1
      replicationFactor: 1
    - name: odin.metadata
      partitions: 1
      replicationFactor: 1
    - name: odin.social
      partitions: 1
      replicationFactor: 1
    - name: odin.community
      partitions: 1
      replicationFactor: 1
    - name: odin.creation
      partitions: 1
      replicationFactor: 1
    - name: odin.analytics
      partitions: 1
      replicationFactor: 1

# Valkey - Minimal (no auth for local dev)
valkey:
  enabled: true
  auth:
    enabled: false  # No password for local development
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

# Publisher - Minimal
publisher:
  enabled: true
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

# Monitoring - Reduced for local
monitoring:
  enabled: true
  prometheus:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
  grafana:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
  loki:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
  promtail:
    enabled: true
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
