# =============================================================================
# kind Cluster Configuration for Local Development
# =============================================================================
# Usage: kind create cluster --config kind-config.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: odin-local

nodes:
  - role: control-plane
    extraPortMappings:
      # WebSocket Server
      - containerPort: 30080
        hostPort: 3005
        protocol: TCP
      # Grafana
      - containerPort: 30300
        hostPort: 3010
        protocol: TCP
      # Prometheus
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      # Redpanda Console (optional)
      - containerPort: 30800
        hostPort: 8080
        protocol: TCP

# Enable pod security admission (for Autopilot parity)
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        "enable-admission-plugins": "NodeRestriction,PodSecurity"
