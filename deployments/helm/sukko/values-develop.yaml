# =============================================================================
# Odin WebSocket Infrastructure - Develop Environment
# =============================================================================
# Cost-effective configuration for development testing
# Target: ~40K total connections (2 nodes × 2 pods × 10K)
# See docs/architecture/CONNECTION_LIMITS.md for details

global:
  namespace: odin-develop

# =============================================================================
# WebSocket Gateway - Develop
# =============================================================================
ws-gateway:
  replicaCount: 1

  # Connection limits for development
  connectionLimits:
    maxConnections: 10000
    readBufferSize: 4096
    writeBufferSize: 4096
    maxMessageSize: 65536

  # Lower resources for cost savings
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# =============================================================================
# WebSocket Server - Develop
# =============================================================================
ws-server:
  replicaCount: 1

  config:
    shards: 2
    logLevel: debug  # More verbose for development
    environment: dev  # Topic naming: odin.dev.{base}.refined

  # Connection limits (ResourceGuard enforces actual limits at runtime)
  connectionLimits:
    clusterMaxConnections: 100000
    readBufferSize: 4096
    writeBufferSize: 4096
    maxMessageSize: 65536

  # Lower resources for cost savings
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

  # No autoscaling in develop
  autoscaling:
    enabled: false

# =============================================================================
# Redpanda - Develop
# =============================================================================
redpanda:
  replicaCount: 1

  # Redpanda runtime memory (Seastar)
  memory: "768M"

  resources:
    requests:
      cpu: "250m"
      memory: "768Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

  storage:
    size: 2Gi

  # External access for local publisher testing
  # Pass advertisedHost and loadBalancerIP via --set at deploy time:
  #   --set redpanda.externalAccess.advertisedHost=$IP
  #   --set redpanda.externalAccess.loadBalancerIP=$IP
  externalAccess:
    enabled: true
    type: LoadBalancer

# =============================================================================
# NATS - Develop
# =============================================================================
nats:
  replicaCount: 1

  cluster:
    enabled: false

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "128Mi"

# =============================================================================
# Monitoring - Develop
# =============================================================================
monitoring:
  enabled: true

  prometheus:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
    retention: "3d"
    service:
      type: NodePort
      nodePort: 30090

  grafana:
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    service:
      type: NodePort
      nodePort: 30300

  loki:
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    retention: "72h"  # 3 days
