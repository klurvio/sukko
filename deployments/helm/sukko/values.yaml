# =============================================================================
# Sukko WebSocket Infrastructure - Base Values
# =============================================================================
#
# DEPLOYMENT MODES (zero-config defaults work out of the box):
#
# 1. Minimal (default):    direct + NATS broadcast + SQLite
#    → Just `helm install sukko .` — no external dependencies needed
#
# 2. Kafka mode:           Set ws-server.messageBackend=kafka, enable redpanda
#    → See examples/helm/values-kafka.yaml
#
# 3. NATS JetStream mode:  Set ws-server.messageBackend=nats, enable jetstream
#    → See examples/helm/values-nats-jetstream.yaml
#
# 4. Production mode:      External Kafka + PostgreSQL + auth + autoscaling
#    → See examples/helm/values-production.yaml
#
# Go envDefault values are the source of truth for application config.
# Override any setting via extraEnv on each service.

global:
  namespace: sukko
  imageRegistry: ""
  labels:
    app.kubernetes.io/part-of: sukko
  # PostgreSQL bundled (default: false → SQLite in provisioning)
  postgresql:
    enabled: false

# =============================================================================
# Kernel Tuning DaemonSet
# =============================================================================
kernelTuning:
  enabled: true

# =============================================================================
# WebSocket Gateway
# =============================================================================
ws-gateway:
  enabled: true
  replicaCount: 2
  image:
    repository: sukko-gateway
    tag: latest
    pullPolicy: IfNotPresent
  # Channel permission patterns
  permissions:
    public:
      - "*.trade"
      - "*.liquidity"
      - "*.metadata"
    userScoped:
      - "balances.{principal}"
      - "notifications.{principal}"
    groupScoped:
      - "community.{group_id}"
      - "social.{group_id}"
  rateLimit:
    enabled: true
    burst: 100
    rate: 10.0
  resources:
    requests:
      cpu: "250m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  service:
    type: LoadBalancer
    port: 80
    targetPort: 3000

# =============================================================================
# WebSocket Server
# =============================================================================
ws-server:
  enabled: true
  replicaCount: 1
  image:
    repository: sukko
    tag: latest
    pullPolicy: IfNotPresent
  # Mode selections (Go defaults: direct + nats)
  messageBackend: direct
  broadcast:
    type: nats
  connectionLimits:
    clusterMaxConnections: 100000
  resources:
    requests:
      cpu: "1"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  service:
    type: NodePort
    port: 3001
    nodePort: 30080
  sessionAffinity:
    enabled: false
    timeoutSeconds: 10800
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# =============================================================================
# Provisioning API
# =============================================================================
provisioning:
  enabled: true
  replicaCount: 1
  image:
    repository: sukko-provisioning
    tag: latest
    pullPolicy: IfNotPresent
  # External PostgreSQL (optional — overrides SQLite default)
  externalDatabase:
    url: ""
    existingSecret: ""
    existingSecretKey: "database-url"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  service:
    type: ClusterIP
    port: 8080

# =============================================================================
# Redpanda (Kafka) — Enable for kafka message backend
# =============================================================================
redpanda:
  enabled: false
  replicaCount: 1
  image:
    repository: redpandadata/redpanda
    tag: v23.3.5
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  kafkaPort: 9092
  adminPort: 9644
  pandaproxyPort: 8082
  schemaRegistryPort: 8081
  consolePort: 8080
  storage:
    enabled: true
    size: 5Gi
    storageClass: ""
  # Topic configuration (infrastructure topics for shared broadcast)
  topics:
    - name: sukko.local.trade
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.liquidity
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.balances
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.metadata
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.social
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.community
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.creation
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.analytics
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.trade.refined
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.liquidity.refined
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.balances.refined
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.metadata.refined
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.social.refined
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.community.refined
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.creation.refined
      partitions: 12
      replicationFactor: 1
    - name: sukko.local.analytics.refined
      partitions: 12
      replicationFactor: 1
  externalAccess:
    enabled: false
    type: LoadBalancer
    nodePort: ""

# =============================================================================
# Valkey (Redis-compatible) — Enable for valkey broadcast bus
# =============================================================================
valkey:
  enabled: false
  replicaCount: 1
  image:
    repository: valkey/valkey
    tag: 7.2-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  port: 6379
  config:
    maxmemory: "256mb"
    maxmemoryPolicy: "allkeys-lru"
  auth:
    enabled: true

# =============================================================================
# NATS — Primary broadcast bus (enabled by default)
# =============================================================================
nats:
  enabled: true
  replicaCount: 1
  image:
    repository: nats
    tag: 2.10-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  ports:
    client: 4222
    cluster: 6222
    monitor: 8222
  cluster:
    enabled: false
    name: "nats-cluster"
  auth:
    enabled: false
  logging:
    debug: false
    trace: false
  jetstream:
    enabled: false

# =============================================================================
# Monitoring Stack
# =============================================================================
monitoring:
  enabled: true
  prometheus:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    port: 9090
    nodePort: 30090
    retention: "7d"
    scrapeInterval: "15s"
  grafana:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
    port: 3000
    nodePort: 30300
    adminUser: admin
  loki:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    port: 3100
    retention: "168h"
  promtail:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
