# =============================================================================
# Odin WebSocket Infrastructure - Base Values
# =============================================================================
#
# DEPLOYMENT MODES (zero-config defaults work out of the box):
#
# 1. Minimal (default):    direct + NATS broadcast + SQLite
#    → Just `helm install odin .` — no external dependencies needed
#
# ── Kafka/Redpanda message backend ──────────────────────────────────
# Copy this block to enable Kafka ingestion via in-cluster Redpanda:
#
# ws-server:
#   messageBackend: kafka
# redpanda:
#   enabled: true
#
# For external/managed Kafka, use instead:
#
# ws-server:
#   messageBackend: kafka
#   kafka:
#     brokers: "your-kafka-host:9092"
#
# ── NATS JetStream message backend ──────────────────────────────────
# Copy this block for lightweight persistent streaming:
#
# ws-server:
#   messageBackend: nats
# nats:
#   jetstream:
#     enabled: true
#
# ── Valkey broadcast bus ────────────────────────────────────────────
# Copy this block to replace NATS with Valkey for broadcast:
#
# ws-server:
#   broadcastType: valkey
# valkey:
#   enabled: true
#
# ── PostgreSQL provisioning database ────────────────────────────────
# Copy this block for production-grade storage:
#
# provisioning:
#   databaseDriver: postgres
# postgresql:
#   enabled: true
#
# For external PostgreSQL, use instead:
#
# provisioning:
#   databaseDriver: postgres
#   externalDatabase:
#     existingSecret: "my-db-credentials"
#
# Go envDefault values are the source of truth for application config.
# Override any setting via extraEnv on each service.

global:
  namespace: odin
  imageRegistry: ""
  labels:
    app.kubernetes.io/part-of: odin

# =============================================================================
# Kernel Tuning DaemonSet
# =============================================================================
kernelTuning:
  enabled: true

# =============================================================================
# WebSocket Gateway
# =============================================================================
ws-gateway:
  enabled: true
  replicaCount: 2
  image:
    repository: odin-gateway
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "250m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  service:
    type: LoadBalancer
    port: 80
    targetPort: 3000

# =============================================================================
# WebSocket Server
# =============================================================================
ws-server:
  enabled: true
  replicaCount: 1
  image:
    repository: odin-ws
    tag: latest
    pullPolicy: IfNotPresent
  # Mode selections (Go defaults: direct + nats)
  messageBackend: direct
  broadcastType: nats
  connectionLimits:
    clusterMaxConnections: 100000
  resources:
    requests:
      cpu: "1"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  service:
    type: NodePort
    port: 3001
    nodePort: 30080
  sessionAffinity:
    enabled: false
    timeoutSeconds: 10800
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# =============================================================================
# Provisioning API
# =============================================================================
provisioning:
  enabled: true
  replicaCount: 1
  image:
    repository: odin-provisioning
    tag: latest
    pullPolicy: IfNotPresent
  # Database driver: "sqlite" (Go default) or "postgres"
  databaseDriver: sqlite
  # External PostgreSQL (when databaseDriver=postgres without postgresql.enabled)
  externalDatabase:
    url: ""
    existingSecret: ""
    existingSecretKey: "database-url"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  service:
    type: ClusterIP
    port: 8080

# =============================================================================
# Redpanda (Kafka) — Enable for kafka message backend
# =============================================================================
redpanda:
  enabled: false
  replicaCount: 1
  image:
    repository: redpandadata/redpanda
    tag: v23.3.5
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"
  kafkaPort: 9092
  adminPort: 9644
  pandaproxyPort: 8082
  schemaRegistryPort: 8081
  consolePort: 8080
  storage:
    enabled: true
    size: 5Gi
    storageClass: ""
  externalAccess:
    enabled: false
    type: LoadBalancer
    nodePort: ""

# =============================================================================
# Valkey (Redis-compatible) — Enable for valkey broadcast bus
# =============================================================================
valkey:
  enabled: false
  replicaCount: 1
  image:
    repository: valkey/valkey
    tag: 7.2-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  port: 6379
  config:
    maxmemory: "256mb"
    maxmemoryPolicy: "allkeys-lru"
  auth:
    enabled: true

# =============================================================================
# NATS — Primary broadcast bus (enabled by default)
# =============================================================================
nats:
  enabled: true
  replicaCount: 1
  image:
    repository: nats
    tag: 2.10-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  ports:
    client: 4222
    cluster: 6222
    monitor: 8222
  cluster:
    enabled: false
    name: "nats-cluster"
  auth:
    enabled: false
  logging:
    debug: false
    trace: false
  jetstream:
    enabled: false

# =============================================================================
# Monitoring Stack
# =============================================================================
monitoring:
  enabled: true
  prometheus:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    port: 9090
    nodePort: 30090
    retention: "7d"
    scrapeInterval: "15s"
  grafana:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
    port: 3000
    nodePort: 30300
    adminUser: admin
  loki:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    port: 3100
    retention: "168h"
  promtail:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
