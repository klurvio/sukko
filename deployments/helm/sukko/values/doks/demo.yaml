# =============================================================================
# DOKS - Demo Environment
# =============================================================================
# Demo environment on DigitalOcean Kubernetes (DOKS).
# Gateway (client-facing) and provisioning (operator-facing) are LoadBalancers.
#
# Usage:
#   helm upgrade --install sukko ./deployments/helm/sukko \
#     -f ./deployments/helm/sukko/values/doks/demo.yaml \
#     -n sukko-demo --create-namespace

global:
  namespace: sukko-demo
  imageRegistry: "ghcr.io/klurvio"
  # internalSecret configures the shared Kubernetes Secret used for gateway → ws-server mutual auth.
  # To enable: kubectl create secret generic sukko-internal-secret -n sukko-demo --from-literal=internal-secret=<random-value>
  # Then set secretName to enable WS_INTERNAL_SECRET_ENABLED on ws-server and forward via gateway.
  # Leave secretName unset to disable (WS_INTERNAL_SECRET_ENABLED defaults to false).
  # internalSecret:
  #   secretName: "sukko-internal-secret"
  #   secretKey: "internal-secret"

# ── Gateway ─────────────────────────────────────────────────────────
ws-gateway:
  replicaCount: 1
  image:
    tag: latest
    pullPolicy: Always
  extraEnv:
    DEFAULT_TENANT_CONNECTION_LIMIT: "10000"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  service:
    type: LoadBalancer
    port: 80
    targetPort: 3000
    loadBalancerIP: ""  # Set to terraform output gateway_external_ip, or pass via --set in CI

# ── WebSocket Server ────────────────────────────────────────────────
ws-server:
  replicaCount: 1
  environment: demo
  messageBackend: kafka
  image:
    tag: latest
    pullPolicy: Always
  connectionLimits:
    clusterMaxConnections: 100000
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  service:
    type: ClusterIP
  # Connections registry enabled for Pro+ demo environment.
  connectionsRegistry:
    enabled: true

# ── Provisioning ────────────────────────────────────────────────────
provisioning:
  replicaCount: 1
  environment: demo
  image:
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  service:
    type: LoadBalancer
    port: 8080
    targetPort: 8080
    grpcPort: 9090
    loadBalancerIP: ""  # Set to terraform output provisioning_external_ip, or pass via --set in CI

# ── Push Service ───────────────────────────────────────────────────
push-service:
  enabled: true
  replicaCount: 1
  environment: demo
  messageBackend: kafka
  dryRun: "true"
  image:
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

# ── Redpanda (Kafka) ───────────────────────────────────────────────
redpanda:
  enabled: true
  replicaCount: 1
  memory: "768M"
  resources:
    requests:
      cpu: "250m"
      memory: "768Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  storage:
    enabled: true
    size: 2Gi
  externalAccess:
    enabled: false

# ── PostgreSQL ──────────────────────────────────────────────────────
postgresql:
  enabled: true

# ── Valkey ──────────────────────────────────────────────────────────
valkey:
  enabled: true
  replicaCount: 1
  config:
    # maxmemory MUST be < limits.memory (128Mi = 131072 KiB; 96mb ≈ 75% → leaves room for
    # Valkey process overhead, OS buffers, and RSS fragmentation).
    # Without this override, the chart default of "384mb" would exceed the 128Mi K8s limit
    # and K8s would OOM-kill the pod before Valkey's allkeys-lru eviction fires.
    maxmemory: "96mb"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

# ── Monitoring ──────────────────────────────────────────────────────
monitoring:
  enabled: true
  prometheus:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
  grafana:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
  loki:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
  promtail:
    enabled: true
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
