# =============================================================================
# GKE Standard - Staging Environment (Spot VMs, Cost-Optimized)
# =============================================================================
# Staging environment using GKE Standard with Spot VMs for 60-90% cost savings.
# Fixed 2 nodes, production-like config, Redpanda for Kafka ingestion.
#
# Usage:
#   helm upgrade --install sukko ./deployments/helm/sukko \
#     -f ./deployments/helm/sukko/values/standard/stg.yaml \
#     -n sukko-stg --create-namespace

global:
  namespace: sukko-stg
  imageRegistry: "us-central1-docker.pkg.dev/YOUR_PROJECT/sukko"

# ── Gateway ─────────────────────────────────────────────────────────
ws-gateway:
  replicaCount: 2
  image:
    repository: ws-gateway
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: "250m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  service:
    type: LoadBalancer
    port: 80
    targetPort: 3000
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ── WebSocket Server ────────────────────────────────────────────────
ws-server:
  replicaCount: 2
  environment: stg
  messageBackend: kafka
  image:
    repository: ws-server
    tag: latest
    pullPolicy: Always
  connectionLimits:
    clusterMaxConnections: 100000
  extraEnv:
    KAFKA_TOPIC_NAMESPACE_OVERRIDE: "prod"  # Consume from prod topics
  resources:
    requests:
      cpu: "500m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  service:
    type: ClusterIP
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# ── Provisioning ────────────────────────────────────────────────────
provisioning:
  replicaCount: 1
  environment: stg
  image:
    repository: sukko-provisioning
    tag: latest
    pullPolicy: Always
  extraEnv:
    KAFKA_TOPIC_NAMESPACE_OVERRIDE: "prod"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

# ── Redpanda (Kafka) ───────────────────────────────────────────────
redpanda:
  enabled: true
  replicaCount: 1
  memory: "256M"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "384Mi"
  storage:
    enabled: false  # emptyDir for cost savings
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  externalAccess:
    enabled: true
    type: LoadBalancer

# ── NATS ────────────────────────────────────────────────────────────
nats:
  enabled: true
  replicaCount: 1
  cluster:
    enabled: false
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

# ── Monitoring ──────────────────────────────────────────────────────
monitoring:
  enabled: true
  prometheus:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
  grafana:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
  loki:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
  promtail:
    enabled: true
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
