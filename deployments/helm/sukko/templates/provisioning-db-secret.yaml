# Provisioning database secret for PostgreSQL configuration.
# Only rendered when in-cluster PostgreSQL is enabled and no external secret is provided.
# SQLite (default) requires no secret.

{{- $extDB := dict }}
{{- if .Values.provisioning }}
  {{- $extDB = .Values.provisioning.externalDatabase | default dict }}
{{- end }}
{{- $hasExistingSecret := index $extDB "existingSecret" }}
{{- $hasExternalURL := index $extDB "url" }}
{{- $pgEnabled := false }}
{{- if .Values.postgresql }}
  {{- $pgEnabled = .Values.postgresql.enabled | default false }}
{{- end }}

{{- if and (not $hasExistingSecret) (not $hasExternalURL) $pgEnabled }}
{{- /* Auto-construct from in-cluster PostgreSQL */}}
{{- $pgPassword := .Values.postgresql.auth.password | required "postgresql.auth.password is required when using in-cluster PostgreSQL. Pass via --set postgresql.auth.password=<value>" }}
{{- $dbUrl := printf "postgres://%s:%s@%s-postgresql:%s/%s?sslmode=disable" .Values.postgresql.auth.username $pgPassword .Release.Name (toString .Values.postgresql.service.port) .Values.postgresql.auth.database }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-provisioning-db
  labels:
    app.kubernetes.io/part-of: odin
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  database-url: {{ $dbUrl | b64enc | quote }}
{{- end }}
