{{- if .Values.kernelTuning.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-kernel-tuning
  labels:
    app.kubernetes.io/name: kernel-tuning
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: infrastructure
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kernel-tuning
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kernel-tuning
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      hostPID: true
      hostNetwork: true
      initContainers:
        - name: kernel-tuning
          image: busybox:1.36
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              echo "Applying kernel tuning for high WebSocket connections..."

              # File descriptor limits
              sysctl -w fs.file-max=2097152

              # TCP/Network tuning
              sysctl -w net.ipv4.ip_local_port_range="1024 65535"
              sysctl -w net.ipv4.tcp_tw_reuse=1
              sysctl -w net.core.somaxconn=65535
              sysctl -w net.ipv4.tcp_max_syn_backlog=65535
              sysctl -w net.core.netdev_max_backlog=65535

              # TCP memory tuning
              sysctl -w net.ipv4.tcp_rmem="4096 87380 16777216"
              sysctl -w net.ipv4.tcp_wmem="4096 65536 16777216"
              sysctl -w net.core.rmem_max=16777216
              sysctl -w net.core.wmem_max=16777216

              echo "Kernel tuning applied successfully"
      containers:
        - name: pause
          image: gcr.io/google-containers/pause:3.2
          resources:
            requests:
              cpu: "1m"
              memory: "4Mi"
            limits:
              cpu: "1m"
              memory: "4Mi"
      tolerations:
        # Run on all nodes including masters
        - operator: Exists
      nodeSelector:
        kubernetes.io/os: linux
{{- end }}
