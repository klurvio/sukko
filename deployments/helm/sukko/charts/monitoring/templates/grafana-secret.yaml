{{- if and .Values.enabled .Values.grafana.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "monitoring.fullname" . }}-grafana-secrets
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
type: Opaque
data:
  # Default password for local development (base64 encoded "admin")
  admin-password: {{ "admin" | b64enc | quote }}
{{- end }}
