{{- if and .Values.enabled .Values.alertmanager.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring.fullname" . }}-prometheus-alert-rules
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  alert-rules.yml: |
    groups:
      - name: sukko-capacity
        rules:
          - alert: HighConnectionCapacity
            expr: ws_connections_active / ws_connections_max > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Connection capacity above 80%"
              runbook_url: "https://docs.sukko.dev/runbooks/high-connection-capacity"
          - alert: CriticalConnectionCapacity
            expr: ws_connections_active / ws_connections_max > 0.95
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Connection capacity above 95%"
              runbook_url: "https://docs.sukko.dev/runbooks/critical-connection-capacity"

      - name: sukko-errors
        rules:
          - alert: HighErrorRate
            expr: rate(ws_errors_total[5m]) > 0.01 * rate(ws_messages_received_total[5m])
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Error rate exceeds 1% of message throughput"
              runbook_url: "https://docs.sukko.dev/runbooks/high-error-rate"

      - name: sukko-infrastructure
        rules:
          - alert: PodRestarts
            expr: increase(kube_pod_container_status_restarts_total{namespace=~"sukko.*"}[10m]) > 2
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{`{{ $labels.pod }}`}} restarting frequently"
              runbook_url: "https://docs.sukko.dev/runbooks/pod-restarts"
          - alert: KafkaConsumerLag
            expr: ws_kafka_consumer_lag > 1000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Kafka consumer lag exceeds 1000 messages"
              runbook_url: "https://docs.sukko.dev/runbooks/kafka-consumer-lag"
          - alert: HighMemoryUsage
            expr: ws_memory_bytes / ws_memory_limit_bytes > 0.8
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Memory usage above 80% of limit"
              runbook_url: "https://docs.sukko.dev/runbooks/high-memory-usage"
          - alert: LicenseExpiringSoon
            expr: (sukko_license_expiry_timestamp - time()) < 7 * 86400
            for: 1h
            labels:
              severity: warning
            annotations:
              summary: "License expires within 7 days"
              runbook_url: "https://docs.sukko.dev/runbooks/license-expiring-soon"
          - alert: ServiceDown
            expr: up{job=~"ws-server|ws-gateway|provisioning"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "{{`{{ $labels.job }}`}} is down"
              runbook_url: "https://docs.sukko.dev/runbooks/service-down"

    {{- range .Values.customAlertRules }}
      - name: {{ .name }}
        rules:
          {{- toYaml .rules | nindent 10 }}
    {{- end }}
{{- end }}
