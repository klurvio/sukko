{{- if and .Values.enabled .Values.pyroscope.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "monitoring.fullname" . }}-pyroscope
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: pyroscope
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.pyroscope.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "monitoring.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: pyroscope
{{- end }}
