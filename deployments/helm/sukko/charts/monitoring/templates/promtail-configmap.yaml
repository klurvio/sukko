{{- if and .Values.enabled .Values.promtail.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring.fullname" . }}-promtail-config
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
data:
  promtail-config.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://{{ include "monitoring.fullname" . }}-loki:{{ .Values.loki.port }}/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          - cri: {}
        relabel_configs:
          # Only scrape pods in the sukko namespace
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: sukko.*
          # Use pod name as job label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Use namespace
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          # Use container name
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          # Use app label
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
          # Set the path to the log file
          - replacement: /var/log/pods/*$1/*.log
            separator: /
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
{{- end }}
