{{- if and .Values.enabled .Values.alertmanager.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring.fullname" . }}-alertmanager-config
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by: ['alertname', 'severity']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      routes:
        - match:
            severity: critical
          receiver: default
          group_wait: 10s
        - match:
            severity: warning
          receiver: default
          group_wait: 5m

    receivers:
      - name: default
        {{- with .Values.alertmanager.receivers }}
        {{- if .slack.enabled }}
        slack_configs:
          - api_url: {{ .slack.webhookUrl | quote }}
            channel: {{ .slack.channel | quote }}
            send_resolved: true
        {{- end }}
        {{- if .pagerduty.enabled }}
        pagerduty_configs:
          - service_key: {{ .pagerduty.serviceKey | quote }}
            send_resolved: true
        {{- end }}
        {{- if .opsgenie.enabled }}
        opsgenie_configs:
          - api_key: {{ .opsgenie.apiKey | quote }}
            send_resolved: true
        {{- end }}
        {{- if .email.enabled }}
        email_configs:
          - to: {{ .email.to | quote }}
            from: {{ .email.from | quote }}
            smarthost: {{ .email.smarthost | quote }}
            send_resolved: true
        {{- end }}
        {{- if .webhook.enabled }}
        webhook_configs:
          - url: {{ .webhook.url | quote }}
            send_resolved: true
        {{- end }}
        {{- end }}
{{- end }}
