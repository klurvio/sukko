{{- if .Values.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ws-gateway.fullname" . }}-validate-config
  labels:
    {{- include "ws-gateway.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "ws-gateway.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: validate-config
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["./sukko-gateway"]
          args: ["--validate-config"]
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          env:
            - name: ENVIRONMENT
              value: {{ .Values.environment | default "local" | quote }}
            - name: GATEWAY_BACKEND_URL
              value: {{ .Values.backendURL | default (printf "ws://%s-ws-server:3001/ws" .Release.Name) | quote }}
            - name: PROVISIONING_GRPC_ADDR
              value: {{ .Values.provisioningGRPCAddr | default (printf "%s-provisioning-grpc:9090" .Release.Name) | quote }}

            # Rate limiting
            - name: GATEWAY_RATE_LIMIT_ENABLED
              value: {{ .Values.rateLimit.enabled | quote }}
            - name: GATEWAY_RATE_LIMIT_BURST
              value: {{ .Values.rateLimit.burst | quote }}
            - name: GATEWAY_RATE_LIMIT_RATE
              value: {{ .Values.rateLimit.rate | quote }}

            # Per-tenant connection limits
            - name: TENANT_CONNECTION_LIMIT_ENABLED
              value: {{ .Values.tenantConnectionLimit.enabled | quote }}
            - name: DEFAULT_TENANT_CONNECTION_LIMIT
              value: {{ .Values.tenantConnectionLimit.default | quote }}

            {{- range $key, $val := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
{{- end }}
