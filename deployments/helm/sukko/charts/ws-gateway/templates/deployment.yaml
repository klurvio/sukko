{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ws-gateway.fullname" . }}
  labels:
    {{- include "ws-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ws-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ws-gateway.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-ws-server
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-ws-server 3001; do echo "waiting for ws-server..."; sleep 2; done']
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
        - name: wait-for-provisioning
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-provisioning-grpc 9090; do echo "waiting for provisioning gRPC..."; sleep 2; done']
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            # Deployment identity (only injected when overriding Go envDefault)
            {{- if .Values.environment }}
            - name: ENVIRONMENT
              value: {{ .Values.environment | quote }}
            {{- end }}

            # License key (Pro/Enterprise editions)
            {{- with ((.Values.global).license) }}
            {{- if .existingSecret }}
            - name: SUKKO_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret }}
                  key: {{ .existingSecretKey | default "license-key" }}
            {{- end }}
            {{- end }}

            # Auto-wired service addresses (Kubernetes service discovery)
            - name: GATEWAY_BACKEND_URL
              value: {{ .Values.backendURL | default (printf "ws://%s-ws-server:3001/ws" .Release.Name) | quote }}
            - name: PROVISIONING_GRPC_ADDR
              value: {{ .Values.provisioningGRPCAddr | default (printf "%s-provisioning-grpc:9090" .Release.Name) | quote }}
            - name: GATEWAY_PROVISIONING_HTTP_ADDR
              value: {{ printf "http://%s-provisioning:8080" .Release.Name | quote }}
            - name: SERVER_GRPC_ADDR
              value: {{ printf "%s-ws-server:3006" .Release.Name | quote }}
            - name: PUSH_GRPC_ADDR
              value: {{ printf "%s-push-service:3008" .Release.Name | quote }}

            # Extra env overrides from values
            # Rate limiting and tenant connection limits use Go envDefault values.
            # Override via extraEnv when needed (e.g., extraEnv: { GATEWAY_RATE_LIMIT_BURST: "200" }).
            {{- range $key, $val := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
