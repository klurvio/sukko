{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "redpanda.fullname" . }}
  labels:
    {{- include "redpanda.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.kafkaPort }}
      targetPort: kafka
      protocol: TCP
      name: kafka
    - port: {{ .Values.adminPort }}
      targetPort: admin
      protocol: TCP
      name: admin
    - port: {{ .Values.pandaproxyPort }}
      targetPort: pandaproxy
      protocol: TCP
      name: pandaproxy
    - port: {{ .Values.schemaRegistryPort }}
      targetPort: schema
      protocol: TCP
      name: schema
  selector:
    {{- include "redpanda.selectorLabels" . | nindent 4 }}
{{- end }}
