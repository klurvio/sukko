{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ws-server.fullname" . }}
  labels:
    {{- include "ws-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "ws-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ws-server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $broadcastType := .Values.broadcastType | default "nats" }}
      {{- $needsNatsBroadcast := eq $broadcastType "nats" }}
      {{- $needsKafka := eq (.Values.messageBackend | default "direct") "kafka" }}
      {{- $needsJetStream := eq (.Values.messageBackend | default "direct") "nats" }}
      {{- if or $needsNatsBroadcast $needsKafka $needsJetStream }}
      initContainers:
        {{- if and $needsNatsBroadcast (not .Values.nats.urls) }}
        - name: wait-for-nats
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-nats 4222; do echo "waiting for nats..."; sleep 2; done']
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
        {{- end }}
        {{- if and $needsKafka (not .Values.kafka.brokers) }}
        - name: wait-for-redpanda
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-redpanda 9092; do echo "waiting for redpanda..."; sleep 2; done']
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
        {{- end }}
        {{- if and $needsJetStream (not .Values.jetstream.urls) }}
        - name: wait-for-nats-jetstream
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-nats 4222; do echo "waiting for nats jetstream..."; sleep 2; done']
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
        {{- end }}
      {{- end }}
      containers:
        - name: ws-server
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "./sukko-server"
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
            {{- range $i := until (int .Values.shards) }}
            - name: shard-{{ $i }}
              containerPort: {{ add $.Values.basePort $i }}
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "ws-server.fullname" . }}-config
            - secretRef:
                name: {{ include "ws-server.fullname" . }}-secrets
                optional: true
          env:
            # Deployment identity
            - name: ENVIRONMENT
              value: {{ .Values.environment | default "local" | quote }}

            # Server topology (override Go envDefaults for Kubernetes deployments)
            - name: WS_NUM_SHARDS
              value: {{ .Values.shards | quote }}
            - name: WS_BASE_PORT
              value: {{ .Values.basePort | quote }}
            - name: WS_LB_ADDR
              value: {{ .Values.lbAddr | quote }}

            # Mode selections (only injected when non-default — Go defaults apply otherwise)
            {{- if and .Values.messageBackend (ne .Values.messageBackend "direct") }}
            - name: MESSAGE_BACKEND
              value: {{ .Values.messageBackend | quote }}
            {{- end }}
            {{- if ne $broadcastType "nats" }}
            - name: BROADCAST_TYPE
              value: {{ $broadcastType | quote }}
            {{- end }}

            # Auto-wired service addresses (Kubernetes service discovery)
            - name: NATS_URLS
              value: {{ .Values.nats.urls | default (printf "nats://%s-nats:4222" .Release.Name) | quote }}
            - name: PROVISIONING_GRPC_ADDR
              value: {{ .Values.provisioningGRPCAddr | default (printf "%s-provisioning-grpc:9090" .Release.Name) | quote }}

            {{- if $needsKafka }}
            # Kafka/Redpanda (only when messageBackend=kafka)
            - name: KAFKA_BROKERS
              value: {{ .Values.kafka.brokers | default (printf "%s-redpanda:9092" .Release.Name) | quote }}
            {{- if .Values.kafka.sasl.enabled }}
            - name: KAFKA_SASL_ENABLED
              value: "true"
            - name: KAFKA_SASL_MECHANISM
              value: {{ .Values.kafka.sasl.mechanism | default "scram-sha-256" | quote }}
            {{- if .Values.kafka.sasl.username }}
            - name: KAFKA_SASL_USERNAME
              value: {{ .Values.kafka.sasl.username | quote }}
            {{- end }}
            - name: KAFKA_SASL_PASSWORD
              {{- if .Values.kafka.sasl.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafka.sasl.existingSecret }}
                  key: {{ .Values.kafka.sasl.existingSecretKey | default "kafka-sasl-password" }}
              {{- else }}
              value: {{ .Values.kafka.sasl.password | default "" | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.kafka.tls.enabled }}
            - name: KAFKA_TLS_ENABLED
              value: "true"
            {{- if .Values.kafka.tls.insecureSkipVerify }}
            - name: KAFKA_TLS_INSECURE
              value: "true"
            {{- end }}
            {{- if .Values.kafka.tls.caPath }}
            - name: KAFKA_TLS_CA_PATH
              value: {{ .Values.kafka.tls.caPath | quote }}
            {{- end }}
            {{- end }}
            {{- end }}

            {{- if $needsJetStream }}
            # NATS JetStream (only when messageBackend=nats)
            - name: NATS_JETSTREAM_URLS
              value: {{ .Values.jetstream.urls | default (printf "nats://%s-nats:4222" .Release.Name) | quote }}
            {{- if or .Values.jetstream.token .Values.jetstream.existingSecret }}
            - name: NATS_JETSTREAM_TOKEN
              {{- if .Values.jetstream.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jetstream.existingSecret }}
                  key: {{ .Values.jetstream.existingSecretTokenKey | default "nats-jetstream-token" }}
              {{- else }}
              value: {{ .Values.jetstream.token | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.jetstream.user }}
            - name: NATS_JETSTREAM_USER
              value: {{ .Values.jetstream.user | quote }}
            {{- end }}
            {{- if or .Values.jetstream.password .Values.jetstream.existingSecret }}
            - name: NATS_JETSTREAM_PASSWORD
              {{- if .Values.jetstream.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jetstream.existingSecret }}
                  key: {{ .Values.jetstream.existingSecretPasswordKey | default "nats-jetstream-password" }}
              {{- else }}
              value: {{ .Values.jetstream.password | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.jetstream.tls.enabled }}
            - name: NATS_JETSTREAM_TLS_ENABLED
              value: "true"
            {{- if .Values.jetstream.tls.insecureSkipVerify }}
            - name: NATS_JETSTREAM_TLS_INSECURE
              value: "true"
            {{- end }}
            {{- if .Values.jetstream.tls.caPath }}
            - name: NATS_JETSTREAM_TLS_CA_PATH
              value: {{ .Values.jetstream.tls.caPath | quote }}
            {{- end }}
            {{- end }}
            {{- end }}

            {{- if eq $broadcastType "valkey" }}
            # Valkey (only when broadcastType=valkey)
            - name: VALKEY_ADDRS
              value: {{ .Values.valkey.addrs | default (printf "%s-valkey:6379" .Release.Name) | quote }}
            {{- if .Values.valkey.password }}
            - name: VALKEY_PASSWORD
              value: {{ .Values.valkey.password | quote }}
            {{- end }}
            {{- if .Values.valkey.tls.enabled }}
            - name: VALKEY_TLS_ENABLED
              value: "true"
            {{- if .Values.valkey.tls.insecureSkipVerify }}
            - name: VALKEY_TLS_INSECURE
              value: "true"
            {{- end }}
            {{- if .Values.valkey.tls.caPath }}
            - name: VALKEY_TLS_CA_PATH
              value: {{ .Values.valkey.tls.caPath | quote }}
            {{- end }}
            {{- end }}
            {{- end }}

            # NATS broadcast bus auth (when using token/password)
            {{- if or .Values.nats.token .Values.nats.existingSecret }}
            - name: NATS_TOKEN
              {{- if .Values.nats.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nats.existingSecret }}
                  key: {{ .Values.nats.existingSecretTokenKey | default "nats-token" }}
              {{- else }}
              value: {{ .Values.nats.token | quote }}
              {{- end }}
            {{- end }}
            {{- if or .Values.nats.password .Values.nats.existingSecret }}
            - name: NATS_PASSWORD
              {{- if .Values.nats.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nats.existingSecret }}
                  key: {{ .Values.nats.existingSecretPasswordKey | default "nats-password" }}
              {{- else }}
              value: {{ .Values.nats.password | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.nats.tls.enabled }}
            - name: NATS_TLS_ENABLED
              value: "true"
            {{- if .Values.nats.tls.insecureSkipVerify }}
            - name: NATS_TLS_INSECURE
              value: "true"
            {{- end }}
            {{- if .Values.nats.tls.caPath }}
            - name: NATS_TLS_CA_PATH
              value: {{ .Values.nats.tls.caPath | quote }}
            {{- end }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
