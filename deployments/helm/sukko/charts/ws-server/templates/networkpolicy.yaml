{{- if .Values.enabled }}
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ws-server.fullname" . }}-ingress
  labels:
    {{- include "ws-server.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ws-server.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from ws-gateway pods only
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ws-gateway
      ports:
        - port: {{ .Values.service.port | default 3001 }}
          protocol: TCP
    # Allow Prometheus scraping (metrics endpoint)
    {{- if .Values.networkPolicy.allowPrometheus }}
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: prometheus
      ports:
        - port: {{ .Values.service.port | default 3001 }}
          protocol: TCP
    {{- end }}
{{- end }}
{{- end }}
