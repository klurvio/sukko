{{- if .Values.enabled }}
{{- $dbDriver := .Values.databaseDriver | default "sqlite" -}}
{{- /* Guard: SQLite requires exactly 1 replica */ -}}
{{- if and (eq $dbDriver "sqlite") (gt (int .Values.replicaCount) 1) -}}
  {{- fail "replicaCount must be 1 when using SQLite (default). Use PostgreSQL for horizontal scaling." -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "push-service.fullname" . }}
  labels:
    {{- include "push-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "push-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "push-service.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $needsKafka := eq (.Values.messageBackend | default "kafka") "kafka" }}
      {{- if $needsKafka }}
      initContainers:
        {{- if not .Values.kafka.brokers }}
        - name: wait-for-redpanda
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-redpanda 9092; do echo "waiting for redpanda..."; sleep 2; done']
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
        {{- end }}
      {{- end }}
      containers:
        - name: push-service
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "./sukko-push"
          ports:
            - name: grpc
              containerPort: 3008
              protocol: TCP
            - name: http
              containerPort: 3009
              protocol: TCP
          env:
            # Deployment identity (only injected when overriding Go envDefault)
            {{- if .Values.environment }}
            - name: ENVIRONMENT
              value: {{ .Values.environment | quote }}
            {{- end }}

            # License key (Pro/Enterprise editions)
            {{- with ((.Values.global).license) }}
            {{- if .existingSecret }}
            - name: SUKKO_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .existingSecret }}
                  key: {{ .existingSecretKey | default "license-key" }}
            {{- end }}
            {{- end }}

            # Auto-wired service addresses (Kubernetes service discovery)
            - name: PROVISIONING_GRPC_ADDR
              value: {{ .Values.provisioningGRPCAddr | default (printf "%s-provisioning-grpc:9090" .Release.Name) | quote }}

            # Message backend (only injected when non-default)
            {{- if .Values.messageBackend }}
            - name: MESSAGE_BACKEND
              value: {{ .Values.messageBackend | quote }}
            {{- end }}

            {{- if $needsKafka }}
            # Kafka/Redpanda
            - name: KAFKA_BROKERS
              value: {{ .Values.kafka.brokers | default (printf "%s-redpanda:9092" .Release.Name) | quote }}
            {{- if .Values.kafka.sasl.enabled }}
            - name: KAFKA_SASL_ENABLED
              value: "true"
            - name: KAFKA_SASL_MECHANISM
              value: {{ .Values.kafka.sasl.mechanism | default "scram-sha-256" | quote }}
            {{- if .Values.kafka.sasl.username }}
            - name: KAFKA_SASL_USERNAME
              value: {{ .Values.kafka.sasl.username | quote }}
            {{- end }}
            - name: KAFKA_SASL_PASSWORD
              {{- if .Values.kafka.sasl.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafka.sasl.existingSecret }}
                  key: {{ .Values.kafka.sasl.existingSecretKey | default "kafka-sasl-password" }}
              {{- else }}
              value: {{ .Values.kafka.sasl.password | default "" | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.kafka.tls.enabled }}
            - name: KAFKA_TLS_ENABLED
              value: "true"
            {{- end }}
            {{- end }}

            # Database configuration
            {{- if ne $dbDriver "sqlite" }}
            - name: PUSH_DATABASE_DRIVER
              value: {{ $dbDriver | quote }}
            {{- end }}
            {{- if eq $dbDriver "sqlite" }}
            - name: PUSH_DATABASE_PATH
              value: {{ .Values.database.sqlitePath | quote }}
            {{- end }}
            {{- if eq $dbDriver "postgres" }}
            - name: PUSH_DATABASE_URL
              {{- if .Values.externalDatabase.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.existingSecret }}
                  key: {{ .Values.externalDatabase.existingSecretKey | default "database-url" }}
              {{- else }}
              value: {{ .Values.externalDatabase.url | quote }}
              {{- end }}
            - name: PUSH_AUTO_MIGRATE
              value: "false"
            {{- end }}

            # Push-specific settings (only injected when set)
            {{- if .Values.dryRun }}
            - name: PUSH_DRY_RUN
              value: {{ .Values.dryRun | quote }}
            {{- end }}
            {{- if .Values.workerPoolSize }}
            - name: PUSH_WORKER_POOL_SIZE
              value: {{ .Values.workerPoolSize | quote }}
            {{- end }}

            # Extra env overrides from values
            {{- range $key, $val := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}

          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if eq $dbDriver "sqlite" }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if eq $dbDriver "sqlite" }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "push-service.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
