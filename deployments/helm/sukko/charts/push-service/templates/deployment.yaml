{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "push-service.fullname" . }}
  labels:
    {{- include "push-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "push-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "push-service.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $needsKafka := eq (.Values.messageBackend | default "kafka") "kafka" }}
      {{- if $needsKafka }}
      initContainers:
        {{- if not .Values.kafka.brokers }}
        - name: wait-for-redpanda
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-redpanda 9092; do echo "waiting for redpanda..."; sleep 2; done']
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
        {{- end }}
      {{- end }}
      containers:
        - name: push-service
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "./sukko-push"
          ports:
            - name: grpc
              containerPort: 3008
              protocol: TCP
            - name: http
              containerPort: 3009
              protocol: TCP
          env:
            # Deployment identity (only injected when overriding Go envDefault)
            {{- if .Values.environment }}
            - name: ENVIRONMENT
              value: {{ .Values.environment | quote }}
            {{- end }}

            # Auto-wired service addresses (Kubernetes service discovery)
            - name: PROVISIONING_GRPC_ADDR
              value: {{ .Values.provisioningGRPCAddr | default (printf "%s-provisioning-grpc:9090" .Release.Name) | quote }}

            # Message backend (only injected when non-default)
            {{- if .Values.messageBackend }}
            - name: MESSAGE_BACKEND
              value: {{ .Values.messageBackend | quote }}
            {{- end }}

            {{- if $needsKafka }}
            # Kafka/Redpanda
            - name: KAFKA_BROKERS
              value: {{ .Values.kafka.brokers | default (printf "%s-redpanda:9092" .Release.Name) | quote }}
            {{- if .Values.kafka.sasl.enabled }}
            - name: KAFKA_SASL_ENABLED
              value: "true"
            - name: KAFKA_SASL_MECHANISM
              value: {{ .Values.kafka.sasl.mechanism | default "scram-sha-256" | quote }}
            {{- if .Values.kafka.sasl.username }}
            - name: KAFKA_SASL_USERNAME
              value: {{ .Values.kafka.sasl.username | quote }}
            {{- end }}
            - name: KAFKA_SASL_PASSWORD
              {{- if .Values.kafka.sasl.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafka.sasl.existingSecret }}
                  key: {{ .Values.kafka.sasl.existingSecretKey | default "kafka-sasl-password" }}
              {{- else }}
              value: {{ .Values.kafka.sasl.password | default "" | quote }}
              {{- end }}
            {{- end }}
            {{- if .Values.kafka.tls.enabled }}
            - name: KAFKA_TLS_ENABLED
              value: "true"
            {{- end }}
            {{- end }}

            # PostgreSQL connection
            - name: DATABASE_URL
              {{- if .Values.database.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey | default "database-url" }}
              {{- else if .Values.database.url }}
              value: {{ .Values.database.url | quote }}
              {{- else }}
              value: {{ printf "postgres://sukko:sukko@%s-postgresql:5432/sukko?sslmode=disable" .Release.Name | quote }}
              {{- end }}

            # Push-specific settings (only injected when set)
            {{- if .Values.dryRun }}
            - name: PUSH_DRY_RUN
              value: {{ .Values.dryRun | quote }}
            {{- end }}
            {{- if .Values.workerPoolSize }}
            - name: PUSH_WORKER_POOL_SIZE
              value: {{ .Values.workerPoolSize | quote }}
            {{- end }}

            # Extra env overrides from values
            {{- range $key, $val := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}

          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
