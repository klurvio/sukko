{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "push-service.fullname" . }}
  labels:
    {{- include "push-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "push-service.selectorLabels" . | nindent 4 }}
{{- end }}
