{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "webhook-worker.fullname" . }}
  labels:
    {{- include "webhook-worker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: {{ .Values.service.httpPort }}
      protocol: TCP
      name: http
    - port: {{ .Values.service.internalGrpcPort }}
      targetPort: {{ .Values.service.internalGrpcPort }}
      protocol: TCP
      name: grpc-internal
  selector:
    {{- include "webhook-worker.selectorLabels" . | nindent 4 }}
{{- end }}
