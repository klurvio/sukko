# Default values for provisioning subchart
# Go envDefault values are the source of truth for application config.
# Override any setting via extraEnv. See /config endpoint for current values.

global:
  imageRegistry: ""

enabled: true

replicaCount: 1

image:
  repository: sukko-provisioning
  tag: latest
  pullPolicy: IfNotPresent

# Deployment identity — drives Kafka topic namespace.
# Free-form string; Sukko convention: local, dev, stg, prod
# environment: local

# Admin bootstrap key for first admin registration (optional).
# Base64-encoded Ed25519 public key (44 chars). Auto-registers on first startup
# when no admin keys exist in the database. Ignored after first registration.
# Generate with: sukko auth keygen && base64 < ~/.sukko/contexts/<ctx>/admin.pub
adminBootstrapKey: ""

# PostgreSQL connection
database:
  # Existing secret containing the database URL
  existingSecret: ""
  existingSecretKey: "database-url"
  # Direct URL (used when existingSecret is empty; auto-wired to in-cluster PostgreSQL if blank)
  url: ""

# Ingress (expose provisioning API externally)
ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
  annotations: {}

# Override any Go envDefault. See /config endpoint for all available settings.
# Example: { LOG_LEVEL: "debug", CORS_ALLOWED_ORIGINS: "https://admin.example.com" }
extraEnv: {}

# --- Kubernetes Resources ---
podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2

# Provisioning is operator-facing (Admin UI + REST API).
# Gateway is client-facing (WebSocket/SSE/push).
# Both use LoadBalancer — same pattern. DNS/TLS/Ingress can be added later.
service:
  type: LoadBalancer
  port: 8080
  targetPort: 8080
  loadBalancerIP: ""
  grpcPort: 9090

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
