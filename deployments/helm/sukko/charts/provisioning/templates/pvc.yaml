{{- if .Values.enabled }}
{{- /* Only create PVC when using SQLite (no external or bundled PostgreSQL) */ -}}
{{- $dbDriver := "sqlite" -}}
{{- if or .Values.externalDatabase.url .Values.externalDatabase.existingSecret -}}
  {{- $dbDriver = "postgres" -}}
{{- else if .Values.global.postgresql.enabled -}}
  {{- $dbDriver = "postgres" -}}
{{- end -}}
{{- if and (eq $dbDriver "sqlite") .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "provisioning.fullname" . }}-data
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
{{- end }}
