{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "provisioning.fullname" . }}-grpc
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.grpcPort }}
      targetPort: {{ .Values.service.grpcPort }}
      protocol: TCP
      name: grpc
    {{- if .Values.webhooks.enabled }}
    - port: {{ .Values.service.webhookWorkerGRPCPort | default 9091 }}
      targetPort: {{ .Values.service.webhookWorkerGRPCPort | default 9091 }}
      protocol: TCP
      name: grpc-webhook
    {{- end }}
  selector:
    {{- include "provisioning.selectorLabels" . | nindent 4 }}
{{- end }}
