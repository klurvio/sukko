{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "provisioning.fullname" . }}-grpc
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.grpcPort | default 9090 }}
      targetPort: {{ .Values.service.grpcPort | default 9090 }}
      protocol: TCP
      name: grpc
  selector:
    {{- include "provisioning.selectorLabels" . | nindent 4 }}
{{- end }}
