{{- if .Values.enabled }}
{{- $dbDriver := "sqlite" -}}
{{- if or .Values.externalDatabase.url .Values.externalDatabase.existingSecret -}}
  {{- $dbDriver = "postgres" -}}
{{- else if .Values.global.postgresql.enabled -}}
  {{- $dbDriver = "postgres" -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "provisioning.fullname" . }}-validate-config
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        {{- include "provisioning.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: validate-config
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["./sukko-provisioning"]
          args: ["--validate-config"]
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          env:
            - name: ENVIRONMENT
              value: {{ .Values.environment | default "local" | quote }}
            - name: DATABASE_DRIVER
              value: {{ $dbDriver | quote }}
            {{- if eq $dbDriver "sqlite" }}
            - name: DATABASE_PATH
              value: {{ .Values.database.sqlitePath | quote }}
            {{- else }}
            # PostgreSQL connection — use a placeholder URL for validation
            # (the actual URL comes from secrets at deploy time)
            - name: DATABASE_URL
              {{- if .Values.externalDatabase.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.existingSecret }}
                  key: {{ .Values.externalDatabase.existingSecretKey | default "database-url" }}
              {{- else if .Values.externalDatabase.url }}
              value: {{ .Values.externalDatabase.url | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-provisioning-db" .Release.Name }}
                  key: database-url
              {{- end }}
            {{- end }}

            # gRPC port (only when overridden from Go default of 9090)
            {{- if and .Values.service.grpcPort (ne (int .Values.service.grpcPort) 9090) }}
            - name: GRPC_PORT
              value: {{ .Values.service.grpcPort | quote }}
            {{- end }}

            # Admin token authentication
            {{- if .Values.adminToken }}
            - name: PROVISIONING_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "provisioning.fullname" . }}-admin-token
                  key: admin-token
            {{- end }}

            {{- range $key, $val := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
{{- end }}
