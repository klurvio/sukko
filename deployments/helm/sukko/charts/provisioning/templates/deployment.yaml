{{- if .Values.enabled }}
{{- $dbDriver := .Values.databaseDriver | default "sqlite" -}}
{{- /* Guard: SQLite requires exactly 1 replica */ -}}
{{- if and (eq $dbDriver "sqlite") (gt (int .Values.replicaCount) 1) -}}
  {{- fail "replicaCount must be 1 when using SQLite (default). Use PostgreSQL for horizontal scaling." -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "provisioning.fullname" . }}
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "provisioning.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "provisioning.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and (eq $dbDriver "postgres") (not (or .Values.externalDatabase.url .Values.externalDatabase.existingSecret)) }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-postgresql 5432; do echo "waiting for postgres..."; sleep 2; done']
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpcPort | default 9090 }}
              protocol: TCP
          env:
            # Deployment identity
            - name: ENVIRONMENT
              value: {{ .Values.environment | default "local" | quote }}

            # Database driver (only injected when non-default)
            {{- if ne $dbDriver "sqlite" }}
            - name: DATABASE_DRIVER
              value: {{ $dbDriver | quote }}
            {{- end }}

            {{- if eq $dbDriver "sqlite" }}
            # SQLite database path
            - name: DATABASE_PATH
              value: {{ .Values.database.sqlitePath | quote }}
            {{- else }}
            # PostgreSQL connection
            - name: DATABASE_URL
              {{- if .Values.externalDatabase.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalDatabase.existingSecret }}
                  key: {{ .Values.externalDatabase.existingSecretKey | default "database-url" }}
              {{- else if .Values.externalDatabase.url }}
              value: {{ .Values.externalDatabase.url | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-provisioning-db" .Release.Name }}
                  key: database-url
              {{- end }}
            {{- end }}

            # gRPC port (only when overridden from Go default of 9090)
            {{- if and .Values.service.grpcPort (ne (int .Values.service.grpcPort) 9090) }}
            - name: GRPC_PORT
              value: {{ .Values.service.grpcPort | quote }}
            {{- end }}

            # Admin token authentication
            {{- if .Values.adminToken }}
            - name: PROVISIONING_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "provisioning.fullname" . }}-admin-token
                  key: admin-token
            {{- end }}

            # Extra env overrides from values
            {{- range $key, $val := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}

          {{- if eq $dbDriver "sqlite" }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if eq $dbDriver "sqlite" }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "provisioning.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
