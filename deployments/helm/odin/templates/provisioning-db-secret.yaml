# Provisioning database secret for multi-tenant configuration
# Used by ws-gateway (tenant keys) and ws-server (tenant topics)
#
# Three configuration paths (in priority order):
# 1. global.provisioning.existingSecret - use a pre-created K8s secret (production)
# 2. global.provisioning.databaseUrl - explicit URL, Helm creates the secret
# 3. postgresql.enabled - auto-construct URL from in-cluster PostgreSQL config

{{- if not .Values.global.provisioning.existingSecret }}

{{- if .Values.global.provisioning.databaseUrl }}
{{- /* Path 2: Explicit database URL provided */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-provisioning-db
  labels:
    app.kubernetes.io/part-of: odin
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  database-url: {{ .Values.global.provisioning.databaseUrl | b64enc | quote }}

{{- else if .Values.postgresql.enabled }}
{{- /* Path 3: Auto-construct from in-cluster PostgreSQL */}}
{{- $pgPassword := .Values.postgresql.auth.password | required "postgresql.auth.password is required when using in-cluster PostgreSQL without global.provisioning.databaseUrl. Pass via --set postgresql.auth.password=<value>" }}
{{- $dbUrl := printf "postgres://%s:%s@%s-postgresql:%s/%s?sslmode=disable" .Values.postgresql.auth.username $pgPassword .Release.Name (toString .Values.postgresql.service.port) .Values.postgresql.auth.database }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-provisioning-db
  labels:
    app.kubernetes.io/part-of: odin
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" | trunc 63 | trimSuffix "-" }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  database-url: {{ $dbUrl | b64enc | quote }}

{{- else }}
  {{- fail "Provisioning database not configured. Set global.provisioning.existingSecret (production), global.provisioning.databaseUrl, or enable postgresql subchart" }}
{{- end }}

{{- end }}
