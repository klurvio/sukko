# =============================================================================
# GKE Standard - Dev Environment (Spot VMs, Cost-Optimized)
# =============================================================================
# Development environment using GKE Standard with Spot VMs for 60-90% cost savings.
# Fixed 2 nodes, minimal resources, no persistent storage.
#
# Usage:
#   helm upgrade --install odin ./deployments/helm/odin \
#     -f ./deployments/helm/odin/values/standard/dev.yaml \
#     -n odin-dev --create-namespace

global:
  namespace: odin-ws-dev
  imageRegistry: "us-central1-docker.pkg.dev/odin-9e902/odin-ws"

# =============================================================================
# WebSocket Gateway
# =============================================================================
ws-gateway:
  enabled: true
  replicaCount: 2

  image:
    repository: ws-gateway
    tag: latest
    pullPolicy: Always

  config:
    logLevel: info
    logFormat: json
    # Multi-Issuer OIDC / Per-Tenant Channel Rules
    multiIssuerOIDCEnabled: false    # Enable when ready to test
    perTenantChannelRulesEnabled: false
    issuerCacheTTL: "5m"
    channelRulesCacheTTL: "1m"

  resources:
    requests:
      cpu: "250m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  service:
    type: LoadBalancer
    port: 443
    targetPort: 3000
    loadBalancerIP: ""  # Injected via --set at deploy time

  # Spot VM tolerations
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

  # Pod disruption budget for Spot preemption handling
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# =============================================================================
# WebSocket Server
# =============================================================================
ws-server:
  enabled: true
  replicaCount: 2

  image:
    repository: ws-server
    tag: latest
    pullPolicy: Always

  config:
    shards: 2
    logLevel: info
    logFormat: json
    environment: dev  # Deployment environment for logging/metrics
    # kafkaTopicNamespace: defaults to "dev", override to consume from other envs

  # Connection limits (ResourceGuard enforces actual limits at runtime)
  connectionLimits:
    clusterMaxConnections: 100000

  # Broadcast Bus - NATS
  broadcast:
    type: nats

  # NATS config
  nats:
    urls: ""  # Uses dynamic default
    clusterMode: false  # Single node for cost savings

  resources:
    requests:
      cpu: "500m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

  service:
    type: ClusterIP  # Internal only - gateway handles external traffic

  autoscaling:
    enabled: false  # Enable for production

  # Spot VM tolerations
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

  # Pod disruption budget for graceful handling
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # Termination grace period for WebSocket connections
  terminationGracePeriodSeconds: 30

# =============================================================================
# Redpanda (Kafka) - Minimal Self-Hosted
# =============================================================================
redpanda:
  enabled: true
  replicaCount: 1

  # Seastar runtime memory - must be less than container limit
  # 768M leaves room for OS overhead within 1Gi container limit
  memory: "768M"
  resources:
    requests:
      cpu: "250m"
      memory: "768Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

  # Persistent storage for data durability
  storage:
    enabled: true
    size: 2Gi

  # Topics created via Provisioning API (single source of truth)

  # Spot VM tolerations
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

  # External access for local publisher testing
  # The static IP is managed by Terraform and injected via --set at deploy time:
  #   --set redpanda.externalAccess.advertisedHost=$REDPANDA_IP
  #   --set redpanda.externalAccess.loadBalancerIP=$REDPANDA_IP
  # This is handled automatically by: task k8s:gke-standard:deploy
  externalAccess:
    enabled: true
    type: LoadBalancer
    annotations:
      cloud.google.com/load-balancer-type: "Internal"

# =============================================================================
# Provisioning Service
# =============================================================================
provisioning:
  enabled: true
  replicaCount: 1

  image:
    repository: odin-provisioning
    tag: latest
    pullPolicy: Always

  config:
    logLevel: info
    logFormat: json
    topicNamespace: dev

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

# =============================================================================
# PostgreSQL - Provisioning Database
# =============================================================================
postgresql:
  enabled: true
  auth:
    database: odin_provisioning
    username: odin
    # password: injected via --set at deploy time (auto-generated)
  persistence:
    enabled: true
    size: 1Gi
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

# =============================================================================
# Valkey - Disabled (using NATS)
# =============================================================================
valkey:
  enabled: false

# =============================================================================
# NATS - Minimal Self-Hosted
# =============================================================================
nats:
  enabled: true
  replicaCount: 1

  cluster:
    enabled: false  # Single node for cost savings

  auth:
    enabled: false

  # Minimal resources
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

  # Spot VM tolerations
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

# =============================================================================
# Monitoring - Minimal
# =============================================================================
monitoring:
  enabled: true

  prometheus:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

  grafana:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

  loki:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"

  promtail:
    enabled: true
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
