# =============================================================================
# GKE Standard - Production Environment (Spot VMs, Autoscaling)
# =============================================================================
# Production environment using GKE Standard with Spot VMs for 60-90% cost savings.
# Autoscaling 1-5 nodes, higher replicas, persistent storage, NATS cluster.
#
# Usage:
#   helm upgrade --install odin ./deployments/helm/odin \
#     -f ./deployments/helm/odin/values/standard/prod.yaml \
#     -n odin-ws-prod --create-namespace

global:
  namespace: odin-ws-prod
  imageRegistry: "us-central1-docker.pkg.dev/YOUR_PROJECT/odin-ws"

# ── Gateway ─────────────────────────────────────────────────────────
ws-gateway:
  replicaCount: 3
  image:
    repository: ws-gateway
    tag: latest
    pullPolicy: IfNotPresent
  extraEnv:
    LOG_LEVEL: "warn"
  resources:
    requests:
      cpu: "500m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  service:
    type: LoadBalancer
    port: 443
    targetPort: 3000
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── WebSocket Server ────────────────────────────────────────────────
ws-server:
  replicaCount: 3
  environment: prod
  messageBackend: kafka
  shards: 4
  image:
    repository: ws-server
    tag: latest
    pullPolicy: IfNotPresent
  connectionLimits:
    clusterMaxConnections: 100000
  extraEnv:
    LOG_LEVEL: "warn"
  resources:
    requests:
      cpu: "1"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  service:
    type: ClusterIP
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

# ── Provisioning ────────────────────────────────────────────────────
provisioning:
  replicaCount: 1
  environment: prod
  image:
    repository: odin-provisioning
    tag: latest
    pullPolicy: IfNotPresent
  extraEnv:
    LOG_LEVEL: "warn"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

# ── Redpanda (Kafka) ───────────────────────────────────────────────
redpanda:
  enabled: true
  replicaCount: 3
  memory: "1G"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "1.5Gi"
  storage:
    enabled: true
    size: 10Gi
    storageClass: standard-rwo
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  podDisruptionBudget:
    enabled: true
    minAvailable: 2
  externalAccess:
    enabled: true
    type: LoadBalancer

# ── NATS ────────────────────────────────────────────────────────────
nats:
  enabled: true
  replicaCount: 3
  cluster:
    enabled: true
    replicas: 3
  auth:
    enabled: true
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  tolerations:
    - key: "cloud.google.com/gke-spot"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

# ── Monitoring ──────────────────────────────────────────────────────
monitoring:
  enabled: true
  prometheus:
    enabled: true
    retention: 15d
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
    storage:
      enabled: true
      size: 20Gi
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
  grafana:
    enabled: true
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
  loki:
    enabled: true
    retention: 7d
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
    storage:
      enabled: true
      size: 10Gi
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
  promtail:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
    tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
