# =============================================================================
# Local Environment (kind) - M1 MacBook optimized
# =============================================================================

global:
  namespace: odin-local
  provisioning:
    databaseUrl: "postgres://odin:odin_local_dev@odin-local-postgresql:5432/odin_provisioning?sslmode=disable"

# WebSocket Gateway - Handles auth and permission filtering
ws-gateway:
  enabled: true
  replicaCount: 1
  config:
    logLevel: debug
    logFormat: pretty
    # Enable for local testing
    multiIssuerOIDCEnabled: false    # Can enable for testing
    perTenantChannelRulesEnabled: false
    # Shorter TTLs for development
    issuerCacheTTL: "30s"
    channelRulesCacheTTL: "10s"
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "128Mi"
  service:
    type: NodePort
    port: 3000
    nodePort: 30000

# WebSocket Server - Dumb broadcaster (no auth)
ws-server:
  enabled: true
  replicaCount: 1
  config:
    shards: 1  # Single shard for M1
    logLevel: debug
    logFormat: pretty
    environment: local  # Topic naming: odin.local.{base}.refined

  # Connection limits (ResourceGuard enforces actual limits at runtime)
  connectionLimits:
    clusterMaxConnections: 100000

  # Broadcast Bus - NATS for high performance
  broadcast:
    type: nats

  # NATS config (single node for local dev)
  nats:
    urls: ""  # Uses dynamic default: nats://odin-local-nats:4222
    clusterMode: false  # Single node for local

  # Kafka/Redpanda - Self-hosted in cluster (no auth needed)
  kafka:
    brokers: ""  # Uses dynamic default: odin-local-redpanda:9092
    # SASL/TLS disabled for local self-hosted Redpanda (defaults from base values)

  # NOTE: Auth is now handled by ws-gateway
  # ws-server is a dumb broadcaster with network-level security

  resources:
    requests:
      cpu: "500m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  service:
    type: NodePort
    nodePort: 30080
  autoscaling:
    enabled: false

# Auth Service - REMOVED
# Token issuance is now handled by odin-api
# For local testing, use a test JWT or mock odin-api

# Redpanda - Reduced resources for kind
redpanda:
  enabled: true
  memory: "256M"  # Redpanda process memory (must be < container limit)
  # External access for local publisher via port-forward
  externalAccess:
    enabled: true
    advertisedHost: localhost  # Publisher connects via port-forward
    containerPort: 19092       # External listener port inside container
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "384Mi"  # 256M + overhead for container
  storage:
    enabled: false  # Use emptyDir for local
  # Topic configuration for local development
  # Topics use environment-prefixed naming: odin.{env}.{base} and odin.{env}.{base}.refined
  # Fewer partitions for Kind hardware constraints
  topics:
    # Regular topics (publisher → external service)
    - name: odin.local.trade
      partitions: 1
      replicationFactor: 1
    - name: odin.local.liquidity
      partitions: 1
      replicationFactor: 1
    - name: odin.local.balances
      partitions: 1
      replicationFactor: 1
    - name: odin.local.metadata
      partitions: 1
      replicationFactor: 1
    - name: odin.local.social
      partitions: 1
      replicationFactor: 1
    - name: odin.local.community
      partitions: 1
      replicationFactor: 1
    - name: odin.local.creation
      partitions: 1
      replicationFactor: 1
    - name: odin.local.analytics
      partitions: 1
      replicationFactor: 1
    # Refined topics (external service → ws-server)
    - name: odin.local.trade.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.local.liquidity.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.local.balances.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.local.metadata.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.local.social.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.local.community.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.local.creation.refined
      partitions: 1
      replicationFactor: 1
    - name: odin.local.analytics.refined
      partitions: 1
      replicationFactor: 1

# Valkey - Disabled (using NATS instead)
valkey:
  enabled: false
  auth:
    enabled: false

# NATS - Single node for local dev
nats:
  enabled: true
  replicaCount: 1
  cluster:
    enabled: false
  auth:
    enabled: false
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

# Monitoring - Reduced for local
monitoring:
  enabled: true
  prometheus:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
  grafana:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
  loki:
    enabled: true
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "100m"
        memory: "256Mi"
  promtail:
    enabled: true
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "50m"
        memory: "64Mi"

# PostgreSQL for provisioning database
postgresql:
  enabled: true
  auth:
    database: odin_provisioning
    username: odin
    password: odin_local_dev  # OK for local dev only
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
  persistence:
    enabled: false  # emptyDir - data lost on restart

# Provisioning API (no auth for local dev)
provisioning:
  enabled: true
  replicaCount: 1
  config:
    logLevel: debug
    logFormat: pretty
    authEnabled: false  # No auth for local provisioning
    topicNamespace: local
    kafkaBrokers: ""  # Uses dynamic default
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "128Mi"
  service:
    type: NodePort
    port: 8080
    nodePort: 30081
