{{- if and .Values.enabled .Values.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "valkey.fullname" . }}-secrets
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
type: Opaque
data:
  # Default password for local development (base64 encoded "testpassword")
  # Override in production via values or external secret management
  password: {{ "testpassword" | b64enc | quote }}
{{- end }}
