# Default values for ws-gateway subchart
# Go envDefault values are the source of truth for application config.
# Override any setting via extraEnv. See /config endpoint for current values.

global:
  imageRegistry: ""

enabled: true

replicaCount: 2

image:
  repository: odin-gateway
  tag: latest
  pullPolicy: IfNotPresent

# Deployment identity — drives logging, metrics namespacing.
# Free-form string; Odin convention: local, dev, stg, prod
# environment: local

# Feature flags (all default false in Go, set via extraEnv when needed)
# AUTH_ENABLED: "true"                         — JWT validation via provisioning gRPC
# GATEWAY_MULTI_ISSUER_OIDC_ENABLED: "true"    — per-tenant OIDC issuers
# GATEWAY_PER_TENANT_CHANNEL_RULES: "true"     — per-tenant channel access rules

# Channel permission patterns (must match Go envDefault — template always injects these)
permissions:
  public:
    - "*.trade"
    - "*.liquidity"
    - "*.metadata"
    - "*.analytics"
    - "*.creation"
    - "*.social"
    - "all.trade"
    - "all.liquidity"
    - "all.metadata"
    - "all.analytics"
    - "all.creation"
    - "all.social"
  userScoped:
    - "*.balances.{principal}"
    - "*.trade.{principal}"
    - "balances.{principal}"
    - "notifications.{principal}"
  groupScoped:
    - "*.community.{group_id}"
    - "community.{group_id}"
    - "social.{group_id}"

# Rate limiting per principal
rateLimit:
  enabled: true
  burst: 100
  rate: 10.0

# Per-tenant connection limits (in-memory, per gateway pod)
tenantConnectionLimit:
  enabled: true
  default: 1000

# Override any Go envDefault. See /config endpoint for all available settings.
# Example: { LOG_LEVEL: "debug", GATEWAY_DIAL_TIMEOUT: "30s", AUTH_ENABLED: "true" }
extraEnv: {}

# --- Kubernetes Resources ---
podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: "250m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2

service:
  type: LoadBalancer
  port: 443
  targetPort: 3000
  loadBalancerIP: ""

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
