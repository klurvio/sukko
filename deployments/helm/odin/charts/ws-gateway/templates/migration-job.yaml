# Database migration job - runs Atlas migrations before gateway deployment
# Migrations are mandatory - provisioning DB schema is required for gateway to function
{{- if .Values.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ws-gateway.fullname" . }}-migrate
  labels:
    {{- include "ws-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    # Run before install/upgrade, delete old jobs before creating new ones
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  # Don't retry failed migrations - require manual intervention
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "ws-gateway.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: arigaio/atlas:latest
          command:
            - atlas
            - migrate
            - apply
            - --url
            - $(DATABASE_URL)
            - --dir
            - file:///migrations
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.provisioning.existingSecret | default (printf "%s-provisioning-db" .Release.Name) }}
                  key: database-url
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: migrations
          configMap:
            name: {{ include "ws-gateway.fullname" . }}-migrations
{{- end }}
