{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ws-gateway.fullname" . }}
  labels:
    {{- include "ws-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ws-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ws-gateway.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-ws-server
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-ws-server 3001; do echo "waiting for ws-server..."; sleep 2; done']
        - name: wait-for-provisioning
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-provisioning-grpc {{ .Values.config.port | default 9090 }}; do echo "waiting for provisioning gRPC..."; sleep 2; done']
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            # Server configuration
            - name: GATEWAY_PORT
              value: "{{ .Values.config.port }}"
            - name: GATEWAY_READ_TIMEOUT
              value: "{{ .Values.config.readTimeout }}"
            - name: GATEWAY_WRITE_TIMEOUT
              value: "{{ .Values.config.writeTimeout }}"
            - name: GATEWAY_IDLE_TIMEOUT
              value: "{{ .Values.config.idleTimeout }}"
            - name: GATEWAY_DIAL_TIMEOUT
              value: "{{ .Values.config.dialTimeout }}"
            - name: GATEWAY_MESSAGE_TIMEOUT
              value: "{{ .Values.config.messageTimeout }}"

            # Backend URL (dynamic default if not specified)
            - name: GATEWAY_BACKEND_URL
              {{- if .Values.config.backendURL }}
              value: "{{ .Values.config.backendURL }}"
              {{- else }}
              value: "ws://{{ .Release.Name }}-ws-server:3001/ws"
              {{- end }}

            # Authentication (multi-tenant with asymmetric keys via gRPC)
            - name: AUTH_ENABLED
              value: "{{ .Values.config.authEnabled }}"
            - name: DEFAULT_TENANT_ID
              value: "{{ .Values.config.defaultTenantID }}"
            {{- if .Values.config.authEnabled }}
            - name: REQUIRE_TENANT_ID
              value: "{{ .Values.config.requireTenantId }}"
            {{- end }}

            # Provisioning gRPC connection
            - name: PROVISIONING_GRPC_ADDR
              {{- if .Values.config.provisioningGRPCAddr }}
              value: "{{ .Values.config.provisioningGRPCAddr }}"
              {{- else }}
              value: "{{ .Release.Name }}-provisioning-grpc:9090"
              {{- end }}
            - name: PROVISIONING_GRPC_RECONNECT_DELAY
              value: "{{ .Values.config.provisioningGRPCReconnectDelay | default "1s" }}"
            - name: PROVISIONING_GRPC_RECONNECT_MAX_DELAY
              value: "{{ .Values.config.provisioningGRPCReconnectMaxDelay | default "30s" }}"

            # Permission patterns
            - name: GATEWAY_PUBLIC_PATTERNS
              value: "{{ join "," .Values.permissions.public }}"
            - name: GATEWAY_USER_SCOPED_PATTERNS
              value: "{{ join "," .Values.permissions.userScoped }}"
            - name: GATEWAY_GROUP_SCOPED_PATTERNS
              value: "{{ join "," .Values.permissions.groupScoped }}"

            # Rate limiting
            - name: GATEWAY_RATE_LIMIT_ENABLED
              value: "{{ .Values.rateLimit.enabled }}"
            - name: GATEWAY_RATE_LIMIT_BURST
              value: "{{ .Values.rateLimit.burst }}"
            - name: GATEWAY_RATE_LIMIT_RATE
              value: "{{ .Values.rateLimit.rate }}"

            # Auth refresh
            - name: GATEWAY_AUTH_REFRESH_RATE_INTERVAL
              value: {{ .Values.config.authRefreshRateInterval | quote }}

            # Logging
            - name: LOG_LEVEL
              value: "{{ .Values.config.logLevel }}"
            - name: LOG_FORMAT
              value: "{{ .Values.config.logFormat }}"

            # Multi-Issuer OIDC / Per-Tenant Channel Rules
            - name: GATEWAY_MULTI_ISSUER_OIDC_ENABLED
              value: {{ .Values.config.multiIssuerOIDCEnabled | quote }}
            - name: GATEWAY_PER_TENANT_CHANNEL_RULES
              value: {{ .Values.config.perTenantChannelRulesEnabled | quote }}
            - name: GATEWAY_OIDC_KEYFUNC_CACHE_TTL
              value: {{ .Values.config.oidcKeyfuncCacheTTL | quote }}
            - name: GATEWAY_JWKS_FETCH_TIMEOUT
              value: {{ .Values.config.jwksFetchTimeout | quote }}
            - name: GATEWAY_JWKS_REFRESH_INTERVAL
              value: {{ .Values.config.jwksRefreshInterval | quote }}
            - name: GATEWAY_FALLBACK_PUBLIC_CHANNELS
              value: {{ .Values.config.fallbackPublicChannels | join "," | quote }}

            # Environment
            - name: ENVIRONMENT
              value: "{{ .Release.Namespace }}"

            # Per-tenant connection limits (in-memory per pod)
            # Effective cluster limit = DEFAULT_TENANT_CONNECTION_LIMIT × gateway replica count
            - name: TENANT_CONNECTION_LIMIT_ENABLED
              value: "{{ .Values.tenantConnectionLimit.enabled }}"
            - name: DEFAULT_TENANT_CONNECTION_LIMIT
              value: "{{ .Values.tenantConnectionLimit.default }}"

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
