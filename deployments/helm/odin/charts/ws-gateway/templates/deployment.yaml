{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ws-gateway.fullname" . }}
  labels:
    {{- include "ws-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ws-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ws-gateway.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            # Server configuration
            - name: GATEWAY_PORT
              value: "{{ .Values.config.port }}"
            - name: GATEWAY_READ_TIMEOUT
              value: "{{ .Values.config.readTimeout }}"
            - name: GATEWAY_WRITE_TIMEOUT
              value: "{{ .Values.config.writeTimeout }}"
            - name: GATEWAY_IDLE_TIMEOUT
              value: "{{ .Values.config.idleTimeout }}"
            - name: GATEWAY_DIAL_TIMEOUT
              value: "{{ .Values.config.dialTimeout }}"
            - name: GATEWAY_MESSAGE_TIMEOUT
              value: "{{ .Values.config.messageTimeout }}"

            # Backend URL (dynamic default if not specified)
            - name: GATEWAY_BACKEND_URL
              {{- if .Values.config.backendURL }}
              value: "{{ .Values.config.backendURL }}"
              {{- else }}
              value: "ws://{{ .Release.Name }}-ws-server:3001/ws"
              {{- end }}

            # Authentication (multi-tenant with asymmetric keys)
            - name: AUTH_ENABLED
              value: "{{ .Values.config.authEnabled }}"
            {{- if .Values.config.authEnabled }}
            # Provisioning database URL - required when auth is enabled
            - name: PROVISIONING_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.provisioning.existingSecret | default (printf "%s-provisioning-db" .Release.Name) }}
                  key: database-url
            # Multi-tenant settings
            - name: REQUIRE_TENANT_ID
              value: "{{ .Values.config.requireTenantId }}"
            - name: KEY_CACHE_REFRESH_INTERVAL
              value: "{{ .Values.config.keyCacheRefreshInterval }}"
            - name: KEY_CACHE_QUERY_TIMEOUT
              value: "{{ .Values.config.keyCacheQueryTimeout }}"
            # Database connection pool settings
            - name: DB_MAX_OPEN_CONNS
              value: "{{ .Values.config.dbMaxOpenConns }}"
            - name: DB_MAX_IDLE_CONNS
              value: "{{ .Values.config.dbMaxIdleConns }}"
            - name: DB_CONN_MAX_LIFETIME
              value: "{{ .Values.config.dbConnMaxLifetime }}"
            - name: DB_CONN_MAX_IDLE_TIME
              value: "{{ .Values.config.dbConnMaxIdleTime }}"
            - name: DB_PING_TIMEOUT
              value: "{{ .Values.config.dbPingTimeout }}"
            {{- end }}

            # Permission patterns
            - name: GATEWAY_PUBLIC_PATTERNS
              value: "{{ join "," .Values.permissions.public }}"
            - name: GATEWAY_USER_SCOPED_PATTERNS
              value: "{{ join "," .Values.permissions.userScoped }}"
            - name: GATEWAY_GROUP_SCOPED_PATTERNS
              value: "{{ join "," .Values.permissions.groupScoped }}"

            # Rate limiting
            - name: GATEWAY_RATE_LIMIT_ENABLED
              value: "{{ .Values.rateLimit.enabled }}"
            - name: GATEWAY_RATE_LIMIT_BURST
              value: "{{ .Values.rateLimit.burst }}"
            - name: GATEWAY_RATE_LIMIT_RATE
              value: "{{ .Values.rateLimit.rate }}"

            # Logging
            - name: LOG_LEVEL
              value: "{{ .Values.config.logLevel }}"
            - name: LOG_FORMAT
              value: "{{ .Values.config.logFormat }}"

            # Multi-Issuer OIDC / Per-Tenant Channel Rules
            - name: GATEWAY_MULTI_ISSUER_OIDC_ENABLED
              value: {{ .Values.config.multiIssuerOIDCEnabled | quote }}
            - name: GATEWAY_PER_TENANT_CHANNEL_RULES
              value: {{ .Values.config.perTenantChannelRulesEnabled | quote }}
            - name: GATEWAY_ISSUER_CACHE_TTL
              value: {{ .Values.config.issuerCacheTTL | quote }}
            - name: GATEWAY_CHANNEL_RULES_CACHE_TTL
              value: {{ .Values.config.channelRulesCacheTTL | quote }}
            - name: GATEWAY_OIDC_KEYFUNC_CACHE_TTL
              value: {{ .Values.config.oidcKeyfuncCacheTTL | quote }}
            - name: GATEWAY_JWKS_FETCH_TIMEOUT
              value: {{ .Values.config.jwksFetchTimeout | quote }}
            - name: GATEWAY_JWKS_REFRESH_INTERVAL
              value: {{ .Values.config.jwksRefreshInterval | quote }}
            - name: GATEWAY_FALLBACK_PUBLIC_CHANNELS
              value: {{ .Values.config.fallbackPublicChannels | join "," | quote }}

            # Environment
            - name: ENVIRONMENT
              value: "{{ .Release.Namespace }}"

            # Note: Gateway does not use connection limits (only rate limiting)
            # MAX_CONNECTIONS, READ_BUFFER_SIZE, etc. are NOT read by gateway code
            # Capacity control happens at the ws-server level

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
