# Default values for provisioning subchart
# These can be overridden from the parent chart

# Global values — sensible defaults for standalone linting.
# The parent odin chart overrides these via Helm's global value merge.
global:
  imageRegistry: ""
  postgresql:
    enabled: false

enabled: true

# MUST be 1 with SQLite. Scale horizontally only with PostgreSQL.
replicaCount: 1

image:
  repository: odin-provisioning
  tag: latest
  pullPolicy: IfNotPresent

config:
  port: 8080
  grpcPort: 9090
  logLevel: info
  logFormat: json

  # Provisioning mode: "api" (database-backed REST API) or "config" (YAML file)
  provisioningMode: "api"

  # Config file path (only used when provisioningMode=config)
  configFilePath: "/etc/odin/tenants.yaml"
  # Name of ConfigMap containing the YAML config file (for K8s deployments)
  # Required when provisioningMode=config in K8s
  configFileConfigMap: ""

  # Auto-migrate database schema on startup
  autoMigrate: true

  # Admin token for API authentication (optional)
  # When set, Bearer token auth is enabled for the REST API
  # Must be >= 16 characters in non-dev environments
  adminToken: ""

  # Authentication - set to false for internal-only deployment
  authEnabled: false

  # OIDC settings (enabled when both issuerUrl and jwksUrl are set)
  oidcIssuerUrl: ""
  oidcAudience: ""
  oidcJwksUrl: ""

  # CORS settings
  corsAllowedOrigins:
    - "http://localhost:3000"
  corsMaxAge: 3600

  # HTTP server timeouts
  httpReadTimeout: "15s"
  httpWriteTimeout: "15s"
  httpIdleTimeout: "60s"

  # Kafka/Redpanda settings (optional)
  kafkaBrokers: ""
  kafkaAdminTimeout: "30s"

  # Environment: deployment environment (local, dev, stg, prod)
  environment: "local"
  # kafkaTopicNamespaceOverride: overrides environment for Kafka topic naming
  # If empty, uses environment
  kafkaTopicNamespaceOverride: ""
  defaultPartitions: 3
  defaultRetentionMs: 604800000  # 7 days

  # Tenant quotas
  maxTopicsPerTenant: 50
  maxPartitionsPerTenant: 200
  maxStorageBytes: 10737418240       # 10GB
  producerByteRate: 10485760         # 10MB/s
  consumerByteRate: 52428800         # 50MB/s
  deprovisionGraceDays: 30

  # Admin auth rate limiting
  adminAuthFailureThreshold: 10
  adminAuthBlockDuration: "60s"
  adminAuthCleanupInterval: "5m"
  adminAuthCleanupMaxAge: "2m"

  # Topic namespace validation
  validNamespaces: "local,dev,stag,prod"

  # Rate limiting
  apiRateLimitPerMin: 60

  # Key registry (JWT validation when auth enabled)
  keyRegistryRefreshInterval: "1m"
  keyRegistryQueryTimeout: "5s"

  # Graceful shutdown
  shutdownTimeout: "30s"

  # Lifecycle manager
  lifecycleManagerEnabled: true
  lifecycleCheckInterval: "1h"

# Database settings (SQLite local storage)
database:
  # SQLite database file path (only used when DATABASE_DRIVER=sqlite)
  sqlitePath: "/data/odin.db"
  # PostgreSQL connection pool (only used when DATABASE_DRIVER=postgres)
  maxOpenConns: 25
  maxIdleConns: 5
  connMaxLifetime: "5m"

# External PostgreSQL (optional — overrides SQLite default)
# When set, DATABASE_DRIVER is auto-derived as "postgres"
externalDatabase:
  # Direct URL (for dev/testing)
  url: ""
  # Use existing K8s secret (recommended for production)
  existingSecret: ""
  existingSecretKey: "database-url"

# Persistent storage for SQLite (auto-enabled when using SQLite)
persistence:
  enabled: true
  size: 1Gi
  accessMode: ReadWriteOnce

# Ingress (optional — expose provisioning API externally)
ingress:
  enabled: false
  className: ""
  host: ""
  tls: []
  annotations: {}

# Pod Security Context
podSecurityContext:
  fsGroup: 1000

# Container Security Context
# Dockerfile creates non-root user (odin:1000) in /app directory
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
