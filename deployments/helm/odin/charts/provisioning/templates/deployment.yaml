{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "provisioning.fullname" . }}
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "provisioning.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "provisioning.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-postgresql 5432; do echo "waiting for postgres..."; sleep 2; done']
        - name: wait-for-redpanda
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-redpanda 9092; do echo "waiting for redpanda..."; sleep 2; done']
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            # Server configuration
            - name: PROVISIONING_ADDR
              value: ":{{ .Values.config.port }}"
            - name: LOG_LEVEL
              value: "{{ .Values.config.logLevel }}"
            - name: LOG_FORMAT
              value: "{{ .Values.config.logFormat }}"

            # Database URL from secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.provisioning.existingSecret | default (printf "%s-provisioning-db" .Release.Name) }}
                  key: database-url

            # Authentication
            - name: AUTH_ENABLED
              value: "{{ .Values.config.authEnabled }}"

            # OIDC settings (only set if configured)
            {{- if and .Values.config.oidcIssuerUrl .Values.config.oidcJwksUrl }}
            - name: OIDC_ISSUER_URL
              value: "{{ .Values.config.oidcIssuerUrl }}"
            - name: OIDC_JWKS_URL
              value: "{{ .Values.config.oidcJwksUrl }}"
            {{- if .Values.config.oidcAudience }}
            - name: OIDC_AUDIENCE
              value: "{{ .Values.config.oidcAudience }}"
            {{- end }}
            {{- end }}

            # CORS settings
            - name: CORS_ALLOWED_ORIGINS
              value: "{{ join "," .Values.config.corsAllowedOrigins }}"
            - name: CORS_MAX_AGE
              value: "{{ .Values.config.corsMaxAge }}"

            # HTTP server timeouts
            - name: HTTP_READ_TIMEOUT
              value: "{{ .Values.config.httpReadTimeout }}"
            - name: HTTP_WRITE_TIMEOUT
              value: "{{ .Values.config.httpWriteTimeout }}"
            - name: HTTP_IDLE_TIMEOUT
              value: "{{ .Values.config.httpIdleTimeout }}"

            # Database connection pool
            - name: DB_MAX_OPEN_CONNS
              value: "{{ .Values.config.dbMaxOpenConns }}"
            - name: DB_MAX_IDLE_CONNS
              value: "{{ .Values.config.dbMaxIdleConns }}"
            - name: DB_CONN_MAX_LIFETIME
              value: "{{ .Values.config.dbConnMaxLifetime }}"

            # Kafka/Redpanda settings
            - name: KAFKA_BROKERS
              value: "{{ .Values.config.kafkaBrokers | default (printf "%s-redpanda:9092" .Release.Name) }}"
            - name: KAFKA_ADMIN_TIMEOUT
              value: "{{ .Values.config.kafkaAdminTimeout }}"

            # Topic defaults
            - name: KAFKA_TOPIC_NAMESPACE
              value: "{{ .Values.config.topicNamespace }}"
            - name: DEFAULT_PARTITIONS
              value: "{{ .Values.config.defaultPartitions }}"
            - name: DEFAULT_RETENTION_MS
              value: "{{ printf "%.0f" .Values.config.defaultRetentionMs }}"

            # Tenant quotas
            - name: MAX_TOPICS_PER_TENANT
              value: "{{ .Values.config.maxTopicsPerTenant }}"
            - name: MAX_PARTITIONS_PER_TENANT
              value: "{{ .Values.config.maxPartitionsPerTenant }}"
            - name: DEPROVISION_GRACE_DAYS
              value: "{{ .Values.config.deprovisionGraceDays }}"

            # Rate limiting
            - name: API_RATE_LIMIT_PER_MIN
              value: "{{ .Values.config.apiRateLimitPerMin }}"

            # Lifecycle manager
            - name: LIFECYCLE_MANAGER_ENABLED
              value: "{{ .Values.config.lifecycleManagerEnabled }}"
            - name: LIFECYCLE_CHECK_INTERVAL
              value: "{{ .Values.config.lifecycleCheckInterval }}"

            # Environment
            - name: ENVIRONMENT
              value: "{{ .Release.Namespace }}"

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
