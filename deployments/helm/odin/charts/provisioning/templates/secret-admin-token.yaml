{{- if and .Values.enabled .Values.config.adminToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "provisioning.fullname" . }}-admin-token
  labels:
    {{- include "provisioning.labels" . | nindent 4 }}
type: Opaque
data:
  admin-token: {{ .Values.config.adminToken | b64enc | quote }}
{{- end }}
