{{- if and .Values.enabled .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "monitoring.fullname" . }}-prometheus-config
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.scrapeInterval }}

    scrape_configs:
      # Scrape ws-server metrics from ALL pods (not via Service which load-balances to one)
      - job_name: 'ws-server'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - {{ .Release.Namespace }}
        relabel_configs:
          # Only scrape endpoints for ws-server service
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: {{ .Release.Name }}-ws-server
          # Only scrape the metrics port (3001)
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http
          # Use pod name as instance label for better identification
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
        metrics_path: /metrics

      # Scrape Redpanda metrics
      - job_name: 'redpanda'
        static_configs:
          - targets: ['{{ .Release.Name }}-redpanda:9644']

      # Note: NATS monitoring port 8222 exposes JSON endpoints (/varz, /connz),
      # not Prometheus format. Use nats-prometheus-exporter sidecar if needed.
      # For now, NATS health is monitored via ws-server connection status.

      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
{{- end }}
