{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ws-server.fullname" . }}
  labels:
    {{- include "ws-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ws-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ws-server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $needsNatsBroadcast := eq (.Values.broadcast.type | default "valkey") "nats" }}
      {{- $needsKafka := eq (.Values.messageBackend | default "direct") "kafka" }}
      {{- $needsJetStream := eq (.Values.messageBackend | default "direct") "nats" }}
      {{- if or $needsNatsBroadcast $needsKafka $needsJetStream }}
      initContainers:
        {{- if $needsNatsBroadcast }}
        - name: wait-for-nats
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-nats 4222; do echo "waiting for nats..."; sleep 2; done']
        {{- end }}
        {{- if $needsKafka }}
        - name: wait-for-redpanda
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-redpanda 9092; do echo "waiting for redpanda..."; sleep 2; done']
        {{- end }}
        {{- if $needsJetStream }}
        {{- /* Assumes in-cluster NATS. For external JetStream, disable this init container. */}}
        - name: wait-for-nats-jetstream
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-nats 4222; do echo "waiting for nats jetstream..."; sleep 2; done']
        {{- end }}
      {{- end }}
      containers:
        - name: ws-server
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{- if .Values.global.imageRegistry }}{{ .Values.global.imageRegistry }}/{{- end }}{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - "./odin-ws"
          args:
            - "--shards={{ .Values.config.shards }}"
            - "--base-port={{ .Values.config.basePort }}"
            - "--lb-addr={{ .Values.config.lbAddr }}"
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
            {{- range $i := until (int .Values.config.shards) }}
            - name: shard-{{ $i }}
              containerPort: {{ add 3002 $i }}
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "ws-server.fullname" . }}-config
            - secretRef:
                name: {{ include "ws-server.fullname" . }}-secrets
                optional: true
          env:
            # Message Backend Selection: direct, kafka, or nats
            - name: MESSAGE_BACKEND
              value: "{{ .Values.messageBackend | default "direct" }}"
            # Environment for logging, metrics, feature flags
            - name: ENVIRONMENT
              value: "{{ .Values.config.environment | default "local" }}"
            # Topic namespace overrides environment for topic naming
            # Used by both kafka and nats message backends
            - name: KAFKA_TOPIC_NAMESPACE_OVERRIDE
              value: "{{ .Values.config.kafkaTopicNamespaceOverride | default "" }}"
            {{- if eq (.Values.messageBackend | default "direct") "kafka" }}
            # Kafka/Redpanda (only when messageBackend=kafka)
            - name: KAFKA_BROKERS
              value: "{{ .Values.kafka.brokers | default (printf "%s-redpanda:9092" .Release.Name) }}"
            # Kafka topic defaults (for on-demand topic creation)
            - name: KAFKA_DEFAULT_PARTITIONS
              value: "{{ .Values.kafka.defaultPartitions | default 1 }}"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "{{ .Values.kafka.defaultReplicationFactor | default 1 }}"
            # Kafka SASL Authentication (for managed services)
            - name: KAFKA_SASL_ENABLED
              value: "{{ .Values.kafka.sasl.enabled | default false }}"
            {{- if .Values.kafka.sasl.enabled }}
            - name: KAFKA_SASL_MECHANISM
              value: "{{ .Values.kafka.sasl.mechanism }}"
            - name: KAFKA_SASL_USERNAME
              value: "{{ .Values.kafka.sasl.username }}"
            - name: KAFKA_SASL_PASSWORD
              {{- if .Values.kafka.sasl.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafka.sasl.existingSecret }}
                  key: {{ .Values.kafka.sasl.existingSecretKey | default "kafka-sasl-password" }}
              {{- else }}
              value: "{{ .Values.kafka.sasl.password }}"
              {{- end }}
            {{- end }}
            # Kafka TLS Encryption (for managed services)
            - name: KAFKA_TLS_ENABLED
              value: "{{ .Values.kafka.tls.enabled | default false }}"
            {{- if .Values.kafka.tls.enabled }}
            - name: KAFKA_TLS_INSECURE
              value: "{{ .Values.kafka.tls.insecureSkipVerify | default false }}"
            {{- if .Values.kafka.tls.caPath }}
            - name: KAFKA_TLS_CA_PATH
              value: "{{ .Values.kafka.tls.caPath }}"
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if eq (.Values.messageBackend | default "direct") "nats" }}
            # NATS JetStream (only when messageBackend=nats)
            - name: NATS_JETSTREAM_URLS
              value: "{{ .Values.jetstream.urls | default (printf "nats://%s-nats:4222" .Release.Name) }}"
            {{- if or .Values.jetstream.token .Values.jetstream.existingSecret }}
            - name: NATS_JETSTREAM_TOKEN
              {{- if .Values.jetstream.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jetstream.existingSecret }}
                  key: {{ .Values.jetstream.existingSecretTokenKey | default "nats-jetstream-token" }}
              {{- else }}
              value: "{{ .Values.jetstream.token }}"
              {{- end }}
            {{- end }}
            {{- if .Values.jetstream.user }}
            - name: NATS_JETSTREAM_USER
              value: "{{ .Values.jetstream.user }}"
            {{- end }}
            {{- if or .Values.jetstream.password .Values.jetstream.existingSecret }}
            - name: NATS_JETSTREAM_PASSWORD
              {{- if .Values.jetstream.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.jetstream.existingSecret }}
                  key: {{ .Values.jetstream.existingSecretPasswordKey | default "nats-jetstream-password" }}
              {{- else }}
              value: "{{ .Values.jetstream.password }}"
              {{- end }}
            {{- end }}
            - name: NATS_JETSTREAM_REPLICAS
              value: "{{ .Values.jetstream.replicas | default 1 }}"
            - name: NATS_JETSTREAM_MAX_AGE
              value: "{{ .Values.jetstream.maxAge | default "24h" }}"
            - name: NATS_JETSTREAM_TLS_ENABLED
              value: "{{ .Values.jetstream.tls.enabled | default false }}"
            {{- if .Values.jetstream.tls.enabled }}
            - name: NATS_JETSTREAM_TLS_INSECURE
              value: "{{ .Values.jetstream.tls.insecureSkipVerify | default false }}"
            {{- if .Values.jetstream.tls.caPath }}
            - name: NATS_JETSTREAM_TLS_CA_PATH
              value: "{{ .Values.jetstream.tls.caPath }}"
            {{- end }}
            {{- end }}
            {{- end }}
            # Broadcast Bus Type: "valkey" or "nats"
            - name: BROADCAST_TYPE
              value: "{{ .Values.broadcast.type | default "valkey" }}"
            # Valkey: Use provided value or default to release-name-valkey:6379
            - name: VALKEY_ADDRS
              value: "{{ .Values.valkey.addrs | default (printf "%s-valkey:6379" .Release.Name) }}"
            - name: VALKEY_MASTER_NAME
              value: "{{ .Values.valkey.masterName }}"
            - name: VALKEY_DB
              value: "{{ .Values.valkey.db }}"
            - name: VALKEY_CHANNEL
              value: "{{ .Values.valkey.channel }}"
            # Valkey TLS (for managed Valkey/Redis services)
            - name: VALKEY_TLS_ENABLED
              value: "{{ .Values.valkey.tls.enabled | default false }}"
            {{- if .Values.valkey.tls.enabled }}
            - name: VALKEY_TLS_INSECURE
              value: "{{ .Values.valkey.tls.insecureSkipVerify | default false }}"
            {{- if .Values.valkey.tls.caPath }}
            - name: VALKEY_TLS_CA_PATH
              value: "{{ .Values.valkey.tls.caPath }}"
            {{- end }}
            {{- end }}
            # NATS: Use provided value or default to release-name-nats:4222
            - name: NATS_URLS
              value: "{{ .Values.nats.urls | default (printf "nats://%s-nats:4222" .Release.Name) }}"
            - name: NATS_CLUSTER_MODE
              value: "{{ .Values.nats.clusterMode | default false }}"
            - name: NATS_SUBJECT
              value: "{{ .Values.nats.subject | default "ws.broadcast" }}"
            {{- if or .Values.nats.token .Values.nats.existingSecret }}
            - name: NATS_TOKEN
              {{- if .Values.nats.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nats.existingSecret }}
                  key: {{ .Values.nats.existingSecretTokenKey | default "nats-token" }}
              {{- else }}
              value: "{{ .Values.nats.token }}"
              {{- end }}
            {{- end }}
            {{- if .Values.nats.user }}
            - name: NATS_USER
              value: "{{ .Values.nats.user }}"
            {{- end }}
            {{- if or .Values.nats.password .Values.nats.existingSecret }}
            - name: NATS_PASSWORD
              {{- if .Values.nats.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nats.existingSecret }}
                  key: {{ .Values.nats.existingSecretPasswordKey | default "nats-password" }}
              {{- else }}
              value: "{{ .Values.nats.password }}"
              {{- end }}
            {{- end }}
            # NATS broadcast bus TLS (for managed NATS services)
            - name: NATS_TLS_ENABLED
              value: "{{ .Values.nats.tls.enabled | default false }}"
            {{- if .Values.nats.tls.enabled }}
            - name: NATS_TLS_INSECURE
              value: "{{ .Values.nats.tls.insecureSkipVerify | default false }}"
            {{- if .Values.nats.tls.caPath }}
            - name: NATS_TLS_CA_PATH
              value: "{{ .Values.nats.tls.caPath }}"
            {{- end }}
            {{- end }}
            # Provisioning gRPC connection (receives tenant topics via streaming)
            - name: PROVISIONING_GRPC_ADDR
              {{- if .Values.config.provisioningGRPCAddr }}
              value: "{{ .Values.config.provisioningGRPCAddr }}"
              {{- else }}
              value: "{{ .Release.Name }}-provisioning-grpc:9090"
              {{- end }}
            - name: PROVISIONING_GRPC_RECONNECT_DELAY
              value: "{{ .Values.config.provisioningGRPCReconnectDelay | default "1s" }}"
            - name: PROVISIONING_GRPC_RECONNECT_MAX_DELAY
              value: "{{ .Values.config.provisioningGRPCReconnectMaxDelay | default "30s" }}"
            # Connection Limits (application-level safety valve)
            # WS_MAX_CONNECTIONS = clusterMaxConnections / replicaCount (per-pod limit)
            # ResourceGuard enforces actual limits based on CPU/memory at runtime
            - name: WS_MAX_CONNECTIONS
              value: {{ div (.Values.connectionLimits.clusterMaxConnections | required "connectionLimits.clusterMaxConnections is required") (.Values.replicaCount | default 1) | quote }}
            # Alerting Configuration
            - name: ALERT_ENABLED
              value: "{{ .Values.alerting.enabled | default false }}"
            - name: ALERT_MIN_LEVEL
              value: "{{ .Values.alerting.minLevel | default "WARNING" }}"
            {{- if .Values.alerting.slack.webhookUrl }}
            - name: ALERT_SLACK_WEBHOOK_URL
              value: "{{ .Values.alerting.slack.webhookUrl }}"
            {{- end }}
            {{- if .Values.alerting.slack.channel }}
            - name: ALERT_SLACK_CHANNEL
              value: "{{ .Values.alerting.slack.channel }}"
            {{- end }}
            - name: ALERT_SLACK_USERNAME
              value: "{{ .Values.alerting.slack.username | default "AlertBot" }}"
            - name: ALERT_SERVICE_NAME
              value: "ws-server"
            - name: ALERT_RATE_LIMIT_WINDOW
              value: "{{ .Values.alerting.rateLimit.window | default "5m" }}"
            - name: ALERT_RATE_LIMIT_MAX
              value: "{{ .Values.alerting.rateLimit.max | default 3 }}"
            - name: ALERT_CONSOLE_ENABLED
              value: "{{ .Values.alerting.consoleEnabled | default false }}"
            # Audit Logging Configuration
            - name: AUDIT_MIN_LEVEL
              value: "{{ .Values.audit.minLevel | default "INFO" }}"
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
