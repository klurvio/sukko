{{- if .Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ws-server.fullname" . }}-config
  labels:
    {{- include "ws-server.labels" . | nindent 4 }}
data:
  # Server configuration
  WS_ADDR: "{{ .Values.config.lbAddr }}"

  # Rate limiting
  WS_MAX_KAFKA_RATE: "{{ .Values.config.maxKafkaRate }}"
  WS_MAX_BROADCAST_RATE: "{{ .Values.config.maxBroadcastRate }}"

  # Connection rate limiting (DoS protection)
  CONN_RATE_LIMIT_ENABLED: "{{ .Values.config.connRateLimit.enabled }}"
  CONN_RATE_LIMIT_IP_BURST: "{{ .Values.config.connRateLimit.ipBurst }}"
  CONN_RATE_LIMIT_IP_RATE: "{{ .Values.config.connRateLimit.ipRate }}"
  CONN_RATE_LIMIT_GLOBAL_BURST: "{{ .Values.config.connRateLimit.globalBurst }}"
  CONN_RATE_LIMIT_GLOBAL_RATE: "{{ .Values.config.connRateLimit.globalRate }}"

  # CPU thresholds (with hysteresis - 10% band for stability)
  WS_CPU_REJECT_THRESHOLD: "{{ .Values.config.cpuRejectThreshold }}"
  WS_CPU_REJECT_THRESHOLD_LOWER: "{{ sub .Values.config.cpuRejectThreshold 10.0 }}"
  WS_CPU_PAUSE_THRESHOLD: "{{ .Values.config.cpuPauseThreshold }}"
  WS_CPU_PAUSE_THRESHOLD_LOWER: "{{ sub .Values.config.cpuPauseThreshold 10.0 }}"

  # TCP/Network tuning
  TCP_LISTEN_BACKLOG: "{{ .Values.config.tcpListenBacklog }}"
  HTTP_READ_TIMEOUT: "{{ .Values.config.httpReadTimeout }}"
  HTTP_WRITE_TIMEOUT: "{{ .Values.config.httpWriteTimeout }}"
  HTTP_IDLE_TIMEOUT: "{{ .Values.config.httpIdleTimeout }}"

  # Logging
  LOG_LEVEL: "{{ .Values.config.logLevel }}"
  LOG_FORMAT: "{{ .Values.config.logFormat }}"

  # Metrics
  METRICS_INTERVAL: "{{ .Values.config.metricsInterval }}"

  # CPU polling (for protection decisions — faster spike detection)
  CPU_POLL_INTERVAL: "{{ .Values.config.cpuPollInterval }}"

  # WebSocket ping/pong timing
  WS_PONG_WAIT: {{ .Values.config.pongWait | quote }}
  WS_PING_PERIOD: {{ .Values.config.pingPeriod | quote }}
  WS_WRITE_WAIT: {{ .Values.config.writeWait | quote }}

  # Goroutine limit (safety valve against runaway goroutine growth)
  # Each connection uses ~10 goroutines (read/write pumps + proxy)
  # Formula: maxGoroutines = (clusterMaxConnections / replicaCount) * 10 + 5000 (system overhead)
  WS_MAX_GOROUTINES: "{{ add (mul (div (.Values.connectionLimits.clusterMaxConnections | default 100000) (.Values.replicaCount | default 1)) 10) 5000 }}"

  # Slow client detection
  WS_SLOW_CLIENT_MAX_ATTEMPTS: "{{ .Values.config.slowClientMaxAttempts | default 3 }}"

  # Default tenant ID — disables multi-tenant support for the producer.
  # Only used when auth is disabled at the gateway level.
  DEFAULT_TENANT_ID: "{{ .Values.config.defaultTenantID | default "odin" }}"

  # Kafka consumer toggle (connection-only mode for loadtesting)
  KAFKA_CONSUMER_ENABLED: "{{ .Values.kafka.consumerEnabled }}"

  # Kafka topics (comma-separated)
  KAFKA_TOPICS: "{{ join "," .Values.kafka.topics }}"
{{- end }}
