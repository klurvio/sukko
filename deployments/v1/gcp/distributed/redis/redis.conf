# Redis Configuration for WebSocket BroadcastBus
# Optimized for: Low latency (<5ms), Pub/Sub workload, Ephemeral data

# ==================== NETWORK ====================
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ==================== SECURITY ====================
# Password will be set via environment variable
# Use strong password (32+ chars): openssl rand -base64 32
requirepass REDIS_PASSWORD_PLACEHOLDER

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""

# Max simultaneous clients
maxclients 10000

# ==================== MEMORY MANAGEMENT ====================
# 4GB max memory (for e2-standard-2 with 8GB RAM)
maxmemory 4gb

# Eviction policy: Least Recently Used (LRU)
# Pub/Sub messages are ephemeral, prioritize active subscriptions
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ==================== PERSISTENCE ====================
# DISABLED: Market data is ephemeral, prioritize latency over durability
# Data is regenerated from Kafka on restart
save ""
appendonly no

# If you later need persistence, uncomment:
# save 900 1
# save 300 10
# save 60 10000
# appendonly yes
# appendfsync everysec

# ==================== LOGGING ====================
loglevel notice
logfile ""

# ==================== PUB/SUB OPTIMIZATIONS ====================
# Client output buffer limits for pub/sub clients
# Format: <hard limit> <soft limit> <soft seconds>
# Hard limit: 32MB - disconnect if buffer exceeds
# Soft limit: 8MB for 60s - disconnect if sustained
client-output-buffer-limit pubsub 32mb 8mb 60

# Normal clients (WS servers connecting as publishers)
client-output-buffer-limit normal 0 0 0

# Replica output buffer (not used in single-node, but defined)
client-output-buffer-limit replica 256mb 64mb 60

# ==================== LATENCY MONITORING ====================
# Track commands taking longer than 10ms
latency-monitor-threshold 10

# ==================== SLOW LOG ====================
# Log commands slower than 5ms (5000 microseconds)
slowlog-log-slower-than 5000
slowlog-max-len 128

# ==================== PERFORMANCE TUNING ====================
# Server frequency (hz): affects background tasks
# Higher = more responsive eviction/expiration, but more CPU
hz 10
dynamic-hz yes

# Enable active memory defragmentation (Redis 7.x)
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 20
active-defrag-cycle-min 5
active-defrag-cycle-max 75

# ==================== REPLICATION (for future Sentinel setup) ====================
# Uncomment when setting up Sentinel cluster
# replicaof <masterip> <masterport>
# masterauth <master-password>
# replica-read-only yes
# repl-diskless-sync yes
# repl-diskless-sync-delay 5

# ==================== SENTINEL (for future HA setup) ====================
# See sentinel.conf for Sentinel-specific configuration

# ==================== DEBUGGING ====================
# Enable if debugging connection issues
# loglevel debug
# logfile /var/log/redis/redis-server.log

# ==================== NOTES ====================
# This config is optimized for:
# - Pub/Sub workload (broadcast messages)
# - Low latency (<5ms p99)
# - Ephemeral data (no persistence)
# - Single-node deployment (upgrade to Sentinel later)
#
# Monitor these metrics:
# - redis_commands_processed_per_sec (target: 1K-10K)
# - redis_connected_clients (target: 2-10 WS servers)
# - redis_latency_percentiles_usec (target: <5000µs p99)
# - redis_memory_used_bytes / redis_memory_max_bytes (target: <90%)
