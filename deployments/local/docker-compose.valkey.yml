version: '3.8'

# ==============================================================================
# SERVICES
# ==============================================================================
services:
  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: valkey-local
    ports:
      - "6379:6379"
    command: valkey-server --requirepass testpassword --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "testpassword", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - odin-local

  valkey-cli:
    image: valkey/valkey:7.2-alpine
    container_name: valkey-cli
    depends_on:
      - valkey
    command: >
      sh -c "
        echo 'Valkey CLI container ready. Use: docker exec -it valkey-cli valkey-cli -h valkey -a testpassword'
        && tail -f /dev/null
      "
    networks:
      - odin-local

# ==============================================================================
# NETWORKS - Service Communication
# ==============================================================================
networks:
  odin-local:
    external: true
    name: odin-local

# ==============================================================================
# USAGE
# ==============================================================================
# Prerequisites:
#   1. Main local stack must be running (creates odin-local network):
#      cd deployments/local
#      docker-compose up -d
#
#   2. Then start Valkey:
#      docker-compose -f docker-compose.valkey.yml up -d
#
# Commands:
#
# 1. Start Valkey:
#    cd deployments/local
#    docker-compose -f docker-compose.valkey.yml up -d
#
# 2. Check Valkey health:
#    docker exec valkey-local valkey-cli -a testpassword ping
#    Expected: PONG
#
# 3. Monitor Valkey Pub/Sub:
#    docker exec -it valkey-cli valkey-cli -h valkey -a testpassword
#    127.0.0.1:6379> SUBSCRIBE ws.broadcast
#
# 4. Publish test message (from another terminal):
#    docker exec valkey-local valkey-cli -a testpassword PUBLISH ws.broadcast '{"subject":"test","message":"hello"}'
#
# 5. Monitor Valkey stats:
#    docker exec valkey-local valkey-cli -a testpassword INFO stats
#
# 6. Stop Valkey:
#    docker-compose -f docker-compose.valkey.yml down
#
# ==============================================================================
# CONFIGURATION
# ==============================================================================
# Environment variables for ws-server (set in .env.local):
#   VALKEY_ADDRS=localhost:6379
#   VALKEY_PASSWORD=testpassword
#
# Inherited from shared/base.env:
#   VALKEY_MASTER_NAME=mymaster
#   VALKEY_DB=0
#   VALKEY_CHANNEL=ws.broadcast
