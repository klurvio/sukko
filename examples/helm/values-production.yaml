# Sukko — Production Configuration
#
# Full production setup with:
#   - External Kafka for persistent messaging
#   - External PostgreSQL for provisioning storage
#   - Authentication enabled
#   - Autoscaling and resource tuning
#
# Usage:
#   helm install sukko deployments/helm/sukko -f examples/helm/values-production.yaml \
#     --set ws-server.kafka.brokers=kafka-1:9092 \
#     --set ws-server.kafka.sasl.existingSecret=my-kafka-secret

# ── Gateway ──────────────────────────────────────────────────────────
ws-gateway:
  replicaCount: 3
  # Enable auth and tune via extraEnv
  extraEnv:
    AUTH_ENABLED: "true"
  resources:
    requests:
      cpu: "500m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ── WebSocket Server ─────────────────────────────────────────────────
ws-server:
  replicaCount: 3
  environment: prod
  messageBackend: kafka
  connectionLimits:
    clusterMaxConnections: 300000
  kafka:
    brokers: ""  # Set via --set or environment-specific values
    sasl:
      enabled: true
      mechanism: scram-sha-256
      username: "sukko"
      existingSecret: ""  # Set via --set
      existingSecretKey: "kafka-sasl-password"
    tls:
      enabled: true
  resources:
    requests:
      cpu: "2"
      memory: "1Gi"
    limits:
      cpu: "4"
      memory: "2Gi"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70

# ── Provisioning ─────────────────────────────────────────────────────
provisioning:
  replicaCount: 2
  environment: prod
  # External PostgreSQL (required for multi-replica)
  externalDatabase:
    existingSecret: "provisioning-db-credentials"  # K8s secret containing database URL
    existingSecretKey: "database-url"
  # Enable auth via extraEnv
  extraEnv:
    AUTH_ENABLED: "true"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

# ── Infrastructure (disable in-cluster, use external) ────────────────
redpanda:
  enabled: false  # Using external Kafka

nats:
  enabled: true
  replicaCount: 3
  cluster:
    enabled: true
