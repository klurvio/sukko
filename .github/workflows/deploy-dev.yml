# =============================================================================
# Deploy Dev — Build Images + Helm Deploy to DOKS
# =============================================================================
# Triggers on push to main (merge commits).
# Builds Docker images, pushes to ghcr.io, deploys to DOKS dev cluster.

name: Deploy Dev

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Build — Docker images pushed to ghcr.io
  # ===========================================================================
  build-and-push:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: sukko-server
            dir: server
          - name: sukko-gateway
            dir: gateway
          - name: sukko-provisioning
            dir: provisioning
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Set build time
        id: meta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ws
          file: ws/build/${{ matrix.dir }}/Dockerfile
          push: true
          tags: |
            ghcr.io/klurvio/${{ matrix.name }}:${{ github.sha }}
            ghcr.io/klurvio/${{ matrix.name }}:latest
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT_HASH=${{ github.sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Deploy — Helm upgrade to DOKS dev cluster
  # ===========================================================================
  deploy:
    name: Deploy to dev
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install doctl
        uses: digitalocean/action-doctl@6374d029dfd5f449281f186d65663779c706c994 # v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DOKS kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ vars.DOKS_CLUSTER_NAME }}

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Helm upgrade
        run: |
          helm upgrade --install sukko ./deployments/helm/sukko \
            -f ./deployments/helm/sukko/values/do/dev.yaml \
            -n sukko-dev --create-namespace \
            --atomic --timeout 10m \
            --set ws-gateway.image.tag=${{ github.sha }} \
            --set ws-server.image.tag=${{ github.sha }} \
            --set provisioning.image.tag=${{ github.sha }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/sukko-ws-server -n sukko-dev --timeout=3m
          kubectl rollout status deployment/sukko-ws-gateway -n sukko-dev --timeout=3m
          kubectl rollout status deployment/sukko-provisioning -n sukko-dev --timeout=3m
