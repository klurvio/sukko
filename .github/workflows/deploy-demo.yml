# =============================================================================
# Deploy Demo — Helm Deploy to DOKS
# =============================================================================
# Manual trigger only — deploys to real infrastructure.
# Trigger via GitHub UI or CLI: gh workflow run deploy-demo.yml --ref main

name: Deploy Demo

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-demo
  cancel-in-progress: true

jobs:
  deploy:
    if: false # temporarily disabled — cluster torn down
    name: Deploy to demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install doctl
        uses: digitalocean/action-doctl@6374d029dfd5f449281f186d65663779c706c994 # v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Save DOKS kubeconfig
        run: doctl kubernetes cluster kubeconfig save ${{ vars.DOKS_CLUSTER_NAME }}

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Helm upgrade
        run: |
          helm upgrade --install sukko ./deployments/helm/sukko \
            -f ./deployments/helm/sukko/values/doks/demo.yaml \
            -n sukko-demo --create-namespace \
            --atomic --timeout 10m \
            --set ws-gateway.image.tag=${{ github.sha }} \
            --set ws-server.image.tag=${{ github.sha }} \
            --set provisioning.image.tag=${{ github.sha }} \
            --set ws-gateway.service.loadBalancerIP=${{ vars.GATEWAY_IP }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/sukko-ws-server -n sukko-demo --timeout=3m
          kubectl rollout status deployment/sukko-ws-gateway -n sukko-demo --timeout=3m
          kubectl rollout status deployment/sukko-provisioning -n sukko-demo --timeout=3m
