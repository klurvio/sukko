# =============================================================================
# Build Images — Docker images pushed to ghcr.io
# =============================================================================
# Manual trigger only — Docker builds are expensive. Trigger via GitHub UI
# or CLI:
#   gh workflow run build-images.yml --ref main                        # all services
#   gh workflow run build-images.yml --ref main -f services=gateway    # one service
#   gh workflow run build-images.yml --ref main -f services="gateway,server"  # multiple
#
# When "all" (default), detects changes since last tag to decide what to build:
#   - Changes in ws/internal/shared/ or ws/go.mod → rebuild all services
#   - Changes in ws/cmd/server/ or ws/build/server/ → rebuild sukko-server only
#   - etc.

name: Build Images

on:
  workflow_dispatch:
    inputs:
      services:
        description: "Services to build (comma-separated: server,gateway,provisioning,push,tester) or 'all' for change detection"
        required: false
        default: "all"
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images
  cancel-in-progress: true

jobs:
  detect:
    name: Detect services to build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Resolve build matrix
        id: resolve
        run: |
          ALL_SERVICES='["server","gateway","provisioning","push","tester"]'
          INPUT="${{ inputs.services }}"

          # Explicit service list — no change detection needed
          if [ "$INPUT" != "all" ] && [ -n "$INPUT" ]; then
            VALID="server gateway provisioning push tester"
            MATRIX="["
            for svc in $(echo "$INPUT" | tr ',' ' '); do
              svc=$(echo "$svc" | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
              if ! echo "$VALID" | grep -qw "$svc"; then
                echo "::error::Unknown service '$svc'. Valid: $VALID"
                exit 1
              fi
              MATRIX="$MATRIX\"$svc\","
            done
            MATRIX="${MATRIX%,}]"
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "Building explicitly selected: $INPUT"
            exit 0
          fi

          # Change detection: compare HEAD against last tag (or first commit if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGED=$(git diff --name-only "$LAST_TAG"..HEAD)

          # Shared changes → rebuild everything
          if echo "$CHANGED" | grep -qE '^ws/internal/shared/|^ws/go\.(mod|sum)$|^ws/proto/'; then
            echo "matrix=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
            echo "Shared code changed — building all services"
            exit 0
          fi

          # Per-service detection
          SERVICES=""
          for svc in server gateway provisioning push tester; do
            if echo "$CHANGED" | grep -qE "^ws/cmd/$svc/|^ws/build/$svc/|^ws/internal/$svc/"; then
              SERVICES="$SERVICES\"$svc\","
            fi
          done

          if [ -z "$SERVICES" ]; then
            # No service-specific changes detected — build all as fallback
            echo "matrix=$ALL_SERVICES" >> "$GITHUB_OUTPUT"
            echo "No service-specific changes detected — building all services"
          else
            MATRIX="[${SERVICES%,}]"
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            echo "Building changed services: $MATRIX"
          fi

  build-and-push:
    name: Build sukko-${{ matrix.dir }}
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Login to ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Set build time
        id: meta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ws
          file: ws/build/${{ matrix.dir }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/klurvio/sukko-${{ matrix.dir }}:${{ github.sha }}
            ghcr.io/klurvio/sukko-${{ matrix.dir }}:latest
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT_HASH=${{ github.sha }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
