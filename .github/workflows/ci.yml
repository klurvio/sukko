# =============================================================================
# CI — PR Validation Only
# =============================================================================
# Runs on pull requests only — not on every push. Skips spec/doc-only changes.
# Jobs: test, lint, helm-lint (parallel).
# Test and lint are required branch protection checks.

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '*.md'

permissions:
  contents: read
  pull-requests: read

jobs:
  # ---------------------------------------------------------------------------
  # Test — go vet + go test -race
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ws
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: ws/go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Run tests
        run: go test -race -count=1 -timeout=10m ./...

  # ---------------------------------------------------------------------------
  # Lint — golangci-lint + verify auto-fixable issues
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ws
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: ws/go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa # v7
        with:
          version: latest
          working-directory: ws

      - name: Verify auto-fixable issues are resolved
        run: |
          golangci-lint run --fix ./... || true
          gofmt -s -w .
          go fix ./... || true
          go mod tidy
          if [ -n "$(git diff)" ]; then
            echo "::error::Code has auto-fixable issues. Run '/lint' locally and commit the changes."
            git diff --stat
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Helm Lint — validate Helm chart values
  # ---------------------------------------------------------------------------
  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Lint DOKS values
        run: helm lint deployments/helm/sukko -f deployments/helm/sukko/values/doks/demo.yaml
